    setIsGenScript(true);setPodMsg({type:"",text:""});
    const guidance = buildEditorGuidance(aiPrompts.script, "Orientação do editor para este roteiro");
    try {
      const ctx = podSelectedList.map(nl=>
        `═══ NEWSLETTER ${fmtDateMag(nl.date)}: ${nl.title} ═══\n` +
        `Subtítulo: ${nl.subtitle||"(s/)"}\n\n` +
        `Resumo:\n${nl.aiSummary||"(s/)"}\n\n` +
        `Empresas: ${(nl.companies||[]).join(", ")}\n` +
        `Tópicos: ${(nl.topics||[]).join(", ")}\n\n` +
        `Manchetes:\n${(nl.headlines||[]).map(h=>`- ${h.title}: ${h.summary}`).join("\n")}`
      ).join("\n\n═══════════════════\n\n");

      const t = await callClaude(apiKey,
        `Crie um ROTEIRO DE PODCAST EM VÍDEO para o HeyGen.

CONTEXTO: Sync·MI é um podcast semanal de IA. Tom DIRETO, SIMPLES e ENTUSIASTA. Foco em INOVAÇÕES de IA com EXEMPLOS CLAROS. 5-7 minutos, português brasileiro.${guidance}

INSTRUÇÕES DE FORMATO (HeyGen lê isto literalmente):
- Use blocos [CENA N · Reação: <descritor> · ~<segundos>s] antes de cada cena para que o operador configure no HeyGen Studio
- Reações disponíveis: animada, focada, surpresa, séria, animadora, reflexiva
- Use [QUEBRA · Xs] entre cenas (transições do HeyGen)
- Dentro da fala, use texto normal — HeyGen lê literal. Use "..." para pausas curtas.
- NÃO use marcação em colchetes dentro da fala — apenas nas separações entre cenas
- 4 a 6 cenas no total (abertura, 2-3 temas, fechamento)

NEWSLETTERS DE BASE:
${ctx}

ESTRUTURA:
- Cena 1: abertura entusiasmada (~20s) — apresenta a semana
- Cenas 2-4: 2-3 temas principais com exemplos práticos (~45-60s cada)
- Cena final: fechamento + chamada para newsletter (~20s)

Retorne APENAS o roteiro formatado, em português brasileiro.`,
        false, 3500, "Roteirista de podcasts de IA. Português brasileiro. Direto, claro, entusiasta.");

      setPodScript(t.trim());

      // Also generate title, description, highlights
      const meta = await callClaude(apiKey,
        `A partir do roteiro abaixo, gere o METADADO do vídeo.
Responda APENAS JSON válido (comece com { termine com }). Sem markdown. Sem prosa antes ou depois.
{"title":"título magnético max 10 palavras","description":"descrição YouTube 2-3 parágrafos, tom direto e entusiasta","highlights":["**Lançamento da semana** que importa\\nExemplo prático em 1 linha","🔒 *Segurança*: novo limite reduz X em Y%"]}

NOTA sobre highlights: cada item pode usar **negrito**, *itálico* e emojis. Use \\n para quebrar linha dentro de um highlight. Retorne 5 highlights, escritos em PT-BR.

ROTEIRO:
${t.slice(0,3000)}`,
        false, 1500);
      try {
        const p = parseJsonResponse(meta, "object");
        setPodTitle(p.title||"");
        setPodDescription(p.description||"");
        const hl = Array.isArray(p.highlights) ? p.highlights : (p.highlights ? [String(p.highlights)] : []);
        setPodHighlights(hl.filter(Boolean).join("\n\n"));
      } catch(metaErr){
        console.warn("meta parse failed:", metaErr.message);
        // Script was generated successfully; just couldn't parse metadata
      }
      setPodMsg({type:"ok",text:"✓ Roteiro + metadados gerados!"});
    } catch(err){setPodMsg({type:"err",text:"Erro: "+err.message});}
    setIsGenScript(false);
  };

  const savePodcast = async () => {
    if(!podTitle.trim()){setPodMsg({type:"err",text:"Título é obrigatório."});return;}
    const id = editingPodId || `podcast:${podWeek}`;
    const p = {
      id, week:podWeek, title:podTitle, description:podDescription,
      videoUrl:podVideoUrl, videoBlobRef:podVideoBlobRef,
      aspectRatio:podAspect, duration:podDuration, highlights:podHighlights,

      thumbnailUrl:podThumbnailUrl,

  const [podUploadPct,setPodUploadPct] = useState(null); // null = idle, 0..100 = uploading

  const handlePodVideoUpload = async (e) => {
    const f = e.target.files?.[0]; if(!f) return;
    const MB = 1024*1024;
    const MAX_MB = 300;
    if(f.size > MAX_MB*MB){setPodMsg({type:"err",text:`Arquivo de ${(f.size/MB).toFixed(1)}MB excede o limite de ${MAX_MB}MB. Use uma URL externa (HeyGen, YouTube...).`});return;}
    if(!storageApi.available()){setPodMsg({type:"err",text:"Supabase Storage não configurado. Use o campo URL externa."});return;}
    const sizeStr = (f.size/MB).toFixed(1) + "MB";
    setPodUploadPct(0);
    setPodMsg({type:"info",text:`⏳ Enviando vídeo (${sizeStr})... não feche esta aba. O upload é retomável se a conexão cair.`});
    try {
      if(isStorageUrl(podVideoUrl)) await storageApi.deleteByUrl(podVideoUrl);
      // Resumable (TUS) handles large files reliably with progress
      const { url } = await storageApi.uploadResumable(f, "video", (frac)=>{
        setPodUploadPct(Math.round(frac*100));
      });
      setPodVideoUrl(url);
      setPodVideoBlobRef("");
      setPodUploadPct(null);
      setPodMsg({type:"ok",text:`✓ Vídeo enviado (${sizeStr}). Aparece no preview abaixo e na página pública.`});
    } catch(err){
      setPodUploadPct(null);
      setPodMsg({type:"err",text:`Falha no upload: ${err.message||err}. Tente novamente — o upload retoma de onde parou.`});
    }
  };

  const copyScript = () => {
    navigator.clipboard.writeText(podScript);
    setPodMsg({type:"ok",text:"✓ Roteiro copiado pro clipboard"});

  return <>
    <Ticker vol="01" episodes={newsletters.length}/>
    <Nav isAdmin={true} session={session} onLogout={onLogout}/>

    <main className="container" style={{padding:"40px 32px 80px"}}>
      {/* TABS */}
      <div style={{display:"flex",gap:6,marginBottom:32,paddingBottom:14,borderBottom:`1px solid ${BRAND.rule}`,flexWrap:"wrap"}}>

            {n:2,label:"Curadoria",icon:"✍️"},
            {n:3,label:"Temas em Destaque",icon:"🎯"},
            {n:4,label:"Título & Subtítulo",icon:"📰"},

          ].map((s,i,arr)=>(
            <div key={s.n} onClick={()=>setWizardStep(s.n)} style={{flex:1,minWidth:130,padding:"10px 12px",cursor:"pointer",borderRight:i<arr.length-1?`1px solid ${BRAND.rule}`:"none",background:wizardStep===s.n?BRAND.ink:wizardStep>s.n?`${BRAND.signal}25`:"transparent",color:wizardStep===s.n?BRAND.paper:wizardStep>s.n?BRAND.inkSoft:BRAND.mute,transition:"all .2s",position:"relative"}}>
              <div className="mono small-caps" style={{fontSize:".58rem",opacity:.8,marginBottom:4}}>PASSO {s.n}</div>
              <div style={{fontSize:".78rem",fontWeight:600,display:"flex",alignItems:"center",gap:6}}>
                <span>{wizardStep>s.n?"✓":s.icon}</span><span>{s.label}</span>
              </div>
            </div>

            </div>
            <PromptHelper
              value={aiPrompts.search}

                  </div>

            </div>

        {/* ═══ STEP 2: Curadoria ═══ */}
        {wizardStep===2 && <div className="fade">
          <div className="card card-pad" style={{padding:24,marginBottom:18,background:`linear-gradient(180deg,${BRAND.paperLight} 0%,rgba(229,67,27,.04) 100%)`}}>

            <div className="mono" style={{fontSize:".72rem",color:BRAND.mute}}>

            </div>

          </div>

              <select value={editingPodId||""} onChange={e=>e.target.value?loadPodcastForEdit(e.target.value):newPodcast()} style={{width:"100%"}}>
                <option value="">— Novo episódio —</option>
                {allPodcasts.map(p=><option key={p.id} value={p.id}>{p.title} · {p.week}</option>)}
              </select>
            </Field>
            <Field label="Semana (data de referência)" style={{minWidth:200}}>
              <Input type="date" value={podWeek} onChange={e=>setPodWeek(e.target.value)}/>
            </Field>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={newPodcast} className="btn btn-ghost btn-sm">+ Novo</button>
            <Btn onClick={savePodcast} disabled={!podTitle.trim()}>💾 Salvar Podcast</Btn>
            {editingPodId && <button onClick={()=>deletePodcast(editingPodId)} className="btn btn-ghost btn-sm" style={{borderColor:BRAND.accent,color:BRAND.accent}}>🗑</button>}
            {editingPodId && <a href={`?view=podcast&id=${encodeURIComponent(editingPodId)}`} target="_blank" rel="noreferrer" className="btn btn-ghost btn-sm">👁 Ver público</a>}
          </div>
        </div>

        {podMsg.text && <div className={podMsg.type==="ok"?"alert-ok":podMsg.type==="err"?"alert-error":"alert-info"}>{podMsg.text}</div>}

        {/* STEP A: Select newsletters */}
        <div className="card card-pad" style={{padding:24,marginBottom:18,background:`linear-gradient(180deg,${BRAND.paperLight} 0%,rgba(229,67,27,.03) 100%)`}}>
          <div className="mono small-caps" style={{color:BRAND.accent,marginBottom:14}}>A · NEWSLETTERS-BASE ({podSelectedNls.size} selecionadas)</div>
          {newsletters.length===0 ? <div style={{padding:24,textAlign:"center",color:BRAND.mute,fontStyle:"italic"}}>Nenhuma newsletter publicada ainda. Publique algumas em "Newsletter".</div>
          : <div style={{display:"flex",flexDirection:"column",gap:8,maxHeight:260,overflowY:"auto"}}>
            {newsletters.map(n=>{
              const sel = podSelectedNls.has(n.date);
              return <label key={n.date} style={{display:"grid",gridTemplateColumns:"auto 110px 1fr auto",gap:14,alignItems:"center",padding:"10px 14px",background:sel?BRAND.paperLight:"transparent",border:`1px solid ${sel?BRAND.accent:BRAND.rule}`,borderRadius:4,cursor:"pointer",transition:"all .15s"}}>
                <input type="checkbox" checked={sel} onChange={()=>togglePodNl(n.date)} style={{accentColor:BRAND.ink,cursor:"pointer",width:18,height:18}}/>
                <div className="mono" style={{fontSize:".72rem",color:BRAND.inkSoft,textTransform:"uppercase",letterSpacing:".08em"}}>{fmtDateMag(n.date)}</div>
                <div style={{fontFamily:"'Fraunces',serif",fontSize:".98rem",lineHeight:1.2}}>{n.title}</div>
                <div className="mono" style={{fontSize:".66rem",color:BRAND.mute}}>{(n.headlines||[]).length} manchetes</div>
              </label>;
            })}
          </div>}
        </div>

        {/* STEP B: Generate script */}
        <div className="card card-pad" style={{padding:24,marginBottom:18}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:8}}>
            <div className="mono small-caps" style={{color:BRAND.accent}}>B · ROTEIRO PARA HEYGEN (com cenas, reações e quebras)</div>
            <div style={{display:"flex",gap:6}}>
              <Btn onClick={generateHeyGenScript} disabled={isGenScript||!keyValidated||podSelectedNls.size===0}>{isGenScript?<><Spin/> Gerando...</>:"✨ Gerar Roteiro com IA"}</Btn>
              {podScript && <Btn size="sm" onClick={copyScript}>📋 Copiar</Btn>}
            </div>
          </div>
          <PromptHelper
            value={aiPrompts.script}
            onChange={updateAiPrompt("script")}
            label="ORIENTAÇÃO PARA O ROTEIRO (opcional)"
            placeholder="Ex: abra com uma manchete chocante; use Cena 3 pra criticar o hype; encerre convidando pra newsletter; mantenha tom irreverente..."/>
          <TArea value={podScript} onChange={e=>setPodScript(e.target.value)} rows={14} placeholder="Roteiro será gerado com cenas marcadas para o HeyGen Studio. Edite à vontade depois..." style={{fontFamily:"'JetBrains Mono',monospace",fontSize:".82rem",lineHeight:1.6}}/>
          <div style={{marginTop:8,fontSize:".78rem",color:BRAND.mute,fontStyle:"italic"}}>
            O roteiro usa marcadores [CENA N · Reação: animada · ~30s] e [QUEBRA · 1s]. Copie e cole cena por cena no HeyGen Studio.
          </div>
        </div>

        {/* STEP C: Metadata + video URL */}
        <div style={{display:"grid",gridTemplateColumns:"3fr 2fr",gap:18,marginBottom:18}}>
          <div className="card card-pad" style={{padding:22}}>
            <div className="mono small-caps" style={{color:BRAND.accent,marginBottom:12}}>C · METADADOS DO VÍDEO</div>
            <Field label="Título (como aparece no YouTube)" style={{marginBottom:12}}>
              <Input value={podTitle} onChange={e=>setPodTitle(e.target.value)} placeholder="Sync·MI Semanal · 12-18 mai" style={{fontFamily:"'Fraunces',serif",fontSize:"1.15rem"}}/>
            </Field>
            <Field label="Descrição">
              <TArea value={podDescription} onChange={e=>setPodDescription(e.target.value)} rows={7} placeholder="O que aparece embaixo do vídeo (estilo YouTube)..."/>
            </Field>
          </div>

          <div className="card card-pad" style={{padding:22}}>
            <div className="mono small-caps" style={{color:BRAND.accent,marginBottom:12}}>D · VÍDEO (HEYGEN OU UPLOAD)</div>
            <Field label="URL externa do vídeo (HeyGen, Vimeo, YouTube...)" style={{marginBottom:8}}>
              <Input value={podVideoUrl && !isStorageUrl(podVideoUrl) ? podVideoUrl : ""} onChange={e=>{setPodVideoUrl(e.target.value);setPodVideoBlobRef("");}} placeholder="https://app.heygen.com/videos/..."/>
            </Field>
            <div style={{fontSize:".74rem",color:BRAND.mute,fontStyle:"italic",marginBottom:10,padding:"4px 8px",borderLeft:`2px solid ${BRAND.rule}`}}>
              — OU, se preferir não depender de URL externa —
            </div>
            <Field label="Upload do arquivo (.mp4 .webm .mov · até 300MB)" style={{marginBottom:8}}>
              <input type="file" accept="video/*" onChange={handlePodVideoUpload} disabled={podUploadPct!==null} style={{fontSize:".82rem"}}/>
            </Field>
            {podUploadPct!==null && <div style={{marginBottom:10}}>
              <div style={{height:8,background:BRAND.paperDark,borderRadius:100,overflow:"hidden",border:`1px solid ${BRAND.rule}`}}>
                <div style={{height:"100%",width:`${podUploadPct}%`,background:`linear-gradient(90deg,${BRAND.accent},${BRAND.signal})`,transition:"width .3s ease"}}></div>
              </div>
              <div className="mono" style={{fontSize:".66rem",color:BRAND.mute,marginTop:5,textAlign:"center"}}>{podUploadPct}% enviado{podUploadPct>=100?" · finalizando..." :""}</div>
            </div>}
            {isStorageUrl(podVideoUrl) && <div style={{padding:"6px 10px",background:`rgba(200,148,27,.1)`,borderRadius:4,fontSize:".72rem",color:BRAND.accentDeep,marginBottom:10,display:"flex",alignItems:"center",gap:8,fontFamily:"'JetBrains Mono',monospace",letterSpacing:".05em"}}>
              <span>📦</span>
              <span style={{flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>STORAGE · {(storageUrlToPath(podVideoUrl)||"").split("/").pop()}</span>
              <button onClick={async()=>{if(confirm("Apagar este arquivo do Storage e desvincular do podcast?")){await storageApi.deleteByUrl(podVideoUrl);setPodVideoUrl("");}}} style={{background:"transparent",border:"none",cursor:"pointer",color:BRAND.accent,fontSize:".72rem",fontFamily:"inherit",letterSpacing:"inherit"}}>🗑 REMOVER</button>
            </div>}
            {podVideoBlobRef && <div className="mono" style={{fontSize:".66rem",color:BRAND.signal,marginBottom:10}}>✓ Vídeo legado carregado (base64, formato antigo)</div>}
            <Field label="URL da thumbnail (opcional)" style={{marginBottom:10}}>
              <Input value={podThumbnailUrl} onChange={e=>setPodThumbnailUrl(e.target.value)} placeholder="https://...jpg"/>
            </Field>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
              <Field label="Formato">
                <select value={podAspect} onChange={e=>setPodAspect(e.target.value)} style={{width:"100%"}}>
                  <option value="16/9">💻 16:9 (horizontal)</option>
                  <option value="9/16">📱 9:16 (vertical)</option>
                  <option value="1/1">⏹ 1:1 (quadrado)</option>
                </select>
              </Field>
              <Field label="Duração (min)">
                <Input type="number" value={podDuration} onChange={e=>setPodDuration(+e.target.value||0)}/>
              </Field>
            </div>
            {(podVideoUrl||podVideoBlobRef) && <div style={{marginTop:14,padding:12,background:BRAND.paperDark,borderRadius:4}}>
              <div className="mono small-caps" style={{color:BRAND.mute,marginBottom:8,fontSize:".58rem"}}>PREVIEW</div>
              <VideoPlayer url={podVideoBlobRef?null:podVideoUrl} aspectRatio={podAspect} maxWidth="100%"/>
              {podVideoBlobRef && <div style={{padding:14,textAlign:"center",color:BRAND.mute,fontSize:".82rem",fontStyle:"italic"}}>Preview disponível após salvar e abrir página pública</div>}
            </div>}
          </div>
        </div>

        {/* HIGHLIGHTS — full width with editor + live preview */}
        <div className="card card-pad" style={{padding:24,marginBottom:18,background:`linear-gradient(135deg,${BRAND.paperLight},rgba(229,67,27,.04))`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,flexWrap:"wrap",gap:8}}>
            <div className="mono small-caps" style={{color:BRAND.accent}}>E · HIGHLIGHTS DO EPISÓDIO</div>
            <div className="mono" style={{fontSize:".68rem",color:BRAND.mute}}>
              {splitHighlights(podHighlights).length} bloco{splitHighlights(podHighlights).length===1?"":"s"} · {podHighlights.length} caracteres
            </div>
          </div>
          <div style={{fontSize:".8rem",color:BRAND.inkSoft,marginBottom:12,padding:"8px 12px",background:BRAND.paperDark,borderRadius:4,lineHeight:1.55}}>
            <strong>Formatação:</strong> use <code style={{padding:"1px 6px",background:"rgba(16,13,8,.08)",borderRadius:3,fontFamily:"'JetBrains Mono',monospace",fontSize:".88em"}}>**negrito**</code>, <code style={{padding:"1px 6px",background:"rgba(16,13,8,.08)",borderRadius:3,fontFamily:"'JetBrains Mono',monospace",fontSize:".88em"}}>*itálico*</code>, <code style={{padding:"1px 6px",background:"rgba(16,13,8,.08)",borderRadius:3,fontFamily:"'JetBrains Mono',monospace",fontSize:".88em"}}>`código`</code> e emojis livremente 🚀.
            Quebra de linha simples = nova linha dentro do mesmo bloco. <strong>Linha em branco</strong> entre blocos separa um highlight do próximo.
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:18,alignItems:"stretch"}}>
            <div>
              <div className="mono small-caps" style={{color:BRAND.mute,marginBottom:6,fontSize:".6rem"}}>EDITOR</div>
              <TArea value={podHighlights} onChange={e=>setPodHighlights(e.target.value)} rows={16}
                placeholder={`🚀 **OpenAI lança modelo agente** que faz pesquisa autônoma\nEle navega na web, lê artigos e produz relatórios em minutos.\n\n🔒 **Anthropic foca em segurança** com nova versão Claude\nNovos guardrails reduzem risco de jailbreak em 40%.\n\n💡 *Exemplo prático:* qualquer dev pode usar via API com 3 linhas de código.`}
                style={{fontFamily:"'JetBrains Mono',monospace",fontSize:".88rem",lineHeight:1.6,minHeight:380}}/>
            </div>
            <div style={{display:"flex",flexDirection:"column"}}>
              <div className="mono small-caps" style={{color:BRAND.mute,marginBottom:6,fontSize:".6rem"}}>PREVIEW AO VIVO (como aparece publicado)</div>
              <div style={{flex:1,minHeight:380,padding:"18px 22px",background:BRAND.paper,border:`1px solid ${BRAND.rule}`,borderRadius:8,overflowY:"auto"}}>
                {splitHighlights(podHighlights).length===0 ? <div style={{color:BRAND.mute,fontStyle:"italic",fontFamily:"'Fraunces',serif",fontSize:"1rem",textAlign:"center",paddingTop:40}}>O preview aparece aqui conforme você digita.</div>
                : <div style={{display:"flex",flexDirection:"column",gap:14}}>
                  {splitHighlights(podHighlights).map((h,i)=>(
                    <div key={i} style={{display:"grid",gridTemplateColumns:"36px 1fr",gap:10,alignItems:"flex-start",paddingBottom:12,borderBottom:i<splitHighlights(podHighlights).length-1?`1px solid ${BRAND.rule}`:"none"}}>
                      <div className="mono" style={{fontSize:".78rem",color:BRAND.accent,fontWeight:600,paddingTop:3}}>{padNum(i+1,2)}</div>
                      <div style={{fontFamily:"'Fraunces',serif",fontSize:"1rem",lineHeight:1.5,color:BRAND.ink}} dangerouslySetInnerHTML={{__html: renderHighlightHTML(h)}}/>
                    </div>
                  ))}
                </div>}
              </div>
            </div>
          </div>
        </div>

        <div style={{display:"flex",justifyContent:"flex-end",gap:10}}>
          <Btn onClick={savePodcast} disabled={!podTitle.trim()}>💾 Salvar Podcast</Btn>
        </div>
      </div>}

      {/* TAB 2: DIVULGAÇÃO (Social Studio) */}
      {tab===2 && <SocialStudio apiKey={apiKey} keyValidated={keyValidated} newsletters={newsletters}/>}

      {/* TAB 3: FONTES */}
      {tab===3 && <div className="fade">
        <SectionLabel num="📡">Fontes de Notícias</SectionLabel>
        <p style={{fontFamily:"'Fraunces',serif",fontStyle:"italic",color:BRAND.inkSoft,fontSize:"1.05rem",marginTop:-24,marginBottom:24}}>
          Fontes que a IA prioriza ao buscar manchetes no Passo 1 da Newsletter. O catálogo padrão tem <strong>{DEFAULT_SOURCES.length}</strong> fontes (Brasil, internacional, labs de IA, podcasts e dev).
        </p>

        <div className="card card-pad" style={{padding:24,marginBottom:18,background:`linear-gradient(135deg,${BRAND.paperLight},rgba(200,148,27,.06))`}}>
          <div className="mono small-caps" style={{color:BRAND.accent,marginBottom:14}}>➕ ADICIONAR NOVA FONTE</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 2fr 130px auto",gap:10,alignItems:"end"}}>
            <Field label="Nome"><Input value={srcName} onChange={e=>setSrcName(e.target.value)} placeholder="TechCrunch"/></Field>
            <Field label="URL"><Input value={srcUrl} onChange={e=>setSrcUrl(e.target.value)} placeholder="https://..."/></Field>
            <Field label="Categoria">
              <select value={srcCategory} onChange={e=>setSrcCategory(e.target.value)} style={{width:"100%"}}>
                {CAT_LABELS.map(c=><option key={c}>{c}</option>)}
              </select>
            </Field>
            <Btn onClick={handleAddSource}>➕ Adicionar</Btn>
          </div>
          {srcMsg.text && <div className={srcMsg.type==="ok"?"alert-ok":"alert-error"}>{srcMsg.text}</div>}
        </div>

        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:10}}>
          <div className="mono small-caps" style={{color:BRAND.mute}}>
            📡 FONTES CADASTRADAS ({newsSources.length} · {newsSources.filter(s=>s.active).length} ATIVAS)
          </div>
          <Btn size="sm" variant="ghost" onClick={handleRestoreDefaults}>↻ Restaurar fontes padrão</Btn>
        </div>

        {newsSources.length===0 ? <div style={{padding:60,textAlign:"center",border:`1px dashed ${BRAND.rule}`,borderRadius:4,color:BRAND.mute,fontStyle:"italic",fontFamily:"'Fraunces',serif"}}>Nenhuma fonte ainda. Adicione acima ou clique em "Restaurar fontes padrão".</div>
        : (() => {
            // Group sources by category
            const groups = {};
            newsSources.forEach(s=>{(groups[s.category||"Outros"]=groups[s.category||"Outros"]||[]).push(s);});
            // Custom order: Brasil → IA → LLM → Podcast → Sistêmico → resto
            const order = ["Brasil","IA","LLM","Podcast","Sistêmico","Produtividade","Hardware","Software","Cloud","Startups","Regulação","Outros"];
            const sortedCats = Object.keys(groups).sort((a,b)=>{
              const ia = order.indexOf(a), ib = order.indexOf(b);
              return (ia===-1?99:ia) - (ib===-1?99:ib);
            });
            return sortedCats.map(cat=>(
              <div key={cat} style={{marginBottom:22}}>
                <div className="mono small-caps" style={{color:BRAND.accent,marginBottom:10,paddingBottom:6,borderBottom:`1px solid ${BRAND.rule}`}}>
                  {cat} ({groups[cat].length})
                </div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(320px,1fr))",gap:10}}>
                  {groups[cat].map(s=>
                    <div key={s.id} className="card" style={{padding:14,opacity:s.active?1:.55,borderLeft:s.active?`4px solid ${BRAND.signal}`:`4px solid ${BRAND.mute}`}}>
                      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:8,marginBottom:8}}>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontWeight:600,fontSize:".95rem",fontFamily:"'Fraunces',serif",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.name}</div>
                        </div>
                        <span className={s.active?"chip sig":"chip"} style={{fontSize:".58rem"}}>{s.active?"● ATIVA":"○ INATIVA"}</span>
                      </div>
                      <a href={s.url} target="_blank" rel="noreferrer" className="mono" style={{fontSize:".7rem",color:BRAND.mute,textDecoration:"none",display:"block",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginBottom:10}}>↗ {s.url}</a>
                      <div style={{display:"flex",gap:5}}>
                        <button onClick={async()=>{await newsSourcesApi.toggleActive(s.id);await reloadSources();}} className="btn btn-ghost btn-sm" style={{flex:1,justifyContent:"center"}}>{s.active?"🚫 Desativar":"✓ Ativar"}</button>
                        <button onClick={async()=>{if(confirm("Apagar?")){await newsSourcesApi.remove(s.id);await reloadSources();}}} className="btn btn-ghost btn-sm" style={{borderColor:BRAND.accent,color:BRAND.accent}}>🗑</button>
                      </div>
                    </div>
                  )}
                </div>
              </div>
            ));
          })()}
      </div>}

      {/* TAB 4: AUDIÊNCIA */}
      {tab===4 && <AudiencePanel/>}

      {/* TAB 5: CONFIGURAÇÕES */}
      {tab===5 && <div className="fade">
        <SectionLabel num="⚙️">Configurações</SectionLabel>

        {!SB_OK && <div className="alert-error" style={{marginBottom:24}}>
          ⚠ Supabase não configurado. Defina as env vars <code>SUPABASE_URL</code> e <code>SUPABASE_ANON_KEY</code> no Vercel (ou preencha os fallbacks no topo do <code>index.html</code>). Veja <code>SETUP.md</code>.
        </div>}

        <div className="card card-pad" style={{padding:28,marginBottom:18}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
            <div className="mono small-caps" style={{color:BRAND.accent,flex:1}}>🤖 ANTHROPIC API (Claude)</div>
            <span className={keyValidated?"chip sig":"chip"}>{keyValidated?"✓ VALIDADA":"PENDENTE"}</span>
          </div>
          <p style={{fontSize:".88rem",color:BRAND.inkSoft,lineHeight:1.5,marginTop:0,marginBottom:14}}>
            Sua chave fica salva no Supabase. Pegue em <a href="https://console.anthropic.com/" target="_blank" style={{color:BRAND.accent}}>console.anthropic.com</a>.
          </p>
          <Field label="Chave (sk-ant-...)" style={{marginBottom:10}}>
            <Input type="password" value={apiKey} onChange={e=>setApiKey(e.target.value)} placeholder="sk-ant-..."/>
          </Field>
          <Btn onClick={testAnthropic} disabled={testing.anthropic||!apiKey}>{testing.anthropic?<><Spin/> Testando</>:"▶ Testar conexão"}</Btn>
          {testResults.anthropic && <div className={testResults.anthropic.status==="ok"?"alert-ok":"alert-error"}>{testResults.anthropic.msg}</div>}
        </div>

        <div className="card card-pad" style={{padding:28}}>
          <div className="mono small-caps" style={{color:BRAND.accent,marginBottom:14}}>🔐 TROCAR SENHA</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:12}}>
            <Field label="Senha atual"><Input type="password" value={pwdCurrent} onChange={e=>setPwdCurrent(e.target.value)}/></Field>
            <Field label="Nova senha (min 6)"><Input type="password" value={pwdNew} onChange={e=>setPwdNew(e.target.value)}/></Field>
            <Field label="Confirmar"><Input type="password" value={pwdNewConfirm} onChange={e=>setPwdNewConfirm(e.target.value)}/></Field>
          </div>
          <Btn onClick={submitPasswordChange} disabled={!pwdCurrent||!pwdNew||!pwdNewConfirm}>🔑 Alterar senha</Btn>
          {pwdMsg.text && <div className={pwdMsg.type==="ok"?"alert-ok":"alert-error"}>{pwdMsg.text}</div>}
        </div>
      </div>}

      {/* TAB 6: ARQUIVO */}
      {tab===6 && <div className="fade">
        <SectionLabel num="📚">Arquivo de Edições</SectionLabel>
        {newsletters.length===0 ? <div style={{padding:80,textAlign:"center",border:`1px dashed ${BRAND.rule}`,borderRadius:4,color:BRAND.mute,fontStyle:"italic",fontFamily:"'Fraunces',serif",fontSize:"1.2rem"}}>Nenhuma edição publicada ainda</div>
        : <div style={{borderTop:`1px solid ${BRAND.ink}`}}>
          {newsletters.map((n,i)=>{
            const num = newsletters.length - i;
            return <div key={n.date} style={{display:"grid",gridTemplateColumns:"80px 110px 1fr 110px auto",gap:24,alignItems:"center",padding:"20px 0",borderBottom:`1px solid ${BRAND.rule}`}}>
              <div className="mono" style={{fontSize:".78rem",color:BRAND.mute}}>№ {padNum(num)}</div>
              <div className="mono" style={{fontSize:".82rem",color:BRAND.inkSoft,textTransform:"uppercase",letterSpacing:".08em"}}>{fmtDateMag(n.date)}</div>
              <div style={{fontFamily:"'Fraunces',serif",fontSize:"1.15rem",letterSpacing:"-.01em"}}>{n.title}</div>
              <div className="mono" style={{fontSize:".72rem",color:BRAND.mute,textAlign:"right"}}>{n.podcastDuration||"—"}min</div>
              <div style={{display:"flex",gap:6}}>
                <button onClick={()=>{setEditorDate(n.date);setTab(0);}} className="btn btn-ghost btn-sm">✏️</button>
                <a href={`?view=public&date=${n.date}`} target="_blank" className="btn btn-ghost btn-sm">👁</a>
                <button onClick={()=>deleteNewsletter(n.date)} className="btn btn-ghost btn-sm" style={{borderColor:BRAND.accent,color:BRAND.accent}}>🗑</button>
              </div>
            </div>;
          })}
        </div>}
      </div>}
    </main>
  </>;
}

// APP ROUTER
// ═══════════════════════════════════════════════════════════════════════════
function App(){
  const [session,setSession] = useState(null);
  const [checking,setChecking] = useState(true);
  const [view,setView] = useState(() => {
    const params = new URLSearchParams(window.location.search);
    return params.get("view") || "landing";
  });

  useEffect(()=>{(async()=>{
    if(SB_OK){
      const s = await auth.getSession();
      if(s && s.expiresAt > Date.now()) setSession(s);
    }
    setChecking(false);
  })()},[]);

  if(checking){
    return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:BRAND.mute,fontFamily:"'JetBrains Mono',monospace",fontSize:".8rem",letterSpacing:".14em",textTransform:"uppercase"}}>
      <div style={{textAlign:"center"}}><div style={{fontSize:"2rem",marginBottom:12}}>⏳</div>SINCRONIZANDO...</div>
    </div>;
  }

  if(view === "admin"){
    if(!session) return <LoginPage onSuccess={(s)=>{setSession(s);}}/>;
    return <AdminApp session={session} onLogout={async()=>{await auth.logout();setSession(null);window.location.href="?view=landing";}}/>;
  }

  if(view === "public") return <PublicNewsletter/>;
  if(view === "podcasts") return <PodcastsPage/>;
  if(view === "podcast") return <PodcastDetail/>;

  return <LandingPage/>;
}

// ── Bootstrap: carrega config do servidor (/api/config → env vars do Vercel),
// inicializa o Supabase e só então renderiza o app. Fallback gracioso se /api
// não existir (ex: abrir o arquivo local) ou demorar demais.
(async function bootstrap(){
  try {
    const ctrl = new AbortController();
    const t = setTimeout(()=>ctrl.abort(), 4000);
    const r = await fetch("/api/config", { cache:"no-store", signal: ctrl.signal });
    clearTimeout(t);
    if(r.ok){
      const cfg = await r.json();
      if(cfg && cfg.supabaseUrl && cfg.supabaseAnonKey){
        initSupabase(cfg.supabaseUrl, cfg.supabaseAnonKey);
      }
    }
  } catch(e){ /* sem /api (local) ou timeout — usa o fallback hardcoded, se houver */ }
  if(!SB_OK) initSupabase(SUPABASE_URL, SUPABASE_ANON_KEY);
  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
})();
</script>
</body>
</html>
