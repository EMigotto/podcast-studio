// ─── DB LAYER ────────────────────────────────────────────────────────────────

const hasClaudeStorage = () => typeof window !== "undefined" && window.storage;
const db = {
  async get(key) {
    try {
      if (hasClaudeStorage()) { const r = await window.storage.get(key); return r ? JSON.parse(r.value) : null; }
      const v = localStorage.getItem(key); return v ? JSON.parse(v) : null;
    } catch { return null; }
  },
  async set(key, value) {
    try {
      if (hasClaudeStorage()) await window.storage.set(key, JSON.stringify(value));
      else localStorage.setItem(key, JSON.stringify(value));
      return true;
    } catch { return false; }
  },
  async delete(key) {
    try { if (hasClaudeStorage()) await window.storage.delete(key); else localStorage.removeItem(key); return true; }
    catch { return false; }
  },
  async listEpisodes() {
    try {
      if (hasClaudeStorage()) {
        const r = await window.storage.list("episode:");
        if (!r?.keys) return [];
        const items = await Promise.all(r.keys.map(k => db.get(k)));
        return items.filter(Boolean).sort((a,b) => (b.createdAt||0)-(a.createdAt||0));
      }
      const items = [];
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k?.startsWith("episode:")) { const v = localStorage.getItem(k); if (v) items.push(JSON.parse(v)); }
      }
      return items.sort((a,b) => (b.createdAt||0)-(a.createdAt||0));
    } catch { return []; }
  },
};

async function callAnthropic(apiKey, body) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify(body),
  });
  const text = await res.text();
  let data; try { data = JSON.parse(text); } catch { data = { raw: text }; }
  if (!res.ok) {
    const err = new Error(data?.error?.message || `HTTP ${res.status}`);
    err.status = res.status; err.data = data; throw err;
  }
  return data;
}

async function callClaude(apiKey, userPrompt, useSearch = false, maxTokens = 1500, systemPrompt = null) {
  const body = { model: ANTHROPIC_MODEL, max_tokens: maxTokens, messages: [{ role: "user", content: userPrompt }] };
  if (systemPrompt) body.system = systemPrompt;
  if (useSearch) body.tools = [{ type: "web_search_20250305", name: "web_search" }];
  let data = await callAnthropic(apiKey, body);
  let text = (data.content || []).filter(b => b.type === "text").map(b => b.text).join("");
  if (text.trim()) return text;
  if (useSearch && data.stop_reason === "tool_use") {
    const toolResults = (data.content || [])
      .filter(b => b.type === "tool_use")
      .map(b => ({ type: "tool_result", tool_use_id: b.id, content: "Search executed." }));
    const body2 = {
      model: ANTHROPIC_MODEL, max_tokens: maxTokens,
      tools: [{ type: "web_search_20250305", name: "web_search" }],
      messages: [
        { role: "user", content: userPrompt },
        { role: "assistant", content: data.content },
        { role: "user", content: toolResults },
      ],
    };
    if (systemPrompt) body2.system = systemPrompt;
    data = await callAnthropic(apiKey, body2);
    return (data.content || []).filter(b => b.type === "text").map(b => b.text).join("");
  }
  return text;
}

async function heygenTestConnection(apiKey) {
  // Test connection by listing voices
  const res = await fetch("https://api.heygen.com/v2/voices", {
    method: "GET",
    headers: { "X-Api-Key": apiKey, "Accept": "application/json" },
  });
  const text = await res.text();
  let data; try { data = JSON.parse(text); } catch { data = { raw: text }; }
  if (!res.ok) {
    const err = new Error(data?.message || data?.error?.message || `HTTP ${res.status}`);
    err.status = res.status; err.data = data; throw err;
  }
  return data;
}

async function heygenGenerateVideo(apiKey, { avatarId, voiceId, scriptText }) {
  // Truncate script to HeyGen's 5000 char limit
  const safeScript = scriptText.slice(0, 4900);
  const body = {
    video_inputs: [{
      character: { type: "avatar", avatar_id: avatarId, avatar_style: "normal" },
      voice: { type: "text", input_text: safeScript, voice_id: voiceId },
      background: { type: "color", value: "#0a1628" },
    }],
    dimension: { width: 1280, height: 720 },
  };
  const res = await fetch("https://api.heygen.com/v2/video/generate", {
    method: "POST",
    headers: { "X-Api-Key": apiKey, "Content-Type": "application/json", "Accept": "application/json" },
    body: JSON.stringify(body),
  });
  const data = await res.json();
  if (!res.ok || data.error) {
    throw new Error(data?.error?.message || data?.message || `HTTP ${res.status}`);
  }
  return data?.data?.video_id;
}

async function heygenGetStatus(apiKey, videoId) {
  const res = await fetch(`https://api.heygen.com/v1/video_status.get?video_id=${videoId}`, {
    method: "GET",
    headers: { "X-Api-Key": apiKey, "Accept": "application/json" },
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data?.message || `HTTP ${res.status}`);
  return data?.data;
}

function openMailto(toList, subject, body) {
  const recipients = (toList || "").split(/[,;\n]/).map(s => s.trim()).filter(s => s.includes("@")).join(",");
  const url = `mailto:${recipients}?subject=${encodeURIComponent(subject || "")}&body=${encodeURIComponent(body || "")}`;
  window.open(url, "_blank");
}

async function sendTeamsWebhook(webhookUrl, title, body, videoUrl) {
  if (!webhookUrl?.startsWith("https://")) throw new Error("URL do webhook Teams inválida");
  const card = {
    "@type": "MessageCard",
    "@context": "https://schema.org/extensions",
    summary: title || "Novo episódio de podcast",
    themeColor: "0090ee",
    title: title || "🎙️ Novo episódio disponível",
    text: body || "Confira o novo episódio do podcast.",
    potentialAction: videoUrl ? [{
      "@type": "OpenUri",
      name: "▶️ Assistir Vídeo",
      targets: [{ os: "default", uri: videoUrl }],
    }] : [],
  };
  // Note: Teams webhooks usually allow CORS from any origin
  const res = await fetch(webhookUrl, {
    method: "POST",
    mode: "no-cors", // Teams webhooks don't return CORS headers; we trust the post
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(card),
  });
  // With no-cors we can't read the response, but if no exception, it likely worked
  return { ok: true };
}

                  {!isRendering && !renderDone && !renderError && (
                    <div style={{ border:"1px dashed rgba(255,255,255,.07)", borderRadius:10, padding:"32px 16px", textAlign:"center", color:"#2a4050", fontSize:11 }}>
                      🚀 Click em "Iniciar Render"
                    </div>
                  )}
                  {(isRendering || renderDone) && (
                    <div style={{ background:"rgba(255,255,255,.02)", border:"1px solid rgba(255,255,255,.06)", borderRadius:10, padding:14, marginBottom:12 }}>
                      <div style={{ display:"flex", justifyContent:"space-between", marginBottom:8 }}>
                        <span style={{ fontSize:11, color:"#90b0c8" }}>{renderMsg}</span>
                        <span style={{ fontSize:12, fontWeight:700, color: renderDone ? "#10b981" : "#00b4ff", fontFamily:"monospace" }}>{renderPct}%</span>
                      </div>
                      <div style={{ background:"rgba(255,255,255,.06)", borderRadius:99, height:7, overflow:"hidden" }}>
                        <div style={{ width:`${renderPct}%`, height:"100%", borderRadius:99, transition:"width .6s", background: renderDone ? "linear-gradient(90deg,#10b981,#34d399)" : "linear-gradient(90deg,#004db3,#00b4ff)" }} />
                      </div>
                      {currentVideoId && <div style={{ fontSize:9, color:"#506070", marginTop:6, fontFamily:"monospace" }}>video_id: {currentVideoId}</div>}
                    </div>
                  )}

                  {/* VIDEO PLAYER */}
                  {renderDone && videoUrl && (
                    <div className="fade" style={{ background:"rgba(16,185,129,.05)", border:"1px solid rgba(16,185,129,.18)", borderRadius:10, padding:14 }}>
                      <div style={{ fontWeight:700, fontSize:13, color:"#10b981", marginBottom:10, display:"flex", alignItems:"center", gap:8 }}>
                        🎉 Vídeo gerado · Pronto para visualizar
                      </div>
                      <video controls poster={thumbnailUrl} style={{ width:"100%", borderRadius:8, background:"#000" }}>
                        <source src={videoUrl} type="video/mp4" />
                        Seu navegador não suporta vídeo.
                      </video>
                      <div style={{ display:"flex", gap:8, marginTop:10, flexWrap:"wrap" }}>
                        <Btn success onClick={() => window.open(videoUrl, "_blank")}>⬇️ Download</Btn>
                        <Btn secondary onClick={() => copyText(videoUrl)}>{copied ? "✓ Copiado" : "📋 Copiar Link"}</Btn>
                        <Btn onClick={() => setTab(4)}>📤 Distribuir →</Btn>
                      </div>
                      <div style={{ fontSize:9, color:"#4a8060", marginTop:8, fontFamily:"monospace", wordBreak:"break-all" }}>
                        {videoUrl}
                      </div>
                    </div>
                  )}
                </Field>
              </div>
            </div>
          </div>
        )}

        {/* ══ DISTRIBUIÇÃO ══════════════════════════════════════════════════ */}
        {tab === 4 && keyValidated && (
          <div className="fade">
            <SectionHeader icon="📤" title="Distribuição" sub="Envie por e-mail ou Microsoft Teams" />

            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:22, marginTop:20 }}>
              <div>
                <Field label="Destinatários" mt={0}>
                  <TextArea
                    value={teamEmails}
                    onChange={e => setTeamEmails(e.target.value)}
                    placeholder={defaultEmails ? `Padrão: ${defaultEmails}\nOu adicione mais aqui` : "joao@empresa.com, maria@empresa.com"}
                    rows={3}
                  />
                  <div style={{ fontSize:9, color:"#506070", marginTop:4 }}>
                    Separe com vírgula, ponto-e-vírgula ou nova linha. Padrão será usado se vazio.
                  </div>
                </Field>

                <Field label="Assunto e Mensagem">
                  <TextInput value={emailSubject} onChange={e => setEmailSubject(e.target.value)} placeholder="Assunto do e-mail" />
                  <div style={{ marginTop:8 }}>
                    <TextArea value={distMsg} onChange={e => setDistMsg(e.target.value)} placeholder="Mensagem de distribuição..." rows={6} />
                  </div>
                  <Btn onClick={genDistMsg} disabled={isGenMsg} style={{ marginTop:8, width:"100%" }}>
                    {isGenMsg ? <><Spinner /> Gerando...</> : "🤖 Gerar Mensagem com IA"}
                  </Btn>
                </Field>
              </div>

              <div>
                <Field label="Canais Disponíveis" mt={0}>
                  <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                    {/* EMAIL */}
                    <div style={{ background:"rgba(255,255,255,.02)", border:"1px solid rgba(255,255,255,.06)", borderRadius:9, padding:12 }}>
                      <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:8 }}>
                        <span style={{ fontSize:18 }}>📧</span>
                        <div style={{ flex:1 }}>
                          <div style={{ fontSize:12, fontWeight:600, color:"#a0c0d8" }}>E-mail</div>
                          <div style={{ fontSize:9, color:"#506070" }}>Abre cliente padrão (Outlook/Gmail/Mail)</div>
                        </div>
                      </div>
                      <Btn success onClick={sendByEmail} style={{ width:"100%" }}>📨 Enviar por E-mail</Btn>
                    </div>

                    {/* TEAMS */}
                    <div style={{ background:"rgba(0,120,212,.04)", border:`1px solid ${teamsWebhook ? "rgba(0,120,212,.25)" : "rgba(255,160,0,.2)"}`, borderRadius:9, padding:12 }}>
                      <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:8 }}>
                        <span style={{ fontSize:18 }}>👥</span>
                        <div style={{ flex:1 }}>
                          <div style={{ fontSize:12, fontWeight:600, color:"#4a90e0" }}>Microsoft Teams</div>
                          <div style={{ fontSize:9, color: teamsWebhook ? "#506070" : "#f59e0b" }}>
                            {teamsWebhook ? "Webhook configurado" : "⚠️ Configure webhook no Diagnóstico"}
                          </div>
                        </div>
                      </div>
                      <Btn onClick={sendToTeams} disabled={!teamsWebhook} style={{ width:"100%", background: teamsWebhook ? "linear-gradient(135deg,#0050bb,#0090ee)" : undefined }}>
                        💬 Postar no Teams
                      </Btn>
                    </div>

                    {/* COPY */}
                    <div style={{ background:"rgba(255,255,255,.02)", border:"1px solid rgba(255,255,255,.06)", borderRadius:9, padding:12 }}>
                      <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:8 }}>
                        <span style={{ fontSize:18 }}>📋</span>
                        <div style={{ flex:1 }}>
                          <div style={{ fontSize:12, fontWeight:600, color:"#a0c0d8" }}>Copiar conteúdo</div>
                          <div style={{ fontSize:9, color:"#506070" }}>Para colar em Slack, WhatsApp, etc.</div>
                        </div>
                      </div>
                      <Btn secondary style={{ width:"100%" }} onClick={() => copyText(`${emailSubject}\n\n${distMsg}\n\n${videoUrl ? "▶️ " + videoUrl : ""}`)}>
                        {copied ? "✓ Copiado!" : "📋 Copiar Tudo"}
                      </Btn>
                    </div>
                  </div>
                </Field>

                <ErrorBox msg={distError} />
                <InfoBox msg={distSuccess} />

                {videoUrl && (
                  <Field label="Preview do Vídeo">
                    <video controls src={videoUrl} poster={thumbnailUrl} style={{ width:"100%", borderRadius:8, background:"#000", maxHeight:200 }} />
                  </Field>
                )}
              </div>
            </div>
          </div>
        )}

        {/* ══ HISTÓRICO ══════════════════════════════════════════════════════ */}
        {tab === 5 && keyValidated && (
          <div className="fade">
            <SectionHeader icon="📚" title="Histórico" sub={`${episodes.length} episódio${episodes.length !== 1 ? "s" : ""} · banco persistente`} />

            <div style={{ marginTop:20 }}>
              {selectedEpisode && (
                <div className="fade" style={{ background:"rgba(0,180,255,.04)", border:"1px solid rgba(0,180,255,.2)", borderRadius:11, padding:18, marginBottom:16 }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"start", marginBottom:12 }}>
                    <div>
                      <div style={{ fontSize:14, fontWeight:700, color:"#00b4ff" }}>{selectedEpisode.title}</div>
                      <div style={{ fontSize:11, color:"#506070", marginTop:3 }}>{selectedEpisode.podcastName} · {selectedEpisode.duration} min · {new Date(selectedEpisode.createdAt).toLocaleString("pt-BR")}</div>
                    </div>
                    <Btn secondary onClick={() => setSelectedEpisode(null)}>✕ Fechar</Btn>
                  </div>
                  {selectedEpisode.videoUrl && (
                    <video controls src={selectedEpisode.videoUrl} poster={selectedEpisode.thumbnailUrl} style={{ width:"100%", borderRadius:8, background:"#000", maxHeight:400 }} />
                  )}
                  <div style={{ display:"flex", gap:8, marginTop:10, flexWrap:"wrap" }}>
                    {selectedEpisode.videoUrl && (
                      <>
                        <Btn success onClick={() => window.open(selectedEpisode.videoUrl, "_blank")}>⬇️ Download</Btn>
                        <Btn secondary onClick={() => copyText(selectedEpisode.videoUrl)}>📋 Copiar Link</Btn>
                      </>
                    )}
                    <Btn onClick={() => {
                      if (selectedEpisode.script) setRefined(selectedEpisode.script);
                      if (selectedEpisode.title) setEpTitle(selectedEpisode.title);
                      if (selectedEpisode.podcastName) setPodcastName(selectedEpisode.podcastName);
                      if (selectedEpisode.duration) setDuration(selectedEpisode.duration);
                      if (selectedEpisode.emailSubject) setEmailSubject(selectedEpisode.emailSubject);
                      if (selectedEpisode.emailBody) setDistEmail(selectedEpisode.emailBody);
                      if (selectedEpisode.videoUrl) setVideoUrl(selectedEpisode.videoUrl);
                      if (selectedEpisode.thumbnailUrl) setThumbnailUrl(selectedEpisode.thumbnailUrl);
                      setTab(4);
                    }}>📤 Redistribuir</Btn>
                  </div>
                </div>
              )}

              {episodes.length === 0 ? (
                <div style={{ border:"1px dashed rgba(255,255,255,.07)", borderRadius:10, padding:"50px 20px", textAlign:"center", color:"#2a4050", fontSize:12 }}>
                  📂 Nenhum episódio salvo<br/>
                  <span style={{ fontSize:10 }}>Gere seu primeiro na aba Render</span>
                </div>
              ) : (
                <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(300px, 1fr))", gap:12 }}>
                  {episodes.map(ep => (
                    <div key={ep.id} style={{ background:"rgba(255,255,255,.02)", border:"1px solid rgba(255,255,255,.06)", borderRadius:10, overflow:"hidden", display:"flex", flexDirection:"column" }}>
                      {ep.thumbnailUrl ? (
                        <div style={{ position:"relative", paddingBottom:"56.25%", background:"#000" }}>
                          <img src={ep.thumbnailUrl} alt="" style={{ position:"absolute", inset:0, width:"100%", height:"100%", objectFit:"cover" }} />
                          {ep.videoUrl && (
                            <div onClick={() => setSelectedEpisode(ep)} style={{ position:"absolute", inset:0, display:"flex", alignItems:"center", justifyContent:"center", background:"rgba(0,0,0,.3)", cursor:"pointer", color:"#fff", fontSize:30 }}>▶️</div>
                          )}
                        </div>
                      ) : (
                        <div style={{ height:80, background:"linear-gradient(135deg,#0a1628,#0d1a2e)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:30 }}>
                          {ep.engine === "kling" ? "⚡" : "🎥"}
                        </div>
                      )}
                      <div style={{ padding:12, flex:1, display:"flex", flexDirection:"column" }}>
                        <div style={{ fontSize:12, fontWeight:700, color:"#c8d8e8", marginBottom:4 }}>{ep.title}</div>
                        <div style={{ fontSize:10, color:"#506070", marginBottom:8 }}>{ep.podcastName} · {ep.duration} min</div>
                        <div style={{ fontSize:9, color:"#3a5060", fontFamily:"monospace", marginBottom:10 }}>
                          {new Date(ep.createdAt).toLocaleDateString("pt-BR")} {new Date(ep.createdAt).toLocaleTimeString("pt-BR", {hour:"2-digit", minute:"2-digit"})} · {ep.engine === "kling" ? "⚡ Kling" : "🎥 HeyGen"}
                        </div>
                        <div style={{ display:"flex", gap:6, marginTop:"auto" }}>
                          <button onClick={() => setSelectedEpisode(ep)} style={{ flex:1, background:"rgba(0,180,255,.08)", border:"1px solid rgba(0,180,255,.2)", color:"#00b4ff", borderRadius:6, padding:"6px", fontSize:10, cursor:"pointer", fontWeight:600 }}>👁️ Ver</button>
                          {ep.videoUrl && <button onClick={() => window.open(ep.videoUrl, "_blank")} style={{ background:"rgba(16,185,129,.08)", border:"1px solid rgba(16,185,129,.2)", color:"#10b981", borderRadius:6, padding:"6px 10px", fontSize:10, cursor:"pointer" }}>⬇️</button>}
                          <button onClick={() => { if(confirm(`Deletar?`)) deleteEpisode(ep.id); }} style={{ background:"rgba(239,68,68,.08)", border:"1px solid rgba(239,68,68,.2)", color:"#ef4444", borderRadius:6, padding:"6px 10px", fontSize:10, cursor:"pointer" }}>🗑️</button>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              )}

              <div style={{ marginTop:18, background:"linear-gradient(135deg,rgba(0,77,179,.07),rgba(0,180,255,.03))", border:"1px solid rgba(0,180,255,.1)", borderRadius:10, padding:14 }}>
                <div style={{ fontWeight:700, fontSize:12, color:"#00b4ff", marginBottom:8 }}>📊 Estatísticas</div>
                <div style={{ display:"grid", gridTemplateColumns:"repeat(4, 1fr)", gap:10 }}>
                  {[
                    { k:"Total", v:episodes.length },
                    { k:"Kling", v:episodes.filter(e => e.engine==="kling").length },
                    { k:"HeyGen", v:episodes.filter(e => e.engine==="heygen").length },
                    { k:"Min", v:episodes.reduce((s, e) => s + (e.duration||0), 0) },
                  ].map(s => (
                    <div key={s.k} style={{ background:"rgba(0,0,0,.2)", borderRadius:7, padding:"10px 12px", textAlign:"center" }}>
                      <div style={{ fontSize:18, fontWeight:800, color:"#00b4ff", fontFamily:"'JetBrains Mono',monospace" }}>{s.v}</div>
                      <div style={{ fontSize:9, color:"#3a5060", letterSpacing:".05em", textTransform:"uppercase" }}>{s.k}</div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>
        )}

        {tab > 0 && !keyValidated && (
          <div className="fade" style={{ textAlign:"center", padding:"80px 20px" }}>
            <div style={{ fontSize:48, marginBottom:14 }}>🔒</div>
            <div style={{ fontSize:18, fontWeight:700, color:"#d97706", marginBottom:8 }}>Aba bloqueada</div>
            <div style={{ fontSize:12, color:"#608090", marginBottom:20 }}>Configure sua chave Anthropic na aba Diagnóstico.</div>
            <Btn onClick={() => setTab(0)}>← Diagnóstico</Btn>
          </div>
        )}

      </div>

      {/* FOOTER */}
      <div style={{ position:"fixed", bottom:0, left:0, right:0, background:"rgba(7,11,19,.97)", backdropFilter:"blur(14px)", borderTop:"1px solid rgba(255,255,255,.05)", padding:"9px 24px", display:"flex", alignItems:"center", gap:10, zIndex:100 }}>
        <span style={{ fontSize:9, color:"#1a3040", fontFamily:"monospace", minWidth:50 }}>FLUXO</span>
        {TABS.map((t, i) => (
          <div key={i} style={{ display:"flex", alignItems:"center", gap:3 }}>
            <div style={{ width:7, height:7, borderRadius:"50%", background: done.includes(i) ? "#10b981" : tab===i ? "#00b4ff" : "rgba(255,255,255,.07)" }} />
            <span style={{ fontSize:9, color: tab===i ? "#00b4ff" : done.includes(i) ? "#10b981" : "#1a3040", cursor:"pointer" }} onClick={() => canAccessTab(i) && setTab(i)}>{t.label}</span>
            {i < TABS.length-1 && <span style={{ color:"#1a2a3a", fontSize:8 }}>›</span>}
          </div>
        ))}
        <div style={{ marginLeft:"auto", fontSize:9, color:"#1a3040", fontFamily:"monospace" }}>{episodes.length} eps</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<PodcastStudio />);
  </script>
</body>
</html>
