// ─── DB LAYER ────────────────────────────────────────────────────────────────

const hasClaudeStorage = () => typeof window !== "undefined" && window.storage;
const db = {
  async get(key) {
    try {
      if (hasClaudeStorage()) { const r = await window.storage.get(key); return r ? JSON.parse(r.value) : null; }
      const v = localStorage.getItem(key); return v ? JSON.parse(v) : null;
    } catch { return null; }
  },
  async set(key, value) {
    try {
      if (hasClaudeStorage()) await window.storage.set(key, JSON.stringify(value));
      else localStorage.setItem(key, JSON.stringify(value));
      return true;
    } catch { return false; }
  },
  async delete(key) {
    try { if (hasClaudeStorage()) await window.storage.delete(key); else localStorage.removeItem(key); return true; }
    catch { return false; }
  },
  async listByPrefix(prefix) {
    try {
      if (hasClaudeStorage()) {
        const r = await window.storage.list(prefix);
        if (!r?.keys) return [];
        const items = await Promise.all(r.keys.map(k => db.get(k)));
        return items.filter(Boolean);
      }
      const items = [];
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k?.startsWith(prefix)) { const v = localStorage.getItem(k); if (v) items.push(JSON.parse(v)); }
      }
      return items;
    } catch { return []; }
  },
  async listEpisodes() {
    const items = await db.listByPrefix("episode:");
    return items.sort((a, b) => (b.createdAt||0) - (a.createdAt||0));
  },
  async listNewsletters() {
    const items = await db.listByPrefix("newsletter:");
    return items.sort((a, b) => (b.date||"").localeCompare(a.date||""));
  },
};

// ─── ANTHROPIC ───────────────────────────────────────────────────────────────

async function callAnthropic(apiKey, body) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify(body),
  });
  const text = await res.text();
  let data; try { data = JSON.parse(text); } catch { data = { raw: text }; }
  if (!res.ok) {
    const err = new Error(data?.error?.message || `HTTP ${res.status}`);
    err.status = res.status; err.data = data; throw err;
  }
  return data;
}

async function callClaude(apiKey, userPrompt, useSearch = false, maxTokens = 1500, systemPrompt = null) {
  const body = { model: ANTHROPIC_MODEL, max_tokens: maxTokens, messages: [{ role: "user", content: userPrompt }] };
  if (systemPrompt) body.system = systemPrompt;
  if (useSearch) body.tools = [{ type: "web_search_20250305", name: "web_search" }];
  let data = await callAnthropic(apiKey, body);
  let text = (data.content || []).filter(b => b.type === "text").map(b => b.text).join("");
  if (text.trim()) return text;
  if (useSearch && data.stop_reason === "tool_use") {
    const toolResults = (data.content || [])
      .filter(b => b.type === "tool_use")
      .map(b => ({ type: "tool_result", tool_use_id: b.id, content: "Search executed." }));
    const body2 = {
      model: ANTHROPIC_MODEL, max_tokens: maxTokens,
      tools: [{ type: "web_search_20250305", name: "web_search" }],
      messages: [
        { role: "user", content: userPrompt },
        { role: "assistant", content: data.content },
        { role: "user", content: toolResults },
      ],
    };
    if (systemPrompt) body2.system = systemPrompt;
    data = await callAnthropic(apiKey, body2);
    return (data.content || []).filter(b => b.type === "text").map(b => b.text).join("");
  }
  return text;
}

async function heygenTestConnection(apiKey) {
  const res = await fetch("https://api.heygen.com/v2/voices", {
    method: "GET",
    headers: { "X-Api-Key": apiKey, "Accept": "application/json" },
  });
  const data = await res.json();
  if (!res.ok) {
    const err = new Error(data?.message || data?.error?.message || `HTTP ${res.status}`);
    err.status = res.status; throw err;
  }
  return data;
}

async function heygenGenerateVideo(apiKey, { avatarId, voiceId, scriptText }) {
  const safeScript = scriptText.slice(0, 4900);
  const body = {
    video_inputs: [{
      character: { type: "avatar", avatar_id: avatarId, avatar_style: "normal" },
      voice: { type: "text", input_text: safeScript, voice_id: voiceId },
      background: { type: "color", value: "#0a1628" },
    }],
    dimension: { width: 1280, height: 720 },
  };
  const res = await fetch("https://api.heygen.com/v2/video/generate", {
    method: "POST",
    headers: { "X-Api-Key": apiKey, "Content-Type": "application/json" },
    body: JSON.stringify(body),
  });
  const data = await res.json();
  if (!res.ok || data.error) throw new Error(data?.error?.message || data?.message || `HTTP ${res.status}`);
  return data?.data?.video_id;
}

async function heygenGetStatus(apiKey, videoId) {
  const res = await fetch(`https://api.heygen.com/v1/video_status.get?video_id=${videoId}`, {
    method: "GET", headers: { "X-Api-Key": apiKey, "Accept": "application/json" },
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data?.message || `HTTP ${res.status}`);
  return data?.data;
}

function openMailto(toList, subject, body) {
  const recipients = (toList || "").split(/[,;\n]/).map(s => s.trim()).filter(s => s.includes("@")).join(",");
  const url = `mailto:${recipients}?subject=${encodeURIComponent(subject || "")}&body=${encodeURIComponent(body || "")}`;
  window.open(url, "_blank");
}

async function sendTeamsWebhook(webhookUrl, title, body, videoUrl) {
  if (!webhookUrl?.startsWith("https://")) throw new Error("URL do webhook Teams inválida");
  const card = {
    "@type": "MessageCard",
    "@context": "https://schema.org/extensions",
    summary: title || "Novo episódio",
    themeColor: "0090ee",
    title: title || "🎙️ Novo episódio",
    text: body || "Confira o novo episódio.",
    potentialAction: videoUrl ? [{ "@type": "OpenUri", name: "▶️ Assistir", targets: [{ os: "default", uri: videoUrl }] }] : [],
  };
  await fetch(webhookUrl, {
    method: "POST", mode: "no-cors",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(card),
  });
  return { ok: true };
}

const today = () => new Date().toISOString().slice(0, 10);
const fmtDate = (iso) => {
  if (!iso) return "";
  const [y, m, d] = iso.split("-");
  return `${d}/${m}/${y}`;
};
const fmtDateLong = (iso) => {
  if (!iso) return "";
  const months = ["janeiro", "fevereiro", "março", "abril", "maio", "junho", "julho", "agosto", "setembro", "outubro", "novembro", "dezembro"];
  const [y, m, d] = iso.split("-");
  return `${parseInt(d)} de ${months[parseInt(m)-1]} de ${y}`;
};
const isExpired = (expiresAt) => expiresAt && Date.now() > expiresAt;

🎙️ ABERTURA (15s)

📌 DESTAQUE 1: [título]
[2-3 frases]
[pausa]

[continue]

🎯 FECHAMENTO (15s)

Use [pausa] entre tópicos e *palavra* para ênfase.

TEXTO BASE:
${rawText}

Retorne APENAS o roteiro.`,
        false, 2000

Responda SOMENTE JSON: {"subject":"...","body":"..."}`,

    if (!refinedScript.trim()) { setRenderError("Gere o roteiro."); return; }
    setIsRendering(true); setRenderDone(false); setRenderError(""); setRenderPct(0);
    setVideoUrl(""); setThumbnailUrl("");
    try {
      setRenderPct(15); setRenderMsg("🔑 Autenticando...");
      const cleanScript = refinedScript.replace(/\[pausa\]/g, "...").replace(/\[\?\]/g, "?").replace(/\*([^*]+)\*/g, "$1");
      const videoId = await heygenGenerateVideo(heygenApiKey.trim(), {

      });
      setRenderPct(30); setRenderMsg(`🎬 Fila: ${videoId.slice(0,12)}...`);

        } else {

                          <button onClick={() => { setEditorDate(n.date); setTab(0); }} style={{ flex:1, background:"rgba(167,139,250,.08)", border:"1px solid rgba(167,139,250,.25)", color:"#a78bfa", borderRadius:5, padding:"4px", fontSize:10, cursor:"pointer", fontWeight:600 }}>📝 Editar</button>
                          <a href={`?view=public&date=${n.date}`} target="_blank" rel="noreferrer" style={{ flex:1, background:"rgba(16,185,129,.08)", border:"1px solid rgba(16,185,129,.25)", color:"#10b981", borderRadius:5, padding:"4px", fontSize:10, cursor:"pointer", fontWeight:600, textAlign:"center", textDecoration:"none" }}>👁️ Ver</a>
                          <button onClick={() => deleteNewsletter(n.date)} style={{ background:"rgba(239,68,68,.08)", border:"1px solid rgba(239,68,68,.25)", color:"#ef4444", borderRadius:5, padding:"4px 8px", fontSize:10, cursor:"pointer" }}>🗑️</button>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>

            {/* EPISODES HISTORY */}
            <div>
              <div style={{ fontSize:11, color:"#00b4ff", fontWeight:700, letterSpacing:".1em", textTransform:"uppercase", marginBottom:10 }}>🎬 Episódios gerados</div>
              {selectedEpisode && (
                <div className="fade" style={{ background:"rgba(0,180,255,.04)", border:"1px solid rgba(0,180,255,.2)", borderRadius:11, padding:16, marginBottom:14 }}>
                  <div style={{ display:"flex", justifyContent:"space-between", marginBottom:10 }}>
                    <div style={{ fontSize:13, fontWeight:700, color:"#00b4ff" }}>{selectedEpisode.title}</div>
                    <Btn secondary onClick={() => setSelectedEpisode(null)}>✕</Btn>
                  </div>
                  {selectedEpisode.videoUrl && (
                    <video controls src={selectedEpisode.videoUrl} poster={selectedEpisode.thumbnailUrl} style={{ width:"100%", borderRadius:8, background:"#000", maxHeight:400 }} />
                  )}
                </div>
              )}
              {episodes.length === 0 ? (
                <div style={{ border:"1px dashed rgba(255,255,255,.07)", borderRadius:9, padding:24, textAlign:"center", color:"#506070", fontSize:11 }}>Nenhum episódio gerado</div>
              ) : (
                <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(280px, 1fr))", gap:10 }}>
                  {episodes.map(ep => (
                    <div key={ep.id} style={{ background:"rgba(255,255,255,.02)", border:"1px solid rgba(255,255,255,.06)", borderRadius:10, overflow:"hidden" }}>
                      {ep.thumbnailUrl ? (
                        <img src={ep.thumbnailUrl} alt="" style={{ width:"100%", height:120, objectFit:"cover" }} />
                      ) : (
                        <div style={{ height:80, background:"linear-gradient(135deg,#0a1628,#0d1a2e)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:30 }}>{ep.engine === "kling" ? "⚡" : "🎥"}</div>
                      )}
                      <div style={{ padding:12 }}>
                        <div style={{ fontSize:12, fontWeight:700, color:"#c8d8e8" }}>{ep.title}</div>
                        <div style={{ fontSize:10, color:"#506070", marginTop:3, fontFamily:"monospace" }}>{new Date(ep.createdAt).toLocaleDateString("pt-BR")} · {ep.duration}min</div>
                        <div style={{ display:"flex", gap:5, marginTop:8 }}>
                          <button onClick={() => setSelectedEpisode(ep)} style={{ flex:1, background:"rgba(0,180,255,.08)", border:"1px solid rgba(0,180,255,.2)", color:"#00b4ff", borderRadius:5, padding:"4px", fontSize:10, cursor:"pointer" }}>👁️ Ver</button>
                          {ep.videoUrl && <button onClick={() => useEpisodeAsPodcast(ep)} style={{ background:"rgba(29,185,84,.08)", border:"1px solid rgba(29,185,84,.25)", color:"#1DB954", borderRadius:5, padding:"4px 10px", fontSize:10, cursor:"pointer" }}>📰</button>}
                          <button onClick={() => { if(confirm("Deletar?")) deleteEpisode(ep.id); }} style={{ background:"rgba(239,68,68,.08)", border:"1px solid rgba(239,68,68,.25)", color:"#ef4444", borderRadius:5, padding:"4px 8px", fontSize:10, cursor:"pointer" }}>🗑️</button>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        )}

        {tab > 1 && !keyValidated && (
          <div className="fade" style={{ textAlign:"center", padding:"80px 20px" }}>
            <div style={{ fontSize:48, marginBottom:14 }}>🔒</div>
            <div style={{ fontSize:18, fontWeight:700, color:"#d97706", marginBottom:8 }}>Aba bloqueada</div>
            <div style={{ fontSize:12, color:"#608090", marginBottom:20 }}>Configure sua chave Anthropic no Diagnóstico.</div>
            <Btn onClick={() => setTab(1)}>← Diagnóstico</Btn>
          </div>
        )}

      </div>
    </div>
  );
}

// ─── ROUTER ──────────────────────────────────────────────────────────────────

function App() {
  const params = new URLSearchParams(window.location.search);
  const view = params.get("view");

  if (view === "public") return <PublicNewsletter />;
  return <AdminApp />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
