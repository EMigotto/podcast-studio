// ─── DB LAYER ────────────────────────────────────────────────────────────────

const hasClaudeStorage = () => typeof window !== "undefined" && window.storage;
const db = {
  async get(key) {
    try {
      if (hasClaudeStorage()) { const r = await window.storage.get(key); return r ? JSON.parse(r.value) : null; }
      const v = localStorage.getItem(key); return v ? JSON.parse(v) : null;
    } catch { return null; }
  },
  async set(key, value) {
    try {
      if (hasClaudeStorage()) await window.storage.set(key, JSON.stringify(value));
      else localStorage.setItem(key, JSON.stringify(value));
      return true;
    } catch { return false; }
  },
  async delete(key) {
    try { if (hasClaudeStorage()) await window.storage.delete(key); else localStorage.removeItem(key); return true; }
    catch { return false; }
  },
  async listEpisodes() {
    try {
      if (hasClaudeStorage()) {
        const r = await window.storage.list("episode:");
        if (!r?.keys) return [];
        const items = await Promise.all(r.keys.map(k => db.get(k)));
        return items.filter(Boolean).sort((a,b) => (b.createdAt||0)-(a.createdAt||0));
      }
      const items = [];
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k?.startsWith("episode:")) { const v = localStorage.getItem(k); if (v) items.push(JSON.parse(v)); }
      }
      return items.sort((a,b) => (b.createdAt||0)-(a.createdAt||0));
    } catch { return []; }
  },
};

// ─── ANTHROPIC CLIENT ────────────────────────────────────────────────────────

async function callAnthropic(apiKey, body) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify(body),
  });
  const text = await res.text();
  let data;
  try { data = JSON.parse(text); } catch { data = { raw: text }; }
  if (!res.ok) {
    const msg = data?.error?.message || `HTTP ${res.status}`;
    const err = new Error(msg);
    err.status = res.status;
    err.data = data;
    throw err;
  }
  return data;
}

async function callClaude(apiKey, userPrompt, useSearch = false, maxTokens = 1500, systemPrompt = null) {
  const body = {
    model: ANTHROPIC_MODEL,
    max_tokens: maxTokens,
    messages: [{ role: "user", content: userPrompt }],
  };
  if (systemPrompt) body.system = systemPrompt;
  if (useSearch) body.tools = [{ type: "web_search_20250305", name: "web_search" }];

  let data = await callAnthropic(apiKey, body);
  let text = (data.content || []).filter(b => b.type === "text").map(b => b.text).join("");
  if (text.trim()) return text;

  // Multi-turn for web search
  if (useSearch && data.stop_reason === "tool_use") {
    const toolResults = (data.content || [])
      .filter(b => b.type === "tool_use")
      .map(b => ({ type: "tool_result", tool_use_id: b.id, content: "Search executed." }));
    const body2 = {
      model: ANTHROPIC_MODEL,
      max_tokens: maxTokens,
      tools: [{ type: "web_search_20250305", name: "web_search" }],
      messages: [
        { role: "user", content: userPrompt },
        { role: "assistant", content: data.content },
        { role: "user", content: toolResults },
      ],
    };
    if (systemPrompt) body2.system = systemPrompt;
    data = await callAnthropic(apiKey, body2);
    return (data.content || []).filter(b => b.type === "text").map(b => b.text).join("");
  }
  return text;
}

          </div>
        )}

        {/* ══════════════════════════════════════════════════════════════════ */}
        {/* TAB 5 — DISTRIBUIÇÃO */}
        {/* ══════════════════════════════════════════════════════════════════ */}
        {tab === 5 && keyValidated && (
          <div className="fade">
            <SectionHeader icon="📤" title="Distribuição" sub="Compartilhe via e-mail, Slack ou Spotify" />
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:22, marginTop:20 }}>
              <div>
                <Field label="Destinatários" mt={0}>
                  <Textarea value={teamEmails} onChange={e => setTeamEmails(e.target.value)} placeholder={"joao@empresa.com\n#slack-tech"} rows={4} />
                </Field>
                <Btn onClick={genDistMsg} disabled={isGenMsg} style={{ width:"100%", marginTop:10 }}>
                  {isGenMsg ? <><Spinner /> Gerando...</> : "✍️ Gerar Mensagem"}
                </Btn>
                <ErrorBox msg={distError} />
                <Field label="Canais">
                  {[
                    { icon:"📧", label:"E-mail",  sub:"Outlook/Gmail" },
                    { icon:"💬", label:"Slack",   sub:"#tech-news" },
                    { icon:"👥", label:"Teams",   sub:"Engenharia" },
                    { icon:"🎙️", label:"Spotify", sub:"eduardomigoto@gmail.com" },
                  ].map(c => (
                    <div key={c.label} style={{ display:"flex", alignItems:"center", gap:9, background:"rgba(255,255,255,.02)", border:"1px solid rgba(255,255,255,.05)", borderRadius:8, padding:"8px 12px", marginTop:7 }}>
                      <span style={{ fontSize:18 }}>{c.icon}</span>
                      <div style={{ flex:1 }}>
                        <div style={{ fontSize:11, fontWeight:500, color: c.icon==="🎙️" ? "#1DB954" : "#a0b8c8" }}>{c.label}</div>
                        <div style={{ fontSize:9, color:"#2a4050" }}>{c.sub}</div>
                      </div>
                    </div>
                  ))}
                </Field>
              </div>

              <div>
                <Field label="Mensagem" mt={0}>
                  {!distMsg ? (
                    <div style={{ border:"1px dashed rgba(255,255,255,.07)", borderRadius:9, padding:"32px 16px", textAlign:"center", color:"#2a4050", fontSize:11 }}>
                      ✉️ Click "Gerar Mensagem"
                    </div>
                  ) : (
                    <>
                      <Textarea value={distMsg} onChange={e => setDistMsg(e.target.value)} rows={6} style={{ background:"rgba(0,180,255,.03)", border:"1px solid rgba(0,180,255,.13)", color:"#90b0c8" }} />
                      <div style={{ display:"flex", gap:8, marginTop:8 }}>
                        <Btn secondary style={{ flex:1 }} onClick={() => copyText(distMsg)}>{copied ? "✓ Copiado" : "📋 Copiar"}</Btn>
                        <Btn style={{ flex:1 }}>🚀 Enviar</Btn>
                      </div>
                    </>
                  )}
                </Field>
              </div>
            </div>
          </div>
        )}

        {/* ══════════════════════════════════════════════════════════════════ */}
        {/* TAB 6 — HISTÓRICO */}
        {/* ══════════════════════════════════════════════════════════════════ */}
        {tab === 6 && keyValidated && (
          <div className="fade">
            <SectionHeader icon="📚" title="Histórico" sub={`${episodes.length} episódio${episodes.length !== 1 ? "s" : ""} · ${hasClaudeStorage() ? "window.storage" : "localStorage"}`} />
            <div style={{ marginTop:20 }}>
              {episodes.length === 0 ? (
                <div style={{ border:"1px dashed rgba(255,255,255,.07)", borderRadius:10, padding:"50px 20px", textAlign:"center", color:"#2a4050", fontSize:12 }}>
                  📂 Nenhum episódio gerado<br/>
                  <span style={{ fontSize:10, color:"#1a3040" }}>Gere seu primeiro na aba Render</span>
                </div>
              ) : (
                <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                  {episodes.map(ep => (
                    <div key={ep.id} style={{ background:"rgba(255,255,255,.02)", border:"1px solid rgba(255,255,255,.06)", borderRadius:10, padding:"14px 16px" }}>
                      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:12 }}>
                        <div style={{ flex:1 }}>
                          <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:4 }}>
                            <span style={{ fontSize:9, padding:"2px 6px", borderRadius:3, background:"rgba(16,185,129,.15)", color:"#10b981", fontWeight:700 }}>✓ COMPLETO</span>
                            <span style={{ fontSize:9, color:"#3a5060", fontFamily:"'JetBrains Mono',monospace" }}>{ep.engine === "kling" ? "⚡ KLING" : "🎥 HEYGEN"}</span>
                            <span style={{ fontSize:9, color:"#3a5060" }}>· {ep.duration} min</span>
                          </div>
                          <div style={{ fontSize:13, fontWeight:700, color:"#c8d8e8" }}>{ep.title}</div>
                          <div style={{ fontSize:10, color:"#3a5060", marginTop:2 }}>{ep.podcastName}</div>
                          <div style={{ fontSize:9, color:"#2a4050", marginTop:6, fontFamily:"'JetBrains Mono',monospace" }}>🕒 {new Date(ep.createdAt).toLocaleString("pt-BR")}</div>
                        </div>
                        <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
                          <button onClick={() => {
                            if (ep.script) setRefined(ep.script);
                            if (ep.title) setEpTitle(ep.title);
                            if (ep.podcastName) setPodcastName(ep.podcastName);
                            if (ep.duration) setDuration(ep.duration);
                            if (ep.emailSubject) setEmailSubject(ep.emailSubject);
                            if (ep.emailBody) setDistEmail(ep.emailBody);
                            setTab(3);
                          }} style={{ background:"rgba(0,180,255,.08)", border:"1px solid rgba(0,180,255,.2)", color:"#00b4ff", borderRadius:6, padding:"5px 10px", fontSize:10, cursor:"pointer" }}>📂 Reabrir</button>
                          <button onClick={() => { if(confirm(`Deletar?`)) deleteEpisode(ep.id); }} style={{ background:"rgba(239,68,68,.08)", border:"1px solid rgba(239,68,68,.2)", color:"#ef4444", borderRadius:6, padding:"5px 10px", fontSize:10, cursor:"pointer" }}>🗑️</button>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              )}

              <div style={{ marginTop:20, background:"linear-gradient(135deg,rgba(0,77,179,.07),rgba(0,180,255,.03))", border:"1px solid rgba(0,180,255,.1)", borderRadius:10, padding:14 }}>
                <div style={{ fontWeight:700, fontSize:12, color:"#00b4ff", marginBottom:8 }}>📊 Estatísticas</div>
                <div style={{ display:"grid", gridTemplateColumns:"repeat(4, 1fr)", gap:10 }}>
                  {[
                    { k:"Total", v:episodes.length },
                    { k:"Kling", v:episodes.filter(e => e.engine==="kling").length },
                    { k:"HeyGen", v:episodes.filter(e => e.engine==="heygen").length },
                    { k:"Min", v:episodes.reduce((s, e) => s + (e.duration||0), 0) },
                  ].map(s => (
                    <div key={s.k} style={{ background:"rgba(0,0,0,.2)", borderRadius:7, padding:"10px 12px", textAlign:"center" }}>
                      <div style={{ fontSize:18, fontWeight:800, color:"#00b4ff", fontFamily:"'JetBrains Mono',monospace" }}>{s.v}</div>
                      <div style={{ fontSize:9, color:"#3a5060", letterSpacing:".05em", textTransform:"uppercase" }}>{s.k}</div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>
        )}

        {/* Locked tabs message */}
        {tab > 0 && !keyValidated && (
          <div className="fade" style={{ textAlign:"center", padding:"80px 20px" }}>
            <div style={{ fontSize:48, marginBottom:14 }}>🔒</div>
            <div style={{ fontSize:18, fontWeight:700, color:"#d97706", marginBottom:8 }}>Aba bloqueada</div>
            <div style={{ fontSize:12, color:"#608090", marginBottom:20 }}>Configure sua chave Anthropic na aba Diagnóstico para desbloquear.</div>
            <Btn onClick={() => setTab(0)}>← Voltar para Diagnóstico</Btn>
          </div>
        )}

      </div>

      {/* FOOTER */}
      <div style={{ position:"fixed", bottom:0, left:0, right:0, background:"rgba(7,11,19,.97)", backdropFilter:"blur(14px)", borderTop:"1px solid rgba(255,255,255,.05)", padding:"9px 24px", display:"flex", alignItems:"center", gap:10, zIndex:100 }}>
        <span style={{ fontSize:9, color:"#1a3040", fontFamily:"monospace", minWidth:50 }}>FLUXO</span>
        {TABS.map((t, i) => (
          <div key={i} style={{ display:"flex", alignItems:"center", gap:3 }}>
            <div style={{ width:7, height:7, borderRadius:"50%", background: done.includes(i) ? "#10b981" : tab===i ? "#00b4ff" : "rgba(255,255,255,.07)" }} />
            <span style={{ fontSize:9, color: tab===i ? "#00b4ff" : done.includes(i) ? "#10b981" : "#1a3040", cursor:"pointer" }} onClick={() => canAccessTab(i) && setTab(i)}>{t.label}</span>
            {i < TABS.length-1 && <span style={{ color:"#1a2a3a", fontSize:8 }}>›</span>}
          </div>
        ))}
        <div style={{ marginLeft:"auto", fontSize:9, color:"#1a3040", fontFamily:"monospace" }}>{episodes.length} eps · {done.length}/{TABS.length}</div>
      </div>
    </div>
  );
}

function SectionHeader({ icon, title, sub }) {
  return (
    <div style={{ borderBottom:"1px solid rgba(255,255,255,.05)", paddingBottom:14 }}>
      <div style={{ display:"flex", alignItems:"center", gap:10 }}>
        <span style={{ fontSize:24 }}>{icon}</span>
        <div>
          <h2 style={{ margin:0, fontSize:20, fontWeight:800, color:"#fff", letterSpacing:"-.02em" }}>{title}</h2>
          <p style={{ margin:"2px 0 0", fontSize:11, color:"#2a4050" }}>{sub}</p>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<PodcastStudio />);
  </script>
</body>
</html>
