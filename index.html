<script type="text/babel" data-presets="env,react">
const { useState, useRef, useEffect, useCallback, useMemo, memo } = React;

// ═══════════════════════════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════════════════════════
const ANTHROPIC_MODEL = "claude-sonnet-4-5";

// SUPABASE — cole aqui o URL e a anon key do seu projeto (Settings → API)
const SUPABASE_URL =  "https://lmqwegtbwgvfumoaagag.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxtcXdlZ3Rid2d2ZnVtb2FhZ2FnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyNzMzODgsImV4cCI6MjA5Mzg0OTM4OH0.rERsOrp1nrInxXhAqjTmk8w-qGacXcrcjlkGj7DjMPc";


const sb = (SUPABASE_URL && SUPABASE_ANON_KEY && window.supabase)
  ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, { auth:{ persistSession:true, autoRefreshToken:true } })
  : null;
const SB_OK = !!sb;

const BRAND = {
  paper:"#F1E9D6", paperLight:"#F8F2E2", paperDark:"#E8DFC8",
  ink:"#14110D", inkSoft:"#2A241B", mute:"#7A6F5A", rule:"#C9BEA1",

};

const ADMIN_TABS = [
  { id:"newsletter",  label:"Newsletter",    icon:"📰" },
  { id:"podcast",     label:"Podcast Semanal", icon:"🎬" },
  { id:"divulgacao",  label:"Divulgação",    icon:"📣" },
  { id:"fontes",      label:"Fontes",        icon:"📡" },
  { id:"audiencia",   label:"Audiência",     icon:"📊" },
  { id:"diagnostico", label:"Configurações", icon:"⚙️" },
  { id:"historico",   label:"Arquivo",       icon:"📚" },
];

const FOCUS_AREAS = [
  { id:"produtividade", label:"Produtividade",                 icon:"⚡" },
  { id:"sistemico",     label:"Desenvolvimento Sistêmico",    icon:"🔧" },
  { id:"llm",           label:"Modelos LLM/IA",                icon:"🧠" },
];

const CAT_LABELS = ["IA","LLM","Brasil","Produtividade","Sistêmico","Podcast","Hardware","Software","Cloud","Startups","Regulação"];

// ═══════════════════════════════════════════════════════════════════════════
// DB (Supabase + localStorage fallback)
// ═══════════════════════════════════════════════════════════════════════════
const TABLE_MAP = { "newsletter":"newsletters", "comment":"comments", "view":"views", "episode":"episodes", "videoblob":"videoblobs", "user":"settings", "source":"news_sources", "audioblob":"audioblobs", "podcast":"podcasts", "podview":"podviews" };
const tableForKey = k => TABLE_MAP[k.split(":")[0]] || null;

const db = {
  async get(k){
    if(!SB_OK){const v=localStorage.getItem(k);return v?JSON.parse(v):null}
    const tbl=tableForKey(k); if(!tbl)return null;
    try{const{data,error}=await sb.from(tbl).select("data").eq("id",k).maybeSingle(); if(error||!data)return null; return data.data}catch{return null}
  },
  async set(k,v){
    if(!SB_OK){try{localStorage.setItem(k,JSON.stringify(v));return{ok:true}}catch(e){return{ok:false,error:e.message}}}
    const tbl=tableForKey(k); if(!tbl)return{ok:false,error:"sem mapeamento p/ "+k};
    try{const{error}=await sb.from(tbl).upsert({id:k,data:v}); if(error)return{ok:false,error:error.message}; return{ok:true}}catch(e){return{ok:false,error:e.message}}
  },
  async delete(k){
    if(!SB_OK){try{localStorage.removeItem(k);return{ok:true}}catch{return{ok:false}}}
    const tbl=tableForKey(k); if(!tbl)return{ok:false};
    try{const{error}=await sb.from(tbl).delete().eq("id",k); return{ok:!error}}catch{return{ok:false}}
  },
  async listByPrefix(p){
    if(!SB_OK){const items=[];for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k?.startsWith(p)){const v=localStorage.getItem(k);if(v)try{items.push(JSON.parse(v))}catch{}}}return items}
    const tbl=tableForKey(p); if(!tbl)return[];
    try{let q=sb.from(tbl).select("id,data"); const segs=p.split(":"); if(segs.length>1&&segs[1])q=q.like("id",p+"%"); const{data,error}=await q.limit(2000); if(error||!data)return[]; return data.map(r=>r.data).filter(Boolean);}catch{return[]}
  },
  async listEpisodes(){return(await db.listByPrefix("episode:")).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0))},
  async listNewsletters(){return(await db.listByPrefix("newsletter:")).sort((a,b)=>(b.date||"").localeCompare(a.date||""))},
  async saveBlob(k,d){return await db.set(k,{data:d,savedAt:Date.now()})},
  async getBlob(k){const r=await db.get(k);return r?.data||null},
};

// ═══════════════════════════════════════════════════════════════════════════
// STORAGE (Supabase Storage — for large files like audio/video, avoids base64 in DB)
// ═══════════════════════════════════════════════════════════════════════════
const STORAGE_BUCKET = "media";

// Sanitize filename: keep letters, digits, dots, dashes; strip the rest
const sanitizeFilename = name => (name||"file").replace(/[^a-zA-Z0-9._-]/g,"_").slice(0,80);

// Is this URL pointing to our Supabase Storage? (used for cleanup on delete)
const isStorageUrl = url => {
  if(!url || typeof url !== "string") return false;
  if(!SB_OK) return false;
  return url.includes("/storage/v1/object/public/"+STORAGE_BUCKET+"/");
};

// Extract the path inside the bucket from a public URL
const storageUrlToPath = url => {
  if(!isStorageUrl(url)) return null;
  const m = url.match(new RegExp("/storage/v1/object/public/"+STORAGE_BUCKET+"/(.+?)(?:\\?|$)"));
  return m ? decodeURIComponent(m[1]) : null;
};

const storageApi = {
  available(){ return SB_OK; },
  // Upload file. folder="audio" or "video". Returns { url, path } on success
  async upload(file, folder="audio"){
    if(!SB_OK) throw new Error("Supabase Storage não disponível (configure SUPABASE_URL/KEY)");
    const ext = (file.name.match(/\.[a-zA-Z0-9]+$/)||[""])[0].toLowerCase();
    const base = sanitizeFilename(file.name.replace(ext,""));
    const path = `${folder}/${Date.now()}-${base}${ext}`;
    const { data, error } = await sb.storage.from(STORAGE_BUCKET).upload(path, file, {
      cacheControl: "31536000",
      upsert: false,
      contentType: file.type || undefined,
    });
    if(error) throw new Error(error.message || "Falha no upload");
    const { data: pub } = sb.storage.from(STORAGE_BUCKET).getPublicUrl(data.path);
    return { url: pub.publicUrl, path: data.path };
  },
  // Delete by path (the part inside the bucket)
  async deletePath(path){
    if(!SB_OK || !path) return;
    try { await sb.storage.from(STORAGE_BUCKET).remove([path]); } catch{}
  },
  // Delete by full public URL (for cleanup)
  async deleteByUrl(url){
    const p = storageUrlToPath(url);
    if(p) await this.deletePath(p);
  },
};

// ═══════════════════════════════════════════════════════════════════════════
// AUTH (Supabase Auth)

const usernameToEmail = u => u.includes("@") ? u.trim().toLowerCase() : `${u.trim().toLowerCase()}@syncronize-mi.local`;

    return{token:data.session.access_token,expiresAt:(data.session.expires_at||0)*1000,username:emailToUsername(data.session.user?.email)};

  async getSession(){
    if(!SB_OK)return null;

  async seedDefaults(){const ex=await this.list(); if(ex.length>0)return ex; for(const s of DEFAULT_SOURCES)await db.set(s.id,s); return await this.list();},
  // Merge: adds missing defaults without removing custom sources. Returns count added.
  async mergeDefaults(){
    const ex = await this.list();

    for(const s of DEFAULT_SOURCES){

    return { added, total: DEFAULT_SOURCES.length };
  },

async function callAnthropic(apiKey,body){
  const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify(body)});
  const text=await res.text();let data;try{data=JSON.parse(text)}catch{data={raw:text}}
  if(!res.ok){const e=new Error(data?.error?.message||`HTTP ${res.status}`);e.status=res.status;throw e}
  return data;
}
async function callClaude(apiKey,prompt,useSearch=false,maxTokens=1500,sys=null){
  const body={model:ANTHROPIC_MODEL,max_tokens:maxTokens,messages:[{role:"user",content:prompt}]};
  if(sys)body.system=sys; if(useSearch)body.tools=[{type:"web_search_20250305",name:"web_search"}];
  let data=await callAnthropic(apiKey,body);
  let text=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("");
  if(text.trim())return text;
  if(useSearch&&data.stop_reason==="tool_use"){
    const tr=(data.content||[]).filter(b=>b.type==="tool_use").map(b=>({type:"tool_result",tool_use_id:b.id,content:"Search executed."}));
    const body2={model:ANTHROPIC_MODEL,max_tokens:maxTokens,tools:[{type:"web_search_20250305",name:"web_search"}],messages:[{role:"user",content:prompt},{role:"assistant",content:data.content},{role:"user",content:tr}]};
    if(sys)body2.system=sys;
    data=await callAnthropic(apiKey,body2);
    return(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("");
  }
  return text;
}

function getVideoEmbedInfo(url){
  if(!url)return null;
  if(url.includes("app.heygen.com/videos/")||url.includes("share.heygen.com"))return{type:"iframe",src:url,brand:"HeyGen"};
  const yt=url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]+)/);
  if(yt)return{type:"iframe",src:`https://www.youtube.com/embed/${yt[1]}`,brand:"YouTube"};
  const vm=url.match(/vimeo\.com\/(\d+)/);
  if(vm)return{type:"iframe",src:`https://player.vimeo.com/video/${vm[1]}`,brand:"Vimeo"};
  if(isStorageUrl(url))return{type:"video",src:url,brand:"Sync·MI Storage"};
  if(url.startsWith("data:video")||/\.(mp4|webm|ogg|mov|m4v)(\?|$)/i.test(url))return{type:"video",src:url,brand:"Vídeo"};
  if(url.includes("heygen.ai")&&url.includes(".mp4"))return{type:"video",src:url,brand:"HeyGen"};
  return{type:"iframe",src:url,brand:"Externo"};
}

const VideoPlayer = memo(function VideoPlayer({ url, aspectRatio="9/16", maxWidth }){
  const info = getVideoEmbedInfo(url);
  if(!info) return null;
  const [w,h] = aspectRatio.split("/").map(Number);
  const pb = `${(h/w)*100}%`;
  const portrait = aspectRatio === "9/16";
  const square = aspectRatio === "1/1";
  const containerWidth = portrait ? "min(360px, 100%)" : square ? "min(480px, 100%)" : "100%";
  const cs = { width: maxWidth || containerWidth, margin: "0 auto" };
  const openExternal = () => window.open(info.src, "_blank", "noopener,noreferrer");

  return (
    <div style={cs}>
      <div style={{position:"relative", paddingBottom:pb, height:0, overflow:"hidden", borderRadius:8, background:BRAND.ink, border:`1px solid ${BRAND.ink}`, boxShadow:"0 8px 24px -8px rgba(20,17,13,.3)"}}>
        {info.type === "video" ? (
          <video controls playsInline preload="metadata"
            style={{position:"absolute", top:0, left:0, width:"100%", height:"100%", objectFit:"contain", background:BRAND.ink}}>
            <source src={info.src} />
          </video>
        ) : (
          <iframe src={info.src}
            style={{position:"absolute", top:0, left:0, width:"100%", height:"100%", border:0}}
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen"
            allowFullScreen title={`Player ${info.brand}`} />

      </div>
      <div style={{marginTop:8, fontFamily:"'JetBrains Mono',monospace", fontSize:".68rem", textTransform:"uppercase", letterSpacing:".12em", color:BRAND.mute, display:"flex", justifyContent:"space-between", alignItems:"center"}}>

  );
});

const fmtDateMag = iso => { if(!iso)return""; const M=["JAN","FEV","MAR","ABR","MAI","JUN","JUL","AGO","SET","OUT","NOV","DEZ"]; const[y,m,d]=iso.split("-"); return`${d} ${M[parseInt(m)-1]} ${y.slice(2)}`; };
const fmtRelative = ts => { const d=(Date.now()-ts)/1000; if(d<60)return"agora"; if(d<3600)return`${Math.floor(d/60)}min`; if(d<86400)return`${Math.floor(d/3600)}h`; if(d<604800)return`${Math.floor(d/86400)}d`; return new Date(ts).toLocaleDateString("pt-BR"); };

// Convert a highlights value (string OR legacy array) into a single string for editing
const highlightsToText = h => {
  if(!h) return "";
  if(Array.isArray(h)) return h.filter(Boolean).join("\n\n");
  return String(h);
};
// Split highlights text into individual blocks (separated by blank line)
const splitHighlights = text => {
  const t = highlightsToText(text);
  if(!t.trim()) return [];
  return t.split(/\n\s*\n/).map(s=>s.trim()).filter(Boolean);
};
// Render a highlight block as HTML with markdown (escapes HTML, then bold, italic, line breaks)
const renderHighlightHTML = text => {
  if(!text) return "";
  let html = String(text).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  // Bold **text**
  html = html.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>');
  // Italic *text* (but not part of **)
  html = html.replace(/(^|[^*])\*([^*\n]+)\*(?!\*)/g, '$1<em>$2</em>');
  // Inline code `code`
  html = html.replace(/`([^`\n]+)`/g, '<code style="background:rgba(20,17,13,.08);padding:1px 6px;border-radius:3px;font-family:\'JetBrains Mono\',monospace;font-size:.92em">$1</code>');
  // Line breaks
  html = html.replace(/\n/g, '<br>');
  return html;
};

// Robust JSON extractor for AI model responses.
// type: "array" or "object". Returns parsed value or throws Error with diagnostic preview.
const parseJsonResponse = (text, type="array") => {
  if(!text || !text.trim()){
    throw new Error("O modelo retornou resposta vazia. Tente clicar de novo em alguns segundos.");
  }
  const openCh = type==="array" ? "[" : "{";
  const closeCh = type==="array" ? "]" : "}";
  // Strip markdown fences ```json ... ``` if present
  let candidate = text;
  const fenced = text.match(/```(?:json|JSON)?\s*([\s\S]*?)\s*```/);
  if(fenced) candidate = fenced[1];
  // Find the outermost brackets of the right type
  const start = candidate.indexOf(openCh);
  const end = candidate.lastIndexOf(closeCh);
  if(start === -1 || end === -1 || end < start){
    const preview = (text||"").trim().slice(0,260).replace(/\s+/g," ");
    throw new Error(`Resposta sem JSON válido. Início: "${preview}${text.length>260?"…":""}"`);
  }
  candidate = candidate.slice(start, end+1);
  // Try direct parse
  try { return JSON.parse(candidate); } catch(e){}
  // Cleanup pass: smart quotes, trailing commas, CR, comments
  const cleaned = candidate
    .replace(/[\u201C\u201D]/g, '"')   // " " → "
    .replace(/[\u2018\u2019]/g, "'")   // ' ' → '
    .replace(/,(\s*[\]}])/g, '$1')     // trailing commas
    .replace(/\r/g, '')
    .replace(/\/\/[^\n]*/g, '');       // line comments
  try { return JSON.parse(cleaned); } catch(e2){
    const preview = candidate.slice(0,200).replace(/\s+/g," ");
    throw new Error(`JSON inválido. Fragmento: "${preview}…" — tente clicar em buscar de novo.`);
  }
};

  const cls = `btn btn-${variant}${size==="sm"?" btn-sm":""}`;
  return <button onClick={onClick} disabled={disabled} className={cls} style={style}>{children}</button>;
});
const Field = memo(function Field({ label, children, style={} }){
  return <div style={{...style}}>
    {label && <label className="field-label">{label}</label>}
    {children}
  </div>;
});
const Input = memo(function Input({ value, onChange, placeholder, type="text", style={} }){
  return <input type={type} value={value||""} onChange={onChange} placeholder={placeholder} style={{width:"100%",...style}} />;
});
const TArea = memo(function TArea({ value, onChange, placeholder, rows=6, style={} }){
  return <textarea value={value||""} onChange={onChange} placeholder={placeholder} rows={rows} style={{width:"100%",...style}} />;
});
const Spin = memo(function Spin(){ return <span className="spin" style={{display:"inline-block", width:13, height:13, border:`2px solid ${BRAND.rule}`, borderTopColor:BRAND.ink, borderRadius:"50%", verticalAlign:"middle"}}/>; });
const SectionLabel = memo(function SectionLabel({ num, children }){
  return <div className="section-label"><span className="num">{num}</span><span>{children}</span></div>;
});

// Editor guidance prompt field — appears below each AI generation button to refine the output
const PromptHelper = memo(function PromptHelper({ value, onChange, placeholder, label }){
  return <div style={{background:BRAND.paperDark,borderRadius:6,padding:"10px 14px",marginTop:12,marginBottom:8,borderLeft:`3px solid ${BRAND.accent}`}}>

    </div>
    <TArea value={value} onChange={onChange} placeholder={placeholder} rows={2} style={{fontSize:".88rem",background:BRAND.paper,minHeight:54,lineHeight:1.5}}/>
    <div style={{fontSize:".7rem",color:BRAND.mute,marginTop:5,fontStyle:"italic"}}>
      Deixe em branco para usar o comportamento padrão. Preenchido, vira instrução adicional à IA.
    </div>
  </div>;
});

// Build editor guidance block to inject into AI prompts. Returns "" if input is empty.
const buildEditorGuidance = (input, contextLabel="Orientação adicional do editor") => {
  const t = (input||"").trim();
  if(!t) return "";
  return `\n\n═══ ${contextLabel.toUpperCase()} ═══\n${t}\nLeve isso em consideração na geração, sem ignorar as outras instruções.\n`;
};

// TICKER
const Ticker = memo(function Ticker({ vol="01", episodes=0, nextDate }){
  const items = [
    {dot:true, text:`TRANSMITINDO · VOL.${vol}`},
    {acc:true, text:`${episodes} EDIÇÕES PUBLICADAS`},
    {text:`FREQ SEMANAL · QUI 19:00 BRT`},
    {dot:true, text: nextDate ? `PRÓXIMA EM ${nextDate}` : "EM CURADORIA"},
    {acc:true, text:"SYNC · MI · SYNC · MI · SYNC · MI"},
    {text:"5 MIN · 1 PODCAST · 1 NEWSLETTER · SEMANA"},
  ];
  return <div className="ticker"><div className="ticker-track">
    {[...items,...items].map((it,i)=>(
      <span key={i} className={it.acc?"acc":""}>
        {it.dot && <span className="dot"></span>}
        {it.text}
      </span>
    ))}
  </div></div>;
});

// LOGIN PAGE (editorial style)
// ═══════════════════════════════════════════════════════════════════════════
function LoginPage({ onSuccess }){
  const [username,setUsername] = useState("");
  const [password,setPassword] = useState("");
  const [error,setError] = useState("");
  const [loading,setLoading] = useState(false);
  const submit = async (e) => {
    if(e) e.preventDefault();
    setLoading(true); setError("");
    try {
      const s = await auth.login(username, password);
      if(!s){ setError("Usuário ou senha incorretos"); setLoading(false); return; }
      onSuccess(s);
    } catch(err){ setError(err.message); setLoading(false); }
  };
  return <>
    <Ticker vol="01" episodes={0}/>
    <Nav/>
    <main className="container" style={{padding:"80px 32px", display:"grid", placeItems:"center", minHeight:"60vh"}}>
      <form onSubmit={submit} className="card card-pad fade" style={{maxWidth:480, width:"100%", padding:48}}>
        <div className="mono small-caps" style={{color:BRAND.accent, marginBottom:14}}>№ ACESSO RESTRITO</div>
        <h1 className="display" style={{fontSize:"clamp(2rem, 5vw, 3.2rem)", margin:"0 0 12px"}}>
          Entre na <em className="acc">redação</em>.
        </h1>
        <p style={{fontFamily:"'Fraunces',serif", fontStyle:"italic", color:BRAND.inkSoft, fontSize:"1.05rem", marginBottom:36, lineHeight:1.45}}>
          Acesso administrativo do Sync·MI. Apenas editores autenticados.
        </p>
        <Field label="Usuário" style={{marginBottom:16}}>
          <Input value={username} onChange={e=>setUsername(e.target.value)} placeholder="emigotto"/>
        </Field>
        <Field label="Senha" style={{marginBottom:24}}>
          <Input type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="••••••••"/>
        </Field>
        {error && <div className="alert-error">⚠ {error}</div>}
        <button type="submit" disabled={loading||!username||!password} className="btn btn-primary" style={{width:"100%", justifyContent:"center", marginTop:16}}>
          {loading ? <><Spin/> Sincronizando...</> : <>Entrar <svg width="14" height="14" viewBox="0 0 14 14" fill="none" className="arrow"><path d="M3 11L11 3M11 3H5M11 3V9" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></svg></>}
        </button>
        <div style={{marginTop:24, paddingTop:20, borderTop:`1px solid ${BRAND.rule}`, textAlign:"center"}}>
          <a href="?view=landing" style={{fontFamily:"'JetBrains Mono',monospace", fontSize:".72rem", textTransform:"uppercase", letterSpacing:".14em", color:BRAND.mute, textDecoration:"none"}}>← VOLTAR PARA O ARQUIVO</a>
        </div>
      </form>
    </main>
  </>;
}

// COMMENTS SIDEBAR
// ═══════════════════════════════════════════════════════════════════════════
function CommentsSidebar({ open, onClose, newsletterDate }){
  const [comments,setComments] = useState([]);
  const [name,setName] = useState("");
  const [message,setMessage] = useState("");
  const [submitting,setSubmitting] = useState(false);
  const [success,setSuccess] = useState(false);
  useEffect(()=>{
    if(!open||!newsletterDate)return;
    const saved=localStorage.getItem("commenter_name"); if(saved&&!name)setName(saved);
    (async()=>{const list=await commentsApi.listFor(newsletterDate);setComments(list.filter(c=>!c.hidden))})();
  },[open,newsletterDate]);
  const submit = async () => {
    if(!message.trim())return;
    setSubmitting(true);
    localStorage.setItem("commenter_name", name);
    await commentsApi.add(newsletterDate, name||"Anônimo", message);
    const list = await commentsApi.listFor(newsletterDate);
    setComments(list.filter(c=>!c.hidden));
    setMessage(""); setSuccess(true); setTimeout(()=>setSuccess(false),3000);
    setSubmitting(false);
  };
  if(!open) return null;
  return <>
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(20,17,13,.5)",zIndex:998,backdropFilter:"blur(2px)"}} className="fadein"/>
    <div className="slide-right" style={{position:"fixed",right:0,top:0,bottom:0,width:"min(440px,95vw)",background:BRAND.paper,borderLeft:`1px solid ${BRAND.ink}`,zIndex:999,display:"flex",flexDirection:"column",boxShadow:"-12px 0 40px rgba(20,17,13,.3)"}}>
      <div style={{padding:"24px 28px",borderBottom:`1px solid ${BRAND.rule}`,background:BRAND.ink,color:BRAND.paper}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <div className="mono small-caps" style={{color:BRAND.signal,marginBottom:8}}>№ COMENTÁRIOS</div>
            <h2 className="display" style={{margin:0,fontSize:"1.6rem",color:BRAND.paper}}>
              <em className="sig">{comments.length}</em> {comments.length===1?"mensagem":"mensagens"}
            </h2>
          </div>
          <button onClick={onClose} style={{background:"transparent",border:"none",color:BRAND.paper,fontSize:24,cursor:"pointer",padding:0,lineHeight:1}}>×</button>
        </div>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"20px 24px"}}>
        {comments.length===0 ? <div style={{textAlign:"center",color:BRAND.mute,padding:"48px 16px",fontFamily:"'Fraunces',serif",fontStyle:"italic",fontSize:"1.05rem"}}>Seja o primeiro a deixar um sinal.</div>
        : comments.map(c=>
          <div key={c.id} className="card" style={{padding:16,marginBottom:12}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <div style={{fontWeight:600,fontSize:".95rem"}}>{c.name}</div>
              <div className="mono" style={{fontSize:".68rem",color:BRAND.mute,textTransform:"uppercase",letterSpacing:".1em"}}>{fmtRelative(c.timestamp)}</div>
            </div>
            <div style={{fontSize:".92rem",lineHeight:1.55,whiteSpace:"pre-wrap"}}>{c.message}</div>
            {c.reply && <div style={{marginTop:12,padding:"10px 14px",background:BRAND.paperDark,borderLeft:`3px solid ${BRAND.accent}`,borderRadius:4}}>
              <div className="mono small-caps" style={{color:BRAND.accent,marginBottom:4,fontSize:".62rem"}}>↳ RESPOSTA DO EDITOR · {fmtRelative(c.reply.timestamp)}</div>
              <div style={{fontSize:".88rem",lineHeight:1.5,whiteSpace:"pre-wrap"}}>{c.reply.message}</div>
            </div>}
          </div>)}
      </div>
      <div style={{padding:"20px 24px",borderTop:`1px solid ${BRAND.rule}`,background:BRAND.paperLight}}>
        {success && <div className="alert-ok" style={{marginBottom:10}}>✓ Comentário enviado</div>}
        <Field label="Nome (opcional)" style={{marginBottom:10}}>
          <Input value={name} onChange={e=>setName(e.target.value)} placeholder="Seu nome"/>
        </Field>
        <Field label="Comentário" style={{marginBottom:12}}>
          <TArea value={message} onChange={e=>setMessage(e.target.value)} rows={3} placeholder="Comentário ou feedback..."/>
        </Field>
        <button onClick={submit} disabled={submitting||!message.trim()} className="btn btn-primary" style={{width:"100%",justifyContent:"center"}}>
          {submitting ? <><Spin/> Enviando</> : "Enviar Comentário →"}
        </button>
      </div>
    </div>
  </>;
}

            <p style={{fontFamily:"'Fraunces',serif",fontVariationSettings:"'opsz' 72, 'SOFT' 30",fontSize:"clamp(1.7rem, 3.5vw, 2.8rem)",lineHeight:1.15,letterSpacing:"-.02em",margin:0}}>
              A IA está mudando <em className="acc">tudo</em> — e ninguém tem tempo de acompanhar.<br/>
              <span style={{color:BRAND.mute}}>Por isso a gente faz a curadoria por você.</span><br/><br/>

          Receba o <em className="acc">sinal</em><br/>direto no seu inbox.

// PUBLIC NEWSLETTER (editorial style, fixed video rendering)
// ═══════════════════════════════════════════════════════════════════════════
function PublicNewsletter(){
  const [newsletters,setNewsletters] = useState([]);
  const [selectedDate,setSelectedDate] = useState(null);
  const [loading,setLoading] = useState(true);
  const [audioBlob,setAudioBlob] = useState(null);
  const [commentsOpen,setCommentsOpen] = useState(false);
  const [commentCount,setCommentCount] = useState(0);
  const [shareCopied,setShareCopied] = useState(false);
  const [lightboxOpen,setLightboxOpen] = useState(false);

  useEffect(()=>{(async()=>{
    const items = await db.listNewsletters();
    setNewsletters(items);
    const params = new URLSearchParams(window.location.search);
    const urlDate = params.get("date");
    if(urlDate && items.find(n=>n.date===urlDate)) setSelectedDate(urlDate);
    else if(items.length>0) setSelectedDate(items[0].date);
    else setSelectedDate(today());
    setLoading(false);
  })()},[]);

  useEffect(()=>{
    if(!selectedDate)return;
    analytics.track(selectedDate);
    (async()=>{
      const list = await commentsApi.listFor(selectedDate);
      setCommentCount(list.filter(c=>!c.hidden).length);
    })();
  },[selectedDate]);

  useEffect(()=>{
    if(!selectedDate) return;
    const c = newsletters.find(n=>n.date===selectedDate);
    if(c?.audioPodcastBlobRef) db.getBlob(c.audioPodcastBlobRef).then(setAudioBlob); else setAudioBlob(null);
  },[selectedDate,newsletters]);

  useEffect(()=>{
    if(!selectedDate||loading) return;
    const u = new URL(window.location.href);
    u.searchParams.set("view","public"); u.searchParams.set("date",selectedDate);
    window.history.replaceState({},"",u.toString());
  },[selectedDate,loading]);

  const current = newsletters.find(n=>n.date===selectedDate);
  const effectiveAudioUrl = audioBlob || current?.audioPodcastUrl;

  const readTime = useMemo(()=>estimateReadTime((current?.aiSummary||"")+" "+(current?.headlines||[]).map(h=>h.summary).join(" ")),[current]);

  const totalEpisodes = newsletters.length;
  const editionNum = useMemo(()=>{
    if(!current) return 0;
    return totalEpisodes - newsletters.findIndex(n=>n.date===selectedDate);
  },[current,newsletters,selectedDate,totalEpisodes]);

  const handleShare = async () => {
    const url = getShareUrl(selectedDate);
    if(navigator.share){ try{ await navigator.share({title:current?.title||"Sync·MI",url}); return; }catch{} }
    try{ await navigator.clipboard.writeText(url); setShareCopied(true); setTimeout(()=>setShareCopied(false),2500); }catch{}
  };

  if(loading){
    return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:BRAND.mute}}><Spin/></div>;
  }

  return <>
    <Ticker vol="01" episodes={totalEpisodes}/>
    <Nav/>

    <main className="container" style={{padding:"60px 32px 80px"}}>
      {!current ? <div style={{padding:"80px 20px",textAlign:"center",border:`1px dashed ${BRAND.rule}`,borderRadius:4}}>
        <div style={{fontFamily:"'Fraunces',serif",fontSize:"1.6rem",fontStyle:"italic",color:BRAND.mute}}>Nenhuma edição disponível ainda.</div>
        <a href="?view=landing" style={{marginTop:20,display:"inline-block",fontFamily:"'JetBrains Mono',monospace",fontSize:".75rem",textTransform:"uppercase",letterSpacing:".14em",color:BRAND.accent}}>← VOLTAR PARA A LANDING</a>
      </div> :
      <div className="fade">

        {/* HEADER */}
        <div style={{paddingBottom:32, borderBottom:`1px solid ${BRAND.rule}`, marginBottom:48}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(12,1fr)",gap:24,fontFamily:"'JetBrains Mono',monospace",fontSize:".72rem",textTransform:"uppercase",letterSpacing:".14em",color:BRAND.mute,marginBottom:36}}>
            <div style={{gridColumn:"1/4",display:"flex",flexDirection:"column",gap:4}}>
              <span>Edição</span><span style={{color:BRAND.ink,fontWeight:500}}>№ {padNum(editionNum)} · VOL.01</span>
            </div>
            <div style={{gridColumn:"4/7",display:"flex",flexDirection:"column",gap:4}}>
              <span>Publicado</span><span style={{color:BRAND.ink,fontWeight:500}}>{fmtDateMag(current.date)}</span>
            </div>
            <div style={{gridColumn:"7/10",display:"flex",flexDirection:"column",gap:4}}>
              <span>Leitura</span><span style={{color:BRAND.ink,fontWeight:500}}>{readTime} MIN</span>
            </div>
            <div style={{gridColumn:"10/13",display:"flex",flexDirection:"column",gap:4,textAlign:"right"}}>
              <span>Comentários</span><span style={{color:BRAND.ink,fontWeight:500}}>{commentCount}</span>
            </div>
          </div>

          <h1 className="display" style={{fontSize:"clamp(2.5rem, 7vw, 5.5rem)", margin:"0 0 24px", color:BRAND.ink}}>
            {current.title || "Highlights de IA"}
          </h1>
          {current.subtitle && <p style={{fontFamily:"'Fraunces',serif",fontStyle:"italic",fontVariationSettings:"'opsz' 36, 'SOFT' 100",fontSize:"clamp(1.15rem, 2vw, 1.5rem)",lineHeight:1.4,color:BRAND.inkSoft,maxWidth:"58ch",margin:0}}>
            {current.subtitle}
          </p>}

          <div style={{marginTop:32,display:"flex",gap:12,flexWrap:"wrap"}}>
            <button onClick={handleShare} className="btn btn-primary btn-sm">{shareCopied?"✓ LINK COPIADO":"↗ COMPARTILHAR"}</button>
            <button onClick={()=>setCommentsOpen(true)} className="btn btn-ghost btn-sm">💬 COMENTÁRIOS ({commentCount})</button>
            <a href="?view=landing" className="btn btn-ghost btn-sm">← ARQUIVO</a>
          </div>
        </div>

        {/* AUDIO PODCAST + SUMMARY — side by side */}
        {current.aiSummary && <section style={{marginBottom:64}}>
          <SectionLabel num="01">Análise da Semana</SectionLabel>
          <div style={{display:"grid",gridTemplateColumns:effectiveAudioUrl?"2fr 1fr":"1fr",gap:32,alignItems:"start"}}>
            <div className="card card-pad" style={{padding:40}}>
              <div style={{fontFamily:"'Fraunces',serif",fontSize:"1.15rem",lineHeight:1.65,color:BRAND.ink,whiteSpace:"pre-wrap"}}>
                {current.aiSummary}
              </div>
            </div>
            {effectiveAudioUrl && <div>
              <div className="mono small-caps" style={{color:BRAND.accent,marginBottom:14}}>🎧 PODCAST DE RESUMO</div>
              <AudioPlayer url={effectiveAudioUrl} title="Podcast de Resumo · Sync·MI"/>
              <p style={{marginTop:14,fontFamily:"'Fraunces',serif",fontStyle:"italic",fontSize:".95rem",color:BRAND.mute,lineHeight:1.5}}>
                Gerado a partir do resumo e fontes. Foco direto em IA, sem hype.
              </p>
            </div>}
          </div>
        </section>}

        {/* INFOGRÁFICO DO EPISÓDIO */}
        {current.infographicUrl && <section style={{marginBottom:64}}>
          <SectionLabel num="02">Infográfico</SectionLabel>
          <figure style={{margin:0}}>
            <div onClick={()=>setLightboxOpen(true)} style={{cursor:"zoom-in",borderRadius:10,overflow:"hidden",border:`1px solid ${BRAND.rule}`,boxShadow:"0 20px 60px -30px rgba(20,17,13,.4)",position:"relative",background:BRAND.paperLight}}>
              <img src={current.infographicUrl} alt={current.infographicCaption||"Infográfico do episódio"} style={{width:"100%",display:"block"}}/>
              <div className="mono small-caps" style={{position:"absolute",top:14,right:14,background:"rgba(20,17,13,.78)",color:BRAND.paper,padding:"6px 12px",borderRadius:100,fontSize:".58rem",letterSpacing:".12em",backdropFilter:"blur(4px)"}}>🔍 Ampliar</div>
            </div>
            {current.infographicCaption && <figcaption style={{marginTop:14,fontFamily:"'Fraunces',serif",fontStyle:"italic",fontSize:".98rem",color:BRAND.mute,textAlign:"center"}}>
              {current.infographicCaption}
            </figcaption>}
          </figure>
        </section>}

        {/* COMPANIES + TOPICS CHIPS */}
        {(current.companies?.length>0 || current.topics?.length>0) && <section style={{marginBottom:64}}>
          <SectionLabel num={current.infographicUrl?"03":"02"}>Em Discussão</SectionLabel>
          <div className="card card-pad" style={{padding:32}}>
            {current.companies?.length>0 && <div style={{marginBottom: current.topics?.length>0 ? 20 : 0}}>
              <div className="mono small-caps" style={{color:BRAND.mute,marginBottom:10}}>EMPRESAS</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                {current.companies.map((c,i)=><span key={i} className="chip solid">{c}</span>)}
              </div>
            </div>}
            {current.topics?.length>0 && <div>
              <div className="mono small-caps" style={{color:BRAND.mute,marginBottom:10}}>TÓPICOS</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                {current.topics.map((t,i)=><span key={i} className="chip acc">#{t}</span>)}
              </div>
            </div>}
          </div>
        </section>}

        {/* FOCUS INSIGHTS */}
        {current.focusInsights?.length>0 && <section style={{marginBottom:64}}>
          <SectionLabel num={current.infographicUrl?"04":"03"}>Temas em Destaque</SectionLabel>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))",gap:18}}>
            {FOCUS_AREAS.map((area,i)=>{
              const ins = current.focusInsights.find(x=>x.area===area.id);
              if(!ins?.summary) return null;
              return <div key={area.id} className="card card-pad" style={{padding:28,position:"relative"}}>
                <div style={{position:"absolute",top:0,left:0,bottom:0,width:3,background:i===0?BRAND.accent:i===1?BRAND.signal:BRAND.ink}}/>
                <div style={{paddingLeft:14}}>
                  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
                    <span style={{fontSize:20}}>{area.icon}</span>
                    <div className="mono small-caps" style={{color:BRAND.ink}}>{area.label}</div>
                  </div>
                  <p style={{margin:0,fontSize:".98rem",lineHeight:1.6,color:BRAND.inkSoft}}>{ins.summary}</p>
                </div>
              </div>;
            })}
          </div>
        </section>}

        {/* HEADLINES */}
        {current.headlines?.length>0 && <section style={{marginBottom:64}}>
          <SectionLabel num={current.infographicUrl?"05":"04"}>Notícias da Semana</SectionLabel>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(360px, 1fr))",gap:18}}>
            {current.headlines.map((h,i)=>{
              const featured = i===0;
              return <article key={i} className="card" style={{padding: featured?32:24, gridColumn: featured?"1/-1":"auto", cursor: h.url?"pointer":"default", transition:"all .2s"}}
                onClick={()=>h.url && window.open(h.url,"_blank","noopener,noreferrer")}
                onMouseEnter={e=>{if(h.url){e.currentTarget.style.transform="translateY(-2px)";e.currentTarget.style.boxShadow="var(--shadow-lg)";}}}
                onMouseLeave={e=>{e.currentTarget.style.transform="translateY(0)";e.currentTarget.style.boxShadow="var(--shadow)";}}>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14,flexWrap:"wrap"}}>
                  <span className="chip acc">{h.category||"IA"}</span>
                  {h.source && <span className="mono" style={{fontSize:".7rem",color:BRAND.mute,textTransform:"uppercase",letterSpacing:".1em"}}>{h.source}</span>}
                  {featured && <span className="chip sig">⭐ DESTAQUE</span>}
                </div>
                <h3 style={{fontFamily:"'Fraunces',serif",fontVariationSettings:`'opsz' ${featured?80:32}`,fontSize: featured?"clamp(1.6rem, 3vw, 2.2rem)":"1.25rem",lineHeight:1.2,letterSpacing:"-.015em",margin:"0 0 12px",color:BRAND.ink}}>
                  {h.title}
                </h3>
                <p style={{margin:0,fontSize: featured?"1.05rem":".95rem",lineHeight:1.55,color:BRAND.inkSoft}}>{h.summary}</p>
                {h.url && <div className="mono small-caps" style={{marginTop:14,color:BRAND.accent,fontSize:".68rem"}}>LER MATÉRIA ↗</div>}
              </article>;
            })}
          </div>
        </section>}

        {/* FOOTER + cross-sell to Podcast */}
        <div style={{marginTop:80,padding:"40px 40px",borderTop:`1px solid ${BRAND.rule}`,background:`linear-gradient(135deg,${BRAND.paperLight},rgba(212,165,46,.08))`,borderRadius:4,textAlign:"center"}}>
          <div className="mono small-caps" style={{color:BRAND.accent,marginBottom:14}}>🎬 PROCURANDO O VÍDEO?</div>
          <h3 className="display" style={{fontSize:"clamp(1.5rem, 3vw, 2.2rem)",margin:"0 0 14px",letterSpacing:"-.02em"}}>
            O resumo em vídeo agora vive no <em className="acc">Podcast Semanal</em>.
          </h3>
          <p style={{fontFamily:"'Fraunces',serif",fontStyle:"italic",fontSize:"1.05rem",color:BRAND.inkSoft,maxWidth:"54ch",margin:"0 auto 24px",lineHeight:1.5}}>
            Se você perdeu a semana inteira, assista ao podcast em 5 min — com os principais temas explicados na prática.
          </p>
          <div style={{display:"flex",justifyContent:"center",gap:12,flexWrap:"wrap"}}>
            <a href="?view=podcasts" className="btn btn-primary">▶ Assistir Podcast Semanal</a>
            <button onClick={handleShare} className="btn btn-ghost">↗ Compartilhar Edição</button>
            <button onClick={()=>setCommentsOpen(true)} className="btn btn-ghost">💬 Comentar ({commentCount})</button>
          </div>
          <div className="mono small-caps" style={{color:BRAND.mute,marginTop:24,fontSize:".62rem"}}>FIM DA EDIÇÃO № {padNum(editionNum)}</div>
        </div>
      </div>}
    </main>

    {/* Floating comments button */}
    {current && <button onClick={()=>setCommentsOpen(true)} style={{position:"fixed",bottom:24,right:24,zIndex:100,background:BRAND.ink,color:BRAND.paper,border:"none",borderRadius:50,padding:"14px 22px",fontSize:".88rem",fontWeight:500,fontFamily:"'Geist',sans-serif",cursor:"pointer",boxShadow:"0 6px 20px rgba(20,17,13,.3)",display:"flex",alignItems:"center",gap:8}}>💬 {commentCount>0?commentCount:""}</button>}

    <CommentsSidebar open={commentsOpen} onClose={()=>setCommentsOpen(false)} newsletterDate={selectedDate}/>

    {/* INFOGRAPHIC LIGHTBOX */}
    {lightboxOpen && current?.infographicUrl && <div onClick={()=>setLightboxOpen(false)} style={{position:"fixed",inset:0,zIndex:200,background:"rgba(20,17,13,.92)",display:"flex",alignItems:"center",justifyContent:"center",padding:"4vh 4vw",cursor:"zoom-out",backdropFilter:"blur(6px)"}}>
      <button onClick={()=>setLightboxOpen(false)} style={{position:"absolute",top:20,right:24,background:"transparent",border:"none",color:BRAND.paper,fontSize:"2rem",cursor:"pointer",lineHeight:1}}>×</button>
      <img src={current.infographicUrl} alt={current.infographicCaption||"Infográfico"} onClick={e=>e.stopPropagation()} style={{maxWidth:"100%",maxHeight:"92vh",objectFit:"contain",borderRadius:8,boxShadow:"0 30px 80px -20px rgba(0,0,0,.6)",cursor:"default"}}/>
    </div>}
  </>;
}

          <div style={{fontFamily:"'Fraunces',serif",fontSize:"1.8rem",fontStyle:"italic",color:BRAND.mute,marginBottom:8}}>Primeiro episódio em produção.</div>

                  <div style={{fontFamily:"'Fraunces',serif",fontSize:"clamp(1.6rem, 3.5vw, 2.6rem)",color:BRAND.paper,textAlign:"center",padding:"0 40px",letterSpacing:"-.02em",lineHeight:1.1}}>{featured.title}</div>
                </div>}
                <div style={{position:"absolute",inset:0,background:"linear-gradient(180deg,transparent 60%,rgba(20,17,13,.7) 100%)"}}></div>
                <div style={{position:"absolute",left:24,bottom:24,right:24,display:"flex",alignItems:"center",justifyContent:"space-between",color:BRAND.paper}}>
                  <div style={{width:64,height:64,background:BRAND.paper,borderRadius:"50%",display:"grid",placeItems:"center",boxShadow:"0 6px 24px rgba(0,0,0,.4)"}}>
                    <svg width="22" height="22" viewBox="0 0 14 14" fill={BRAND.ink}><path d="M3 1.5l9 5.5-9 5.5V1.5z"/></svg>
                  </div>
                  {featured.duration && <div style={{padding:"4px 10px",background:"rgba(20,17,13,.85)",color:BRAND.paper,borderRadius:3,fontFamily:"'JetBrains Mono',monospace",fontSize:".82rem"}}>{featured.duration} MIN</div>}

            </a>
            <div>
              <div className="mono small-caps" style={{color:BRAND.mute,marginBottom:10,display:"flex",gap:16,flexWrap:"wrap"}}>

                <div style={{display:"flex",flexDirection:"column",gap:10}}>

        </div>

        {/* GRID */}
        {rest.length>0 && <div>
          <SectionLabel num="02">Episódios Anteriores</SectionLabel>

                onMouseLeave={e=>e.currentTarget.querySelector('.podthumb').style.transform="scale(1)"}>

                </div>
                <h4 style={{fontFamily:"'Fraunces',serif",fontSize:"1.1rem",lineHeight:1.25,margin:"0 0 6px",letterSpacing:"-.01em"}}>{p.title}</h4>
                <div className="mono" style={{fontSize:".7rem",color:BRAND.mute,textTransform:"uppercase",letterSpacing:".08em"}}>
                  {p.week ? fmtDateMag(p.week) : ""} · {p.viewCount||0} views
                </div>
              </a>
            )}
          </div>
        </div>}
      </>}
    </main>
  </>;
}

// PODCAST DETAIL — YouTube-style player view
// ═══════════════════════════════════════════════════════════════════════════
function PodcastDetail(){
  const [podcast,setPodcast] = useState(null);
  const [related,setRelated] = useState([]);
  const [loading,setLoading] = useState(true);
  const [videoBlob,setVideoBlob] = useState(null);
  const [relatedNls,setRelatedNls] = useState([]);

  useEffect(()=>{(async()=>{
    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");
    if(!id){setLoading(false);return;}
    const p = await podcastsApi.get(id);
    if(!p){setLoading(false);return;}
    setPodcast(p);
    podcastsApi.trackView(id).catch(()=>{});
    const all = await podcastsApi.list();
    setRelated(all.filter(x=>x.id!==id).slice(0,6));
    if(p.videoBlobRef) db.getBlob(p.videoBlobRef).then(setVideoBlob);
    // Load source newsletters
    if(p.newsletterDates?.length>0){
      const nls = [];
      for(const d of p.newsletterDates){
        const nl = await db.get(`newsletter:${d}`);
        if(nl) nls.push(nl);
      }
      setRelatedNls(nls);
    }
    setLoading(false);
  })()},[]);

  if(loading) return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:BRAND.mute}}><Spin/></div>;
  if(!podcast) return <>
    <Ticker vol="01" episodes={0}/>
    <Nav/>
    <main className="container" style={{padding:"100px 32px",textAlign:"center"}}>
      <div style={{fontSize:"3rem",marginBottom:16}}>🚫</div>
      <h1 className="display" style={{fontSize:"2rem",margin:"0 0 16px"}}>Podcast não encontrado.</h1>
      <a href="?view=podcasts" className="btn btn-ghost">← Voltar para todos</a>
    </main>
  </>;

  const effectiveVideoUrl = videoBlob || podcast.videoUrl;
  const aspectRatio = podcast.aspectRatio || "16/9";

  return <>
    <Ticker vol="01" episodes={related.length+1}/>
    <Nav/>

    <main className="container" style={{padding:"32px 32px 80px"}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 360px",gap:32,alignItems:"start"}}>
        {/* LEFT: Player + meta */}
        <div>
          {/* Video player */}
          {effectiveVideoUrl ? <div style={{marginBottom:24}}>
            <VideoPlayer url={effectiveVideoUrl} aspectRatio={aspectRatio} maxWidth="100%"/>
          </div>
          : <div style={{aspectRatio:"16/9",background:BRAND.ink,borderRadius:4,display:"grid",placeItems:"center",color:BRAND.paper,marginBottom:24}}>
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:48,marginBottom:8}}>🎬</div>
              <div className="mono small-caps">Vídeo em produção</div>
            </div>
          </div>}

          {/* Title + meta */}
          <h1 className="display" style={{fontSize:"clamp(1.6rem, 4vw, 2.4rem)",margin:"0 0 14px",lineHeight:1.1}}>
            {podcast.title}
          </h1>
          <div style={{display:"flex",alignItems:"center",gap:18,marginBottom:24,paddingBottom:18,borderBottom:`1px solid ${BRAND.rule}`,flexWrap:"wrap"}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{width:42,height:42,borderRadius:"50%",background:BRAND.ink,display:"grid",placeItems:"center",color:BRAND.paper,fontFamily:"'Fraunces',serif",fontStyle:"italic",fontSize:"1rem"}}>·</div>
              <div>
                <div style={{fontFamily:"'Fraunces',serif",fontWeight:500,fontSize:".95rem"}}>Sync<em className="acc" style={{fontStyle:"italic"}}>·MI</em></div>
                <div className="mono" style={{fontSize:".68rem",color:BRAND.mute,textTransform:"uppercase",letterSpacing:".1em"}}>Newsletter & Podcast</div>
              </div>
            </div>
            <div style={{flex:1}}/>
            <div className="mono" style={{fontSize:".78rem",color:BRAND.mute,textTransform:"uppercase",letterSpacing:".1em"}}>
              {podcast.viewCount||0} views · {podcast.week?fmtDateMag(podcast.week):fmtRelative(podcast.createdAt)}
            </div>
            {podcast.videoUrl && <a href={podcast.videoUrl} target="_blank" rel="noreferrer" className="btn btn-ghost btn-sm">↗ Abrir externamente</a>}
          </div>

          {/* Description card (YouTube-style) */}
          <div className="card" style={{padding:28,marginBottom:24}}>
            <div className="mono small-caps" style={{color:BRAND.accent,marginBottom:14}}>📝 DESCRIÇÃO</div>
            <div style={{fontFamily:"'Fraunces',serif",fontSize:"1.05rem",lineHeight:1.65,color:BRAND.ink,whiteSpace:"pre-wrap",marginBottom:splitHighlights(podcast.highlights).length>0?24:0}}>
              {podcast.description || <span style={{fontStyle:"italic",color:BRAND.mute}}>(sem descrição)</span>}
            </div>
            {splitHighlights(podcast.highlights).length>0 && <div style={{paddingTop:22,borderTop:`1px solid ${BRAND.rule}`}}>
              <div className="mono small-caps" style={{color:BRAND.accent,marginBottom:16}}>✨ HIGHLIGHTS DO VÍDEO</div>
              <div style={{display:"flex",flexDirection:"column",gap:18}}>
                {splitHighlights(podcast.highlights).map((h,i,arr)=>
                  <div key={i} style={{display:"grid",gridTemplateColumns:"48px 1fr",gap:14,alignItems:"flex-start",paddingBottom:i<arr.length-1?14:0,borderBottom:i<arr.length-1?`1px solid ${BRAND.rule}`:"none"}}>
                    <div className="mono" style={{fontSize:".85rem",color:BRAND.accent,fontWeight:600,paddingTop:4,letterSpacing:".04em"}}>№ {padNum(i+1,2)}</div>
                    <div style={{fontFamily:"'Fraunces',serif",fontSize:"1.05rem",lineHeight:1.55,color:BRAND.ink,wordBreak:"break-word"}} dangerouslySetInnerHTML={{__html: renderHighlightHTML(h)}}/>
                  </div>
                )}
              </div>
            </div>}
          </div>

          {/* Source newsletters */}
          {relatedNls.length>0 && <div className="card" style={{padding:24}}>
            <div className="mono small-caps" style={{color:BRAND.accent,marginBottom:14}}>📰 NEWSLETTERS QUE ORIGINARAM ESTE EPISÓDIO</div>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {relatedNls.map(nl=>
                <a key={nl.date} href={`?view=public&date=${nl.date}`} style={{display:"flex",alignItems:"center",gap:14,padding:"10px 14px",background:BRAND.paperDark,borderRadius:4,textDecoration:"none",color:BRAND.ink,transition:"all .2s"}}
                  onMouseEnter={e=>{e.currentTarget.style.background=BRAND.paperLight;e.currentTarget.style.transform="translateX(4px)"}}
                  onMouseLeave={e=>{e.currentTarget.style.background=BRAND.paperDark;e.currentTarget.style.transform="translateX(0)"}}>
                  <div className="mono" style={{fontSize:".72rem",color:BRAND.mute,textTransform:"uppercase",letterSpacing:".1em",minWidth:80}}>{fmtDateMag(nl.date)}</div>
                  <div style={{fontFamily:"'Fraunces',serif",fontSize:"1rem",lineHeight:1.2,flex:1}}>{nl.title}</div>
                  <span style={{color:BRAND.accent,fontSize:".8rem"}}>→</span>
                </a>
              )}
            </div>
          </div>}
        </div>

        {/* RIGHT: Related podcasts */}
        <aside>
          <div className="mono small-caps" style={{color:BRAND.mute,marginBottom:14}}>📺 OUTROS EPISÓDIOS</div>
          {related.length===0 ? <div style={{padding:30,textAlign:"center",border:`1px dashed ${BRAND.rule}`,borderRadius:4,color:BRAND.mute,fontFamily:"'Fraunces',serif",fontStyle:"italic"}}>Nenhum outro ainda</div>
          : <div style={{display:"flex",flexDirection:"column",gap:14}}>
            {related.map(p=>
              <a key={p.id} href={`?view=podcast&id=${encodeURIComponent(p.id)}`} style={{display:"grid",gridTemplateColumns:"160px 1fr",gap:12,textDecoration:"none",color:"inherit"}}>
                <div style={{position:"relative",aspectRatio:"16/9",background:BRAND.ink,borderRadius:4,overflow:"hidden",border:`1px solid ${BRAND.rule}`}}>
                  {p.thumbnailUrl ? <img src={p.thumbnailUrl} alt={p.title} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                  : <div style={{position:"absolute",inset:0,background:"radial-gradient(circle at 30% 40%, rgba(197,57,28,.3) 0%, transparent 50%)",display:"grid",placeItems:"center",color:BRAND.paper,fontFamily:"'Fraunces',serif",fontSize:".82rem",padding:8,textAlign:"center",lineHeight:1.1}}>{(p.title||"").slice(0,40)}</div>}
                  {p.duration && <div style={{position:"absolute",right:4,bottom:4,padding:"1px 6px",background:"rgba(20,17,13,.85)",color:BRAND.paper,borderRadius:2,fontFamily:"'JetBrains Mono',monospace",fontSize:".62rem"}}>{p.duration}m</div>}
                </div>
                <div>
                  <div style={{fontFamily:"'Fraunces',serif",fontSize:".95rem",lineHeight:1.2,marginBottom:4,letterSpacing:"-.005em"}}>{p.title}</div>
                  <div className="mono" style={{fontSize:".62rem",color:BRAND.mute,textTransform:"uppercase",letterSpacing:".08em"}}>
                    {p.week?fmtDateMag(p.week):""} · {p.viewCount||0} views
                  </div>
                </div>
              </a>
            )}
          </div>}
        </aside>
      </div>
    </main>
  </>;
}

function BreakdownCard({ title, data, keyFmt }){
  const total = data.reduce((s,[,n])=>s+n,0)||1;
  return <div className="card card-pad" style={{padding:18}}>
    <div className="mono small-caps" style={{color:BRAND.mute,marginBottom:12}}>{title}</div>
    {data.length===0 ? <div style={{fontSize:".82rem",color:BRAND.mute,fontStyle:"italic"}}>—</div>
    : <div style={{display:"flex",flexDirection:"column",gap:8}}>
      {data.slice(0,8).map(([k,n])=><div key={k}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:4,fontSize:".82rem"}}>
          <span style={{fontWeight:500}}>{keyFmt?keyFmt(k):k}</span>
          <span className="mono" style={{color:BRAND.mute}}>{n}</span>
        </div>
        <div style={{height:4,background:BRAND.paperDark,borderRadius:2,overflow:"hidden"}}>
          <div style={{width:`${(n/total)*100}%`,height:"100%",background:BRAND.ink}}/>
        </div>
      </div>)}
    </div>}
  </div>;
}

  const byDevice = useMemo(()=>{const m=new Map(); views.forEach(v=>m.set(v.device||"?",(m.get(v.device||"?")||0)+1)); return Array.from(m.entries()).sort((a,b)=>b[1]-a[1])},[views]);

// SOCIAL STUDIO — Instagram post templates + LinkedIn post generator
// ═══════════════════════════════════════════════════════════════════════════
const IG_POST_TYPES = [
  { id:"cover-ink",    label:"Capa · Ink",        group:"Capa de Episódio", aspect:"1/1",  bg:"ink"    },
  { id:"cover-paper",  label:"Capa · Paper",      group:"Capa de Episódio", aspect:"1/1",  bg:"paper"  },
  { id:"cover-accent", label:"Capa · Accent",     group:"Capa de Episódio", aspect:"1/1",  bg:"accent" },
  { id:"quote",        label:"Quote Card",        group:"Citação",          aspect:"1/1",  bg:"paper"  },
  { id:"stat",         label:"Dado em Destaque",  group:"Citação",          aspect:"1/1",  bg:"ink"    },
  { id:"reels",        label:"Reels / Story",     group:"Vertical 9:16",    aspect:"9/16", bg:"ink"    },
  { id:"infographic",  label:"Infográfico",       group:"Imagem",           aspect:"auto", bg:"paper"  },
];

function SocialStudio({ apiKey, keyValidated, newsletters }){
  const [selDate,setSelDate] = useState("");
  const [postType,setPostType] = useState("cover-ink");
  const [igCaption,setIgCaption] = useState("");
  const [liPost,setLiPost] = useState("");
  const [genState,setGenState] = useState("");
  const [msg,setMsg] = useState({type:"",text:""});
  const [copied,setCopied] = useState("");
  const postRef = useRef(null);

  const eps = useMemo(()=>(newsletters||[]).slice().sort((a,b)=>(b.date||"").localeCompare(a.date||"")),[newsletters]);
  useEffect(()=>{ if(eps.length>0 && !selDate) setSelDate(eps[0].date); },[eps,selDate]);

  const ep = eps.find(e=>e.date===selDate);
  // Edition number = chronological position (oldest = 1)
  const epNum = useMemo(()=>{
    if(!ep) return 1;
    const asc = (newsletters||[]).slice().sort((a,b)=>(a.date||"").localeCompare(b.date||""));
    return asc.findIndex(n=>n.date===ep.date)+1;
  },[ep,newsletters]);

  const epUrl = ep ? `${window.location.origin}/?view=public&date=${ep.date}` : "";
  const shareUrl = ep ? `${window.location.origin}/api/share?date=${ep.date}` : "";

  // Pull the top featured headline + a stat-ish topic for templates
  const topHeadline = ep?.headlines?.find(h=>h.featured) || ep?.headlines?.[0];
  const firstTopic = ep?.topics?.[0] || ep?.companies?.[0] || "IA";

  const curType = IG_POST_TYPES.find(t=>t.id===postType) || IG_POST_TYPES[0];

  const copyText = (text,key) => {
    navigator.clipboard.writeText(text);
    setCopied(key); setTimeout(()=>setCopied(""),1800);
  };

  const downloadPng = async () => {
    if(!postRef.current){return;}
    if(typeof html2canvas==="undefined"){setMsg({type:"err",text:"html2canvas não carregou. Recarregue a página."});return;}
    setMsg({type:"info",text:"⏳ Gerando PNG em alta resolução..."});
    try {
      const node = postRef.current;
      const canvas = await html2canvas(node,{scale:3,backgroundColor:null,useCORS:true,logging:false});
      const link = document.createElement("a");
      link.download = `syncmi-${ep?.date||"post"}-${postType}.png`;
      link.href = canvas.toDataURL("image/png");
      link.click();
      setMsg({type:"ok",text:"✓ PNG baixado! Poste no Instagram."});
    } catch(err){setMsg({type:"err",text:"Erro ao gerar PNG: "+err.message});}
  };

  const genCaption = async () => {
    if(!keyValidated){setMsg({type:"err",text:"Configure a chave Anthropic em Configurações."});return;}
    if(!ep){setMsg({type:"err",text:"Selecione um episódio."});return;}
    setGenState("ig"); setMsg({type:"",text:""});
    try {
      const ctx = `Título: ${ep.title}\nSubtítulo: ${ep.subtitle||""}\nResumo: ${(ep.aiSummary||"").slice(0,1200)}\nTemas: ${(ep.topics||[]).join(", ")}\nEmpresas: ${(ep.companies||[]).join(", ")}`;
      const t = await callClaude(apiKey,
        `Crie uma LEGENDA para post de Instagram sobre este episódio de newsletter de IA.\nTom: direto, entusiasta, sem hype exagerado. Português brasileiro.\nEstrutura: gancho forte na 1ª linha; 2-3 frases de valor; convite pra ler/assistir; 1 linha com 4-6 hashtags relevantes de IA.\nUse no máximo 3 emojis bem colocados. Não use markdown.\n\nEPISÓDIO:\n${ctx}`,
        false, 700);
      setIgCaption(t.trim());
      setMsg({type:"ok",text:"✓ Legenda do Instagram gerada!"});
    } catch(err){setMsg({type:"err",text:"Erro: "+err.message});}
    setGenState("");
  };

  const genLinkedin = async () => {
    if(!keyValidated){setMsg({type:"err",text:"Configure a chave Anthropic em Configurações."});return;}
    if(!ep){setMsg({type:"err",text:"Selecione um episódio."});return;}
    setGenState("li"); setMsg({type:"",text:""});
    try {
      const ctx = `Título: ${ep.title}\nSubtítulo: ${ep.subtitle||""}\nResumo: ${(ep.aiSummary||"").slice(0,1500)}\nTemas: ${(ep.topics||[]).join(", ")}\nEmpresas: ${(ep.companies||[]).join(", ")}`;
      const t = await callClaude(apiKey,
        `Crie um POST PARA LINKEDIN sobre este episódio de uma newsletter/podcast de IA chamada Sync·MI.\nTom: profissional, entusiasta, instigante — adequado a um feed executivo de tecnologia. Português brasileiro.\nEstrutura: gancho de 1 linha que para o scroll; 3-4 frases sucintas com os destaques mais relevantes (pode usar bullets com "→"); fechamento convidando a ler a edição completa; 3-5 hashtags profissionais no fim.\nNÃO inclua a URL no corpo (ela será anexada automaticamente como preview). Não use markdown de negrito. Máximo ~140 palavras.\n\nEPISÓDIO:\n${ctx}`,
        false, 700);
      setLiPost(t.trim());
      setMsg({type:"ok",text:"✓ Post do LinkedIn gerado!"});
    } catch(err){setMsg({type:"err",text:"Erro: "+err.message});}
    setGenState("");
  };

  // ─── Render the selected Instagram post template ───
  const renderPost = () => {
    if(!ep) return null;
    const dateStr = fmtDateMag(ep.date);
    const mark = <span className="ig-mark"><span className="ig-mark-dot"></span> Sync<em>·MI</em></span>;
    const waveBars = Array.from({length:32},(_,i)=>15+Math.abs(Math.sin(i*.55))*82);

    if(postType==="cover-ink"){
      return <div className="ig-post ig-1-1 ig-bg-ink"><div className="ig-frame">
        <div className="ig-corner">{mark}<span>EP.{padNum(epNum)} · {dateStr}</span></div>
        <div style={{flex:1,display:"flex",alignItems:"center"}}><div>
          <div className="ig-tag ig-tag-fill" style={{marginBottom:18}}>▲ Novo Episódio</div>
          <h2 className="ig-headline" style={{fontSize:"clamp(1.6rem,5.5vw,2.7rem)"}}>{ep.title}</h2>
          {ep.subtitle && <p style={{fontFamily:"'Fraunces',serif",fontStyle:"italic",fontSize:"1rem",opacity:.85,marginTop:14,maxWidth:"32ch"}}>{ep.subtitle}</p>}
        </div></div>
        <div className="ig-corner">
          <div className="ig-wave" style={{width:"55%",height:22}}>{waveBars.map((h,i)=><span key={i} style={{height:`${h}%`}}/>)}</div>
          <span>5 MIN · IA</span>
        </div>
      </div></div>;
    }
    if(postType==="cover-paper"){
      return <div className="ig-post ig-1-1 ig-bg-paper"><div className="ig-frame">
        <div className="ig-corner">{mark}<span style={{color:"var(--mute)"}}>EP.{padNum(epNum)} · {dateStr}</span></div>
        <div style={{flex:1,display:"flex",alignItems:"center"}}><div>
          <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:".62rem",letterSpacing:".18em",textTransform:"uppercase",color:"var(--accent)",marginBottom:16}}>▲ EP.{padNum(epNum)} no ar</div>
          <h2 className="ig-headline" style={{fontSize:"clamp(1.5rem,5vw,2.5rem)"}}>{ep.title}</h2>
          {ep.subtitle && <p style={{fontFamily:"'Fraunces',serif",fontStyle:"italic",fontSize:"1rem",color:"var(--ink-soft)",marginTop:16,maxWidth:"32ch"}}>{ep.subtitle}</p>}
        </div></div>
        <div className="ig-corner"><span style={{color:"var(--mute)"}}>SYNCMI.COM</span><span className="ig-tag">LINK NA BIO →</span></div>
      </div></div>;
    }
    if(postType==="cover-accent"){
      return <div className="ig-post ig-1-1 ig-bg-accent"><div className="ig-frame">
        <div className="ig-corner" style={{color:"var(--paper)"}}><span className="ig-mark" style={{color:"var(--paper)"}}><span className="ig-mark-dot" style={{background:"var(--paper)"}}></span> Sync<em style={{color:"var(--ink)"}}>·MI</em></span><span>▲ NOVO</span></div>
        <div style={{flex:1,display:"flex",alignItems:"center"}}>
          <h2 className="ig-headline" style={{fontSize:"clamp(1.7rem,6vw,3rem)",color:"var(--paper)"}}>{ep.title}</h2>
        </div>
        <div className="ig-corner" style={{color:"var(--paper)"}}><span>EP.{padNum(epNum)} · LINK NA BIO</span><span>↗</span></div>
      </div></div>;
    }
    if(postType==="quote"){
      const quote = ep.subtitle || topHeadline?.title || ep.title;
      return <div className="ig-post ig-1-1 ig-bg-paper"><div className="ig-frame">
        <div className="ig-corner"><span>CITAÇÃO</span><span>№ {padNum(epNum)}</span></div>
        <div style={{flex:1,display:"flex",alignItems:"center"}}>
          <h3 style={{fontFamily:"'Fraunces',serif",fontSize:"clamp(1.4rem,4.5vw,2rem)",letterSpacing:"-.02em",lineHeight:1.1,margin:0}}>“{quote}”</h3>
        </div>
        <div className="ig-corner">{mark}<span style={{color:"var(--mute)"}}>EP.{padNum(epNum)}</span></div>
      </div></div>;
    }
    if(postType==="stat"){
      return <div className="ig-post ig-1-1 ig-bg-ink"><div className="ig-frame">
        <div className="ig-corner">{mark}<span>EP.{padNum(epNum)}</span></div>
        <div style={{flex:1,display:"flex",flexDirection:"column",justifyContent:"center"}}>
          <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:".6rem",letterSpacing:".2em",textTransform:"uppercase",color:"var(--signal)",marginBottom:14}}>O TEMA DA SEMANA</div>
          <h2 className="ig-headline" style={{fontSize:"clamp(1.8rem,6vw,2.8rem)"}}>{firstTopic}</h2>
          {topHeadline && <p style={{fontFamily:"'Fraunces',serif",fontStyle:"italic",fontSize:".98rem",opacity:.82,marginTop:16,maxWidth:"34ch"}}>{topHeadline.summary?.slice(0,120)}</p>}
        </div>
        <div className="ig-corner"><span>SYNC·MI · 5MIN</span><span>↗ LINK NA BIO</span></div>
      </div></div>;
    }
    if(postType==="reels"){
      return <div className="ig-post ig-9-16 ig-bg-ink"><div className="ig-frame">
        <div className="ig-corner">{mark}<span>EP.{padNum(epNum)}</span></div>
        <div style={{flex:1,display:"flex",alignItems:"center"}}><div>
          <div className="ig-tag ig-tag-fill" style={{marginBottom:18}}>▲ Esta semana em IA</div>
          <h2 className="ig-headline" style={{fontSize:"clamp(1.8rem,7vw,2.6rem)"}}>{ep.title}</h2>
          {ep.subtitle && <p style={{fontFamily:"'Fraunces',serif",fontStyle:"italic",fontSize:"1.05rem",opacity:.85,marginTop:18}}>{ep.subtitle}</p>}
        </div></div>
        <div style={{textAlign:"center"}}>
          <div className="ig-wave" style={{height:30,marginBottom:14}}>{waveBars.map((h,i)=><span key={i} style={{height:`${h}%`}}/>)}</div>
          <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:".62rem",letterSpacing:".18em",textTransform:"uppercase",opacity:.7}}>deslize ↑ · link na bio</div>
        </div>
      </div></div>;
    }
    if(postType==="infographic"){
      if(!ep.infographicUrl) return <div style={{padding:60,textAlign:"center",border:`1px dashed ${BRAND.rule}`,borderRadius:8,color:BRAND.mute,fontStyle:"italic",fontFamily:"'Fraunces',serif"}}>Este episódio não tem infográfico. Suba um no Passo 5 da Newsletter.</div>;
      return <div className="ig-post ig-bg-paper" style={{aspectRatio:"auto"}}><div style={{padding:"4%"}}>
        <div className="ig-corner" style={{marginBottom:12}}>{mark}<span style={{color:"var(--mute)"}}>EP.{padNum(epNum)} · {dateStr}</span></div>
        <img src={ep.infographicUrl} alt="infográfico" crossOrigin="anonymous" style={{width:"100%",display:"block",borderRadius:4}}/>
      </div></div>;
    }
    return null;
  };

  if(eps.length===0){
    return <div className="fade"><SectionLabel num="📣">Divulgação</SectionLabel>
      <div style={{padding:60,textAlign:"center",border:`1px dashed ${BRAND.rule}`,borderRadius:8,color:BRAND.mute,fontStyle:"italic",fontFamily:"'Fraunces',serif",fontSize:"1.15rem"}}>Publique uma edição primeiro para gerar posts.</div>
    </div>;
  }

  return <div className="fade">
    <SectionLabel num="📣">Divulgação</SectionLabel>
    <p style={{fontFamily:"'Fraunces',serif",fontStyle:"italic",color:BRAND.inkSoft,fontSize:"1.05rem",marginTop:-24,marginBottom:24}}>
      Gere posts do Instagram (baixe o PNG pronto) e o texto para LinkedIn com preview profissional do link.
    </p>

    {/* Episode picker */}
    <div className="card card-pad" style={{padding:20,marginBottom:18,background:`linear-gradient(135deg,${BRAND.paperLight},rgba(212,165,46,.06))`}}>
      <Field label="Episódio">
        <select value={selDate} onChange={e=>setSelDate(e.target.value)} style={{width:"100%",maxWidth:480}}>
          {eps.map(e=><option key={e.date} value={e.date}>EP.{String((newsletters||[]).slice().sort((a,b)=>(a.date||"").localeCompare(b.date||"")).findIndex(n=>n.date===e.date)+1).padStart(2,"0")} · {fmtDate(e.date)} · {e.title}</option>)}
        </select>
      </Field>
    </div>

    {msg.text && <div className={msg.type==="ok"?"alert-ok":msg.type==="err"?"alert-error":"alert-info"} style={{marginBottom:18}}>{msg.text}</div>}

    <div style={{display:"grid",gridTemplateColumns:"minmax(0,1fr) minmax(0,1fr)",gap:24,alignItems:"start"}}>
      {/* LEFT: Instagram studio */}
      <div className="card card-pad" style={{padding:24}}>
        <div className="mono small-caps" style={{color:BRAND.accent,marginBottom:14}}>📸 POST DO INSTAGRAM</div>
        <Field label="Tipo de post" style={{marginBottom:16}}>
          <select value={postType} onChange={e=>setPostType(e.target.value)} style={{width:"100%"}}>
            {IG_POST_TYPES.map(t=><option key={t.id} value={t.id}>{t.group} · {t.label}</option>)}
          </select>
        </Field>

        {/* The rendered post — captured by html2canvas */}
        <div style={{maxWidth:curType.aspect==="9/16"?300:380,margin:"0 auto 16px"}}>
          <div ref={postRef}>{renderPost()}</div>
        </div>

        <div style={{display:"flex",gap:8,justifyContent:"center",flexWrap:"wrap"}}>
          <Btn size="sm" onClick={downloadPng}>⬇ Baixar PNG</Btn>
          <Btn size="sm" variant="ghost" onClick={genCaption} disabled={genState==="ig"||!keyValidated}>{genState==="ig"?<><Spin/> Gerando...</>:"✨ Gerar legenda"}</Btn>
        </div>

        {igCaption && <div style={{marginTop:16}}>
          <div className="mono small-caps" style={{color:BRAND.mute,marginBottom:6,fontSize:".6rem"}}>LEGENDA</div>
          <TArea value={igCaption} onChange={e=>setIgCaption(e.target.value)} rows={7} style={{fontSize:".88rem",lineHeight:1.5}}/>
          <Btn size="sm" variant="ghost" onClick={()=>copyText(igCaption,"igcap")} style={{marginTop:8}}>{copied==="igcap"?"✓ Copiado":"📋 Copiar legenda"}</Btn>
        </div>}
      </div>

      {/* RIGHT: LinkedIn */}
      <div className="card card-pad" style={{padding:24}}>
        <div className="mono small-caps" style={{color:BRAND.accent,marginBottom:14}}>💼 POST DO LINKEDIN</div>

        {/* Link preview mock — how it appears on LinkedIn */}
        <div className="mono small-caps" style={{color:BRAND.mute,marginBottom:8,fontSize:".6rem"}}>PREVIEW DO LINK (como aparece no LinkedIn)</div>
        <div style={{border:`1px solid ${BRAND.rule}`,borderRadius:8,overflow:"hidden",marginBottom:16,background:BRAND.paper}}>
          {ep?.infographicUrl
            ? <img src={ep.infographicUrl} alt="preview" style={{width:"100%",display:"block",maxHeight:200,objectFit:"cover"}}/>
            : <div style={{height:120,display:"flex",alignItems:"center",justifyContent:"center",background:BRAND.ink,color:BRAND.paper,fontFamily:"'Fraunces',serif",fontStyle:"italic",fontSize:".9rem",textAlign:"center",padding:20}}>Sem infográfico — usará a imagem padrão da marca</div>}
          <div style={{padding:"10px 14px"}}>
            <div style={{fontWeight:600,fontSize:".88rem",color:BRAND.ink,marginBottom:3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{ep?.title}</div>
            <div style={{fontSize:".74rem",color:BRAND.mute,fontFamily:"'JetBrains Mono',monospace"}}>{(window.location.host||"podcast-studio-lac.vercel.app")}</div>
          </div>
        </div>

        <Btn size="sm" variant="ghost" onClick={genLinkedin} disabled={genState==="li"||!keyValidated}>{genState==="li"?<><Spin/> Gerando...</>:"✨ Gerar post do LinkedIn"}</Btn>

        {liPost && <div style={{marginTop:16}}>
          <div className="mono small-caps" style={{color:BRAND.mute,marginBottom:6,fontSize:".6rem"}}>TEXTO DO POST</div>
          <TArea value={liPost} onChange={e=>setLiPost(e.target.value)} rows={9} style={{fontSize:".88rem",lineHeight:1.5}}/>
          <Btn size="sm" variant="ghost" onClick={()=>copyText(liPost+"\n\n"+shareUrl,"lipost")} style={{marginTop:8}}>{copied==="lipost"?"✓ Copiado com link":"📋 Copiar post + link"}</Btn>
        </div>}

        <div style={{marginTop:18,paddingTop:16,borderTop:`1px solid ${BRAND.rule}`}}>
          <div className="mono small-caps" style={{color:BRAND.mute,marginBottom:6,fontSize:".6rem"}}>LINK COMPARTILHÁVEL (preview rico)</div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <Input value={shareUrl} readOnly style={{fontSize:".78rem",fontFamily:"'JetBrains Mono',monospace"}}/>
            <Btn size="sm" variant="ghost" onClick={()=>copyText(shareUrl,"share")}>{copied==="share"?"✓":"📋"}</Btn>
          </div>
          <p style={{fontSize:".74rem",color:BRAND.mute,marginTop:8,lineHeight:1.5}}>
            Este link (<code>/api/share</code>) gera o card com imagem ao colar no LinkedIn. Requer a função serverless <code>api/share.js</code> publicada (veja SETUP.md). O link direto do episódio também funciona: <a href={epUrl} target="_blank" rel="noreferrer" style={{color:BRAND.accent}}>abrir página</a>.
          </p>
        </div>
      </div>
    </div>
  </div>;
}
