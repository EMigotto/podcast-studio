<style>
  :root{
    --paper: #F5F1E6; --paper-light: #FBF8EE; --paper-dark: #E8E1CD;
    --ink: #241F21; --ink-soft: #3A3236;
    --mute: #807679; --rule: #DDD4BD;
    --accent: #E5431B; --accent-deep: #A82C0F;
    --coral: #E97852; --green: #B3D29B; --blue: #99B0CD; --tan: #D4B896;
    --signal: #E5431B;
    --bg-deep:#241F21; --ease:cubic-bezier(.22,.61,.36,1);
    --shadow: 0 1px 0 rgba(36,31,33,.06), 0 8px 24px -12px rgba(36,31,33,.14);
    --shadow-lg: 0 4px 12px rgba(36,31,33,.08), 0 16px 40px -16px rgba(36,31,33,.24);
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body, #root { margin:0; padding:0; min-height:100%; }
  html { scroll-behavior: smooth; }
  body{
    margin:0;
    background: var(--paper);
    background-image:
      radial-gradient(circle at 8% 0%, rgba(229,67,27,.10) 0%, transparent 42%),
      radial-gradient(circle at 92% 96%, rgba(36,31,33,.04) 0%, transparent 44%),
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 .14 0 0 0 0 .12 0 0 0 0 .13 0 0 0 .04 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
    color: var(--ink);
    font-family: 'Geist', system-ui, sans-serif;
    font-feature-settings: 'ss01','ss02','cv11';
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
  }
  .display { font-family:'Fraunces',serif; font-variation-settings:'opsz' 144,'SOFT' 30,'WONK' 0; font-weight:400; letter-spacing:-.035em; line-height:.9; }
  .display-italic { font-style:italic; font-variation-settings:'opsz' 144,'SOFT' 100,'WONK' 1; }
  em.acc { font-style:italic; color:var(--accent); font-variation-settings:'opsz' 100,'SOFT' 100,'WONK' 1; }
  em.sig { font-style:italic; color:var(--signal); font-variation-settings:'opsz' 100,'SOFT' 100,'WONK' 1; }
  .mono { font-family:'JetBrains Mono',monospace; letter-spacing:.02em; }
  .small-caps { text-transform:uppercase; letter-spacing:.18em; font-size:.72rem; font-weight:500; }
  .container { max-width:1320px; margin:0 auto; padding:0 32px; }
  @media (max-width: 640px){ .container { padding: 0 20px; } }

  textarea,input,select,button { outline:none !important; font-family:'Geist',sans-serif; color:var(--ink); }
  textarea,input,select { background:var(--paper-light); border:1px solid var(--rule); border-radius:8px; padding:10px 14px; font-size:.92rem; }
  textarea:focus, input:focus, select:focus { border-color:var(--ink); }
  textarea { line-height:1.6; resize:vertical; }
  button { cursor:pointer; }

  ::-webkit-scrollbar { width:10px; height:10px; }
  ::-webkit-scrollbar-track { background:rgba(36,31,33,.04); }
  ::-webkit-scrollbar-thumb { background:rgba(36,31,33,.2); border-radius:8px; }
  ::-webkit-scrollbar-thumb:hover { background:rgba(36,31,33,.4); }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  @keyframes slideRight { from { transform:translateX(100%); } to { transform:translateX(0); } }
  @keyframes ticker { from { transform:translateX(0); } to { transform:translateX(-50%); } }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.3; } }
  @keyframes live { 0%,100% { box-shadow:0 0 0 0 rgba(229,67,27,.6); } 50% { box-shadow:0 0 0 8px rgba(229,67,27,0); } }
  @keyframes wave { 0%,100% { height:20%; } 50% { height:80%; } }
  .fade { animation: fadeUp .35s ease forwards; }
  .fadein { animation: fadeIn .5s ease forwards; }
  .slide-right { animation: slideRight .3s ease forwards; }
  .spin { animation: spin 1s linear infinite; display:inline-block; }
  .pulse { animation: pulse 1.4s ease-in-out infinite; }

  /* TICKER */
  .ticker { background:var(--ink); color:var(--paper); border-bottom:1px solid var(--ink-soft); overflow:hidden; position:relative; }
  .ticker-track { display:flex; gap:48px; padding:10px 0; white-space:nowrap; animation:ticker 60s linear infinite; font-family:'JetBrains Mono',monospace; font-size:.72rem; letter-spacing:.15em; text-transform:uppercase; }
  .ticker-track span { display:inline-flex; align-items:center; gap:12px; flex-shrink:0; }
  .ticker-track .dot { width:6px; height:6px; border-radius:50%; background:var(--signal); animation:pulse 1.4s ease-in-out infinite; }
  .ticker-track .acc { color:var(--signal); }

  /* NAV */
  .nav { border-bottom:1px solid var(--rule); background:rgba(241,233,214,.85); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); position:sticky; top:0; z-index:50; }
  .nav-inner { display:flex; align-items:center; justify-content:space-between; padding:18px 0; }
  .brand { display:flex; align-items:center; gap:14px; text-decoration:none; color:var(--ink); }
  .brand-mark { width:36px; height:36px; border:1.5px solid var(--ink); border-radius:50%; display:grid; place-items:center; position:relative; background:var(--paper-light); flex-shrink:0; }
  .brand-mark::before { content:""; position:absolute; inset:5px; border:1px solid var(--ink); border-radius:50%; opacity:.35; }
  .brand-mark::after { content:""; width:8px; height:8px; background:var(--accent); border-radius:50%; animation:pulse 2s ease-in-out infinite; }
  .brand-name { font-family:'Fraunces',serif; font-weight:500; font-size:1.25rem; letter-spacing:-.02em; font-variation-settings:'opsz' 14; }
  .brand-name em { font-style:italic; font-variation-settings:'opsz' 14,'SOFT' 100; }
  .nav-links { display:flex; gap:28px; align-items:center; }
  .nav-links a { text-decoration:none; color:var(--ink-soft); font-size:.88rem; font-weight:500; transition:color .2s; }
  .nav-links a:hover { color:var(--accent); }
  .nav-cta { background:var(--ink); color:var(--paper); padding:8px 18px; border-radius:999px; font-size:.82rem; transition:all .2s; }
  .nav-cta:hover { background:var(--accent); color:var(--paper) !important; }
  @media (max-width:760px) {
    .nav-inner{ gap:10px; }
    .nav-links{ gap:14px; font-size:.8rem; overflow-x:auto; scrollbar-width:none; -webkit-overflow-scrolling:touch; }
    .nav-links::-webkit-scrollbar{ display:none; }
    .nav-links a{ white-space:nowrap; font-size:.82rem; }
    .brand-name{ font-size:1.3rem !important; }
  }

  /* BUTTONS */
  .btn { display:inline-flex; align-items:center; gap:10px; padding:14px 22px; border-radius:999px; text-decoration:none; font-size:.92rem; font-weight:500; transition:all .2s ease; border:1px solid transparent; cursor:pointer; font-family:'Geist',sans-serif; }
  .btn-primary { background:var(--ink); color:var(--paper); }
  .btn-primary:hover { background:var(--accent); transform:translateY(-1px); }
  .btn-ghost { background:transparent; color:var(--ink); border-color:var(--ink); }
  .btn-ghost:hover { background:var(--ink); color:var(--paper); }
  .btn-sm { padding:8px 14px; font-size:.78rem; }
  .btn:disabled { opacity:.45; cursor:not-allowed; }
  .btn:disabled:hover { transform:none; background:var(--ink); }
  .btn .arrow { transition:transform .2s; }
  .btn:hover .arrow { transform:translate(2px,-2px); }

  /* SECTION LABELS */
  .section-label { display:flex; align-items:center; gap:16px; margin-bottom:40px; font-family:'JetBrains Mono',monospace; font-size:.72rem; text-transform:uppercase; letter-spacing:.18em; color:var(--mute); }
  .section-label::after { content:""; flex:1; height:1px; background:var(--rule); }
  .section-label .num { color:var(--accent); font-weight:500; }

  /* CHIPS */
  .chip { display:inline-flex; align-items:center; gap:6px; padding:4px 12px; border-radius:100px; font-family:'JetBrains Mono',monospace; font-size:.68rem; text-transform:uppercase; letter-spacing:.12em; font-weight:500; border:1px solid var(--rule); background:var(--paper-light); color:var(--ink-soft); }
  .chip.acc { color:var(--accent); border-color:var(--accent); }
  .chip.sig { color:var(--signal); border-color:var(--signal); background:rgba(229,67,27,.08); }
  .chip.solid { background:var(--ink); color:var(--paper); border-color:var(--ink); }

  /* FORMS */
  .field-label { font-family:'JetBrains Mono',monospace; font-size:.68rem; text-transform:uppercase; letter-spacing:.14em; color:var(--mute); font-weight:500; display:block; margin-bottom:6px; }
  .alert-error { background:rgba(229,67,27,.08); border:1px solid rgba(229,67,27,.3); border-radius:8px; padding:10px 14px; font-size:.85rem; color:var(--accent); margin-top:10px; }
  .alert-info { background:rgba(229,67,27,.1); border:1px solid rgba(229,67,27,.3); border-radius:8px; padding:10px 14px; font-size:.85rem; color:var(--accent-deep); margin-top:10px; }
  .alert-ok { background:rgba(74,124,89,.1); border:1px solid rgba(74,124,89,.3); border-radius:8px; padding:10px 14px; font-size:.85rem; color:#3a6049; margin-top:10px; }

  /* GRAIN OVERLAY */
  .grain { position:fixed; inset:0; pointer-events:none; z-index:999; mix-blend-mode:multiply; opacity:.25; background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 .08 0 0 0 0 .07 0 0 0 0 .05 0 0 0 .4 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>"); }

  /* CARDS */
  .card { background:var(--paper-light); border:1px solid var(--rule); border-radius:4px; overflow:hidden; box-shadow:var(--shadow); }
  .card-pad { padding:32px; }
  @media (max-width:640px) { .card-pad { padding:24px; } }

  /* ═══ INSTAGRAM POST TEMPLATES (Social Studio) ═══ */
  .ig-post{ position:relative; overflow:hidden; font-family:'Geist',sans-serif; width:100%; }
  .ig-1-1{ aspect-ratio:1/1; }
  .ig-9-16{ aspect-ratio:9/16; }
  .ig-bg-paper{ background:var(--paper); color:var(--ink);
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 .08 0 0 0 0 .07 0 0 0 0 .05 0 0 0 .05 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>"); }
  .ig-bg-ink{ background:var(--ink); color:var(--paper);
    background-image:radial-gradient(circle at 30% 20%, rgba(229,67,27,.25) 0%, transparent 50%), radial-gradient(circle at 70% 80%, rgba(229,67,27,.15) 0%, transparent 50%); }
  .ig-bg-accent{ background:var(--accent); color:var(--paper); }
  .ig-frame{ padding:7%; height:100%; display:flex; flex-direction:column; position:relative; }
  .ig-corner{ display:flex; justify-content:space-between; align-items:center; font-family:'JetBrains Mono',monospace; font-size:.62rem; text-transform:uppercase; letter-spacing:.14em; opacity:.8; }
  .ig-mark{ display:inline-flex; align-items:center; gap:6px; font-family:'Fraunces',serif; font-weight:500; font-size:.9rem; letter-spacing:-.01em; }
  .ig-mark em{ font-style:italic; color:var(--accent); }
  .ig-bg-ink .ig-mark em, .ig-bg-accent .ig-mark em{ color:var(--signal); }
  .ig-mark-dot{ width:8px; height:8px; background:var(--accent); border-radius:50%; }
  .ig-bg-ink .ig-mark-dot{ background:var(--signal); }
  .ig-bg-accent .ig-mark-dot{ background:var(--paper); }
  .ig-headline{ font-family:'Fraunces',serif; line-height:.95; letter-spacing:-.025em; margin:0; font-weight:400; }
  .ig-headline em{ font-style:italic; color:var(--accent); }
  .ig-bg-ink .ig-headline em{ color:var(--signal); }
  .ig-bg-accent .ig-headline em{ color:var(--ink); }
  .ig-tag{ display:inline-block; padding:5px 12px; border:1px solid currentColor; border-radius:100px; font-family:'JetBrains Mono',monospace; font-size:.6rem; text-transform:uppercase; letter-spacing:.14em; }
  .ig-tag-fill{ background:var(--accent); color:var(--paper); border-color:transparent; }
  .ig-bg-ink .ig-tag-fill{ background:var(--signal); color:var(--ink); }
  .ig-wave{ display:flex; align-items:center; gap:2px; }
  .ig-wave span{ flex:1; background:currentColor; opacity:.55; border-radius:1px; }
  .ig-wave span:nth-child(3n){ background:var(--accent); opacity:1; }
  .ig-bg-ink .ig-wave span:nth-child(3n){ background:var(--signal); }

  /* ═══ IVE / CUPERTINO DESIGN SYSTEM (landing + shared) ═══ */
  .lp-serif{font-family:'Instrument Serif',serif; font-weight:400; letter-spacing:-.01em}
  .lp-ultra{font-weight:200; letter-spacing:-.035em; line-height:1}
  .lp-progress{position:fixed; top:0; left:0; height:2px; width:0; background:var(--accent); z-index:300}
  .lp-reveal{opacity:0; transform:translateY(44px); transition:opacity 1.1s var(--ease), transform 1.1s var(--ease)}
  .lp-reveal.in{opacity:1; transform:none}
  /* hero pinned */
  .lp-stage{height:200vh; position:relative}
  .lp-pin{position:sticky; top:0; height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; overflow:hidden}
  .lp-glow{position:absolute; inset:0; z-index:0; background:radial-gradient(46% 38% at 38% 30%, rgba(229,67,27,.14), transparent 70%), radial-gradient(40% 36% at 70% 26%, rgba(36,31,33,.13), transparent 70%), radial-gradient(60% 50% at 50% 88%, rgba(229,67,27,.08), transparent 70%)}
  .lp-cue{position:absolute; bottom:34px; left:50%; transform:translateX(-50%); z-index:2; color:var(--mute)}
  .lp-cue .m{width:22px; height:36px; border:1.5px solid var(--mute); border-radius:12px; margin:10px auto 0; position:relative}
  .lp-cue .m::after{content:""; position:absolute; top:7px; left:50%; transform:translateX(-50%); width:3px; height:7px; border-radius:2px; background:var(--mute); animation:wheel 1.8s infinite}
  @keyframes wheel{0%{opacity:1;top:7px}70%{opacity:0;top:16px}100%{opacity:0}}
  /* statement word reveal */
  .lp-stmt{font-family:'Instrument Serif',serif; font-size:clamp(1.8rem,5vw,3.8rem); font-weight:400; letter-spacing:-.02em; line-height:1.2; text-align:center; max-width:18ch; margin:0 auto}
  .lp-stmt .w{display:inline-block; opacity:.16; transition:opacity .5s var(--ease),color .5s; margin-right:.22em}
  .lp-stmt .w.on{opacity:1}
  .lp-stmt .w.ac.on{color:var(--accent)}
  /* carousel */
  .lp-track{display:flex; gap:22px; overflow-x:auto; scroll-snap-type:x mandatory; scroll-behavior:smooth; padding:8px 4px 28px; cursor:grab; scrollbar-width:none}
  .lp-track::-webkit-scrollbar{display:none}
  .lp-track.drag{cursor:grabbing; scroll-behavior:auto}
  .lp-track.drag *{pointer-events:none}
  .lp-navbtn{width:44px; height:44px; border-radius:50%; border:1px solid var(--rule); background:transparent; color:var(--ink); font-size:1.1rem; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .3s var(--ease)}
  .lp-navbtn:hover{background:var(--ink); color:var(--paper); transform:scale(1.06)}
  .lp-navbtn:disabled{opacity:.3; cursor:default; transform:none; background:transparent; color:inherit}
  .lp-vcard{scroll-snap-align:start; flex:0 0 clamp(280px,42vw,440px); border-radius:22px; overflow:hidden; background:#111; position:relative; aspect-ratio:16/10; transition:transform .5s var(--ease),box-shadow .5s var(--ease); text-decoration:none; display:block}
  .lp-vcard:hover{transform:translateY(-6px); box-shadow:0 30px 60px -30px rgba(0,0,0,.6)}
  .lp-vcard .th{position:absolute; inset:0; background-size:cover; background-position:center}
  .lp-vcard .gr{position:absolute; inset:0; background:linear-gradient(to top,rgba(0,0,0,.8) 0%,transparent 55%)}
  .lp-vcard .pl{position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:60px; height:60px; border-radius:50%; background:rgba(255,255,255,.16); backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,.4); display:flex; align-items:center; justify-content:center; transition:all .4s var(--ease)}
  .lp-vcard:hover .pl{background:rgba(255,255,255,.95); transform:translate(-50%,-50%) scale(1.08)}
  .lp-vcard .pl svg{fill:#fff; margin-left:3px; transition:fill .4s}
  .lp-vcard:hover .pl svg{fill:#15130f}
  .lp-vcard .mt{position:absolute; left:22px; right:22px; bottom:20px; color:#fff; z-index:2}
  .lp-ncard{scroll-snap-align:start; flex:0 0 clamp(240px,32vw,310px); aspect-ratio:3/4; border-radius:20px; background:var(--paper-light); border:1px solid var(--rule); padding:28px; display:flex; flex-direction:column; transition:transform .5s var(--ease),box-shadow .5s var(--ease); position:relative; overflow:hidden; text-decoration:none; color:var(--ink)}
  .lp-ncard:hover{transform:translateY(-6px); box-shadow:0 30px 60px -34px rgba(36,31,33,.35)}
  .lp-ncard .big{position:absolute; bottom:-26px; right:-4px; font-size:8rem; font-weight:200; color:var(--rule); line-height:1; z-index:0; font-family:'Geist',sans-serif}
  .lp-ncard>*{position:relative; z-index:1}
  /* dark band */
  .lp-dark{background:var(--bg-deep); color:var(--paper); position:relative; overflow:hidden}
  .lp-dark .lp-navbtn{border-color:rgba(255,255,255,.16); color:var(--paper)}
  .lp-dark .lp-navbtn:hover{background:rgba(255,255,255,.12)}
  .lp-pl{position:absolute; inset:0; z-index:0; background:radial-gradient(42% 44% at 78% 18%, rgba(229,67,27,.13), transparent 70%), radial-gradient(40% 42% at 18% 80%, rgba(36,31,33,.16), transparent 70%); will-change:transform}
  /* moments */
  .lp-moments{display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:var(--rule); border:1px solid var(--rule); border-radius:24px; overflow:hidden}
  @media(max-width:760px){.lp-moments{grid-template-columns:1fr}}
  .lp-moment{background:var(--paper); padding:44px 36px; transition:background .5s var(--ease)}
  .lp-moment:hover{background:var(--paper-light)}
  .lp-moment .ic{width:44px; height:44px; margin-bottom:24px; color:var(--accent)}
  .lp-moment .ic svg{width:100%; height:100%; fill:none; stroke:currentColor; stroke-width:1.4}
  /* learning card */
  .lp-lcard{border:1px solid rgba(255,255,255,.14); border-radius:24px; background:rgba(255,255,255,.03); backdrop-filter:blur(20px); overflow:hidden}
  .lp-lcard .top{padding:34px 38px; border-bottom:1px solid rgba(255,255,255,.14); display:flex; justify-content:space-between; gap:24px; flex-wrap:wrap; align-items:flex-start}
  .lp-lsteps{display:grid; grid-template-columns:repeat(3,1fr)}
  @media(max-width:760px){.lp-lsteps{grid-template-columns:1fr}}
  .lp-lstep{padding:32px 38px; border-right:1px solid rgba(255,255,255,.14)}
  .lp-lstep:last-child{border-right:none}
  @media(max-width:760px){.lp-lstep{border-right:none; border-bottom:1px solid rgba(255,255,255,.14)}}

  /* ═══ FLOEMA SYSTEM (chartreuse + near-black 2-color, chaptered) ═══ */
  .fl-reveal{opacity:0; transform:translateY(40px); transition:opacity 1.1s var(--ease), transform 1.1s var(--ease)}
  .fl-reveal.in{opacity:1; transform:none}
  .fl-eyebrow{font-family:'JetBrains Mono',monospace; font-size:.62rem; letter-spacing:.24em; text-transform:uppercase; color:var(--ink-soft); margin-bottom:48px}
  .fl-mark{background:var(--accent); padding:0 .15em; color:var(--ink)}
  /* HERO */
  .fl-hero{min-height:100vh; display:flex; align-items:center; padding:120px 0 80px; background:var(--paper); position:relative; overflow:hidden}
  .fl-hero-in svg:first-child{margin:0 auto 0; display:block; color:var(--accent)}
  .fl-hero-in{text-align:center; max-width:1100px}
  .fl-hero-title{font-family:'Instrument Serif',serif; font-weight:400; font-size:clamp(2.6rem,9vw,8rem); line-height:1.02; letter-spacing:-.02em; color:var(--ink); margin:0 auto; max-width:18ch}
  .fl-hero-sub{font-family:'Instrument Serif',serif; font-style:italic; font-size:clamp(1.2rem,2vw,1.6rem); color:var(--ink-soft); margin-top:36px}
  .fl-scroll{display:inline-flex; align-items:center; gap:10px; margin-top:80px; padding:14px 24px; border:1px solid var(--ink); border-radius:100px; color:var(--ink); text-decoration:none; font-family:'JetBrains Mono',monospace; font-size:.65rem; letter-spacing:.2em; text-transform:uppercase; transition:all .3s var(--ease)}
  .fl-scroll:hover{background:var(--ink); color:var(--paper); transform:translateY(4px)}
  .fl-scroll svg{animation:flbob 2s infinite}
  @keyframes flbob{0%,100%{transform:translateY(0)}50%{transform:translateY(3px)}}
  /* CHAPTER SECTIONS */
  .fl-chapter{padding:110px 0; position:relative; overflow:hidden}
  .fl-bg-yellow{background:var(--accent); color:var(--ink)}
  .fl-bg-paper{background:var(--paper-light); color:var(--ink)}
  .fl-bg-dark{background:var(--bg-deep); color:var(--paper)}
  /* ═══ FLOWING INFORMATION BG (Aramco-inspired) ═══ */
  .flow-bg{position:absolute; inset:0; overflow:hidden; pointer-events:none; z-index:0}
  .flow-bg svg{position:absolute; inset:0; width:100%; height:100%}
  .flow-line{stroke:var(--accent); fill:none; opacity:.18; stroke-width:1; animation:flow-drift 14s linear infinite}
  .flow-line:nth-child(2){animation-duration:18s; opacity:.12; animation-delay:-3s}
  .flow-line:nth-child(3){animation-duration:22s; opacity:.10; animation-delay:-6s}
  .flow-line:nth-child(4){animation-duration:16s; opacity:.14; animation-delay:-9s}
  .flow-line:nth-child(5){animation-duration:20s; opacity:.08; animation-delay:-1s}
  @keyframes flow-drift{
    0%   {transform:translate3d(0,0,0)}
    100% {transform:translate3d(-100px,0,0)}
  }
  .flow-particle{fill:var(--accent); opacity:.28; animation:flow-pulse 3s ease-in-out infinite}
  .flow-particle:nth-child(odd){animation-duration:4s; opacity:.18}
  @keyframes flow-pulse{
    0%,100%{transform:scale(1); opacity:.28}
    50%{transform:scale(1.6); opacity:.05}
  }
  /* Sync logo wrapper for animated brand spots */
  .brand{display:inline-flex; align-items:center; gap:10px}

  /* ═══ VIDEO CAROUSEL — Betteroff-style hover-to-play ═══ */
  .lp-vcard video.th{transition:opacity .4s var(--ease)}
  .lp-vcard:hover video.th{transform:none}
  .lp-vcard .vbadge{position:absolute; top:14px; left:14px; z-index:3; background:rgba(36,31,33,.7); backdrop-filter:blur(6px); color:#fff; font-family:'JetBrains Mono',monospace; font-size:.55rem; letter-spacing:.18em; padding:4px 9px; border-radius:100px; text-transform:uppercase}
  .lp-vcard:hover .pl{transform:translate(-50%,-50%) scale(.85); opacity:.65}

  /* Larger, more cinematic video cards on landing */
  .lp-vcard{flex:0 0 clamp(320px,48vw,520px)}
  .fl-c-coral{background:#E97852; color:#241F21; min-height:100vh; padding:120px 0; display:flex; align-items:center; position:relative; overflow:hidden}
  .fl-c-blue{background:#2A3645; color:#F5F1E6; min-height:100vh; padding:120px 0; display:flex; align-items:center; position:relative; overflow:hidden}
  .fl-c-green{background:#B3D29B; color:#241F21; min-height:100vh; padding:120px 0; display:flex; align-items:center; position:relative; overflow:hidden}
  .fl-c-tan{background:#D4B896; color:#241F21; min-height:100vh; padding:120px 0; display:flex; align-items:center; position:relative; overflow:hidden}
  .fl-c-coral .fl-num,.fl-c-green .fl-num,.fl-c-tan .fl-num{color:#241F21}
  .fl-c-blue .fl-num{color:#E97852}
  .fl-c-coral .fl-cat,.fl-c-green .fl-cat,.fl-c-tan .fl-cat{color:rgba(36,31,33,.65)}
  .fl-c-blue .fl-cat{color:rgba(245,241,230,.6)}
  .fl-c-blue .fl-chapter-title{color:#F5F1E6}
  .fl-c-blue .fl-chapter-desc{color:rgba(245,241,230,.78)}
  .fl-c-blue .fl-cta{background:#E97852; color:#F5F1E6}
  .fl-c-blue .fl-cta:hover{background:#F5F1E6; color:#241F21}
  .fl-c-green .fl-cta:hover,.fl-c-tan .fl-cta:hover{background:#E97852; color:#F5F1E6}
  .fl-c-coral .fl-cta{background:#241F21; color:#F5F1E6}
  .fl-c-coral .fl-cta:hover{background:#F5F1E6; color:#241F21}
  /* bg image layer */
  .fl-chapter-bg{position:absolute; inset:0; z-index:0; background-size:cover; background-position:center; will-change:transform; opacity:.42}
  .fl-c-coral .fl-chapter-bg{mix-blend-mode:multiply; opacity:.32}
  .fl-c-blue .fl-chapter-bg{mix-blend-mode:luminosity; opacity:.38}
  .fl-c-green .fl-chapter-bg{mix-blend-mode:multiply; opacity:.28}
  .fl-c-tan .fl-chapter-bg{mix-blend-mode:multiply; opacity:.32}
  .fl-chapter-overlay{position:absolute; inset:0; z-index:1; pointer-events:none}
  .fl-chapter-in{position:relative; z-index:2; width:100%}
  .fl-chapter-in{position:relative}
  .fl-num{font-family:'Instrument Serif',serif; font-weight:400; font-size:clamp(5rem,14vw,12rem); line-height:.85; color:var(--ink); opacity:.92; letter-spacing:-.02em}
  .fl-bg-dark .fl-num{color:var(--accent)}
  .fl-cat{font-family:'JetBrains Mono',monospace; font-size:.7rem; letter-spacing:.28em; text-transform:uppercase; color:var(--ink-soft); margin-top:18px; margin-bottom:54px}
  .fl-bg-dark .fl-cat{color:rgba(245,241,230,.55)}
  .fl-chapter-grid{display:grid; grid-template-columns:1fr 1fr; gap:64px; align-items:center}
  @media(max-width:880px){.fl-chapter-grid{grid-template-columns:1fr; gap:40px}}
  .fl-reverse{direction:rtl}
  .fl-reverse>*{direction:ltr}
  @media(max-width:880px){.fl-reverse{direction:ltr}}
  .fl-chapter-title{font-family:'Instrument Serif',serif; font-weight:400; font-size:clamp(2rem,4.6vw,3.6rem); line-height:1.08; letter-spacing:-.015em; margin:0 0 24px; max-width:18ch}
  .fl-chapter-desc{font-family:'Geist',sans-serif; font-size:clamp(1.05rem,1.6vw,1.25rem); line-height:1.55; font-weight:300; max-width:48ch; margin-bottom:38px}
  .fl-cta{display:inline-flex; align-items:center; gap:14px; padding:16px 28px; background:var(--ink); color:var(--paper); border-radius:100px; font-family:'Geist',sans-serif; font-weight:500; font-size:.95rem; text-decoration:none; transition:all .3s var(--ease)}
  .fl-cta:hover{background:var(--accent); color:var(--ink); transform:translateY(-2px)}
  .fl-cta-onDark{background:var(--accent); color:var(--ink)}
  .fl-cta-onDark:hover{background:var(--paper); color:var(--ink)}
  /* edition cover visual */
  .fl-chapter-visual{display:block; text-decoration:none}
  .fl-edition-cover{aspect-ratio:3/4; background:var(--paper-light); border:1px solid rgba(36,31,33,.18); border-radius:18px; padding:32px; display:flex; flex-direction:column; position:relative; overflow:hidden; transition:transform .5s var(--ease)}
  .fl-chapter-visual:hover .fl-edition-cover{transform:translateY(-6px)}
  .fl-ec-top{display:flex; justify-content:space-between; gap:16px; font-family:'JetBrains Mono',monospace; font-size:.62rem; letter-spacing:.18em; text-transform:uppercase; color:var(--ink-soft)}
  .fl-ec-meta{font-family:'JetBrains Mono',monospace; font-size:.62rem; letter-spacing:.18em; text-transform:uppercase}
  .fl-ec-title{font-family:'Instrument Serif',serif; font-weight:400; font-size:clamp(1.5rem,2.6vw,2.2rem); line-height:1.12; margin-top:auto; color:var(--ink)}
  .fl-ec-bottom{display:flex; justify-content:space-between; align-items:flex-end; margin-top:24px}
  .fl-ec-big{font-family:'Instrument Serif',serif; font-weight:400; font-size:clamp(4.5rem,10vw,8rem); line-height:.85; color:var(--accent-deep); opacity:.6}
  .fl-ec-cta{font-family:'JetBrains Mono',monospace; font-size:.7rem; letter-spacing:.18em; text-transform:uppercase; color:var(--ink)}
  /* video frame */
  .fl-vframe{position:relative; aspect-ratio:16/10; border-radius:18px; overflow:hidden; background:#0f0d0e}
  .fl-vframe-media{position:absolute; inset:0; width:100%; height:100%; object-fit:cover}
  .fl-vframe-grad{background:linear-gradient(135deg,#3A3236,#241F21)}
  .fl-vframe-overlay{position:absolute; inset:0; background:linear-gradient(to top, rgba(36,31,33,.86) 0%, transparent 55%)}
  .fl-vframe-play{position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:78px; height:78px; border-radius:50%; background:var(--accent); color:var(--ink); display:flex; align-items:center; justify-content:center; transition:transform .4s var(--ease)}
  .fl-chapter-visual:hover .fl-vframe-play{transform:translate(-50%,-50%) scale(1.06)}
  .fl-vframe-play svg{margin-left:3px}
  .fl-vframe-meta{position:absolute; left:24px; right:24px; bottom:22px; color:var(--paper); z-index:2}
  /* learning card */
  /* ═══ UNIFIED LEARNING CARD — used in Chapter 03, Learnings page, IG teaser, LinkedIn ═══ */
  .lcard{
    display:grid; grid-template-columns:1fr 1fr;
    border-radius:26px; overflow:hidden;
    background:#F6F2E8;
    box-shadow:0 30px 80px -30px rgba(27,25,20,.35);
    font-family:'Mulish',sans-serif;
    color:#1B1914;
    width:100%;
  }
  @media(max-width:760px){.lcard:not(.lcard-fixed){grid-template-columns:1fr}}

  /* Preview variant — only the cream body (used in Chapter 03 where the green panel would be redundant with the section bg) */
  .lcard.lcard-preview{ grid-template-columns:1fr; max-width:680px; }
  .lcard.lcard-preview .lcard-panel{ display:none; }

  /* Square variant — Instagram 1080×1080, stacked vertically */
  .lcard.lcard-square{
    grid-template-columns:1fr; grid-template-rows:1fr 1fr;
    width:1080px; height:1080px; max-width:100%;
    border-radius:0;
  }
  .lcard.lcard-square .lcard-panel{padding:56px; min-height:0}
  .lcard.lcard-square .lcard-num{font-size:120px}
  .lcard.lcard-square .lcard-h{font-size:42px; max-width:14ch; padding-top:24px}
  .lcard.lcard-square .lcard-desc{display:none}
  .lcard.lcard-square .lcard-cta{display:none}
  .lcard.lcard-square .lcard-body{padding:56px}
  .lcard.lcard-square .lcard-body h3{font-size:34px}
  .lcard.lcard-square .lcard-row p{font-size:16px}
  .lcard.lcard-square .lcard-frase{font-size:22px}

  /* Horizontal LinkedIn variant — 1200×627 wide format */
  .lcard.lcard-linkedin{
    width:1200px; height:627px; max-width:100%;
    border-radius:0;
  }
  .lcard.lcard-linkedin .lcard-panel{padding:48px; min-height:0}
  .lcard.lcard-linkedin .lcard-num{font-size:120px}
  .lcard.lcard-linkedin .lcard-body{padding:48px}
  .lcard-panel{
    position:relative; color:#F4F1E6;
    padding:clamp(30px,5vw,58px);
    overflow:hidden;
    background:linear-gradient(165deg,rgba(126,142,106,.96),rgba(80,93,64,.98));

    min-height:420px;
  }

    content:""; position:absolute; inset:0; opacity:.14; mix-blend-mode:soft-light; pointer-events:none;
    background-image:
      repeating-linear-gradient(90deg,rgba(255,255,255,.55) 0 2px,transparent 2px 22px),
      repeating-linear-gradient(0deg,rgba(0,0,0,.4) 0 1px,transparent 1px 120px);
  }
  .lcard-num{font-family:'Fraunces',serif; font-style:italic; font-weight:300; font-size:clamp(70px,10vw,128px); line-height:.8; color:rgba(244,241,230,.92); position:relative}
  .lcard-kick{font-family:'Space Mono',monospace; font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:rgba(244,241,230,.78); margin-top:14px; position:relative}
  .lcard-h{font-family:'Fraunces',serif; font-weight:400; font-size:clamp(26px,3.4vw,42px); line-height:1.04; letter-spacing:-.015em; margin:auto 0 0; padding-top:32px; position:relative; max-width:13ch}
  .lcard-desc{font-size:clamp(14px,1.5vw,16px); line-height:1.55; color:rgba(244,241,230,.9); margin:18px 0 26px; position:relative; max-width:42ch}
  .lcard-cta{position:relative; align-self:flex-start; display:inline-flex; align-items:center; gap:12px; background:#1B1914; color:#F4F1E6; font-family:'Mulish'; font-weight:600; font-size:15px; border:none; cursor:pointer; text-decoration:none; padding:14px 24px; border-radius:40px; transition:.25s}

  .lcard-body{padding:clamp(28px,4vw,50px); display:flex; flex-direction:column; background:#F6F2E8}

  .lcard-body h3{font-family:'Fraunces',serif; font-weight:430; font-size:clamp(20px,2.4vw,30px); line-height:1.14; letter-spacing:-.012em; color:#1B1914; margin:0}
  .lcard-rule{height:1px; background:rgba(27,25,20,.13); margin:22px 0}
  .lcard-row{margin-bottom:18px}
  .lcard-row:last-child{margin-bottom:0}

  .lcard-lab.hl{background:#C9D3B6; display:inline-block; padding:1px 6px; border-radius:3px; color:#1B1914}
  .lcard-row p{font-size:15px; line-height:1.5; color:#4A463B}
  .lcard-frase{font-family:'Fraunces',serif; font-style:italic; font-weight:380; font-size:clamp(16px,1.9vw,19px); line-height:1.4; color:#1B1914; margin-top:4px}
  .lcard-frase b{font-style:normal; font-weight:600}

  /* ═══ LEARNINGS CAROUSEL (page /learnings) ═══ */
  .lcarousel{display:flex; gap:clamp(20px,3vw,40px); overflow-x:auto; scroll-snap-type:x mandatory; padding:24px 0 60px; scrollbar-width:thin}
  .lcarousel::-webkit-scrollbar{height:6px}

  .fl-moments{display:grid; grid-template-columns:repeat(3,1fr); gap:24px; margin-top:60px}

  .fl-moment-ic svg{width:100%; height:100%}
  .fl-moment h4{font-family:'Instrument Serif',serif; font-weight:400; font-size:1.4rem; margin-bottom:10px}
  .fl-moment p{font-weight:300; color:rgba(245,241,230,.72); line-height:1.55; font-size:.95rem}
  /* recent list (Edições Recentes ↓) */
  .fl-list-section{padding:120px 0; background:var(--paper)}
  .fl-list-head{font-family:'Instrument Serif',serif; font-weight:400; font-size:clamp(2rem,4vw,3rem); margin-bottom:48px; color:var(--ink)}
  .fl-list-head span{color:var(--ink-soft); font-size:.7em}
  .fl-list{display:flex; flex-direction:column}
  .fl-list-item{display:grid; grid-template-columns:auto 1fr auto; gap:28px; align-items:center; padding:32px 0; border-top:1px solid var(--rule); text-decoration:none; color:var(--ink); transition:all .4s var(--ease)}

  .fl-list-item:hover{padding-left:18px; background:var(--accent)}
  .fl-li-num{font-family:'Instrument Serif',serif; font-weight:400; font-size:clamp(2.4rem,5vw,4rem); line-height:1; color:var(--ink-soft); min-width:80px; transition:color .3s}
  .fl-list-item:hover .fl-li-num{color:var(--ink)}
  .fl-li-eyebrow{font-family:'JetBrains Mono',monospace; font-size:.6rem; letter-spacing:.2em; text-transform:uppercase; color:var(--ink-soft); margin-bottom:8px}
  .fl-li-title{font-family:'Instrument Serif',serif; font-weight:400; font-size:clamp(1.4rem,2.6vw,2rem); line-height:1.15}

  .fl-process{padding:110px 0; background:var(--paper-light)}
  .fl-process-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:48px}

  .fl-ps-label{font-family:'Instrument Serif',serif; font-weight:400; font-size:2rem; margin-bottom:14px}

  .fl-sub-head{font-family:'JetBrains Mono',monospace; font-size:.62rem; letter-spacing:.24em; text-transform:uppercase; color:var(--ink-soft); margin-bottom:20px}
  .fl-sub-title{font-family:'Instrument Serif',serif; font-weight:400; font-size:clamp(2rem,4vw,3rem); line-height:1.1; margin-bottom:40px; color:var(--ink)}

<body>
<div class="grain"></div>
<div id="root">
  <div style="text-align:center;padding:80px 20px;color:#7A6F5A;font-family:'JetBrains Mono',monospace;font-size:.8rem;letter-spacing:.14em;text-transform:uppercase">
    <div style="font-size:2rem;margin-bottom:12px">⏳</div>
    <div>SINCRONIZANDO...</div>
  </div>
</div>
<script type="text/babel" data-presets="env,react">
const { useState, useRef, useEffect, useCallback, useMemo, memo } = React;

// ═══════════════════════════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════════════════════════
const ANTHROPIC_MODEL = "claude-sonnet-4-5";

// SUPABASE — em produção (Vercel) os valores vêm de /api/config (lê as env vars
// SUPABASE_URL e SUPABASE_ANON_KEY no servidor). Para rodar localmente / abrir o
// arquivo direto, você PODE preencher os fallbacks abaixo (a anon key é pública).
let SUPABASE_URL = "";
let SUPABASE_ANON_KEY = "";

let sb = null;
let SB_OK = false;

function initSupabase(url, key){
  if(url) SUPABASE_URL = url;
  if(key) SUPABASE_ANON_KEY = key;
  sb = (SUPABASE_URL && SUPABASE_ANON_KEY && window.supabase)
    ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, { auth:{ persistSession:true, autoRefreshToken:true } })
    : null;
  SB_OK = !!sb;
  return SB_OK;
}

const BRAND = {
  paper:"#F5F1E6", paperLight:"#FBF8EE", paperDark:"#E8E1CD",
  ink:"#241F21", inkSoft:"#3A3236", mute:"#807679", rule:"#DDD4BD",
  accent:"#E5431B", accentDeep:"#A82C0F", signal:"#E5431B",
  coral:"#E97852", green:"#B3D29B", blue:"#99B0CD", tan:"#D4B896",
};

const ADMIN_TABS = [
  { id:"newsletter",  label:"Newsletter",    icon:"📰" },
  { id:"podcast",     label:"Podcast Semanal", icon:"🎬" },
  { id:"learning",    label:"Learning",      icon:"🎓" },
  { id:"divulgacao",  label:"Divulgação",    icon:"📣" },
  { id:"fontes",      label:"Fontes",        icon:"📡" },
  { id:"audiencia",   label:"Audiência",     icon:"📊" },
  { id:"diagnostico", label:"Configurações", icon:"⚙️" },
  { id:"historico",   label:"Arquivo",       icon:"📚" },
];

const FOCUS_AREAS = [
  { id:"produtividade", label:"Produtividade",                 icon:"⚡" },
  { id:"sistemico",     label:"Desenvolvimento Sistêmico",    icon:"🔧" },
  { id:"llm",           label:"Modelos LLM/IA",                icon:"🧠" },
];

const CAT_LABELS = ["IA","LLM","Brasil","Produtividade","Sistêmico","Podcast","Hardware","Software","Cloud","Startups","Regulação"];

// ═══════════════════════════════════════════════════════════════════════════
// DB (Supabase + localStorage fallback)
// ═══════════════════════════════════════════════════════════════════════════
const TABLE_MAP = { "newsletter":"newsletters", "comment":"comments", "view":"views", "episode":"episodes", "videoblob":"videoblobs", "user":"settings", "source":"news_sources", "audioblob":"audioblobs", "podcast":"podcasts", "podview":"podviews", "subscriber":"subscribers", "open":"opens", "emaillog":"email_logs", "learning":"learnings" };
const tableForKey = k => TABLE_MAP[k.split(":")[0]] || null;

const db = {
  async get(k){
    if(!SB_OK){const v=localStorage.getItem(k);return v?JSON.parse(v):null}
    const tbl=tableForKey(k); if(!tbl)return null;
    try{const{data,error}=await sb.from(tbl).select("data").eq("id",k).maybeSingle(); if(error||!data)return null; return data.data}catch{return null}
  },
  async set(k,v){
    if(!SB_OK){try{localStorage.setItem(k,JSON.stringify(v));return{ok:true}}catch(e){return{ok:false,error:e.message}}}
    const tbl=tableForKey(k); if(!tbl)return{ok:false,error:"sem mapeamento p/ "+k};
    try{const{error}=await sb.from(tbl).upsert({id:k,data:v}); if(error)return{ok:false,error:error.message}; return{ok:true}}catch(e){return{ok:false,error:e.message}}
  },
  async delete(k){
    if(!SB_OK){try{localStorage.removeItem(k);return{ok:true}}catch{return{ok:false}}}
    const tbl=tableForKey(k); if(!tbl)return{ok:false};
    try{const{error}=await sb.from(tbl).delete().eq("id",k); return{ok:!error}}catch{return{ok:false}}
  },
  async listByPrefix(p){
    if(!SB_OK){const items=[];for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k?.startsWith(p)){const v=localStorage.getItem(k);if(v)try{items.push(JSON.parse(v))}catch{}}}return items}
    const tbl=tableForKey(p); if(!tbl)return[];
    try{let q=sb.from(tbl).select("id,data"); const segs=p.split(":"); if(segs.length>1&&segs[1])q=q.like("id",p+"%"); const{data,error}=await q.limit(2000); if(error||!data)return[]; return data.map(r=>r.data).filter(Boolean);}catch{return[]}
  },
  async listEpisodes(){return(await db.listByPrefix("episode:")).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0))},
  async listNewsletters(){return(await db.listByPrefix("newsletter:")).sort((a,b)=>(b.date||"").localeCompare(a.date||""))},
  async saveBlob(k,d){return await db.set(k,{data:d,savedAt:Date.now()})},
  async getBlob(k){const r=await db.get(k);return r?.data||null},
};

// ═══════════════════════════════════════════════════════════════════════════
// STORAGE (Supabase Storage — for large files like audio/video, avoids base64 in DB)
// ═══════════════════════════════════════════════════════════════════════════
const STORAGE_BUCKET = "media";

// Sanitize filename: keep letters, digits, dots, dashes; strip the rest
const sanitizeFilename = name => (name||"file").replace(/[^a-zA-Z0-9._-]/g,"_").slice(0,80);

// Is this URL pointing to our Supabase Storage? (used for cleanup on delete)
const isStorageUrl = url => {
  if(!url || typeof url !== "string") return false;
  if(!SB_OK) return false;
  return url.includes("/storage/v1/object/public/"+STORAGE_BUCKET+"/");
};

// Extract the path inside the bucket from a public URL
const storageUrlToPath = url => {
  if(!isStorageUrl(url)) return null;
  const m = url.match(new RegExp("/storage/v1/object/public/"+STORAGE_BUCKET+"/(.+?)(?:\\?|$)"));
  return m ? decodeURIComponent(m[1]) : null;
};

const storageApi = {
  available(){ return SB_OK; },
  // Upload file. folder="audio" or "video". Returns { url, path } on success
  async upload(file, folder="audio"){
    if(!SB_OK) throw new Error("Supabase Storage não disponível (configure SUPABASE_URL/KEY)");
    const ext = (file.name.match(/\.[a-zA-Z0-9]+$/)||[""])[0].toLowerCase();
    const base = sanitizeFilename(file.name.replace(ext,""));
    const path = `${folder}/${Date.now()}-${base}${ext}`;
    const { data, error } = await sb.storage.from(STORAGE_BUCKET).upload(path, file, {
      cacheControl: "31536000",
      upsert: false,
      contentType: file.type || undefined,
    });
    if(error) throw new Error(error.message || "Falha no upload");
    const { data: pub } = sb.storage.from(STORAGE_BUCKET).getPublicUrl(data.path);
    return { url: pub.publicUrl, path: data.path };
  },
  // Delete by path (the part inside the bucket)
  async deletePath(path){
    if(!SB_OK || !path) return;
    try { await sb.storage.from(STORAGE_BUCKET).remove([path]); } catch{}
  },
  // Delete by full public URL (for cleanup)
  async deleteByUrl(url){
    const p = storageUrlToPath(url);
    if(p) await this.deletePath(p);
  },
  // Resumable upload (TUS) for large files (video up to 300MB). Reports progress 0..1.
  // Uses the logged-in admin session token so it satisfies the "authenticated" Storage RLS.
  async uploadResumable(file, folder="video", onProgress){
    if(!SB_OK) throw new Error("Supabase Storage não disponível (configure SUPABASE_URL/KEY)");
    if(typeof window.tus === "undefined") throw new Error("Biblioteca de upload (tus) não carregou. Recarregue a página.");
    const { data: sess } = await sb.auth.getSession();
    const token = (sess && sess.session && sess.session.access_token) ? sess.session.access_token : SUPABASE_ANON_KEY;
    const ext = (file.name.match(/\.[a-zA-Z0-9]+$/)||[""])[0].toLowerCase();
    const baseName = sanitizeFilename(file.name.replace(ext,""));
    const path = `${folder}/${Date.now()}-${baseName}${ext}`;
    return new Promise((resolve, reject) => {
      const upload = new window.tus.Upload(file, {
        endpoint: `${SUPABASE_URL}/storage/v1/upload/resumable`,
        retryDelays: [0, 3000, 5000, 10000, 20000],
        headers: { authorization: `Bearer ${token}`, "x-upsert": "true" },
        uploadDataDuringCreation: true,
        removeFingerprintOnSuccess: true,
        metadata: {
          bucketName: STORAGE_BUCKET,
          objectName: path,
          contentType: file.type || "application/octet-stream",
          cacheControl: "31536000",
        },
        chunkSize: 6 * 1024 * 1024, // Supabase requires exactly 6MB chunks (except the last)
        onError: (err) => reject(err),
        onProgress: (sent, total) => { if(onProgress && total) onProgress(sent/total); },
        onSuccess: () => {
          const { data: pub } = sb.storage.from(STORAGE_BUCKET).getPublicUrl(path);
          resolve({ url: pub.publicUrl, path });
        },
      });
      upload.findPreviousUploads().then(prev => {
        if(prev && prev.length) upload.resumeFromPreviousUpload(prev[0]);
        upload.start();
      }).catch(() => upload.start());
    });
  },
};

// ═══════════════════════════════════════════════════════════════════════════
// AUTH (Supabase Auth)
// ═══════════════════════════════════════════════════════════════════════════
const usernameToEmail = u => u.includes("@") ? u.trim().toLowerCase() : `${u.trim().toLowerCase()}@syncronize-mi.local`;
const emailToUsername = e => (e||"").split("@")[0];

const auth = {
  async login(u,p){
    if(!SB_OK)throw new Error("Supabase não configurado. Veja SETUP.md");
    const{data,error}=await sb.auth.signInWithPassword({email:usernameToEmail(u),password:p});
    if(error||!data?.session)return null;
    return{token:data.session.access_token,expiresAt:(data.session.expires_at||0)*1000,username:emailToUsername(data.session.user?.email)};
  },
  async getSession(){
    if(!SB_OK)return null;
    const{data}=await sb.auth.getSession();
    if(!data?.session)return null;
    return{token:data.session.access_token,expiresAt:(data.session.expires_at||0)*1000,username:emailToUsername(data.session.user?.email)};
  },
  async logout(){if(SB_OK)await sb.auth.signOut()},
  async changePassword(cur,nw){if(!SB_OK)throw new Error("Supabase não configurado");if(nw.length<6)throw new Error("Mínimo 6 caracteres");const{error}=await sb.auth.updateUser({password:nw});if(error)throw new Error(error.message);},
};

// ═══════════════════════════════════════════════════════════════════════════
// APIs (Comments, NewsSources, Analytics)
// ═══════════════════════════════════════════════════════════════════════════

  async seedDefaults(){const ex=await this.list(); if(ex.length>0)return ex; for(const s of DEFAULT_SOURCES)await db.set(s.id,s); return await this.list();},
  // Merge: adds missing defaults without removing custom sources. Returns count added.
  async mergeDefaults(){
    const ex = await this.list();

    for(const s of DEFAULT_SOURCES){

    return { added, total: DEFAULT_SOURCES.length };
  },

// Deterministic, non-reversible token per email (SHA-256, first 20 hex) — used as the
// subscriber id and the public "ref" in tracking links (so emails aren't exposed in URLs).
async function emailToRef(email){
  const enc = new TextEncoder().encode(String(email||"").trim().toLowerCase());
  const buf = await crypto.subtle.digest("SHA-256", enc);
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,"0")).join("").slice(0,20);
}

const subscribersApi = {
  async add(email, name){
    const e = String(email||"").trim().toLowerCase();
    if(!e || !/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(e)) throw new Error("Email inválido");
    const ref = await emailToRef(e);
    const id = `subscriber:${ref}`;
    const sub = { id, ref, email:e, name:(name||"").trim(), createdAt:Date.now(), active:true, emailsSent:0, lastEmailAt:null };
    // Upsert is idempotent on id (same email → same ref) so it dedupes automatically
    const r = await db.set(id, sub);
    return { ...sub, ok: r.ok!==false };
  },
  async list(){ return (await db.listByPrefix("subscriber:")).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0)); },
  // Record that a subscriber opened an episode (anon-safe; deterministic id dedupes)
  async recordOpen(ref, date, code){
    if(!ref || !date) return;
    const id = `open:${ref}:${date}`;
    try { await db.set(id, { id, subscriberId:`subscriber:${ref}`, ref, episodeDate:date, episodeCode:code||"", openedAt:Date.now() }); } catch(e){}
  },
  async listOpens(){ return await db.listByPrefix("open:"); },
};

async function callAnthropic(apiKey,body){
  const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify(body)});
  const text=await res.text();let data;try{data=JSON.parse(text)}catch{data={raw:text}}
  if(!res.ok){const e=new Error(data?.error?.message||`HTTP ${res.status}`);e.status=res.status;throw e}
  return data;
}
async function callClaude(apiKey,prompt,useSearch=false,maxTokens=1500,sys=null){
  const body={model:ANTHROPIC_MODEL,max_tokens:maxTokens,messages:[{role:"user",content:prompt}]};
  if(sys)body.system=sys; if(useSearch)body.tools=[{type:"web_search_20250305",name:"web_search"}];
  let data=await callAnthropic(apiKey,body);
  let text=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("");
  if(text.trim())return text;
  if(useSearch&&data.stop_reason==="tool_use"){
    const tr=(data.content||[]).filter(b=>b.type==="tool_use").map(b=>({type:"tool_result",tool_use_id:b.id,content:"Search executed."}));
    const body2={model:ANTHROPIC_MODEL,max_tokens:maxTokens,tools:[{type:"web_search_20250305",name:"web_search"}],messages:[{role:"user",content:prompt},{role:"assistant",content:data.content},{role:"user",content:tr}]};
    if(sys)body2.system=sys;
    data=await callAnthropic(apiKey,body2);
    return(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("");
  }
  return text;
}

function getVideoEmbedInfo(url){
  if(!url)return null;
  if(url.includes("app.heygen.com/videos/")||url.includes("share.heygen.com"))return{type:"iframe",src:url,brand:"HeyGen"};
  const yt=url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]+)/);
  if(yt)return{type:"iframe",src:`https://www.youtube.com/embed/${yt[1]}`,brand:"YouTube"};
  const vm=url.match(/vimeo\.com\/(\d+)/);
  if(vm)return{type:"iframe",src:`https://player.vimeo.com/video/${vm[1]}`,brand:"Vimeo"};
  if(isStorageUrl(url))return{type:"video",src:url,brand:"Sync·MI Storage"};
  if(url.startsWith("data:video")||/\.(mp4|webm|ogg|mov|m4v)(\?|$)/i.test(url))return{type:"video",src:url,brand:"Vídeo"};
  if(url.includes("heygen.ai")&&url.includes(".mp4"))return{type:"video",src:url,brand:"HeyGen"};
  return{type:"iframe",src:url,brand:"Externo"};
}

  const portrait = aspectRatio === "9/16";
  const square = aspectRatio === "1/1";
  const containerWidth = portrait ? "min(360px, 100%)" : square ? "min(480px, 100%)" : "100%";
  const cs = { width: maxWidth || containerWidth, margin: "0 auto" };
  const openExternal = () => window.open(info.src, "_blank", "noopener,noreferrer");

      <div style={{position:"relative", paddingBottom:pb, height:0, overflow:"hidden", borderRadius:8, background:BRAND.ink, border:`1px solid ${BRAND.ink}`, boxShadow:"0 8px 24px -8px rgba(36,31,33,.3)"}}>

            style={{position:"absolute", top:0, left:0, width:"100%", height:"100%", border:0}}

// Convert a highlights value (string OR legacy array) into a single string for editing
const highlightsToText = h => {
  if(!h) return "";
  if(Array.isArray(h)) return h.filter(Boolean).join("\n\n");
  return String(h);
};
// Split highlights text into individual blocks (separated by blank line)
const splitHighlights = text => {
  const t = highlightsToText(text);
  if(!t.trim()) return [];
  return t.split(/\n\s*\n/).map(s=>s.trim()).filter(Boolean);
};
// Render a highlight block as HTML with markdown (escapes HTML, then bold, italic, line breaks)
const renderHighlightHTML = text => {
  if(!text) return "";
  let html = String(text).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  // Bold **text**
  html = html.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>');
  // Italic *text* (but not part of **)
  html = html.replace(/(^|[^*])\*([^*\n]+)\*(?!\*)/g, '$1<em>$2</em>');
  // Inline code `code`
  html = html.replace(/`([^`\n]+)`/g, '<code style="background:rgba(36,31,33,.08);padding:1px 6px;border-radius:3px;font-family:\'JetBrains Mono\',monospace;font-size:.92em">$1</code>');
  // Line breaks
  html = html.replace(/\n/g, '<br>');
  return html;
};

// Robust JSON extractor for AI model responses.
// type: "array" or "object". Returns parsed value or throws Error with diagnostic preview.
const parseJsonResponse = (text, type="array") => {
  if(!text || !text.trim()){
    throw new Error("O modelo retornou resposta vazia. Tente clicar de novo em alguns segundos.");
  }
  const openCh = type==="array" ? "[" : "{";
  const closeCh = type==="array" ? "]" : "}";
  // Strip markdown fences ```json ... ``` if present
  let candidate = text;
  const fenced = text.match(/```(?:json|JSON)?\s*([\s\S]*?)\s*```/);
  if(fenced) candidate = fenced[1];
  // Find the outermost brackets of the right type
  const start = candidate.indexOf(openCh);
  const end = candidate.lastIndexOf(closeCh);
  if(start === -1 || end === -1 || end < start){
    const preview = (text||"").trim().slice(0,260).replace(/\s+/g," ");
    throw new Error(`Resposta sem JSON válido. Início: "${preview}${text.length>260?"…":""}"`);
  }
  candidate = candidate.slice(start, end+1);
  // Try direct parse
  try { return JSON.parse(candidate); } catch(e){}
  // Cleanup pass: smart quotes, trailing commas, CR, comments
  const cleaned = candidate
    .replace(/[\u201C\u201D]/g, '"')   // " " → "
    .replace(/[\u2018\u2019]/g, "'")   // ' ' → '
    .replace(/,(\s*[\]}])/g, '$1')     // trailing commas
    .replace(/\r/g, '')
    .replace(/\/\/[^\n]*/g, '');       // line comments
  try { return JSON.parse(cleaned); } catch(e2){
    const preview = candidate.slice(0,200).replace(/\s+/g," ");
    throw new Error(`JSON inválido. Fragmento: "${preview}…" — tente clicar em buscar de novo.`);
  }
};

// LOGO + FLOW BG + PARTICLE NETWORK + MARQUEE — premium visual layer
// ═══════════════════════════════════════════════════════════════════════════
const ParticleNetwork = memo(function ParticleNetwork({ density = 65, hex }){
  const ref = useRef(null);
  useEffect(()=>{
    const c = ref.current; if(!c) return;
    const ctx = c.getContext("2d"); if(!ctx) return;
    let raf, particles = [], mouseX = -9999, mouseY = -9999;
    const dpr = Math.min(2, window.devicePixelRatio||1);
    let w=0, h=0;
    const color = hex || (getComputedStyle(document.documentElement).getPropertyValue("--accent").trim()||"#E5431B");
    const hexToRgb = (x) => { const v=x.replace("#",""); return `${parseInt(v.slice(0,2),16)},${parseInt(v.slice(2,4),16)},${parseInt(v.slice(4,6),16)}`; };
    const rgb = hexToRgb(color);

    const resize = () => {
      w = c.offsetWidth; h = c.offsetHeight;
      c.width = w*dpr; c.height = h*dpr;
      ctx.setTransform(dpr,0,0,dpr,0,0);
    };
    const init = () => {
      particles = [];
      const count = Math.min(density, Math.floor((w*h)/14000));
      for(let i=0;i<count;i++){
        particles.push({ x:Math.random()*w, y:Math.random()*h, vx:(Math.random()-.5)*.28, vy:(Math.random()-.5)*.28, r:Math.random()*1.4+.6 });
      }
    };
    const draw = () => {
      ctx.clearRect(0,0,w,h);
      particles.forEach(p=>{
        // mouse attraction (subtle)
        const dxm=mouseX-p.x, dym=mouseY-p.y, dm=Math.sqrt(dxm*dxm+dym*dym);
        if(dm<160 && dm>0){ p.vx += (dxm/dm)*.012; p.vy += (dym/dm)*.012; }
        // gentle damping
        p.vx*=.985; p.vy*=.985;
        p.x+=p.vx; p.y+=p.vy;
        if(p.x<0||p.x>w) p.vx*=-1;
        if(p.y<0||p.y>h) p.vy*=-1;
        p.x=Math.max(0,Math.min(w,p.x)); p.y=Math.max(0,Math.min(h,p.y));
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle=`rgba(${rgb},.55)`; ctx.fill();
      });
      for(let i=0;i<particles.length;i++){
        for(let j=i+1;j<particles.length;j++){
          const dx=particles[i].x-particles[j].x, dy=particles[i].y-particles[j].y;
          const d=Math.sqrt(dx*dx+dy*dy);
          if(d<135){
            const op=(1-d/135)*.22;
            ctx.beginPath(); ctx.moveTo(particles[i].x,particles[i].y); ctx.lineTo(particles[j].x,particles[j].y);
            ctx.strokeStyle=`rgba(${rgb},${op})`; ctx.lineWidth=.7; ctx.stroke();
          }
        }
      }
      raf=requestAnimationFrame(draw);
    };
    const onMove = (e) => { const r=c.getBoundingClientRect(); mouseX=e.clientX-r.left; mouseY=e.clientY-r.top; };
    const onLeave = () => { mouseX=-9999; mouseY=-9999; };
    const onResize = () => { resize(); init(); };
    resize(); init(); draw();
    window.addEventListener("resize", onResize);
    c.parentElement?.addEventListener("mousemove", onMove);
    c.parentElement?.addEventListener("mouseleave", onLeave);
    return ()=>{ cancelAnimationFrame(raf); window.removeEventListener("resize",onResize); c.parentElement?.removeEventListener("mousemove",onMove); c.parentElement?.removeEventListener("mouseleave",onLeave); };
  },[density,hex]);
  return <canvas ref={ref} className="particle-canvas" aria-hidden="true"/>;
});

function LandingCarousel({ eyebrow, title, dark, children, id }){
  const trackRef = useRef(null);
  const [atStart,setAtStart] = useState(true);
  const [atEnd,setAtEnd] = useState(false);
  const upd = useCallback(()=>{
    const t=trackRef.current; if(!t) return;
    const max=t.scrollWidth-t.clientWidth-4;
    setAtStart(t.scrollLeft<=4); setAtEnd(t.scrollLeft>=max);
  },[]);
  useEffect(()=>{ const id=setTimeout(upd,60); return ()=>clearTimeout(id); },[children,upd]);
  const scroll=(dir)=>{ const t=trackRef.current; if(!t) return; const card=t.querySelector(".lp-vcard,.lp-ncard"); const step=(card?card.getBoundingClientRect().width:320)+22; t.scrollBy({left:step*dir,behavior:"smooth"}); };
  useEffect(()=>{
    const t=trackRef.current; if(!t) return;
    let down=false,sx,sl,moved=false;
    const dn=e=>{down=true;moved=false;sx=e.pageX;sl=t.scrollLeft;}
    const mv=e=>{if(!down)return;const dx=e.pageX-sx;if(Math.abs(dx)>5){moved=true; t.classList.add("drag");} t.scrollLeft=sl-dx}
    const up=()=>{down=false;setTimeout(()=>t.classList.remove("drag"),0)}
    const ck=e=>{if(moved){e.preventDefault();e.stopPropagation();moved=false;}}
    t.addEventListener("pointerdown",dn);t.addEventListener("pointermove",mv);t.addEventListener("pointerup",up);t.addEventListener("pointercancel",up);t.addEventListener("pointerleave",up);t.addEventListener("click",ck,true);t.addEventListener("scroll",upd,{passive:true});
    return ()=>{t.removeEventListener("pointerdown",dn);t.removeEventListener("pointermove",mv);t.removeEventListener("pointerup",up);t.removeEventListener("pointercancel",up);t.removeEventListener("pointerleave",up);t.removeEventListener("click",ck,true);t.removeEventListener("scroll",upd)}
  },[upd]);
  return <section id={id} className={dark?"lp-dark":""} style={{padding:"100px 0"}}>
    <div className="container">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",gap:20,marginBottom:34,flexWrap:"wrap"}}>
        <div className="lp-reveal">
          <div className="mono small-caps" style={{color:dark?BRAND.signal:BRAND.accent,marginBottom:12}}>{eyebrow}</div>
          <h2 className="lp-serif" style={{fontSize:"clamp(1.9rem,4vw,3.1rem)",lineHeight:1.08,maxWidth:"22ch",margin:0}}>{title}</h2>
        </div>
        <div style={{display:"flex",gap:10}}>
          <button className="lp-navbtn" onClick={()=>scroll(-1)} disabled={atStart} aria-label="Anterior">‹</button>
          <button className="lp-navbtn" onClick={()=>scroll(1)} disabled={atEnd} aria-label="Próximo">›</button>
        </div>
      </div>
      <div className="lp-track" ref={trackRef}>{children}</div>
    </div>
  </section>;
}

const countWords = s => String(s||"").trim().split(/\s+/).filter(Boolean).length;
function estimateLearningReadTime(L){
  const total = countWords(L.sections?.conceito) + countWords(L.sections?.porQueImporta) + countWords(L.sections?.naPratica) + countWords(L.sections?.proximasAcoes);
  const faqWords = (L.faqs||[]).filter(f=>f.selected).reduce((a,f)=>a+countWords(f.a),0);
  return Math.max(2, Math.round((total + faqWords) / 215));
}
function firstSentence(s, max = 130){
  const t = String(s||"").trim().replace(/\s+/g," ");
  if(!t) return "";
  // get first sentence-ish
  const m = t.match(/^.+?[.!?](?:\s|$)/);
  let out = m ? m[0] : t;
  if(out.length > max) out = out.slice(0, max).replace(/\s\S*$/,"") + "…";
  return out.trim();
}

// Fluid carousel with center snap + scale-on-current
const LearningCarousel = memo(function LearningCarousel({ items, onOpen }){
  const trackRef = useRef(null);
  const [currentIdx, setCurrentIdx] = useState(0);
  useEffect(()=>{
    const track = trackRef.current; if(!track) return;
    const onScroll = () => {
      const center = track.scrollLeft + track.clientWidth/2;
      let bestIdx = 0, bestDist = Infinity;
      Array.from(track.children).forEach((el, i) => {
        const elCenter = el.offsetLeft + el.offsetWidth/2;
        const d = Math.abs(elCenter - center);
        if(d < bestDist){ bestDist = d; bestIdx = i; }
      });
      setCurrentIdx(bestIdx);
    };
    track.addEventListener("scroll", onScroll, {passive:true});
    onScroll();
    return ()=>track.removeEventListener("scroll", onScroll);
  },[items.length]);

  return <div className="lcarousel">
    <div className="lcarousel-track" ref={trackRef}>
      {items.map((L,i)=>(
        <div key={L.id} className={i===currentIdx?"is-current":""}>
          <LearningTeaserCard learning={L} onClick={()=>onOpen(L)} current={i===currentIdx}/>
        </div>
      ))}
    </div>
  </div>;
});

  // Reveal observer + chapter bg parallax (Floema-style scroll panels)
  useEffect(()=>{
    const io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add("in");io.unobserve(e.target)}}),{threshold:.12});
    document.querySelectorAll(".fl-reveal:not(.in)").forEach(el=>io.observe(el));
    let ticking=false;
    const bgs = Array.from(document.querySelectorAll(".fl-chapter-bg"));
    const onScroll=()=>{
      if(ticking) return; ticking=true;
      requestAnimationFrame(()=>{

    // GSAP ScrollTrigger — chapter numbers + content animations

            scale:1, opacity:.92, y:0, ease:"power3.out",
            scrollTrigger:{trigger:ch, start:"top 80%", end:"top 30%", scrub:1}
          });
          triggers.push(t1);
        }
        if(cat){
          const t2 = gsap.fromTo(cat, {opacity:0, y:30}, {
            opacity:1, y:0, ease:"power2.out",
            scrollTrigger:{trigger:ch, start:"top 70%", end:"top 40%", scrub:1}
          });
          triggers.push(t2);
        }
        if(title){
          const t3 = gsap.fromTo(title, {opacity:0, y:50}, {
            opacity:1, y:0, ease:"power2.out",
            scrollTrigger:{trigger:ch, start:"top 65%", end:"top 35%", scrub:1}
          });

        }
      });
      // List items stagger reveal
      document.querySelectorAll(".fl-list-item").forEach((li,i)=>{
        const t = gsap.fromTo(li, {opacity:0, x:-30}, {
          opacity:1, x:0, ease:"power2.out", duration:.6,

        });
        triggers.push(t);

          scrollTrigger:{trigger:".fl-process-grid", start:"top 75%", once:true}
        });
        triggers.push(t);
      });
    }

    return ()=>{
      io.disconnect();
      window.removeEventListener("scroll",onScroll);
      triggers.forEach(t=>{ try{ t.scrollTrigger?.kill(); t.kill(); }catch(_){} });
    };
  },[newsletters,podcasts]);

// PUBLIC NEWSLETTER (editorial style, fixed video rendering)
// ═══════════════════════════════════════════════════════════════════════════
function PublicNewsletter(){
  const [newsletters,setNewsletters] = useState([]);
  const [selectedDate,setSelectedDate] = useState(null);
  const [loading,setLoading] = useState(true);
  const [audioBlob,setAudioBlob] = useState(null);
  const [commentsOpen,setCommentsOpen] = useState(false);
  const [commentCount,setCommentCount] = useState(0);
  const [shareCopied,setShareCopied] = useState(false);
  const [lightboxOpen,setLightboxOpen] = useState(false);

  useEffect(()=>{(async()=>{
    const items = await db.listNewsletters();
    setNewsletters(items);
    const params = new URLSearchParams(window.location.search);
    const urlDate = params.get("date");
    if(urlDate && items.find(n=>n.date===urlDate)) setSelectedDate(urlDate);
    else if(items.length>0) setSelectedDate(items[0].date);
    else setSelectedDate(today());
    setLoading(false);
  })()},[]);

  useEffect(()=>{
    if(!selectedDate)return;
    analytics.track(selectedDate);
    // Subscriber open tracking: link from email carries ?ref=<token>&ec=<episodeCode>
    const params = new URLSearchParams(window.location.search);
    const ref = params.get("ref");
    const ec = params.get("ec");
    if(ref) subscribersApi.recordOpen(ref, selectedDate, ec).catch(()=>{});
    (async()=>{
      const list = await commentsApi.listFor(selectedDate);
      setCommentCount(list.filter(c=>!c.hidden).length);
    })();
  },[selectedDate]);

  useEffect(()=>{
    if(!selectedDate) return;
    const c = newsletters.find(n=>n.date===selectedDate);
    if(c?.audioPodcastBlobRef) db.getBlob(c.audioPodcastBlobRef).then(setAudioBlob); else setAudioBlob(null);
  },[selectedDate,newsletters]);

  useEffect(()=>{
    if(!selectedDate||loading) return;
    const u = new URL(window.location.href);
    u.searchParams.set("view","public"); u.searchParams.set("date",selectedDate);
    window.history.replaceState({},"",u.toString());
  },[selectedDate,loading]);

  const current = newsletters.find(n=>n.date===selectedDate);
  const effectiveAudioUrl = audioBlob || current?.audioPodcastUrl;

  useEffect(()=>{
    if(loading) return;
    const io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add("in");io.unobserve(e.target)}}),{threshold:.12});
    document.querySelectorAll(".lp-reveal:not(.in)").forEach(el=>io.observe(el));
    return ()=>io.disconnect();
  },[loading,current]);

  const readTime = useMemo(()=>estimateReadTime((current?.aiSummary||"")+" "+(current?.headlines||[]).map(h=>h.summary).join(" ")),[current]);

  const totalEpisodes = newsletters.length;
  const editionNum = useMemo(()=>{
    if(!current) return 0;
    return totalEpisodes - newsletters.findIndex(n=>n.date===selectedDate);
  },[current,newsletters,selectedDate,totalEpisodes]);

  const handleShare = async () => {
    const url = getShareUrl(selectedDate);
    if(navigator.share){ try{ await navigator.share({title:current?.title||"Sync·MI",url}); return; }catch{} }
    try{ await navigator.clipboard.writeText(url); setShareCopied(true); setTimeout(()=>setShareCopied(false),2500); }catch{}
  };

  if(loading){
    return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:BRAND.mute}}><Spin/></div>;
  }

  return <>
    <Ticker vol="01" episodes={totalEpisodes}/>
    <Nav/>

    <main className="container" style={{padding:"60px 32px 80px"}}>
      {!current ? <div style={{padding:"80px 20px",textAlign:"center",border:`1px dashed ${BRAND.rule}`,borderRadius:4}}>
        <div style={{fontFamily:"'Fraunces',serif",fontSize:"1.6rem",fontStyle:"italic",color:BRAND.mute}}>Nenhuma edição disponível ainda.</div>
        <a href="?view=landing" style={{marginTop:20,display:"inline-block",fontFamily:"'JetBrains Mono',monospace",fontSize:".75rem",textTransform:"uppercase",letterSpacing:".14em",color:BRAND.accent}}>← VOLTAR PARA A LANDING</a>
      </div> :
      <div className="fade">

        {/* HEADER */}
        <div className="lp-reveal in" style={{position:"relative",overflow:"hidden",paddingTop:40, paddingBottom:40, borderBottom:`1px solid ${BRAND.rule}`, marginBottom:56}}>
          <FlowBg/>
          <div style={{position:"relative",zIndex:2}}>
            <Logo size={42}/>
            <div className="mono small-caps" style={{display:"flex",gap:18,flexWrap:"wrap",color:BRAND.mute,marginTop:20,marginBottom:30,fontSize:".62rem"}}>
              <span style={{color:BRAND.accent}}>Edição № {padNum(editionNum)}</span>
              <span>{fmtDateMag(current.date)}</span>
              <span>{readTime} min de leitura</span>
              <span>{commentCount} comentários</span>
            </div>

            <h1 className="lp-ultra" style={{fontSize:"clamp(2.4rem, 6.5vw, 5.5rem)", margin:"0 0 24px", color:BRAND.ink}}>
              {current.title || "Highlights de IA"}
            </h1>
            {current.subtitle && <p className="lp-serif" style={{fontSize:"clamp(1.2rem, 2.2vw, 1.7rem)",lineHeight:1.4,color:BRAND.inkSoft,maxWidth:"56ch",margin:0,fontStyle:"italic"}}>
              {current.subtitle}
            </p>}

            <div style={{marginTop:34,display:"flex",gap:10,flexWrap:"wrap"}}>
              <button onClick={handleShare} className="btn btn-primary btn-sm">{shareCopied?"✓ Link copiado":"↗ Compartilhar"}</button>
              <button onClick={()=>setCommentsOpen(true)} className="btn btn-ghost btn-sm">💬 Comentários ({commentCount})</button>
              <a href="?view=landing" className="btn btn-ghost btn-sm">← Início</a>
            </div>
          </div>
        </div>

        {/* AUDIO PODCAST + SUMMARY — side by side */}
        {current.aiSummary && <section className="lp-reveal" style={{marginBottom:64}}>
          <SectionLabel num="01">Análise da Semana</SectionLabel>
          <div style={{display:"grid",gridTemplateColumns:effectiveAudioUrl?"2fr 1fr":"1fr",gap:32,alignItems:"start"}}>
            <div className="card card-pad" style={{padding:40}}>
              <div style={{fontFamily:"'Fraunces',serif",fontSize:"1.15rem",lineHeight:1.65,color:BRAND.ink,whiteSpace:"pre-wrap"}}>
                {current.aiSummary}
              </div>
            </div>
            {effectiveAudioUrl && <div>
              <div className="mono small-caps" style={{color:BRAND.accent,marginBottom:14}}>🎧 PODCAST DE RESUMO</div>
              <AudioPlayer url={effectiveAudioUrl} title="Podcast de Resumo · Sync·MI"/>
              <p style={{marginTop:14,fontFamily:"'Fraunces',serif",fontStyle:"italic",fontSize:".95rem",color:BRAND.mute,lineHeight:1.5}}>
                Gerado a partir do resumo e fontes. Foco direto em IA, sem hype.
              </p>
            </div>}
          </div>
        </section>}

        {/* INFOGRÁFICO DO EPISÓDIO */}
        {current.infographicUrl && <section className="lp-reveal" style={{marginBottom:64}}>
          <SectionLabel num="02">Infográfico</SectionLabel>
          <figure style={{margin:0}}>
            <div onClick={()=>setLightboxOpen(true)} style={{cursor:"zoom-in",borderRadius:10,overflow:"hidden",border:`1px solid ${BRAND.rule}`,boxShadow:"0 20px 60px -30px rgba(36,31,33,.4)",position:"relative",background:BRAND.paperLight}}>
              <img src={current.infographicUrl} alt={current.infographicCaption||"Infográfico do episódio"} style={{width:"100%",display:"block"}}/>
              <div className="mono small-caps" style={{position:"absolute",top:14,right:14,background:"rgba(36,31,33,.78)",color:BRAND.paper,padding:"6px 12px",borderRadius:100,fontSize:".58rem",letterSpacing:".12em",backdropFilter:"blur(4px)"}}>🔍 Ampliar</div>
            </div>
            {current.infographicCaption && <figcaption style={{marginTop:14,fontFamily:"'Fraunces',serif",fontStyle:"italic",fontSize:".98rem",color:BRAND.mute,textAlign:"center"}}>
              {current.infographicCaption}
            </figcaption>}
          </figure>
        </section>}

        {/* COMPANIES + TOPICS CHIPS */}
        {(current.companies?.length>0 || current.topics?.length>0) && <section className="lp-reveal" style={{marginBottom:64}}>
          <SectionLabel num={current.infographicUrl?"03":"02"}>Em Discussão</SectionLabel>
          <div className="card card-pad" style={{padding:32}}>
            {current.companies?.length>0 && <div style={{marginBottom: current.topics?.length>0 ? 20 : 0}}>
              <div className="mono small-caps" style={{color:BRAND.mute,marginBottom:10}}>EMPRESAS</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                {current.companies.map((c,i)=><span key={i} className="chip solid">{c}</span>)}
              </div>
            </div>}
            {current.topics?.length>0 && <div>
              <div className="mono small-caps" style={{color:BRAND.mute,marginBottom:10}}>TÓPICOS</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                {current.topics.map((t,i)=><span key={i} className="chip acc">#{t}</span>)}
              </div>
            </div>}
          </div>
        </section>}

        {/* FOCUS INSIGHTS */}
        {current.focusInsights?.length>0 && <section className="lp-reveal" style={{marginBottom:64}}>
          <SectionLabel num={current.infographicUrl?"04":"03"}>Temas em Destaque</SectionLabel>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))",gap:18}}>
            {FOCUS_AREAS.map((area,i)=>{
              const ins = current.focusInsights.find(x=>x.area===area.id);
              if(!ins?.summary) return null;
              return <div key={area.id} className="card card-pad" style={{padding:28,position:"relative"}}>
                <div style={{position:"absolute",top:0,left:0,bottom:0,width:3,background:i===0?BRAND.accent:i===1?BRAND.signal:BRAND.ink}}/>
                <div style={{paddingLeft:14}}>
                  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
                    <span style={{fontSize:20}}>{area.icon}</span>
