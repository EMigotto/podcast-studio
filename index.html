// LEARNING VIEW — renders a single aprofundamento INLINE (iframe srcDoc, no new tab)
function LearningView(){
  const [learning, setLearning] = useState(null);
  const [loading, setLoading] = useState(true);
  const [notFound, setNotFound] = useState(false);
  const params = new URLSearchParams(window.location.search);
  const id = params.get("id");
  const mode = params.get("mode"); // "infografico" → start in infographic view

  useEffect(()=>{(async()=>{
    if(!id){ setNotFound(true); setLoading(false); return; }
    try {
      let L = await learningsApi.get(id);
      if(!L){ // try by slug match
        const all = await learningsApi.list();
        L = all.find(x=>x.slug===id || x.id===id);
      }
      if(L) setLearning(L); else setNotFound(true);
    } catch(e){ setNotFound(true); }
    setLoading(false);
  })()},[id]);

  const html = useMemo(()=>{
    if(!learning) return "";
    let h = (learning.preserveRaw && learning.rawHtml) ? learning.rawHtml : renderLearningHTML(learning);
    // If infographic mode requested, auto-activate the toggle on load
    if(mode === "infografico"){
      h = h.replace("</body>", `<script>window.addEventListener('load',()=>{var b=document.getElementById('bInfo'); if(b) b.click();});<\/script></body>`);
    }
    return h;
  }, [learning, mode]);

  return <div style={{minHeight:"100vh",background:BRAND.paper,display:"flex",flexDirection:"column"}}>
    {/* Slim top bar to return — keeps user inside the app */}
    <div style={{position:"sticky",top:0,zIndex:50,display:"flex",alignItems:"center",justifyContent:"space-between",gap:16,padding:"12px 20px",background:"rgba(245,241,230,.92)",backdropFilter:"blur(10px)",borderBottom:`1px solid ${BRAND.rule}`}}>
      <button onClick={()=>{ if(window.history.length>1) window.history.back(); else window.location.href="?view=learnings"; }}
        style={{display:"inline-flex",alignItems:"center",gap:8,background:"transparent",border:"none",cursor:"pointer",color:BRAND.ink,fontFamily:"'JetBrains Mono',monospace",fontSize:".72rem",letterSpacing:".14em",textTransform:"uppercase"}}>
        ← Voltar
      </button>
      <a href="?view=landing" className="brand" style={{textDecoration:"none"}}>
        <Logo size={26}/>
        <span style={{fontFamily:"'Instrument Serif',serif",fontSize:"1.2rem",color:BRAND.ink}}>Sync<em style={{fontStyle:"normal",color:BRAND.accent}}>·MI</em></span>
      </a>
      {learning && <button onClick={()=>{
        const blob = new Blob([html],{type:"text/html"}); const url=URL.createObjectURL(blob);
        const a=document.createElement("a"); a.href=url; a.download=`learning-${learning.slug||"aprofundamento"}.html`; a.click();
        setTimeout(()=>URL.revokeObjectURL(url),500);
      }} style={{background:"transparent",border:`1px solid ${BRAND.rule}`,borderRadius:100,padding:"6px 14px",cursor:"pointer",color:BRAND.inkSoft,fontFamily:"'JetBrains Mono',monospace",fontSize:".66rem",letterSpacing:".14em",textTransform:"uppercase"}}>↓ HTML</button>}
    </div>

    {loading
      ? <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",color:BRAND.mute}}><Spin/> Carregando…</div>
      : notFound
        ? <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:14,padding:40,textAlign:"center"}}>
            <div style={{fontFamily:"'Instrument Serif',serif",fontSize:"2rem",color:BRAND.ink}}>Aprofundamento não encontrado.</div>
            <a href="?view=learnings" className="btn btn-ghost btn-sm">← Ver todos os aprofundamentos</a>
          </div>
        : <iframe title={learning?.title||"Aprofundamento"} srcDoc={html} style={{flex:1,width:"100%",border:"none",minHeight:"calc(100vh - 54px)"}} sandbox="allow-scripts allow-popups allow-same-origin"/>
    }
  </div>;
}

function LearningsPage(){
  const [learnings, setLearnings] = useState([]);
  const [loading, setLoading] = useState(true);
  const [activeIdx, setActiveIdx] = useState(0);
  const carouselRef = useRef(null);

  useEffect(()=>{(async()=>{
    setLearnings(await learningsApi.list());
    setLoading(false);
  })()}, []);

  const openLearning = (L) => {
    // Open inside the app (same tab) instead of a new browser tab
    window.location.href = `?view=learning&id=${encodeURIComponent(L.id || L.slug || "")}`;
  };

  // Track which card is centered in the carousel for active state + dots
  useEffect(()=>{
    const el = carouselRef.current; if(!el) return;
    const onScroll = () => {
      const center = el.scrollLeft + el.offsetWidth/2;
      const items = el.querySelectorAll(".lcarousel-item");
      let bestIdx = 0, bestDist = Infinity;
      items.forEach((it, i)=>{
        const itemCenter = it.offsetLeft + it.offsetWidth/2;
        const d = Math.abs(itemCenter - center);
        if(d < bestDist){ bestDist = d; bestIdx = i; }
      });
      setActiveIdx(bestIdx);
    };
    el.addEventListener("scroll", onScroll, {passive:true});
    onScroll();
    return ()=>el.removeEventListener("scroll", onScroll);
  }, [learnings]);

  const scrollTo = (i) => {
    const el = carouselRef.current; if(!el) return;
    const item = el.querySelectorAll(".lcarousel-item")[i]; if(!item) return;
    el.scrollTo({ left: item.offsetLeft - (el.offsetWidth - item.offsetWidth)/2, behavior: "smooth" });
  };

  return <div style={{minHeight:"100vh",background:BRAND.paper}}>
    <Nav activeSection="learning"/>

    <main className="container" style={{paddingTop:120,paddingBottom:80,maxWidth:1400}}>
      {/* HEADER */}
      <div className="lp-reveal in" style={{position:"relative",overflow:"hidden",paddingTop:30,paddingBottom:32,borderBottom:`1px solid ${BRAND.rule}`,marginBottom:40,maxWidth:900}}>
        <FlowBg/>
        <div style={{position:"relative",zIndex:2}}>
          <Logo size={42}/>
          <div className="mono small-caps" style={{color:BRAND.accent,marginTop:18,marginBottom:16,fontSize:".6rem"}}>Learning de Inovação · Sync·MI</div>
          <h1 className="lp-ultra" style={{fontSize:"clamp(2.4rem,6.5vw,5rem)",margin:"0 0 20px",color:BRAND.ink}}>
            Aprofundamentos. <em style={{fontStyle:"normal",color:BRAND.accent}}>Um tema por vez.</em>
          </h1>
          <p className="lp-serif" style={{fontStyle:"italic",fontSize:"clamp(1.15rem,2vw,1.5rem)",lineHeight:1.45,color:BRAND.inkSoft,maxWidth:"56ch",margin:0}}>
            Estudos que destilam temas densos em explicador prático — conceito, dados de mercado, aplicação e ações imediatas.
          </p>
        </div>
      </div>

      {loading
        ? <div style={{padding:"80px 0",textAlign:"center",color:BRAND.mute}}><Spin/> Carregando aprofundamentos…</div>
        : learnings.length === 0
          ? <div style={{padding:"80px 0",textAlign:"center"}}>
              <div className="mono small-caps" style={{color:BRAND.accent,fontSize:".7rem",marginBottom:14}}>Em breve</div>
              <h2 style={{fontFamily:"'Instrument Serif',serif",fontWeight:400,fontSize:"2.4rem",color:BRAND.ink,marginBottom:10}}>O primeiro aprofundamento chega em breve.</h2>
              <p style={{color:BRAND.inkSoft,maxWidth:"50ch",margin:"0 auto",fontSize:"1.05rem",lineHeight:1.55}}>Cada Learning destila um tema denso em explicador prático: pesquisa em fontes, KPIs, exemplos e ações por edição.</p>
              <a href="?view=landing" className="btn btn-ghost btn-sm" style={{marginTop:24,display:"inline-block"}}>← Voltar pra landing</a>
            </div>
          : <>
              <div className="mono small-caps" style={{color:BRAND.mute,marginBottom:14,fontSize:".62rem"}}>{learnings.length} aprofundamento{learnings.length>1?"s":""} · arrasta lateralmente</div>
              {/* CAROUSEL */}
              <div ref={carouselRef} className="lcarousel" style={{margin:"0 -24px",padding:"24px 24px 60px"}}>
                {learnings.map((L,i)=>(
                  <div key={L.id} className={"lcarousel-item" + (i===activeIdx ? " active" : "")} onClick={()=>i===activeIdx ? openLearning(L) : scrollTo(i)}>
                    <LearningCard L={L} onOpen={()=>openLearning(L)}/>
                  </div>
                ))}
              </div>
              {/* Dots nav */}
              {learnings.length > 1 && <div className="lcarousel-nav">
                {learnings.map((_,i)=>(
                  <button key={i} className={"lcarousel-dot" + (i===activeIdx ? " active" : "")} onClick={()=>scrollTo(i)} aria-label={`Ver aprofundamento ${i+1}`}/>
                ))}
              </div>}
            </>
      }
    </main>
  </div>;
}

                <div className="mono" style={{fontSize:".7rem",color:BRAND.mute,textTransform:"uppercase",letterSpacing:".08em"}}>
                  {p.week ? fmtDateMag(p.week) : ""} · {p.viewCount||0} views
                </div>
              </a>
            )}
          </div>
        </div>}
      </>}
    </main>
  </>;
}

function PodcastDetail(){
  const [podcast,setPodcast] = useState(null);
  const [related,setRelated] = useState([]);
  const [loading,setLoading] = useState(true);
  const [videoBlob,setVideoBlob] = useState(null);
  const [relatedNls,setRelatedNls] = useState([]);

  useEffect(()=>{(async()=>{
    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");
    if(!id){setLoading(false);return;}
    const p = await podcastsApi.get(id);
    if(!p){setLoading(false);return;}
    setPodcast(p);
    podcastsApi.trackView(id).catch(()=>{});
    const all = await podcastsApi.list();
    setRelated(all.filter(x=>x.id!==id).slice(0,6));
    if(p.videoBlobRef) db.getBlob(p.videoBlobRef).then(setVideoBlob);
    // Load source newsletters
    if(p.newsletterDates?.length>0){
      const nls = [];
      for(const d of p.newsletterDates){
        const nl = await db.get(`newsletter:${d}`);
        if(nl) nls.push(nl);
      }
      setRelatedNls(nls);
    }
    setLoading(false);
  })()},[]);

  if(loading) return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:BRAND.mute}}><Spin/></div>;
  if(!podcast) return <>
    <Ticker vol="01" episodes={0}/>
    <Nav/>
    <main className="container" style={{padding:"100px 32px",textAlign:"center"}}>
      <div style={{fontSize:"3rem",marginBottom:16}}>🚫</div>
      <h1 className="lp-serif" style={{fontSize:"2rem",margin:"0 0 16px"}}>Podcast não encontrado.</h1>
      <a href="?view=podcasts" className="btn btn-ghost">← Voltar para todos</a>
    </main>
  </>;

  const effectiveVideoUrl = videoBlob || podcast.videoUrl;
  const aspectRatio = podcast.aspectRatio || "16/9";

  return <>
    <Ticker vol="01" episodes={related.length+1}/>
    <Nav/>

    <main className="container" style={{padding:"32px 32px 80px"}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 360px",gap:32,alignItems:"start"}}>
        {/* LEFT: Player + meta */}
        <div>
          {/* Video player */}
          {effectiveVideoUrl ? <div style={{marginBottom:24}}>
            <VideoPlayer url={effectiveVideoUrl} aspectRatio={aspectRatio} maxWidth="100%"/>
          </div>
          : <div style={{aspectRatio:"16/9",background:BRAND.ink,borderRadius:4,display:"grid",placeItems:"center",color:BRAND.paper,marginBottom:24}}>
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:48,marginBottom:8}}>🎬</div>
              <div className="mono small-caps">Vídeo em produção</div>
            </div>
          </div>}

          {/* Title + meta */}
          <h1 className="lp-serif" style={{fontSize:"clamp(1.7rem, 4vw, 2.6rem)",margin:"0 0 14px",lineHeight:1.12}}>
            {podcast.title}
          </h1>
          <div style={{display:"flex",alignItems:"center",gap:18,marginBottom:24,paddingBottom:18,borderBottom:`1px solid ${BRAND.rule}`,flexWrap:"wrap"}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{width:42,height:42,borderRadius:"50%",background:BRAND.ink,display:"grid",placeItems:"center",color:BRAND.paper,fontFamily:"'Fraunces',serif",fontStyle:"italic",fontSize:"1rem"}}>·</div>
              <div>
                <div style={{fontFamily:"'Fraunces',serif",fontWeight:500,fontSize:".95rem"}}>Sync<em className="acc" style={{fontStyle:"italic"}}>·MI</em></div>
                <div className="mono" style={{fontSize:".68rem",color:BRAND.mute,textTransform:"uppercase",letterSpacing:".1em"}}>Newsletter & Podcast</div>
              </div>
            </div>
            <div style={{flex:1}}/>
            <div className="mono" style={{fontSize:".78rem",color:BRAND.mute,textTransform:"uppercase",letterSpacing:".1em"}}>
              {podcast.viewCount||0} views · {podcast.week?fmtDateMag(podcast.week):fmtRelative(podcast.createdAt)}
            </div>
            {podcast.videoUrl && <a href={podcast.videoUrl} target="_blank" rel="noreferrer" className="btn btn-ghost btn-sm">↗ Abrir externamente</a>}
          </div>

          {/* Description card (YouTube-style) */}
          <div className="card" style={{padding:28,marginBottom:24}}>
            <div className="mono small-caps" style={{color:BRAND.accent,marginBottom:14}}>📝 DESCRIÇÃO</div>
            <div style={{fontFamily:"'Fraunces',serif",fontSize:"1.05rem",lineHeight:1.65,color:BRAND.ink,whiteSpace:"pre-wrap",marginBottom:splitHighlights(podcast.highlights).length>0?24:0}}>
              {podcast.description || <span style={{fontStyle:"italic",color:BRAND.mute}}>(sem descrição)</span>}
            </div>
            {splitHighlights(podcast.highlights).length>0 && <div style={{paddingTop:22,borderTop:`1px solid ${BRAND.rule}`}}>
              <div className="mono small-caps" style={{color:BRAND.accent,marginBottom:16}}>✨ HIGHLIGHTS DO VÍDEO</div>
              <div style={{display:"flex",flexDirection:"column",gap:18}}>
                {splitHighlights(podcast.highlights).map((h,i,arr)=>
                  <div key={i} style={{display:"grid",gridTemplateColumns:"48px 1fr",gap:14,alignItems:"flex-start",paddingBottom:i<arr.length-1?14:0,borderBottom:i<arr.length-1?`1px solid ${BRAND.rule}`:"none"}}>
                    <div className="mono" style={{fontSize:".85rem",color:BRAND.accent,fontWeight:600,paddingTop:4,letterSpacing:".04em"}}>№ {padNum(i+1,2)}</div>
                    <div style={{fontFamily:"'Fraunces',serif",fontSize:"1.05rem",lineHeight:1.55,color:BRAND.ink,wordBreak:"break-word"}} dangerouslySetInnerHTML={{__html: renderHighlightHTML(h)}}/>
                  </div>
                )}
              </div>
            </div>}
          </div>

          {/* Source newsletters */}
          {relatedNls.length>0 && <div className="card" style={{padding:24}}>
            <div className="mono small-caps" style={{color:BRAND.accent,marginBottom:14}}>📰 NEWSLETTERS QUE ORIGINARAM ESTE EPISÓDIO</div>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {relatedNls.map(nl=>
                <a key={nl.date} href={`?view=public&date=${nl.date}`} style={{display:"flex",alignItems:"center",gap:14,padding:"10px 14px",background:BRAND.paperDark,borderRadius:4,textDecoration:"none",color:BRAND.ink,transition:"all .2s"}}
                  onMouseEnter={e=>{e.currentTarget.style.background=BRAND.paperLight;e.currentTarget.style.transform="translateX(4px)"}}
                  onMouseLeave={e=>{e.currentTarget.style.background=BRAND.paperDark;e.currentTarget.style.transform="translateX(0)"}}>
                  <div className="mono" style={{fontSize:".72rem",color:BRAND.mute,textTransform:"uppercase",letterSpacing:".1em",minWidth:80}}>{fmtDateMag(nl.date)}</div>
                  <div style={{fontFamily:"'Fraunces',serif",fontSize:"1rem",lineHeight:1.2,flex:1}}>{nl.title}</div>
                  <span style={{color:BRAND.accent,fontSize:".8rem"}}>→</span>
                </a>
              )}
            </div>
          </div>}
        </div>

        {/* RIGHT: Related podcasts */}
        <aside>
          <div className="mono small-caps" style={{color:BRAND.mute,marginBottom:14}}>📺 OUTROS EPISÓDIOS</div>
          {related.length===0 ? <div style={{padding:30,textAlign:"center",border:`1px dashed ${BRAND.rule}`,borderRadius:4,color:BRAND.mute,fontFamily:"'Fraunces',serif",fontStyle:"italic"}}>Nenhum outro ainda</div>
          : <div style={{display:"flex",flexDirection:"column",gap:14}}>
            {related.map(p=>
              <a key={p.id} href={`?view=podcast&id=${encodeURIComponent(p.id)}`} style={{display:"grid",gridTemplateColumns:"160px 1fr",gap:12,textDecoration:"none",color:"inherit"}}>
                <div style={{position:"relative",aspectRatio:"16/9",background:BRAND.ink,borderRadius:4,overflow:"hidden",border:`1px solid ${BRAND.rule}`}}>
                  {p.thumbnailUrl ? <img src={p.thumbnailUrl} alt={p.title} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                  : <div style={{position:"absolute",inset:0,background:"radial-gradient(circle at 30% 40%, rgba(229,67,27,.3) 0%, transparent 50%)",display:"grid",placeItems:"center",color:BRAND.paper,fontFamily:"'Fraunces',serif",fontSize:".82rem",padding:8,textAlign:"center",lineHeight:1.1}}>{(p.title||"").slice(0,40)}</div>}
                  {p.duration && <div style={{position:"absolute",right:4,bottom:4,padding:"1px 6px",background:"rgba(36,31,33,.85)",color:BRAND.paper,borderRadius:2,fontFamily:"'JetBrains Mono',monospace",fontSize:".62rem"}}>{p.duration}m</div>}
                </div>
                <div>
                  <div style={{fontFamily:"'Fraunces',serif",fontSize:".95rem",lineHeight:1.2,marginBottom:4,letterSpacing:"-.005em"}}>{p.title}</div>
                  <div className="mono" style={{fontSize:".62rem",color:BRAND.mute,textTransform:"uppercase",letterSpacing:".08em"}}>
                    {p.week?fmtDateMag(p.week):""} · {p.viewCount||0} views
                  </div>
                </div>
              </a>
            )}
          </div>}
        </aside>
      </div>
    </main>
  </>;
}

function BreakdownCard({ title, data, keyFmt }){
  const total = data.reduce((s,[,n])=>s+n,0)||1;
  return <div className="card card-pad" style={{padding:18}}>
    <div className="mono small-caps" style={{color:BRAND.mute,marginBottom:12}}>{title}</div>
    {data.length===0 ? <div style={{fontSize:".82rem",color:BRAND.mute,fontStyle:"italic"}}>—</div>
    : <div style={{display:"flex",flexDirection:"column",gap:8}}>
      {data.slice(0,8).map(([k,n])=><div key={k}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:4,fontSize:".82rem"}}>
          <span style={{fontWeight:500}}>{keyFmt?keyFmt(k):k}</span>
          <span className="mono" style={{color:BRAND.mute}}>{n}</span>
        </div>
        <div style={{height:4,background:BRAND.paperDark,borderRadius:2,overflow:"hidden"}}>
          <div style={{width:`${(n/total)*100}%`,height:"100%",background:BRAND.ink}}/>
        </div>
      </div>)}
    </div>}
  </div>;
}

function AudiencePanel(){
  const [comments,setComments] = useState([]);
  const [views,setViews] = useState([]);
  const [subscribers,setSubscribers] = useState([]);
  const [opens,setOpens] = useState([]);
  const [replyingTo,setReplyingTo] = useState(null);
  const [replyText,setReplyText] = useState("");
  const [filter,setFilter] = useState("all");

  const reload = useCallback(async()=>{
    setComments(await commentsApi.listAll());
    setViews(await analytics.listAll());
    setSubscribers(await subscribersApi.list());
    setOpens(await subscribersApi.listOpens());
  },[]);
  useEffect(()=>{reload()},[reload]);

  const filteredComments = comments.filter(c=>{
    if(filter==="pending") return !c.reply && !c.hidden;
    if(filter==="hidden") return c.hidden;
    return true;
  });

  const totalViews = views.length;
  const last24h = views.filter(v=>Date.now()-v.timestamp<86400000).length;
  const last7d = views.filter(v=>Date.now()-v.timestamp<7*86400000).length;
  const byEdition = useMemo(()=>{const m=new Map(); views.forEach(v=>m.set(v.newsletterDate,(m.get(v.newsletterDate)||0)+1)); return Array.from(m.entries()).sort((a,b)=>b[0].localeCompare(a[0]))},[views]);
  const byBrowser = useMemo(()=>{const m=new Map(); views.forEach(v=>m.set(v.browser||"?",(m.get(v.browser||"?")||0)+1)); return Array.from(m.entries()).sort((a,b)=>b[1]-a[1])},[views]);
  const byOS = useMemo(()=>{const m=new Map(); views.forEach(v=>m.set(v.os||"?",(m.get(v.os||"?")||0)+1)); return Array.from(m.entries()).sort((a,b)=>b[1]-a[1])},[views]);
  const byDevice = useMemo(()=>{const m=new Map(); views.forEach(v=>m.set(v.device||"?",(m.get(v.device||"?")||0)+1)); return Array.from(m.entries()).sort((a,b)=>b[1]-a[1])},[views]);
  const byLang = useMemo(()=>{const m=new Map(); views.forEach(v=>m.set(v.lang||"?",(m.get(v.lang||"?")||0)+1)); return Array.from(m.entries()).sort((a,b)=>b[1]-a[1])},[views]);
  const recentViews = [...views].sort((a,b)=>b.timestamp-a.timestamp).slice(0,40);

  // Subscribers + engagement
  const opensBySub = useMemo(()=>{const m=new Map(); opens.forEach(o=>{const k=o.subscriberId||(`subscriber:${o.ref}`); if(!m.has(k))m.set(k,new Set()); m.get(k).add(o.episodeDate);}); return m;},[opens]);
  const opensByEpisode = useMemo(()=>{const m=new Map(); opens.forEach(o=>m.set(o.episodeDate,(m.get(o.episodeDate)||0)+1)); return Array.from(m.entries()).sort((a,b)=>b[0].localeCompare(a[0]));},[opens]);
  const totalEmailsSent = useMemo(()=>subscribers.reduce((s,x)=>s+(x.emailsSent||0),0),[subscribers]);
  const activeViewers = useMemo(()=>subscribers.filter(s=>(opensBySub.get(s.id)?.size||0)>0).length,[subscribers,opensBySub]);
  const subsSorted = useMemo(()=>[...subscribers].sort((a,b)=>{
    const oa=opensBySub.get(a.id)?.size||0, ob=opensBySub.get(b.id)?.size||0;
    if(ob!==oa) return ob-oa; return (b.createdAt||0)-(a.createdAt||0);
  }),[subscribers,opensBySub]);

  return <div className="fade">
    <SectionLabel num="📊">Audiência</SectionLabel>
    <p style={{fontFamily:"'Fraunces',serif",fontStyle:"italic",color:BRAND.inkSoft,fontSize:"1.05rem",marginTop:-24,marginBottom:32}}>Comentários e métricas dos leitores. Tudo via Supabase em tempo real.</p>

    {/* STATS */}
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:14,marginBottom:36}}>
      {[
        {label:"Views totais",value:totalViews,icon:"👁",color:BRAND.ink},
        {label:"Últimas 24h",value:last24h,icon:"⚡",color:BRAND.accent},
        {label:"Últimos 7 dias",value:last7d,icon:"📅",color:BRAND.signal},
        {label:"Comentários",value:comments.length,icon:"💬",color:BRAND.inkSoft},
      ].map(s=><div key={s.label} className="card card-pad" style={{padding:20,position:"relative"}}>
        <div style={{position:"absolute",top:0,left:0,bottom:0,width:3,background:s.color}}/>
        <div style={{paddingLeft:10}}>
          <div style={{fontFamily:"'Fraunces',serif",fontSize:"2.2rem",fontWeight:500,lineHeight:1,color:s.color}}>{s.value}</div>
          <div className="mono small-caps" style={{color:BRAND.mute,marginTop:6}}>{s.icon} {s.label}</div>
        </div>
      </div>)}
    </div>

    {/* SUBSCRIBERS / INSCRITOS */}
    <div style={{marginBottom:48}}>
      <h3 style={{fontFamily:"'Fraunces',serif",fontSize:"1.5rem",margin:"0 0 18px",letterSpacing:"-.015em"}}>📋 Inscritos na Newsletter ({subscribers.length})</h3>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:14,marginBottom:20}}>
        {[
          {label:"Inscritos",value:subscribers.length,icon:"📋",color:BRAND.ink},
          {label:"Telespectadores ativos",value:activeViewers,icon:"✅",color:BRAND.accent},
          {label:"Emails enviados",value:totalEmailsSent,icon:"📨",color:BRAND.signal},
          {label:"Aberturas registradas",value:opens.length,icon:"👀",color:BRAND.inkSoft},
        ].map(s=><div key={s.label} className="card card-pad" style={{padding:20,position:"relative"}}>
          <div style={{position:"absolute",top:0,left:0,bottom:0,width:3,background:s.color}}/>
          <div style={{paddingLeft:10}}>
            <div style={{fontFamily:"'Fraunces',serif",fontSize:"2.2rem",fontWeight:500,lineHeight:1,color:s.color}}>{s.value}</div>
            <div className="mono small-caps" style={{color:BRAND.mute,marginTop:6}}>{s.icon} {s.label}</div>
          </div>
        </div>)}
      </div>

      {subscribers.length===0 ? <div style={{padding:40,textAlign:"center",border:`1px dashed ${BRAND.rule}`,borderRadius:8,color:BRAND.mute,fontStyle:"italic",fontFamily:"'Fraunces',serif"}}>Nenhum inscrito ainda. O formulário da landing page alimenta esta lista.</div>
      : <div className="card" style={{overflow:"hidden"}}>
        <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 110px 130px",gap:12,padding:"12px 18px",background:BRAND.paperDark,borderBottom:`1px solid ${BRAND.rule}`}} className="mono small-caps">
          <div style={{color:BRAND.mute,fontSize:".6rem"}}>EMAIL</div>
          <div style={{color:BRAND.mute,fontSize:".6rem"}}>INSCRITO EM</div>
          <div style={{color:BRAND.mute,fontSize:".6rem",textAlign:"center"}}>EMAILS</div>
          <div style={{color:BRAND.mute,fontSize:".6rem",textAlign:"center"}}>EPISÓDIOS ABERTOS</div>
        </div>
        <div style={{maxHeight:420,overflowY:"auto"}}>
          {subsSorted.map(s=>{
            const opened = opensBySub.get(s.id)?.size||0;
            const active = opened>0;
            return <div key={s.id} style={{display:"grid",gridTemplateColumns:"2fr 1fr 110px 130px",gap:12,padding:"12px 18px",borderBottom:`1px solid ${BRAND.rule}`,alignItems:"center",fontSize:".86rem"}}>
              <div style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                <span style={{display:"inline-block",width:8,height:8,borderRadius:"50%",background:active?BRAND.signal:BRAND.rule,marginRight:8}}/>
                {s.email}
              </div>
              <div className="mono" style={{fontSize:".72rem",color:BRAND.mute}}>{s.createdAt?fmtDate(new Date(s.createdAt).toISOString().slice(0,10)):"—"}</div>
              <div style={{textAlign:"center",fontFamily:"'JetBrains Mono',monospace",color:BRAND.inkSoft}}>{s.emailsSent||0}</div>
              <div style={{textAlign:"center"}}>
                <span className="mono" style={{display:"inline-block",padding:"3px 10px",borderRadius:100,fontSize:".72rem",background:active?`rgba(229,67,27,.18)`:BRAND.paperDark,color:active?BRAND.accentDeep:BRAND.mute,fontWeight:600}}>{opened}</span>
              </div>
            </div>;
          })}
        </div>
      </div>}

      {opensByEpisode.length>0 && <div style={{marginTop:18}}>
        <div className="mono small-caps" style={{color:BRAND.mute,marginBottom:10}}>ABERTURAS POR EPISÓDIO (inscritos que acessaram via email)</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
          {opensByEpisode.map(([date,count])=><div key={date} className="chip" style={{fontSize:".7rem"}}>{fmtDate(date)} · <strong style={{color:BRAND.accent}}>{count}</strong></div>)}
        </div>
      </div>}
    </div>
    <div style={{marginBottom:48}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:18,flexWrap:"wrap",gap:12}}>
        <h3 style={{fontFamily:"'Fraunces',serif",fontSize:"1.5rem",margin:0,letterSpacing:"-.015em"}}>💬 Moderação ({filteredComments.length})</h3>
        <div style={{display:"flex",gap:6}}>
          {[{id:"all",label:"Todos"},{id:"pending",label:"Sem resposta"},{id:"hidden",label:"Ocultos"}].map(f=>
            <button key={f.id} onClick={()=>setFilter(f.id)} className={filter===f.id?"btn btn-primary btn-sm":"btn btn-ghost btn-sm"}>{f.label}</button>
          )}
        </div>
      </div>
      {filteredComments.length===0 ? <div className="card card-pad" style={{padding:32,textAlign:"center",color:BRAND.mute,fontFamily:"'Fraunces',serif",fontStyle:"italic"}}>{comments.length===0?"Nenhum comentário ainda":"Nada com este filtro"}</div>
      : <div style={{display:"flex",flexDirection:"column",gap:12}}>
          {filteredComments.map(c=>

                  <div className="mono" style={{fontSize:".68rem",color:BRAND.mute,marginTop:3,textTransform:"uppercase",letterSpacing:".08em"}}>📅 {fmtDate(c.newsletterDate)} · {fmtRelative(c.timestamp)}</div>

                <div style={{display:"flex",gap:6}}>
                  {!c.reply && <button onClick={()=>{setReplyingTo(c.id);setReplyText("")}} className="btn btn-ghost btn-sm">↳ Responder</button>}
                  <button onClick={async()=>{await commentsApi.toggleHide(c.id);reload();}} className="btn btn-ghost btn-sm">{c.hidden?"👁 Mostrar":"🚫 Ocultar"}</button>

                </div>
              </div>
              <div style={{fontSize:".95rem",lineHeight:1.55,whiteSpace:"pre-wrap",marginBottom:c.reply||replyingTo===c.id?12:0}}>{c.message}</div>
              {c.reply && <div style={{padding:"12px 14px",background:BRAND.paperDark,borderLeft:`3px solid ${BRAND.accent}`,borderRadius:4}}>
                <div className="mono small-caps" style={{color:BRAND.accent,marginBottom:6,fontSize:".62rem"}}>↳ SUA RESPOSTA · {fmtRelative(c.reply.timestamp)}</div>
                <div style={{fontSize:".88rem",lineHeight:1.5,whiteSpace:"pre-wrap"}}>{c.reply.message}</div>
              </div>}
              {replyingTo===c.id && <div style={{marginTop:10}}>
                <TArea value={replyText} onChange={e=>setReplyText(e.target.value)} placeholder="Digite sua resposta..." rows={3}/>
                <div style={{display:"flex",gap:8,marginTop:8}}>
                  <button onClick={async()=>{if(replyText.trim()){await commentsApi.setReply(c.id,replyText);setReplyingTo(null);setReplyText("");reload();}}} disabled={!replyText.trim()} className="btn btn-primary btn-sm">📩 Enviar</button>
                  <button onClick={()=>{setReplyingTo(null);setReplyText("");}} className="btn btn-ghost btn-sm">Cancelar</button>
                </div>
              </div>}
            </div>)}
        </div>}
    </div>

    {/* BREAKDOWN */}
    <div style={{marginBottom:32}}>
      <h3 style={{fontFamily:"'Fraunces',serif",fontSize:"1.5rem",margin:"0 0 18px",letterSpacing:"-.015em"}}>📊 Métricas Detalhadas</h3>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))",gap:14}}>
        <BreakdownCard title="📰 Por edição" data={byEdition} keyFmt={fmtDate}/>
        <BreakdownCard title="🌐 Navegador" data={byBrowser}/>
        <BreakdownCard title="💻 Sistema" data={byOS}/>
        <BreakdownCard title="📱 Dispositivo" data={byDevice}/>
        <BreakdownCard title="🌍 Idioma" data={byLang}/>
      </div>
    </div>

    {/* RECENT VIEWS */}
    <div>
      <div className="mono small-caps" style={{color:BRAND.mute,marginBottom:12}}>📋 ÚLTIMAS 40 VISUALIZAÇÕES</div>
      <div className="card" style={{overflow:"hidden",maxHeight:340,overflowY:"auto"}}>
        {recentViews.length===0 ? <div style={{padding:32,textAlign:"center",color:BRAND.mute,fontStyle:"italic"}}>Nenhuma visualização ainda</div>
        : <table style={{width:"100%",fontFamily:"'JetBrains Mono',monospace",fontSize:".78rem",borderCollapse:"collapse"}}>
            <thead style={{background:BRAND.paperDark,position:"sticky",top:0}}>
              <tr>
                <th style={{textAlign:"left",padding:"10px 14px",fontSize:".68rem",color:BRAND.mute,textTransform:"uppercase",letterSpacing:".12em",fontWeight:500}}>Quando</th>
                <th style={{textAlign:"left",padding:"10px 14px",fontSize:".68rem",color:BRAND.mute,textTransform:"uppercase",letterSpacing:".12em",fontWeight:500}}>Edição</th>
                <th style={{textAlign:"left",padding:"10px 14px",fontSize:".68rem",color:BRAND.mute,textTransform:"uppercase",letterSpacing:".12em",fontWeight:500}}>Dispositivo</th>
                <th style={{textAlign:"left",padding:"10px 14px",fontSize:".68rem",color:BRAND.mute,textTransform:"uppercase",letterSpacing:".12em",fontWeight:500}}>Origem</th>
              </tr>
            </thead>
            <tbody>
              {recentViews.map(v=><tr key={v.id} style={{borderTop:`1px solid ${BRAND.rule}`}}>
                <td style={{padding:"8px 14px"}}>{fmtRelative(v.timestamp)}</td>
                <td style={{padding:"8px 14px",color:BRAND.mute}}>{fmtDate(v.newsletterDate)}</td>
                <td style={{padding:"8px 14px"}}>{v.device} · {v.browser} · {v.os}</td>
                <td style={{padding:"8px 14px",color:BRAND.mute}}>{(v.referrer||"direto").slice(0,30)}</td>
              </tr>)}
            </tbody>
          </table>}
      </div>
    </div>
  </div>;
}

// ═══════════════════════════════════════════════════════════════════════════
// SOCIAL STUDIO — Instagram post templates + LinkedIn post generator
// ═══════════════════════════════════════════════════════════════════════════
const IG_POST_TYPES = [
  { id:"cover-ink",    label:"Capa · Ink",        group:"Capa de Episódio", aspect:"1/1",  bg:"ink"    },
  { id:"cover-paper",  label:"Capa · Paper",      group:"Capa de Episódio", aspect:"1/1",  bg:"paper"  },
  { id:"cover-accent", label:"Capa · Accent",     group:"Capa de Episódio", aspect:"1/1",  bg:"accent" },
  { id:"quote",        label:"Quote Card",        group:"Citação",          aspect:"1/1",  bg:"paper"  },
  { id:"stat",         label:"Dado em Destaque",  group:"Citação",          aspect:"1/1",  bg:"ink"    },
  { id:"reels",        label:"Reels / Story",     group:"Vertical 9:16",    aspect:"9/16", bg:"ink"    },
  { id:"infographic",  label:"Infográfico",       group:"Imagem",           aspect:"auto", bg:"paper"  },
];

function SocialStudio({ apiKey, keyValidated, newsletters }){
  const [selDate,setSelDate] = useState("");
  const [postType,setPostType] = useState("cover-ink");
  const [igCaption,setIgCaption] = useState("");
  const [liPost,setLiPost] = useState("");
  const [genState,setGenState] = useState("");
  const [msg,setMsg] = useState({type:"",text:""});
  const [copied,setCopied] = useState("");
  const postRef = useRef(null);

  const eps = useMemo(()=>(newsletters||[]).slice().sort((a,b)=>(b.date||"").localeCompare(a.date||"")),[newsletters]);
  useEffect(()=>{ if(eps.length>0 && !selDate) setSelDate(eps[0].date); },[eps,selDate]);

  const ep = eps.find(e=>e.date===selDate);
  // Edition number = chronological position (oldest = 1)
  const epNum = useMemo(()=>{
    if(!ep) return 1;
    const asc = (newsletters||[]).slice().sort((a,b)=>(a.date||"").localeCompare(b.date||""));
    return asc.findIndex(n=>n.date===ep.date)+1;
  },[ep,newsletters]);

  const epUrl = ep ? `${window.location.origin}/?view=public&date=${ep.date}` : "";
  const shareUrl = ep ? `${window.location.origin}/api/share?date=${ep.date}` : "";

  // Pull the top featured headline + a stat-ish topic for templates
  const topHeadline = ep?.headlines?.find(h=>h.featured) || ep?.headlines?.[0];
  const firstTopic = ep?.topics?.[0] || ep?.companies?.[0] || "IA";

  const curType = IG_POST_TYPES.find(t=>t.id===postType) || IG_POST_TYPES[0];

  const copyText = (text,key) => {
    navigator.clipboard.writeText(text);
    setCopied(key); setTimeout(()=>setCopied(""),1800);
  };

  const downloadPng = async () => {
    if(!postRef.current){return;}
    if(typeof html2canvas==="undefined"){setMsg({type:"err",text:"html2canvas não carregou. Recarregue a página."});return;}
    setMsg({type:"info",text:"⏳ Gerando PNG em alta resolução..."});
    try {
      const node = postRef.current;
      const canvas = await html2canvas(node,{scale:3,backgroundColor:null,useCORS:true,logging:false});
      const link = document.createElement("a");
      link.download = `syncmi-${ep?.date||"post"}-${postType}.png`;
      link.href = canvas.toDataURL("image/png");
      link.click();
      setMsg({type:"ok",text:"✓ PNG baixado! Poste no Instagram."});
    } catch(err){setMsg({type:"err",text:"Erro ao gerar PNG: "+err.message});}
  };

  const genCaption = async () => {
    if(!keyValidated){setMsg({type:"err",text:"Configure a chave Anthropic em Configurações."});return;}
    if(!ep){setMsg({type:"err",text:"Selecione um episódio."});return;}
    setGenState("ig"); setMsg({type:"",text:""});
    try {
      const ctx = `Título: ${ep.title}\nSubtítulo: ${ep.subtitle||""}\nResumo: ${(ep.aiSummary||"").slice(0,1200)}\nTemas: ${(ep.topics||[]).join(", ")}\nEmpresas: ${(ep.companies||[]).join(", ")}`;
      const t = await callClaude(apiKey,
        `Crie uma LEGENDA para post de Instagram sobre este episódio de newsletter de IA.\nTom: direto, entusiasta, sem hype exagerado. Português brasileiro.\nEstrutura: gancho forte na 1ª linha; 2-3 frases de valor; convite pra ler/assistir; 1 linha com 4-6 hashtags relevantes de IA.\nUse no máximo 3 emojis bem colocados. Não use markdown.\n\nEPISÓDIO:\n${ctx}`,
        false, 700);
      setIgCaption(t.trim());
      setMsg({type:"ok",text:"✓ Legenda do Instagram gerada!"});
    } catch(err){setMsg({type:"err",text:"Erro: "+err.message});}
    setGenState("");
  };

  const genLinkedin = async () => {
    if(!keyValidated){setMsg({type:"err",text:"Configure a chave Anthropic em Configurações."});return;}
    if(!ep){setMsg({type:"err",text:"Selecione um episódio."});return;}
    setGenState("li"); setMsg({type:"",text:""});
    try {
      const ctx = `Título: ${ep.title}\nSubtítulo: ${ep.subtitle||""}\nResumo: ${(ep.aiSummary||"").slice(0,1500)}\nTemas: ${(ep.topics||[]).join(", ")}\nEmpresas: ${(ep.companies||[]).join(", ")}`;
      const t = await callClaude(apiKey,
        `Crie um POST PARA LINKEDIN sobre este episódio de uma newsletter/podcast de IA chamada Sync·MI.\nTom: profissional, entusiasta, instigante — adequado a um feed executivo de tecnologia. Português brasileiro.\nEstrutura: gancho de 1 linha que para o scroll; 3-4 frases sucintas com os destaques mais relevantes (pode usar bullets com "→"); fechamento convidando a ler a edição completa; 3-5 hashtags profissionais no fim.\nNÃO inclua a URL no corpo (ela será anexada automaticamente como preview). Não use markdown de negrito. Máximo ~140 palavras.\n\nEPISÓDIO:\n${ctx}`,
        false, 700);
      setLiPost(t.trim());
      setMsg({type:"ok",text:"✓ Post do LinkedIn gerado!"});
    } catch(err){setMsg({type:"err",text:"Erro: "+err.message});}
    setGenState("");
  };

  // ─── Render the selected Instagram post template ───
  const renderPost = () => {
    if(!ep) return null;
    const dateStr = fmtDateMag(ep.date);
    const mark = <span className="ig-mark"><span className="ig-mark-dot"></span> Sync<em>·MI</em></span>;
    const waveBars = Array.from({length:32},(_,i)=>15+Math.abs(Math.sin(i*.55))*82);

    if(postType==="cover-ink"){
      return <div className="ig-post ig-1-1 ig-bg-ink"><div className="ig-frame">
        <div className="ig-corner">{mark}<span>EP.{padNum(epNum)} · {dateStr}</span></div>
        <div style={{flex:1,display:"flex",alignItems:"center"}}><div>
          <div className="ig-tag ig-tag-fill" style={{marginBottom:18}}>▲ Novo Episódio</div>
          <h2 className="ig-headline" style={{fontSize:"clamp(1.6rem,5.5vw,2.7rem)"}}>{ep.title}</h2>
          {ep.subtitle && <p style={{fontFamily:"'Fraunces',serif",fontStyle:"italic",fontSize:"1rem",opacity:.85,marginTop:14,maxWidth:"32ch"}}>{ep.subtitle}</p>}
        </div></div>
        <div className="ig-corner">
          <div className="ig-wave" style={{width:"55%",height:22}}>{waveBars.map((h,i)=><span key={i} style={{height:`${h}%`}}/>)}</div>
          <span>5 MIN · IA</span>
        </div>
      </div></div>;
    }
    if(postType==="cover-paper"){
      return <div className="ig-post ig-1-1 ig-bg-paper"><div className="ig-frame">
        <div className="ig-corner">{mark}<span style={{color:"var(--mute)"}}>EP.{padNum(epNum)} · {dateStr}</span></div>
        <div style={{flex:1,display:"flex",alignItems:"center"}}><div>
          <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:".62rem",letterSpacing:".18em",textTransform:"uppercase",color:"var(--accent)",marginBottom:16}}>▲ EP.{padNum(epNum)} no ar</div>
          <h2 className="ig-headline" style={{fontSize:"clamp(1.5rem,5vw,2.5rem)"}}>{ep.title}</h2>
          {ep.subtitle && <p style={{fontFamily:"'Fraunces',serif",fontStyle:"italic",fontSize:"1rem",color:"var(--ink-soft)",marginTop:16,maxWidth:"32ch"}}>{ep.subtitle}</p>}
        </div></div>
        <div className="ig-corner"><span style={{color:"var(--mute)"}}>SYNCMI.COM</span><span className="ig-tag">LINK NA BIO →</span></div>
      </div></div>;
    }
    if(postType==="cover-accent"){
      return <div className="ig-post ig-1-1 ig-bg-accent"><div className="ig-frame">
        <div className="ig-corner" style={{color:"var(--paper)"}}><span className="ig-mark" style={{color:"var(--paper)"}}><span className="ig-mark-dot" style={{background:"var(--paper)"}}></span> Sync<em style={{color:"var(--ink)"}}>·MI</em></span><span>▲ NOVO</span></div>
        <div style={{flex:1,display:"flex",alignItems:"center"}}>
          <h2 className="ig-headline" style={{fontSize:"clamp(1.7rem,6vw,3rem)",color:"var(--paper)"}}>{ep.title}</h2>
        </div>
        <div className="ig-corner" style={{color:"var(--paper)"}}><span>EP.{padNum(epNum)} · LINK NA BIO</span><span>↗</span></div>
      </div></div>;
    }
    if(postType==="quote"){
      const quote = ep.subtitle || topHeadline?.title || ep.title;
      return <div className="ig-post ig-1-1 ig-bg-paper"><div className="ig-frame">
        <div className="ig-corner"><span>CITAÇÃO</span><span>№ {padNum(epNum)}</span></div>
        <div style={{flex:1,display:"flex",alignItems:"center"}}>
          <h3 style={{fontFamily:"'Fraunces',serif",fontSize:"clamp(1.4rem,4.5vw,2rem)",letterSpacing:"-.02em",lineHeight:1.1,margin:0}}>“{quote}”</h3>
        </div>
        <div className="ig-corner">{mark}<span style={{color:"var(--mute)"}}>EP.{padNum(epNum)}</span></div>
      </div></div>;
    }
    if(postType==="stat"){
      return <div className="ig-post ig-1-1 ig-bg-ink"><div className="ig-frame">
        <div className="ig-corner">{mark}<span>EP.{padNum(epNum)}</span></div>
        <div style={{flex:1,display:"flex",flexDirection:"column",justifyContent:"center"}}>
          <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:".6rem",letterSpacing:".2em",textTransform:"uppercase",color:"var(--signal)",marginBottom:14}}>O TEMA DA SEMANA</div>
          <h2 className="ig-headline" style={{fontSize:"clamp(1.8rem,6vw,2.8rem)"}}>{firstTopic}</h2>
          {topHeadline && <p style={{fontFamily:"'Fraunces',serif",fontStyle:"italic",fontSize:".98rem",opacity:.82,marginTop:16,maxWidth:"34ch"}}>{topHeadline.summary?.slice(0,120)}</p>}
        </div>
        <div className="ig-corner"><span>SYNC·MI · 5MIN</span><span>↗ LINK NA BIO</span></div>
      </div></div>;
    }
    if(postType==="reels"){
      return <div className="ig-post ig-9-16 ig-bg-ink"><div className="ig-frame">
        <div className="ig-corner">{mark}<span>EP.{padNum(epNum)}</span></div>
        <div style={{flex:1,display:"flex",alignItems:"center"}}><div>
          <div className="ig-tag ig-tag-fill" style={{marginBottom:18}}>▲ Esta semana em IA</div>
          <h2 className="ig-headline" style={{fontSize:"clamp(1.8rem,7vw,2.6rem)"}}>{ep.title}</h2>
          {ep.subtitle && <p style={{fontFamily:"'Fraunces',serif",fontStyle:"italic",fontSize:"1.05rem",opacity:.85,marginTop:18}}>{ep.subtitle}</p>}
        </div></div>
        <div style={{textAlign:"center"}}>
          <div className="ig-wave" style={{height:30,marginBottom:14}}>{waveBars.map((h,i)=><span key={i} style={{height:`${h}%`}}/>)}</div>
          <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:".62rem",letterSpacing:".18em",textTransform:"uppercase",opacity:.7}}>deslize ↑ · link na bio</div>
        </div>
      </div></div>;
    }
    if(postType==="infographic"){
      if(!ep.infographicUrl) return <div style={{padding:60,textAlign:"center",border:`1px dashed ${BRAND.rule}`,borderRadius:8,color:BRAND.mute,fontStyle:"italic",fontFamily:"'Fraunces',serif"}}>Este episódio não tem infográfico. Suba um no Passo 5 da Newsletter.</div>;
      return <div className="ig-post ig-bg-paper" style={{aspectRatio:"auto"}}><div style={{padding:"4%"}}>
        <div className="ig-corner" style={{marginBottom:12}}>{mark}<span style={{color:"var(--mute)"}}>EP.{padNum(epNum)} · {dateStr}</span></div>
        <img src={ep.infographicUrl} alt="infográfico" crossOrigin="anonymous" style={{width:"100%",display:"block",borderRadius:4}}/>
      </div></div>;
    }
    return null;
  };

  if(eps.length===0){
    return <div className="fade"><SectionLabel num="📣">Divulgação</SectionLabel>
      <div style={{padding:60,textAlign:"center",border:`1px dashed ${BRAND.rule}`,borderRadius:8,color:BRAND.mute,fontStyle:"italic",fontFamily:"'Fraunces',serif",fontSize:"1.15rem"}}>Publique uma edição primeiro para gerar posts.</div>
    </div>;
  }

  return <div className="fade">
    <SectionLabel num="📣">Divulgação</SectionLabel>
    <p style={{fontFamily:"'Fraunces',serif",fontStyle:"italic",color:BRAND.inkSoft,fontSize:"1.05rem",marginTop:-24,marginBottom:24}}>
      Gere posts do Instagram (baixe o PNG pronto) e o texto para LinkedIn com preview profissional do link.
    </p>

    {/* Episode picker */}
    <div className="card card-pad" style={{padding:20,marginBottom:18,background:`linear-gradient(135deg,${BRAND.paperLight},rgba(229,67,27,.06))`}}>
      <Field label="Episódio">
        <select value={selDate} onChange={e=>setSelDate(e.target.value)} style={{width:"100%",maxWidth:480}}>
          {eps.map(e=><option key={e.date} value={e.date}>EP.{String((newsletters||[]).slice().sort((a,b)=>(a.date||"").localeCompare(b.date||"")).findIndex(n=>n.date===e.date)+1).padStart(2,"0")} · {fmtDate(e.date)} · {e.title}</option>)}
        </select>
      </Field>
    </div>

    {msg.text && <div className={msg.type==="ok"?"alert-ok":msg.type==="err"?"alert-error":"alert-info"} style={{marginBottom:18}}>{msg.text}</div>}

    <div style={{display:"grid",gridTemplateColumns:"minmax(0,1fr) minmax(0,1fr)",gap:24,alignItems:"start"}}>
      {/* LEFT: Instagram studio */}
      <div className="card card-pad" style={{padding:24}}>
        <div className="mono small-caps" style={{color:BRAND.accent,marginBottom:14}}>📸 POST DO INSTAGRAM</div>
        <Field label="Tipo de post" style={{marginBottom:16}}>
          <select value={postType} onChange={e=>setPostType(e.target.value)} style={{width:"100%"}}>
            {IG_POST_TYPES.map(t=><option key={t.id} value={t.id}>{t.group} · {t.label}</option>)}
          </select>
        </Field>

        {/* The rendered post — captured by html2canvas */}
        <div style={{maxWidth:curType.aspect==="9/16"?300:380,margin:"0 auto 16px"}}>
          <div ref={postRef}>{renderPost()}</div>
        </div>

        <div style={{display:"flex",gap:8,justifyContent:"center",flexWrap:"wrap"}}>
          <Btn size="sm" onClick={downloadPng}>⬇ Baixar PNG</Btn>
          <Btn size="sm" variant="ghost" onClick={genCaption} disabled={genState==="ig"||!keyValidated}>{genState==="ig"?<><Spin/> Gerando...</>:"✨ Gerar legenda"}</Btn>
        </div>

        {igCaption && <div style={{marginTop:16}}>
          <div className="mono small-caps" style={{color:BRAND.mute,marginBottom:6,fontSize:".6rem"}}>LEGENDA</div>
          <TArea value={igCaption} onChange={e=>setIgCaption(e.target.value)} rows={7} style={{fontSize:".88rem",lineHeight:1.5}}/>
          <Btn size="sm" variant="ghost" onClick={()=>copyText(igCaption,"igcap")} style={{marginTop:8}}>{copied==="igcap"?"✓ Copiado":"📋 Copiar legenda"}</Btn>
        </div>}
      </div>

      {/* RIGHT: LinkedIn */}
      <div className="card card-pad" style={{padding:24}}>
        <div className="mono small-caps" style={{color:BRAND.accent,marginBottom:14}}>💼 POST DO LINKEDIN</div>

        {/* Link preview mock — how it appears on LinkedIn */}
        <div className="mono small-caps" style={{color:BRAND.mute,marginBottom:8,fontSize:".6rem"}}>PREVIEW DO LINK (como aparece no LinkedIn)</div>
        <div style={{border:`1px solid ${BRAND.rule}`,borderRadius:8,overflow:"hidden",marginBottom:16,background:BRAND.paper}}>
          {ep?.infographicUrl
            ? <img src={ep.infographicUrl} alt="preview" style={{width:"100%",display:"block",maxHeight:200,objectFit:"cover"}}/>
            : <div style={{height:120,display:"flex",alignItems:"center",justifyContent:"center",background:BRAND.ink,color:BRAND.paper,fontFamily:"'Fraunces',serif",fontStyle:"italic",fontSize:".9rem",textAlign:"center",padding:20}}>Sem infográfico — usará a imagem padrão da marca</div>}
          <div style={{padding:"10px 14px"}}>
            <div style={{fontWeight:600,fontSize:".88rem",color:BRAND.ink,marginBottom:3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{ep?.title}</div>
            <div style={{fontSize:".74rem",color:BRAND.mute,fontFamily:"'JetBrains Mono',monospace"}}>{(window.location.host||"podcast-studio-lac.vercel.app")}</div>
          </div>
        </div>

        <Btn size="sm" variant="ghost" onClick={genLinkedin} disabled={genState==="li"||!keyValidated}>{genState==="li"?<><Spin/> Gerando...</>:"✨ Gerar post do LinkedIn"}</Btn>

        {liPost && <div style={{marginTop:16}}>
          <div className="mono small-caps" style={{color:BRAND.mute,marginBottom:6,fontSize:".6rem"}}>TEXTO DO POST</div>
          <TArea value={liPost} onChange={e=>setLiPost(e.target.value)} rows={9} style={{fontSize:".88rem",lineHeight:1.5}}/>
          <Btn size="sm" variant="ghost" onClick={()=>copyText(liPost+"\n\n"+shareUrl,"lipost")} style={{marginTop:8}}>{copied==="lipost"?"✓ Copiado com link":"📋 Copiar post + link"}</Btn>
        </div>}

        <div style={{marginTop:18,paddingTop:16,borderTop:`1px solid ${BRAND.rule}`}}>
          <div className="mono small-caps" style={{color:BRAND.mute,marginBottom:6,fontSize:".6rem"}}>LINK COMPARTILHÁVEL (preview rico)</div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <Input value={shareUrl} readOnly style={{fontSize:".78rem",fontFamily:"'JetBrains Mono',monospace"}}/>
            <Btn size="sm" variant="ghost" onClick={()=>copyText(shareUrl,"share")}>{copied==="share"?"✓":"📋"}</Btn>
          </div>
          <p style={{fontSize:".74rem",color:BRAND.mute,marginTop:8,lineHeight:1.5}}>
            Este link (<code>/api/share</code>) gera o card com imagem ao colar no LinkedIn. Requer a função serverless <code>api/share.js</code> publicada (veja SETUP.md). O link direto do episódio também funciona: <a href={epUrl} target="_blank" rel="noreferrer" style={{color:BRAND.accent}}>abrir página</a>.
          </p>
        </div>
      </div>
    </div>
  </div>;
}

// ADMIN APP (editorial style)

// ═══════════════════════════════════════════════════════════════════════════
// LEARNING DE INOVAÇÃO EDITOR — research, structure, refine via chat, export
// ═══════════════════════════════════════════════════════════════════════════

// Build full standalone HTML in the style of the Sync·MI Learning deep-dive
function renderLearningHTML(L){
  const esc=s=>String(s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
  const md=s=>esc(s||"").split(/\n{2,}/).map(p=>{
    if(p.trim().startsWith("- ")) return "<ul>"+p.split("\n").map(l=>l.replace(/^- /,"")).filter(Boolean).map(l=>"<li>"+l+"</li>").join("")+"</ul>";
    return "<p>"+p.replace(/\n/g,"<br/>")+"</p>";
  }).join("");
  const num=String(L.editionNumber||1).padStart(2,"0");
  const kpis=(L.kpis||[]).map((k,i)=>`<div class="kpi"><div class="kpi-v">${esc(k.value)}</div><div class="kpi-l">${esc(k.label)}</div>${k.note?`<div class="kpi-n">${esc(k.note)}</div>`:""}</div>`).join("");
  const chartMax=Math.max(1,...((L.chartData||[]).map(c=>+c.value||0)));
  const chart=(L.chartData||[]).map(c=>{const pct=Math.round((+c.value||0)/chartMax*100);return `<div class="bar-row"><div class="bar-lbl">${esc(c.label)}</div><div class="bar-wrap"><div class="bar" style="width:${pct}%"><span>${esc(String(c.value))}</span></div></div></div>`;}).join("");
  // ONLY render FAQs marked as selected (user picked from the 10 generated)
  const selectedFaqs = (L.faqs||[]).filter(f=>f.selected);
  const faqs = selectedFaqs.map(f=>`<details class="faq-it"><summary>${esc(f.q)}</summary><div class="faq-a">${md(f.a)}</div></details>`).join("");
  const sources=(L.sources||[]).map((s,i)=>`<li><span class="src-n">${String(i+1).padStart(2,"0")}</span> <a href="${esc(s.url)}" target="_blank" rel="noopener">${esc(s.title)}</a></li>`).join("");
  const chips=(L.chips||[]).map(c=>`<span class="chip">${esc(c)}</span>`).join("");
  // Images with URLs render inline; without URLs they're suggestions only (not shown)
  const imagesWithUrl = (L.images||[]).filter(im=>im.url);
  const images = imagesWithUrl.map(im=>`<figure class="learn-fig"><img src="${esc(im.url)}" alt="${esc(im.alt||im.caption)}" loading="lazy"/>${im.caption?`<figcaption>${esc(im.caption)}</figcaption>`:""}</figure>`).join("");
  return `<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>${esc(L.topic)} — Sync·MI Learning</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

function emptyLearning(){
  return {
    topic:"", title:"", subtitle:"", chips:[],
    sectionTitles:{conceito:"",porQueImporta:"",naPratica:""},
    sections:{conceito:"",porQueImporta:"",naPratica:"",proximasAcoes:""},
    kpis:[], chartData:[], faqs:[], images:[], sources:[], takeaway:"",
    rawHtml:"", preserveRaw:false
  };
}

function tryParseJSON(text){
  if(!text) return null;
  // Extract JSON from possibly-wrapped response
  const cleaned = text.replace(/^```(?:json)?\s*/i,"").replace(/```\s*$/,"").trim();
  // Find first { and last }
  const a = cleaned.indexOf("{"); const b = cleaned.lastIndexOf("}");
  if(a<0||b<0) return null;
  try { return JSON.parse(cleaned.slice(a,b+1)); } catch(_){ return null; }
}

// Parse uploaded HTML into Learning fields. Understands BOTH the Sync·MI template
// (classes .kpi, .faq-it, .takeaway, .sources) AND custom harness-style templates
// (classes .pillar > .pillar-label/.stats > .stat/.num/.lab, <details>, .em-frase, .mkt, .ig-card).
function parseHTMLToLearning(html, topicHint){
  const doc = new DOMParser().parseFromString(html, "text/html");
  const L = emptyLearning();
  L.topic = topicHint || "";
  L.rawHtml = html;          // preserve full source of truth
  L.preserveRaw = true;      // default: keep uploaded HTML as is when publishing

  const text = el => el ? el.textContent.replace(/\s+/g," ").trim() : "";

  // HERO — title (h1), subtitle (.dek or first hero p), chips
  const h1 = doc.querySelector(".hero h1, .hero-inner h1, header h1, h1");
  if(h1) L.title = text(h1);
  const dek = doc.querySelector(".hero .dek, .hero-inner .dek, .dek, .lede");
  if(dek) L.subtitle = text(dek);
  // If no .dek, try the first <p> inside hero
  if(!L.subtitle){
    const heroP = doc.querySelector(".hero p, .hero-inner p, header p");
    if(heroP) L.subtitle = text(heroP);
  }
  const chips = Array.from(doc.querySelectorAll(".chip, .tag.mono, .meta-row .tag")).map(c=>text(c)).filter(Boolean);
  if(chips.length) L.chips = Array.from(new Set(chips)).slice(0,8);

  // Edition number from .bignum or .num inside .pillar-label
  const bignum = doc.querySelector(".bignum");
  if(bignum){
    const m = text(bignum).match(/\d+/);
    if(m) L.editionNumber = parseInt(m[0]);
  }

  // PILLARS — handles both <section class="pillar"> and Sync·MI <section class="pillar">
  const allPillars = Array.from(doc.querySelectorAll("section.pillar, div.pillar, .pillar"));
  // Filter top-level pillars (not nested inside .info-wrap)
  const pillars = allPillars.filter(p => !p.closest(".info-wrap, .info-view, #info-view"));
  const sectionKeys = ["conceito","porQueImporta","naPratica","proximasAcoes"];
  let pIdx = 0;

  pillars.forEach(p => {
    const isFAQ = p.classList.contains("faq") || /faq|perguntas frequentes/i.test(text(p.querySelector(".pillar-label, .p-num, h2"))||"");
    const h2 = p.querySelector("h2, .p-title");
    const label = p.querySelector(".pillar-label, .p-num");

    if(isFAQ){
      // FAQ: gather <details> children (harness) OR .faq-it (Sync·MI)
      const items = p.querySelectorAll(":scope > details, :scope > .faq-it, details, .faq-it");
      const faqs = Array.from(items).map(d=>{
        const summ = d.querySelector("summary");
        const ans = d.querySelector(".a, .faq-a");
        const q = summ ? text(summ) : "";
        let a = "";
        if(ans) a = text(ans);
        else if(summ){
          // fallback: textContent minus summary
          const full = text(d);
          a = full.startsWith(q) ? full.slice(q.length).trim() : full;
        }
        return { q, a, selected: false };
      }).filter(x=>x.q);
      // Mark first 5 as selected (typical: published HTML already has only 5)
      faqs.forEach((f,i)=>{ f.selected = i < Math.min(5, faqs.length); });
      L.faqs = faqs;
      return; // FAQ doesn't advance section index
    }

    // Regular content pillar
    if(pIdx >= 4) return;
    const k = sectionKeys[pIdx];

    // Section title — prefer h2 text; if h2 is rich (has <em>), keep textContent
    if(h2 && pIdx < 3) L.sectionTitles[k] = text(h2);

    // Body: collect <p>, <ul>, <ol>, <blockquote> in DOM order (top-level children of the pillar)
    let body = "";
    Array.from(p.children).forEach(c => {
      const tag = c.nodeName;
      if(tag === "H2" || c.classList?.contains("pillar-label")) return; // skip title block
      if(c.classList?.contains("stats") || c.classList?.contains("kpis")) return; // KPIs handled separately
      if(tag === "FIGURE" || c.tagName === "FIGURE") return; // skip svg/figure
      if(tag === "P"){
        const t = text(c);
        if(t) body += t + "\n\n";
      } else if(tag === "UL" || tag === "OL"){
        Array.from(c.querySelectorAll(":scope > li")).forEach(li=>{
          body += "- " + text(li) + "\n";
        });
        body += "\n";
      } else if(tag === "BLOCKQUOTE"){
        body += "> " + text(c) + "\n\n";
      }
    });
    L.sections[k] = body.trim();

    // KPIs in this pillar — both .stats > .stat (harness) and .kpis > .kpi (Sync·MI)
    const stats = p.querySelectorAll(".stats > .stat, .stat, .kpi");
    stats.forEach(s => {
      const num = s.querySelector(".num, .kpi-v");
      const lab = s.querySelector(".lab, .kpi-l");
      const note = s.querySelector(".kpi-n");
      const labText = lab ? lab.innerHTML.replace(/<br\s*\/?>/gi,"\n").replace(/<[^>]+>/g,"") : "";
      const labLines = labText.split(/\n+/).map(x=>x.trim()).filter(Boolean);
      L.kpis.push({
        value: text(num),
        label: labLines[0] || "",
        note: note ? text(note) : labLines.slice(1).join(" — ")
      });
    });

    pIdx++;
  });

  // Fallback / merge: KPIs from infographic .mkt cards (.mkt > .n + .l)
  if(L.kpis.length < 3){
    const mkts = doc.querySelectorAll(".mkt, .ig-stat, .info-card");
    mkts.forEach(m => {
      const n = m.querySelector(".n, .num, .kpi-v, .ig-num");
      const l = m.querySelector(".l, .lab, .kpi-l, .ig-lab");
      const note = m.querySelector(".ig-note, .kpi-n, p");
      if(n && text(n).match(/\d/)){
        // avoid duplicates
        const v = text(n);
        if(!L.kpis.some(k=>k.value===v)){
          L.kpis.push({ value: v, label: l ? text(l) : "", note: note ? text(note).slice(0,120) : "" });
        }
      }
    });
  }

  // Chart data — try to extract from SVG bars if main has none (best effort)
  if(L.chartData.length === 0){
    const ladders = doc.querySelectorAll(".ladder .bar, .bar-row, .chart .row, .bars .bar, [data-bar]");
    ladders.forEach(b => {
      const label = b.querySelector(".name, .bar-lbl, .bar-label, .lbl") || b;
      const val = b.querySelector(".val, .bar span, .value, [data-val]");
      const txt = (val ? text(val) : "") || b.getAttribute("data-val") || "";
      const m = txt.match(/[\d.]+/);
      const lblTxt = (label && label!==b) ? text(label) : "";
      if(lblTxt && m) L.chartData.push({ label: lblTxt, value: parseFloat(m[0]) });
    });
  }

  // TAKEAWAY — .em-frase p (harness) or .takeaway (Sync·MI)
  const tk = doc.querySelector(".em-frase p, .takeaway p, .takeaway");
  if(tk) L.takeaway = text(tk).replace(/^["'""\u201C\u201D]+|["'""\u201C\u201D]+$/g, "");

  // SOURCES — handles harness <ol><li>Title — <a>link</a></li> and Sync·MI structured list
  const sourceItems = doc.querySelectorAll(".sources ol li, .sources li, ol.sources li");
  L.sources = Array.from(sourceItems).map(li => {
    const a = li.querySelector("a");
    const url = a ? (a.getAttribute("href") || a.href || "") : "";
    let title = text(li);
    // If anchor exists, build a clean "Outlet — Article title" format
    if(a){
      const anchorText = text(a);
      const beforeAnchor = (li.textContent.split(anchorText)[0]||"").replace(/[—–-]\s*$/,"").trim();
      title = beforeAnchor ? `${beforeAnchor} — ${anchorText}` : anchorText;
    }
    return { title: title.replace(/\s+/g," ").trim(), url };
  }).filter(s => s.title);

  // IMAGES — collect <img> with alt/captions
  const figures = doc.querySelectorAll("figure");
  L.images = Array.from(figures).map(f => {
    const img = f.querySelector("img");
    const cap = f.querySelector("figcaption");
    return {
      caption: cap ? text(cap) : "",
      query: "",
      alt: img ? (img.getAttribute("alt") || "") : "",
      url: img ? (img.getAttribute("src") || "") : ""
    };
  }).filter(x => x.url || x.caption);

  return L;
}
