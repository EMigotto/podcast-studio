// DB LAYER — with separate storage for large blobs (videos)
// ═════════════════════════════════════════════════════════════════════════════

const hasClaudeStorage = () => typeof window !== "undefined" && window.storage;

const db = {
  async get(key) {
    try {
      if (hasClaudeStorage()) {
        const r = await window.storage.get(key);
        return r ? JSON.parse(r.value) : null;
      }
      const v = localStorage.getItem(key);
      return v ? JSON.parse(v) : null;
    } catch (e) {
      console.error("db.get error", key, e);
      return null;
    }
  },
  async set(key, value) {
    const json = JSON.stringify(value);
    try {
      if (hasClaudeStorage()) {
        await window.storage.set(key, json);
      } else {
        localStorage.setItem(key, json);
      }
      return { ok: true };
    } catch (e) {
      console.error("db.set FAILED", key, "size:", json.length, e);
      return { ok: false, error: e.message, size: json.length };
    }
  },
  async delete(key) {
    try {
      if (hasClaudeStorage()) await window.storage.delete(key);
      else localStorage.removeItem(key);
      return { ok: true };
    } catch { return { ok: false }; }
  },
  async listByPrefix(prefix) {
    try {
      if (hasClaudeStorage()) {
        const r = await window.storage.list(prefix);
        if (!r?.keys) return [];
        const items = await Promise.all(r.keys.map(k => db.get(k)));
        return items.filter(Boolean);
      }
      const items = [];
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k?.startsWith(prefix)) {
          const v = localStorage.getItem(k);
          if (v) try { items.push(JSON.parse(v)); } catch {}
        }
      }
      return items;
    } catch { return []; }
  },
  async listEpisodes() {
    const items = await db.listByPrefix("episode:");
    return items.sort((a, b) => (b.createdAt||0) - (a.createdAt||0));
  },
  async listNewsletters() {
    const items = await db.listByPrefix("newsletter:");
    return items.sort((a, b) => (b.date||"").localeCompare(a.date||""));
  },
  // Save big blob separately so it doesn't bloat the newsletter record
  async saveVideoBlob(blobKey, dataUrl) {
    return await db.set(blobKey, { data: dataUrl, savedAt: Date.now() });
  },
  async getVideoBlob(blobKey) {
    const r = await db.get(blobKey);
    return r?.data || null;
  },
};

async function callAnthropic(apiKey, body) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify(body),
  });
  const text = await res.text();
  let data; try { data = JSON.parse(text); } catch { data = { raw: text }; }
  if (!res.ok) {
    const err = new Error(data?.error?.message || `HTTP ${res.status}`);
    err.status = res.status; err.data = data; throw err;
  }
  return data;
}

async function callClaude(apiKey, userPrompt, useSearch = false, maxTokens = 1500, systemPrompt = null) {
  const body = { model: ANTHROPIC_MODEL, max_tokens: maxTokens, messages: [{ role: "user", content: userPrompt }] };
  if (systemPrompt) body.system = systemPrompt;
  if (useSearch) body.tools = [{ type: "web_search_20250305", name: "web_search" }];
  let data = await callAnthropic(apiKey, body);
  let text = (data.content || []).filter(b => b.type === "text").map(b => b.text).join("");
  if (text.trim()) return text;
  if (useSearch && data.stop_reason === "tool_use") {
    const toolResults = (data.content || [])
      .filter(b => b.type === "tool_use")
      .map(b => ({ type: "tool_result", tool_use_id: b.id, content: "Search executed." }));
    const body2 = {
      model: ANTHROPIC_MODEL, max_tokens: maxTokens,
      tools: [{ type: "web_search_20250305", name: "web_search" }],
      messages: [
        { role: "user", content: userPrompt },
        { role: "assistant", content: data.content },
        { role: "user", content: toolResults },
      ],
    };
    if (systemPrompt) body2.system = systemPrompt;
    data = await callAnthropic(apiKey, body2);
    return (data.content || []).filter(b => b.type === "text").map(b => b.text).join("");
  }
  return text;
}

// VIDEO PLAYER (smart: detects HeyGen, YouTube, Vimeo, mp4, data URL)
// ═════════════════════════════════════════════════════════════════════════════

function getVideoEmbedInfo(url) {
  if (!url) return null;
  if (url.includes("app.heygen.com/videos/") || url.includes("share.heygen.com")) {
    return { type: "iframe", src: url };
  }
  const ytMatch = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]+)/);
  if (ytMatch) return { type: "iframe", src: `https://www.youtube.com/embed/${ytMatch[1]}` };
  const vimeoMatch = url.match(/vimeo\.com\/(\d+)/);
  if (vimeoMatch) return { type: "iframe", src: `https://player.vimeo.com/video/${vimeoMatch[1]}` };
  if (url.startsWith("data:video") || /\.(mp4|webm|ogg|mov|m4v)(\?|$)/i.test(url)) {
    return { type: "video", src: url };
  }
  if (url.includes("heygen.ai") && url.includes(".mp4")) return { type: "video", src: url };
  return { type: "iframe", src: url };
}

const VideoPlayer = memo(function VideoPlayer({ url, poster, maxHeight = 480 }) {
  const info = getVideoEmbedInfo(url);
  if (!info) return null;
  if (info.type === "video") {
    return (
      <video controls poster={poster} style={{ width:"100%", borderRadius:12, background:"#000", maxHeight, display:"block" }}>
        <source src={info.src} />
      </video>
    );
  }
  return (
    <div style={{ position:"relative", paddingBottom:"56.25%", height:0, overflow:"hidden", borderRadius:12, background:"#000" }}>
      <iframe src={info.src}
        style={{ position:"absolute", top:0, left:0, width:"100%", height:"100%", border:0, borderRadius:12 }}
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen"
        allowFullScreen title="Video Player" />
    </div>
  );
});

function openMailto(toList, subject, body) {
  const recipients = (toList || "").split(/[,;\n]/).map(s => s.trim()).filter(s => s.includes("@")).join(",");
  const url = `mailto:${recipients}?subject=${encodeURIComponent(subject || "")}&body=${encodeURIComponent(body || "")}`;
  window.open(url, "_blank");
}

async function sendTeamsWebhook(webhookUrl, title, body, videoUrl) {
  if (!webhookUrl?.startsWith("https://")) throw new Error("URL Teams inválida");
  const card = {
    "@type": "MessageCard", "@context": "https://schema.org/extensions",
    summary: title, themeColor: BRAND.navy.replace("#", ""),
    title: title || "🎙️ Syncronize-MI", text: body || "",
    potentialAction: videoUrl ? [{ "@type": "OpenUri", name: "▶️ Assistir", targets: [{ os: "default", uri: videoUrl }] }] : [],
  };
  await fetch(webhookUrl, { method: "POST", mode: "no-cors", headers: { "Content-Type": "application/json" }, body: JSON.stringify(card) });
  return { ok: true };
}

const fmtDate = (iso) => { if (!iso) return ""; const [y, m, d] = iso.split("-"); return `${d}/${m}/${y}`; };

const estimateReadTime = (text) => {
  if (!text) return 0;
  return Math.max(1, Math.round(text.split(/\s+/).filter(Boolean).length / 200));
};
const getShareUrl = (date) => {

  return url.toString();

// Theme hook
function useTheme(storageKey = "user:theme", defaultTheme = "light") {
  const [theme, setTheme] = useState(defaultTheme);
  useEffect(() => {
    const saved = localStorage.getItem(storageKey);
    if (saved) setTheme(saved);
  }, [storageKey]);
  const toggle = () => {
    const next = theme === "light" ? "dark" : "light";
    setTheme(next);
    localStorage.setItem(storageKey, next);
  };
  return [theme, toggle];
}

const Btn = memo(function Btn({ onClick, disabled, secondary, danger, success, gold, sage, children, style = {} }) {
  let bg, color, border, shadow;
  if (success) { bg = `linear-gradient(135deg, ${BRAND.sageDark}, ${BRAND.sage})`; color = "#fff"; border = "none"; shadow = `0 2px 10px ${BRAND.sage}40`; }
  else if (gold) { bg = `linear-gradient(135deg, ${BRAND.goldDark}, ${BRAND.gold})`; color = "#fff"; border = "none"; shadow = `0 2px 10px ${BRAND.gold}40`; }
  else if (sage) { bg = `linear-gradient(135deg, ${BRAND.sageDark}, ${BRAND.sage})`; color = "#fff"; border = "none"; shadow = `0 2px 10px ${BRAND.sage}40`; }
  else if (danger) { bg = "rgba(180,40,40,.12)"; color = "#c84545"; border = "1px solid rgba(180,40,40,.3)"; shadow = "none"; }
  else if (secondary) { bg = "transparent"; color = BRAND.muted; border = `1px solid ${BRAND.muted}40`; shadow = "none"; }
  else { bg = `linear-gradient(135deg, ${BRAND.navyDeep}, ${BRAND.navy})`; color = "#fff"; border = "none"; shadow = `0 2px 10px ${BRAND.navy}40`; }
  return (
    <button onClick={onClick} disabled={disabled} style={{
      padding:"9px 16px", borderRadius:8, fontSize:12, fontWeight:600,
      cursor: disabled ? "not-allowed" : "pointer", opacity: disabled ? .45 : 1,
      display:"inline-flex", alignItems:"center", gap:7, fontFamily:"'Outfit',sans-serif",
      transition:"all .15s", background: bg, color, border,
      boxShadow: !disabled ? shadow : "none",
      ...style,
    }}>{children}</button>
  );
});

const ErrorBox = memo(function ErrorBox({ msg }) {
  if (!msg) return null;
  return <div style={{ background:"rgba(200,69,69,.08)", border:"1px solid rgba(200,69,69,.3)", borderRadius:8, padding:"9px 13px", fontSize:11, color:"#c84545", marginTop:10 }}>⚠️ {msg}</div>;
});

const InfoBox = memo(function InfoBox({ msg }) {
  if (!msg) return null;
  return <div style={{ background:`${BRAND.sage}20`, border:`1px solid ${BRAND.sage}50`, borderRadius:8, padding:"9px 13px", fontSize:11, color:BRAND.sageDark, marginTop:10 }}>✅ {msg}</div>;
});

const Spinner = memo(function Spinner({ light }) {
  return <span className="spin" style={{ display:"inline-block", width:13, height:13, border:`2px solid ${light ? BRAND.navy + "20" : "rgba(255,255,255,.2)"}`, borderTopColor: light ? BRAND.navy : "#fff", borderRadius:"50%", flexShrink:0 }} />;
});

const ThemeToggle = memo(function ThemeToggle({ theme, onToggle, style = {} }) {
  return (
    <button onClick={onToggle} title={theme === "light" ? "Modo escuro" : "Modo claro"} style={{
      background:"transparent", border:`1px solid ${theme === "dark" ? "rgba(255,255,255,.15)" : BRAND.muted + "40"}`,
      color: theme === "dark" ? BRAND.gold : BRAND.navy,
      padding:"7px 12px", borderRadius:8, fontSize:14, cursor:"pointer",
      fontFamily:"'Outfit',sans-serif",
      ...style,
    }}>
      {theme === "light" ? "🌙" : "☀️"}
    </button>
  );
});

// ═════════════════════════════════════════════════════════════════════════════
// PUBLIC NEWSLETTER
// ═════════════════════════════════════════════════════════════════════════════

function PublicNewsletter() {
  const [newsletters, setNewsletters] = useState([]);
  const [selectedDate, setSelectedDate] = useState(null);
  const [loading, setLoading] = useState(true);
  const [filter, setFilter] = useState("all");
  const [shareCopied, setShareCopied] = useState(false);
  const [theme, toggleTheme] = useTheme("user:newsletter_theme", "light");
  const [videoBlob, setVideoBlob] = useState(null);

  const isDark = theme === "dark";

  useEffect(() => {
    document.body.classList.toggle("newsletter-dark", isDark);
    return () => document.body.classList.remove("newsletter-dark");
  }, [isDark]);

  useEffect(() => {
    (async () => {
      const items = await db.listNewsletters();
      setNewsletters(items);
      const params = new URLSearchParams(window.location.search);
      const urlDate = params.get("date");
      if (urlDate && items.find(n => n.date === urlDate)) setSelectedDate(urlDate);
      else if (items.length > 0) setSelectedDate(items[0].date);
      else setSelectedDate(today());
      setLoading(false);
    })();
  }, []);

  // Load video blob from separate storage if podcastUrl points to blob ref
  useEffect(() => {
    if (!selectedDate) return;
    const current = newsletters.find(n => n.date === selectedDate);
    if (current?.podcastBlobRef) {
      db.getVideoBlob(current.podcastBlobRef).then(setVideoBlob);
    } else {
      setVideoBlob(null);
    }
  }, [selectedDate, newsletters]);

  useEffect(() => {
    if (!selectedDate || loading) return;
    const url = new URL(window.location.href);
    url.searchParams.set("view", "public");
    url.searchParams.set("date", selectedDate);
    window.history.replaceState({}, "", url.toString());
  }, [selectedDate, loading]);

  const current = newsletters.find(n => n.date === selectedDate);
  const effectivePodcastUrl = videoBlob || current?.podcastUrl;
  const podcastValid = effectivePodcastUrl && (!current?.podcastExpiresAt || !isExpired(current.podcastExpiresAt));

  const filteredHeadlines = useMemo(() => {
    if (!current?.headlines) return [];
    if (filter === "all") return current.headlines;
    return current.headlines.filter(h => h.category === filter);
  }, [current, filter]);

  const categoriesInUse = useMemo(() => {
    if (!current?.headlines) return [];
    return Array.from(new Set(current.headlines.map(h => h.category).filter(Boolean)));
  }, [current]);

  const readTime = useMemo(() => {
    if (!current) return 0;
    return estimateReadTime((current.aiSummary || "") + " " + (current.headlines || []).map(h => h.summary).join(" "));
  }, [current]);

  const handleShare = async () => {
    const url = getShareUrl(selectedDate);
    const title = current?.title || `Syncronize-MI · ${fmtDate(selectedDate)}`;
    const text = current?.subtitle || "Atualizações de IA para quem tem pouco tempo";
    if (navigator.share) {
      try { await navigator.share({ title, text, url }); return; } catch {}
    }
    try {
      await navigator.clipboard.writeText(url);
      setShareCopied(true);
      setTimeout(() => setShareCopied(false), 2500);
    } catch {}
  };

  const copyShareUrl = async () => {
    await navigator.clipboard.writeText(getShareUrl(selectedDate));
    setShareCopied(true);
    setTimeout(() => setShareCopied(false), 2500);
  };

  // Theme variables
  const T = isDark ? {
    bg: BRAND.ink,
    bgAlt: BRAND.navyDeep,
    text: BRAND.cream,
    textMuted: "#9ba8b8",
    cardBg: "rgba(255,255,255,.03)",
    cardBorder: "rgba(255,255,255,.08)",
    cardShadow: "none",
    cardShadowHover: `0 8px 30px ${BRAND.gold}20`,
    accent1: BRAND.gold,
    accent2: BRAND.sage,
    accent3: "#5a8fc7",
    heroGradient: `linear-gradient(135deg, ${BRAND.navyDeep} 0%, ${BRAND.navy} 100%)`,
    titleColor: BRAND.cream,
    titleAccent: BRAND.gold,
  } : {
    bg: BRAND.cream,
    bgAlt: BRAND.creamSoft,
    text: BRAND.ink,
    textMuted: BRAND.muted,
    cardBg: "#fff",
    cardBorder: "rgba(31,58,92,.12)",
    cardShadow: "0 2px 14px rgba(31,58,92,.04)",
    cardShadowHover: "0 8px 30px rgba(31,58,92,.12)",
    accent1: BRAND.navy,
    accent2: BRAND.sageDark,
    accent3: BRAND.goldDark,
    heroGradient: `linear-gradient(135deg, ${BRAND.cream} 0%, ${BRAND.creamSoft} 100%)`,
    titleColor: BRAND.ink,
    titleAccent: BRAND.navy,
  };

  if (loading) {
    return (
      <div style={{ background: T.bg, minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", color: T.textMuted }}>
        <div style={{ textAlign:"center" }}>
          <div className="float" style={{ fontSize:48, marginBottom:12 }}>🧠</div>
          <div style={{ fontFamily:"'Fraunces',serif", fontStyle:"italic" }}>Carregando edição...</div>
        </div>
      </div>
    );
  }

  return (
    <div style={{ background: T.bg, minHeight:"100vh", color: T.text, transition:"all .3s" }}>
      {/* HERO */}
      <div style={{
        background: T.heroGradient,
        borderBottom: `1px solid ${T.cardBorder}`,
        padding: "28px 24px 20px", position:"relative", overflow:"hidden",
      }}>
        {/* Decorative geometric shapes (poster-inspired) */}
        <div style={{
          position:"absolute", top: -60, right: -40, width: 200, height: 200,
          background: BRAND.navy, opacity: isDark ? .25 : .12,
          clipPath: "polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%)",
          pointerEvents:"none",
        }} />
        <div style={{
          position:"absolute", bottom: -50, left: -30, width: 180, height: 180,
          background: BRAND.sage, opacity: isDark ? .15 : .25,
          clipPath: "polygon(0% 0%, 100% 30%, 70% 100%, 0% 80%)",
          pointerEvents:"none",
        }} />
        <div style={{
          position:"absolute", top: 30, right: 100, width: 140, height: 140,
          background: BRAND.gold, opacity: isDark ? .15 : .25,
          clipPath: "polygon(20% 0%, 100% 50%, 80% 100%, 0% 60%)",
          pointerEvents:"none",
        }} />

        <div style={{ maxWidth:1100, margin:"0 auto", position:"relative" }}>
          <div style={{ display:"flex", alignItems:"center", gap:14, marginBottom:6, flexWrap:"wrap" }}>
            <div style={{
              width:54, height:54, borderRadius:14,
              background: T.titleAccent,
              display:"flex", alignItems:"center", justifyContent:"center",
              fontSize:26, color:"#fff",
              boxShadow:`0 6px 20px ${T.titleAccent}60`,
            }}>🧠</div>
            <div style={{ flex:1, minWidth:200 }}>
              <div style={{
                fontFamily:"'Fraunces',serif", fontSize:34, fontWeight:800,
                letterSpacing:"-.035em", lineHeight:1, color: T.titleColor,
              }}>
                Syncronize-MI
              </div>
              <div style={{
                fontFamily:"'Fraunces',serif", fontStyle:"italic", fontWeight:400,
                fontSize:13, color: T.textMuted, marginTop:4,
              }}>
                Atualizações de Inteligência Artificial para quem tem pouco tempo
              </div>
            </div>

            <div style={{ display:"flex", gap:8, alignItems:"center", flexWrap:"wrap" }}>
              <ThemeToggle theme={theme} onToggle={toggleTheme} />
              <button onClick={handleShare} style={{
                background: `linear-gradient(135deg, ${T.titleAccent}, ${BRAND.navyLight})`,
                border:"none", color:"#fff", padding:"8px 16px", borderRadius:8,
                fontSize:12, fontWeight:600, cursor:"pointer", fontFamily:"'Outfit',sans-serif",
                display:"flex", alignItems:"center", gap:6,
                boxShadow:`0 4px 14px ${T.titleAccent}40`,
              }}>
                {shareCopied ? "✓ Link copiado!" : "🔗 Compartilhar"}
              </button>
              <a href="?view=admin" style={{
                fontSize:10, color: T.textMuted, textDecoration:"none",
                padding:"7px 12px", borderRadius:8,
                border: `1px solid ${T.cardBorder}`,
              }}>Admin →</a>
            </div>
          </div>

          {newsletters.length > 0 && (
            <div style={{
              display:"flex", alignItems:"center", gap:10, flexWrap:"wrap",
              marginTop:18, paddingTop:18, borderTop: `1px solid ${T.cardBorder}`,
            }}>
              <span style={{ fontSize:10, color: T.textMuted, fontWeight:700, letterSpacing:".1em", textTransform:"uppercase" }}>📆 Edições</span>
              {newsletters.slice(0, 14).map(n => {
                const sel = selectedDate === n.date;
                return (
                  <button key={n.date} onClick={() => setSelectedDate(n.date)} style={{
                    background: sel ? T.titleAccent : (isDark ? "rgba(255,255,255,.05)" : "#fff"),
                    border: `1px solid ${sel ? T.titleAccent : T.cardBorder}`,
                    color: sel ? "#fff" : T.text,
                    borderRadius:7, padding:"6px 12px", fontSize:11, cursor:"pointer",
                    fontFamily:"'JetBrains Mono',monospace", fontWeight:600,
                    boxShadow: sel ? `0 4px 14px ${T.titleAccent}40` : "none",
                  }}>
                    {fmtDateShort(n.date)}
                    {n.podcastUrl && (!n.podcastExpiresAt || !isExpired(n.podcastExpiresAt)) && <span style={{ marginLeft:5 }}>🎙️</span>}
                  </button>
                );
              })}
            </div>
          )}
        </div>
      </div>

      {/* MAIN */}
      <div style={{ maxWidth:1100, margin:"0 auto", padding:"32px 24px 60px" }}>
        {!current ? (
          <div style={{
            border: `2px dashed ${T.cardBorder}`,
            borderRadius:16, padding:"80px 20px",
            textAlign:"center", color: T.textMuted,
            background: T.cardBg,
          }}>
            <div className="float" style={{ fontSize:48, marginBottom:14 }}>📭</div>
            <div style={{ fontSize:18, fontWeight:600, color: T.text, fontFamily:"'Fraunces',serif" }}>Nenhuma edição disponível</div>
          </div>
        ) : (
          <div className="fade">
            <div style={{ marginBottom:28 }}>
              <div style={{
                display:"inline-block", fontSize:11, fontWeight:700, letterSpacing:".15em",
                textTransform:"uppercase", color: T.titleAccent, marginBottom:10,
              }}>
                ◆ Edição de {fmtDateLong(current.date)}
              </div>
              <h1 style={{
                fontFamily:"'Fraunces',serif", fontSize:"clamp(34px, 5.5vw, 56px)", fontWeight:800,
                color: T.titleColor, margin:"4px 0 0",
                letterSpacing:"-.035em", lineHeight:1.05,
              }}>
                {current.title || "Highlights de IA"}
              </h1>
              {current.subtitle && (
                <div style={{
                  fontSize:19, color: T.textMuted, marginTop:14, lineHeight:1.55, maxWidth:780,
                  fontFamily:"'Fraunces',serif", fontWeight:400, fontStyle:"italic",
                }}>
                  {current.subtitle}
                </div>
              )}
              <div style={{ display:"flex", gap:14, marginTop:16, fontSize:11, color: T.textMuted, flexWrap:"wrap" }}>
                {readTime > 0 && <span>📖 {readTime} min de leitura</span>}
                {current.headlines?.length > 0 && <span>📰 {current.headlines.length} notícia{current.headlines.length !== 1 ? "s" : ""}</span>}
                {podcastValid && <span style={{ color: T.titleAccent, fontWeight:600 }}>🎙️ Podcast disponível</span>}
              </div>
            </div>

            {/* PODCAST */}
            {podcastValid && (
              <div style={{
                background: T.cardBg,
                border: `1px solid ${T.cardBorder}`,
                borderRadius:16, padding:24, marginBottom:30,
                boxShadow: T.cardShadow,
                position:"relative", overflow:"hidden",
              }}>
                <div style={{
                  position:"absolute", top:0, left:0, right:0, height:4,
                  background:`linear-gradient(90deg, ${BRAND.navy}, ${BRAND.sage}, ${BRAND.gold})`,
                }} />
                <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:14, flexWrap:"wrap", gap:10 }}>
                  <div style={{ display:"flex", alignItems:"center", gap:12 }}>
                    <div style={{
                      width:42, height:42, borderRadius:11, background: T.titleAccent,
                      display:"flex", alignItems:"center", justifyContent:"center",
                      fontSize:22, color:"#fff",
                      boxShadow:`0 4px 14px ${T.titleAccent}40`,
                    }}>🎙️</div>
                    <div>
                      <div style={{ fontSize:14, fontWeight:700, color: T.text, fontFamily:"'Fraunces',serif", fontStyle:"italic" }}>
                        {current.podcastTitle || "Podcast da Semana"}
                      </div>
                      <div style={{ fontSize:11, color: T.textMuted, marginTop:2 }}>
                        Syncronize-MI {current.podcastDuration ? `· ${current.podcastDuration} min` : ""}
                      </div>
                    </div>
                  </div>
                  {current.podcastExpiresAt && (
                    <div style={{
                      fontSize:10, padding:"4px 10px", borderRadius:6,
                      background: `${BRAND.gold}25`, color: BRAND.goldDark,
                      fontFamily:"'JetBrains Mono',monospace", fontWeight:600,
                    }}>
                      ⏰ até {new Date(current.podcastExpiresAt).toLocaleDateString("pt-BR")}
                    </div>
                  )}
                </div>
                <VideoPlayer url={effectivePodcastUrl} poster={current.podcastThumbnail} maxHeight={520} />
              </div>
            )}

            {current?.podcastUrl && !podcastValid && (
              <div style={{
                background: `${BRAND.gold}15`, border: `1px solid ${BRAND.gold}40`,
                borderRadius:11, padding:14, marginBottom:24, fontSize:12, color: BRAND.goldDark,
              }}>
                ⏰ O podcast desta edição expirou.
              </div>
            )}

            {/* SUMMARY */}
            {current.aiSummary && (
              <div style={{
                background: T.cardBg, border: `1px solid ${T.cardBorder}`,
                borderRadius:16, padding:28, marginBottom:30,
                boxShadow: T.cardShadow, position:"relative", overflow:"hidden",
              }}>
                <div style={{
                  position:"absolute", top:0, left:0, bottom:0, width:5,
                  background: T.titleAccent,
                }} />
                <div style={{ paddingLeft:14 }}>
                  <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:14 }}>
                    <span style={{
                      fontSize:11, fontWeight:700, letterSpacing:".15em", textTransform:"uppercase",
                      color: T.titleAccent,
                    }}>🧠 Análise da Semana</span>
                  </div>
                  <div style={{
                    fontFamily:"'Fraunces',serif", fontSize:18, lineHeight:1.7,
                    color: T.text, whiteSpace:"pre-wrap", fontWeight:400,
                  }}>{current.aiSummary}</div>
                </div>
              </div>
            )}

            {/* FOCUS INSIGHTS */}
            {current.focusInsights && current.focusInsights.length > 0 && (
              <div style={{ marginBottom:30 }}>
                <div style={{
                  fontSize:11, color: T.textMuted, fontWeight:700,
                  letterSpacing:".15em", textTransform:"uppercase", marginBottom:14,
                  display:"flex", alignItems:"center", gap:8,
                }}>
                  <span style={{ width:24, height:1, background: T.cardBorder }} />
                  Temas em Destaque
                  <span style={{ flex:1, height:1, background: T.cardBorder }} />
                </div>
                <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(280px, 1fr))", gap:14 }}>
                  {FOCUS_AREAS.map((area, i) => {
                    const insight = current.focusInsights.find(x => x.area === area.id);
                    if (!insight?.summary) return null;
                    const colors = [T.accent1, T.accent2, T.accent3];
                    const color = colors[i] || T.titleAccent;
                    return (
                      <div key={area.id} style={{
                        background: T.cardBg, border: `1px solid ${T.cardBorder}`,
                        borderRadius:14, padding:20, boxShadow: T.cardShadow,
                        position:"relative", overflow:"hidden", transition:"all .25s",
                      }}>
                        <div style={{ position:"absolute", top:0, left:0, bottom:0, width:4, background:color }} />
                        <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:10, paddingLeft:8 }}>
                          <div style={{
                            width:36, height:36, borderRadius:10,
                            background: `${color}20`, color: color,
                            display:"flex", alignItems:"center", justifyContent:"center", fontSize:18,
                          }}>{area.icon}</div>
                          <div style={{ fontSize:11, color: color, fontWeight:700, letterSpacing:".05em", textTransform:"uppercase" }}>
                            {area.label}
                          </div>
                        </div>
                        <div style={{ fontSize:14, color: T.text, lineHeight:1.6, paddingLeft:8 }}>
                          {insight.summary}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* HEADLINES */}
            {current.headlines && current.headlines.length > 0 && (
              <div>
                <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:16, flexWrap:"wrap", gap:10 }}>
                  <div style={{ fontSize:11, color: T.textMuted, fontWeight:700, letterSpacing:".15em", textTransform:"uppercase" }}>
                    📰 Notícias da Semana ({filteredHeadlines.length}/{current.headlines.length})
                  </div>
                  {categoriesInUse.length > 1 && (
                    <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                      <button onClick={() => setFilter("all")} style={{
                        padding:"4px 10px", borderRadius:6, fontSize:10, fontWeight:600, cursor:"pointer",
                        background: filter === "all" ? T.text : "transparent",
                        color: filter === "all" ? T.bg : T.textMuted,
                        border: `1px solid ${filter === "all" ? T.text : T.cardBorder}`,
                        fontFamily:"'Outfit',sans-serif",
                      }}>Todas</button>
                      {categoriesInUse.map(cat => {
                        const sel = filter === cat;
                        const cs = catStyle(cat, isDark);
                        return (
                          <button key={cat} onClick={() => setFilter(cat)} style={{
                            padding:"4px 10px", borderRadius:6, fontSize:10, fontWeight:600, cursor:"pointer",
                            background: sel ? cs.background : "transparent",
                            color: sel ? cs.color : T.textMuted,
                            border: `1px solid ${sel ? cs.color + "60" : T.cardBorder}`,
                            fontFamily:"'Outfit',sans-serif",
                          }}>{cat}</button>
                        );
                      })}
                    </div>
                  )}
                </div>

                <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(330px, 1fr))", gap:16 }}>
                  {filteredHeadlines.map((h, i) => {
                    const cs = catStyle(h.category, isDark);
                    const featured = i === 0 && filter === "all";
                    return (
                      <div key={i} style={{
                        gridColumn: featured ? "1 / -1" : "auto",
                        background: T.cardBg, border: `1px solid ${T.cardBorder}`,
                        borderRadius:14, padding: featured ? 24 : 18,
                        cursor: h.url ? "pointer" : "default", transition:"all .2s",
                        boxShadow: T.cardShadow,
                      }}
                      onClick={() => h.url && window.open(h.url, "_blank", "noopener,noreferrer")}
                      onMouseEnter={e => { if (h.url) { e.currentTarget.style.boxShadow = T.cardShadowHover; e.currentTarget.style.transform = "translateY(-2px)"; } }}
                      onMouseLeave={e => { e.currentTarget.style.boxShadow = T.cardShadow; e.currentTarget.style.transform = "translateY(0)"; }}>
                        <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:10, flexWrap:"wrap" }}>
                          <span style={{
                            fontSize:9, padding:"3px 9px", borderRadius:5, fontWeight:700, letterSpacing:".04em",
                            background: cs.background, color: cs.color,
                          }}>{h.category || "IA"}</span>
                          {h.source && <span style={{ fontSize:10, color: T.textMuted, fontWeight:500 }}>{h.source}</span>}
                          {featured && (
                            <span style={{
                              fontSize:9, padding:"3px 9px", borderRadius:5, fontWeight:700, letterSpacing:".04em",
                              background: `linear-gradient(135deg, ${T.titleAccent}, ${BRAND.navyLight})`, color:"#fff",
                            }}>⭐ DESTAQUE</span>
                          )}
                        </div>
                        <div style={{
                          fontFamily:"'Fraunces',serif",
                          fontSize: featured ? 24 : 17, fontWeight: featured ? 700 : 600, lineHeight:1.3,
                          color: T.text, marginBottom:10,
                        }}>{h.title}</div>
                        <div style={{ fontSize: featured ? 14 : 13, color: T.textMuted, lineHeight:1.6 }}>
                          {h.summary}
                        </div>
                        {h.url && (
                          <div style={{ marginTop:12, fontSize:11, fontWeight:600, color: T.titleAccent, display:"flex", alignItems:"center", gap:5 }}>
                            Ler matéria completa →
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* FOOTER */}
            <div style={{
              marginTop:60, paddingTop:30,
              borderTop: `1px solid ${T.cardBorder}`,
              textAlign:"center", color: T.textMuted, fontSize:11,
            }}>
              <div style={{ display:"flex", justifyContent:"center", gap:14, marginBottom:14, flexWrap:"wrap" }}>
                <button onClick={handleShare} style={{
                  background: `linear-gradient(135deg, ${T.titleAccent}, ${BRAND.navyLight})`,
                  border:"none", color:"#fff", padding:"10px 22px", borderRadius:9,
                  fontSize:13, fontWeight:600, cursor:"pointer", fontFamily:"'Outfit',sans-serif",
                  boxShadow:`0 4px 14px ${T.titleAccent}30`,
                }}>
                  {shareCopied ? "✓ Link copiado!" : "🔗 Compartilhar Edição"}
                </button>
                <button onClick={copyShareUrl} style={{
                  background: "transparent", border: `1px solid ${T.cardBorder}`,
                  color: T.text, padding:"10px 22px", borderRadius:9,
                  fontSize:13, fontWeight:500, cursor:"pointer", fontFamily:"'Outfit',sans-serif",
                }}>📋 Copiar Link</button>
              </div>
              <div style={{ marginTop:14, fontWeight:500, fontFamily:"'Fraunces',serif", fontStyle:"italic", fontSize:13 }}>
                📡 Syncronize-MI — Atualizações de IA para quem tem pouco tempo
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function AdminApp() {
  const [theme, toggleTheme] = useTheme("user:admin_theme", "dark");
  const isDark = theme === "dark";

  useEffect(() => {
    document.body.classList.toggle("admin-dark", isDark);

// ─── PODCAST PREVIEW (loads blob from db if needed) ──────────────────────────

function PodcastPreview({ blobRef, url }) {
  const [resolvedUrl, setResolvedUrl] = useState(url);
  useEffect(() => {
    if (blobRef) {
      db.getVideoBlob(blobRef).then(d => setResolvedUrl(d || ""));
    } else {
      setResolvedUrl(url);
    }
  }, [blobRef, url]);
  if (!resolvedUrl) return null;
  return <VideoPlayer url={resolvedUrl} maxHeight={200} />;
}

// ─── ROUTER ──────────────────────────────────────────────────────────────────

function App() {
  const params = new URLSearchParams(window.location.search);
  const view = params.get("view");
  if (view === "public") return <PublicNewsletter />;
  return <AdminApp />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
