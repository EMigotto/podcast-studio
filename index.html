  /* GRAIN OVERLAY */
  .grain { position:fixed; inset:0; pointer-events:none; z-index:999; mix-blend-mode:multiply; opacity:.25; background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 .08 0 0 0 0 .07 0 0 0 0 .05 0 0 0 .4 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>"); }

</style>

// ═══════════════════════════════════════════════════════════════════════════
// DB (Supabase + localStorage fallback)
// ═══════════════════════════════════════════════════════════════════════════
const TABLE_MAP = { "newsletter":"newsletters", "comment":"comments", "view":"views", "episode":"episodes", "videoblob":"videoblobs", "user":"settings", "source":"news_sources", "audioblob":"audioblobs" };
const tableForKey = k => TABLE_MAP[k.split(":")[0]] || null;

const db = {
  async get(k){
    if(!SB_OK){const v=localStorage.getItem(k);return v?JSON.parse(v):null}
    const tbl=tableForKey(k); if(!tbl)return null;
    try{const{data,error}=await sb.from(tbl).select("data").eq("id",k).maybeSingle(); if(error||!data)return null; return data.data}catch{return null}
  },
  async set(k,v){
    if(!SB_OK){try{localStorage.setItem(k,JSON.stringify(v));return{ok:true}}catch(e){return{ok:false,error:e.message}}}
    const tbl=tableForKey(k); if(!tbl)return{ok:false,error:"sem mapeamento p/ "+k};
    try{const{error}=await sb.from(tbl).upsert({id:k,data:v}); if(error)return{ok:false,error:error.message}; return{ok:true}}catch(e){return{ok:false,error:e.message}}
  },
  async delete(k){
    if(!SB_OK){try{localStorage.removeItem(k);return{ok:true}}catch{return{ok:false}}}
    const tbl=tableForKey(k); if(!tbl)return{ok:false};
    try{const{error}=await sb.from(tbl).delete().eq("id",k); return{ok:!error}}catch{return{ok:false}}
  },
  async listByPrefix(p){
    if(!SB_OK){const items=[];for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k?.startsWith(p)){const v=localStorage.getItem(k);if(v)try{items.push(JSON.parse(v))}catch{}}}return items}
    const tbl=tableForKey(p); if(!tbl)return[];
    try{let q=sb.from(tbl).select("id,data"); const segs=p.split(":"); if(segs.length>1&&segs[1])q=q.like("id",p+"%"); const{data,error}=await q.limit(2000); if(error||!data)return[]; return data.map(r=>r.data).filter(Boolean);}catch{return[]}
  },
  async listEpisodes(){return(await db.listByPrefix("episode:")).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0))},
  async listNewsletters(){return(await db.listByPrefix("newsletter:")).sort((a,b)=>(b.date||"").localeCompare(a.date||""))},
  async saveBlob(k,d){return await db.set(k,{data:d,savedAt:Date.now()})},
  async getBlob(k){const r=await db.get(k);return r?.data||null},
};

// ═══════════════════════════════════════════════════════════════════════════
// AUTH (Supabase Auth)
// ═══════════════════════════════════════════════════════════════════════════
const usernameToEmail = u => u.includes("@") ? u.trim().toLowerCase() : `${u.trim().toLowerCase()}@syncronize-mi.local`;
const emailToUsername = e => (e||"").split("@")[0];

const auth = {
  async login(u,p){
    if(!SB_OK)throw new Error("Supabase não configurado. Veja SETUP.md");
    const{data,error}=await sb.auth.signInWithPassword({email:usernameToEmail(u),password:p});
    if(error||!data?.session)return null;
    return{token:data.session.access_token,expiresAt:(data.session.expires_at||0)*1000,username:emailToUsername(data.session.user?.email)};
  },
  async getSession(){
    if(!SB_OK)return null;
    const{data}=await sb.auth.getSession();
    if(!data?.session)return null;
    return{token:data.session.access_token,expiresAt:(data.session.expires_at||0)*1000,username:emailToUsername(data.session.user?.email)};
  },
  async logout(){if(SB_OK)await sb.auth.signOut()},
  async changePassword(cur,nw){if(!SB_OK)throw new Error("Supabase não configurado");if(nw.length<6)throw new Error("Mínimo 6 caracteres");const{error}=await sb.auth.updateUser({password:nw});if(error)throw new Error(error.message);},
};

// APIs (Comments, NewsSources, Analytics)

const commentsApi = {
  async listFor(d){return(await db.listByPrefix("comment:")).filter(c=>c.newsletterDate===d).sort((a,b)=>(a.timestamp||0)-(b.timestamp||0))},
  async listAll(){return(await db.listByPrefix("comment:")).sort((a,b)=>(b.timestamp||0)-(a.timestamp||0))},
  async add(d,n,m){const id=`comment:${d}:${Date.now()}`;const c={id,newsletterDate:d,name:(n||"Anônimo").slice(0,60),message:m.slice(0,1500),timestamp:Date.now(),hidden:false};await db.set(id,c);return c},
  async setReply(id,m){const c=await db.get(id);if(!c)return null;c.reply={message:m.slice(0,1500),timestamp:Date.now()};await db.set(id,c);return c},
  async toggleHide(id){const c=await db.get(id);if(!c)return null;c.hidden=!c.hidden;await db.set(id,c);return c},
  async remove(id){await db.delete(id)},
};

const newsSourcesApi = {
  async list(){return(await db.listByPrefix("source:")).sort((a,b)=>(a.name||"").localeCompare(b.name||""))},
  async seedDefaults(){const ex=await this.list(); if(ex.length>0)return ex; for(const s of DEFAULT_SOURCES)await db.set(s.id,s); return await this.list();},
  async upsert(src){const id=src.id||`source:${Date.now()}-${Math.random().toString(36).slice(2,6)}`;const s={...src,id};await db.set(id,s);return s},

const parseBrowser = ua => /Edg\//.test(ua)?"Edge":/OPR\/|Opera/.test(ua)?"Opera":/Firefox\//.test(ua)?"Firefox":/Chrome\//.test(ua)&&!/Edg\//.test(ua)?"Chrome":/Safari\//.test(ua)&&!/Chrome\//.test(ua)?"Safari":"Outro";
const parseOS = ua => /Windows NT/.test(ua)?"Windows":/Mac OS X|Macintosh/.test(ua)&&!/iPhone|iPad/.test(ua)?"macOS":/iPhone|iPad|iPod/.test(ua)?"iOS":/Android/.test(ua)?"Android":/Linux/.test(ua)?"Linux":"Outro";
const parseDevice = ua => /iPad|Tablet/i.test(ua)?"tablet":/Mobi|iPhone|Android.*Mobile/i.test(ua)?"mobile":"desktop";

const analytics = {
  async track(d){
    if(!d)return;
    const k=`viewed_session:${d}`; if(sessionStorage.getItem(k))return; sessionStorage.setItem(k,"1");
    const ua=(navigator.userAgent||"").slice(0,250);
    const id=`view:${d}:${Date.now()}-${Math.random().toString(36).slice(2,6)}`;
    await db.set(id,{id,newsletterDate:d,timestamp:Date.now(),ua,lang:navigator.language||"",screen:`${screen.width||0}x${screen.height||0}`,viewport:`${window.innerWidth||0}x${window.innerHeight||0}`,referrer:(document.referrer||"").slice(0,250),device:parseDevice(ua),browser:parseBrowser(ua),os:parseOS(ua)});
  },
  async listAll(){return await db.listByPrefix("view:")},
  async listFor(d){return(await db.listByPrefix("view:")).filter(v=>v.newsletterDate===d)},
};

// ═══════════════════════════════════════════════════════════════════════════
// ANTHROPIC / HEYGEN clients
// ═══════════════════════════════════════════════════════════════════════════
async function callAnthropic(apiKey,body){
  const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify(body)});
  const text=await res.text();let data;try{data=JSON.parse(text)}catch{data={raw:text}}
  if(!res.ok){const e=new Error(data?.error?.message||`HTTP ${res.status}`);e.status=res.status;throw e}
  return data;
}
async function callClaude(apiKey,prompt,useSearch=false,maxTokens=1500,sys=null){
  const body={model:ANTHROPIC_MODEL,max_tokens:maxTokens,messages:[{role:"user",content:prompt}]};
  if(sys)body.system=sys; if(useSearch)body.tools=[{type:"web_search_20250305",name:"web_search"}];
  let data=await callAnthropic(apiKey,body);
  let text=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("");
  if(text.trim())return text;
  if(useSearch&&data.stop_reason==="tool_use"){
    const tr=(data.content||[]).filter(b=>b.type==="tool_use").map(b=>({type:"tool_result",tool_use_id:b.id,content:"Search executed."}));
    const body2={model:ANTHROPIC_MODEL,max_tokens:maxTokens,tools:[{type:"web_search_20250305",name:"web_search"}],messages:[{role:"user",content:prompt},{role:"assistant",content:data.content},{role:"user",content:tr}]};
    if(sys)body2.system=sys;
    data=await callAnthropic(apiKey,body2);
    return(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("");
  }
  return text;
}

// VIDEO PLAYER (clean — handles HeyGen / YouTube / Vimeo / MP4)
// ═══════════════════════════════════════════════════════════════════════════
function getVideoEmbedInfo(url){
  if(!url)return null;
  if(url.includes("app.heygen.com/videos/")||url.includes("share.heygen.com"))return{type:"iframe",src:url,brand:"HeyGen"};
  const yt=url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]+)/);
  if(yt)return{type:"iframe",src:`https://www.youtube.com/embed/${yt[1]}`,brand:"YouTube"};
  const vm=url.match(/vimeo\.com\/(\d+)/);
  if(vm)return{type:"iframe",src:`https://player.vimeo.com/video/${vm[1]}`,brand:"Vimeo"};
  if(url.startsWith("data:video")||/\.(mp4|webm|ogg|mov|m4v)(\?|$)/i.test(url))return{type:"video",src:url,brand:"Vídeo"};
  if(url.includes("heygen.ai")&&url.includes(".mp4"))return{type:"video",src:url,brand:"HeyGen"};
  return{type:"iframe",src:url,brand:"Externo"};
}

const VideoPlayer = memo(function VideoPlayer({ url, aspectRatio="9/16", maxWidth }){
  const info = getVideoEmbedInfo(url);
  if(!info) return null;
  const [w,h] = aspectRatio.split("/").map(Number);
  const pb = `${(h/w)*100}%`;
  const portrait = aspectRatio === "9/16";
  const square = aspectRatio === "1/1";
  const containerWidth = portrait ? "min(360px, 100%)" : square ? "min(480px, 100%)" : "100%";
  const cs = { width: maxWidth || containerWidth, margin: "0 auto" };
  const openExternal = () => window.open(info.src, "_blank", "noopener,noreferrer");

  return (
    <div style={cs}>
      <div style={{position:"relative", paddingBottom:pb, height:0, overflow:"hidden", borderRadius:8, background:BRAND.ink, border:`1px solid ${BRAND.ink}`, boxShadow:"0 8px 24px -8px rgba(20,17,13,.3)"}}>
        {info.type === "video" ? (

            style={{position:"absolute", top:0, left:0, width:"100%", height:"100%", objectFit:"contain", background:BRAND.ink}}>
            <source src={info.src} />
          </video>
        ) : (
          <iframe src={info.src}
            style={{position:"absolute", top:0, left:0, width:"100%", height:"100%", border:0}}
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen"
            allowFullScreen title={`Player ${info.brand}`} />

      </div>
      <div style={{marginTop:8, fontFamily:"'JetBrains Mono',monospace", fontSize:".68rem", textTransform:"uppercase", letterSpacing:".12em", color:BRAND.mute, display:"flex", justifyContent:"space-between", alignItems:"center"}}>

function isLikelyAudioUrl(url){

  return /\.(mp3|ogg|wav|m4a|aac|opus|flac|webm)(\?|$)/i.test(url);

const today = () => new Date().toISOString().slice(0,10);
const fmtDate = iso => { if(!iso)return""; const[y,m,d]=iso.split("-"); return`${d}/${m}/${y}`; };
const fmtDateLong = iso => { if(!iso)return""; const M=["janeiro","fevereiro","março","abril","maio","junho","julho","agosto","setembro","outubro","novembro","dezembro"]; const[y,m,d]=iso.split("-"); return`${parseInt(d)} de ${M[parseInt(m)-1]} de ${y}`; };
const fmtDateMag = iso => { if(!iso)return""; const M=["JAN","FEV","MAR","ABR","MAI","JUN","JUL","AGO","SET","OUT","NOV","DEZ"]; const[y,m,d]=iso.split("-"); return`${d} ${M[parseInt(m)-1]} ${y.slice(2)}`; };
const fmtRelative = ts => { const d=(Date.now()-ts)/1000; if(d<60)return"agora"; if(d<3600)return`${Math.floor(d/60)}min`; if(d<86400)return`${Math.floor(d/3600)}h`; if(d<604800)return`${Math.floor(d/86400)}d`; return new Date(ts).toLocaleDateString("pt-BR"); };
const isExpired = e => e && Date.now() > e;
const estimateReadTime = t => t ? Math.max(1, Math.round(t.split(/\s+/).filter(Boolean).length/200)) : 0;
const padNum = (n,digits=3) => String(n).padStart(digits,"0");
const getShareUrl = d => { const u=new URL(window.location.href); u.search=`?view=public&date=${d}`; return u.toString(); };
const fileToDataUrl = file => new Promise((resolve,reject)=>{const r=new FileReader();r.onloadend=()=>resolve(r.result);r.onerror=reject;r.readAsDataURL(file);});

function CommentsSidebar({ open, onClose, newsletterDate }){
  const [comments,setComments] = useState([]);
  const [name,setName] = useState("");
  const [message,setMessage] = useState("");
  const [submitting,setSubmitting] = useState(false);
  const [success,setSuccess] = useState(false);
  useEffect(()=>{
    if(!open||!newsletterDate)return;
    const saved=localStorage.getItem("commenter_name"); if(saved&&!name)setName(saved);
    (async()=>{const list=await commentsApi.listFor(newsletterDate);setComments(list.filter(c=>!c.hidden))})();
  },[open,newsletterDate]);
  const submit = async () => {
    if(!message.trim())return;
    setSubmitting(true);
    localStorage.setItem("commenter_name", name);
    await commentsApi.add(newsletterDate, name||"Anônimo", message);
    const list = await commentsApi.listFor(newsletterDate);
    setComments(list.filter(c=>!c.hidden));
    setMessage(""); setSuccess(true); setTimeout(()=>setSuccess(false),3000);
    setSubmitting(false);
  };
  if(!open) return null;
  return <>
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(20,17,13,.5)",zIndex:998,backdropFilter:"blur(2px)"}} className="fadein"/>

          <div>
            <div className="mono small-caps" style={{color:BRAND.signal,marginBottom:8}}>№ COMENTÁRIOS</div>

              <em className="sig">{comments.length}</em> {comments.length===1?"mensagem":"mensagens"}

          </div>
          <button onClick={onClose} style={{background:"transparent",border:"none",color:BRAND.paper,fontSize:24,cursor:"pointer",padding:0,lineHeight:1}}>×</button>

            <p style={{fontFamily:"'Fraunces',serif",fontVariationSettings:"'opsz' 72, 'SOFT' 30",fontSize:"clamp(1.7rem, 3.5vw, 2.8rem)",lineHeight:1.15,letterSpacing:"-.02em",margin:0}}>
              A IA está mudando <em className="acc">tudo</em> — e ninguém tem tempo de acompanhar.<br/>
              <span style={{color:BRAND.mute}}>Por isso a gente faz a curadoria por você.</span><br/><br/>

        <div style={{marginTop:80,display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:32,paddingTop:40,borderTop:"1px solid rgba(241,233,214,.15)"}}>
          {[
            {num:"5",sym:"min",label:"Tempo de Leitura"},
            {num:"1",sym:"×",label:"Por Semana"},
            {num:"0",sym:"%",label:"Hype"},
            {num:"100",sym:"%",label:"Sinal · Ruído Zero"},
          ].map((s,i)=><div key={i} style={{display:"flex",flexDirection:"column",gap:6}}>
            <div style={{fontFamily:"'Fraunces',serif",fontSize:"clamp(2.5rem, 5vw, 3.6rem)",lineHeight:1,color:BRAND.paper}}>

            </div>
            <div className="mono small-caps" style={{color:BRAND.mute}}>{s.label}</div>

    {/* SUBSCRIBE */}
    <section id="subscribe" style={{padding:"120px 0",textAlign:"center",position:"relative"}}>

        <div className="mono small-caps" style={{color:BRAND.accent,marginBottom:24}}>№ 04 / Conecte-se à Frequência</div>
        <h2 className="display" style={{fontSize:"clamp(2.5rem, 6vw, 5rem)",lineHeight:.95,letterSpacing:"-.03em",margin:"0 auto 24px",maxWidth:"16ch"}}>
          Receba o <em className="acc">sinal</em><br/>direto no seu inbox.
        </h2>
        <p style={{fontFamily:"'Fraunces',serif",fontSize:"1.15rem",color:BRAND.inkSoft,maxWidth:"48ch",margin:"0 auto 40px"}}>
          Toda quinta, 19:00. Newsletter de 5 minutos + episódio de podcast. Cancele a qualquer hora — duvidamos que vá querer.
        </p>
        <form onSubmit={e=>{e.preventDefault();setEmailSent(true)}} style={{display:"flex",gap:8,maxWidth:480,margin:"0 auto",padding:6,border:`1px solid ${BRAND.ink}`,borderRadius:100,background:BRAND.paperLight}}>
          <input type="email" required value={emailInput} onChange={e=>setEmailInput(e.target.value)} placeholder="seu@email.com" style={{flex:1,border:"none",background:"transparent",padding:"12px 20px",fontFamily:"'Geist',sans-serif",fontSize:".95rem",color:BRAND.ink,outline:"none",minWidth:0}}/>
          <button type="submit" style={{background:BRAND.ink,color:BRAND.paper,border:"none",padding:"12px 24px",borderRadius:100,cursor:"pointer",fontFamily:"'Geist',sans-serif",fontSize:".88rem",fontWeight:500,whiteSpace:"nowrap"}}>{emailSent?"✓ Sincronizado":"Sincronizar →"}</button>

// PUBLIC NEWSLETTER (editorial style, fixed video rendering)
// ═══════════════════════════════════════════════════════════════════════════
function PublicNewsletter(){
  const [newsletters,setNewsletters] = useState([]);
  const [selectedDate,setSelectedDate] = useState(null);
  const [loading,setLoading] = useState(true);
  const [videoBlob,setVideoBlob] = useState(null);
  const [audioBlob,setAudioBlob] = useState(null);
  const [commentsOpen,setCommentsOpen] = useState(false);
  const [commentCount,setCommentCount] = useState(0);
  const [shareCopied,setShareCopied] = useState(false);

  useEffect(()=>{(async()=>{
    const items = await db.listNewsletters();
    setNewsletters(items);
    const params = new URLSearchParams(window.location.search);
    const urlDate = params.get("date");
    if(urlDate && items.find(n=>n.date===urlDate)) setSelectedDate(urlDate);
    else if(items.length>0) setSelectedDate(items[0].date);
    else setSelectedDate(today());
    setLoading(false);
  })()},[]);

  useEffect(()=>{
    if(!selectedDate)return;
    analytics.track(selectedDate);
    (async()=>{
      const list = await commentsApi.listFor(selectedDate);
      setCommentCount(list.filter(c=>!c.hidden).length);
    })();
  },[selectedDate]);

  useEffect(()=>{
    if(!selectedDate) return;
    const c = newsletters.find(n=>n.date===selectedDate);
    if(c?.podcastBlobRef) db.getBlob(c.podcastBlobRef).then(setVideoBlob); else setVideoBlob(null);
    if(c?.audioPodcastBlobRef) db.getBlob(c.audioPodcastBlobRef).then(setAudioBlob); else setAudioBlob(null);
  },[selectedDate,newsletters]);

  useEffect(()=>{
    if(!selectedDate||loading) return;
    const u = new URL(window.location.href);
    u.searchParams.set("view","public"); u.searchParams.set("date",selectedDate);
    window.history.replaceState({},"",u.toString());
  },[selectedDate,loading]);

  const current = newsletters.find(n=>n.date===selectedDate);
  const effectiveVideoUrl = videoBlob || current?.podcastUrl;
  const videoValid = effectiveVideoUrl && (!current?.podcastExpiresAt || !isExpired(current.podcastExpiresAt));
  const aspectRatio = current?.podcastAspectRatio || "9/16";
  const effectiveAudioUrl = audioBlob || current?.audioPodcastUrl;

  const highlightLines = useMemo(()=>{
    const raw = (current?.podcastHighlights||"").trim();
    if(!raw) return [];
    return raw.split(/\n+/).map(s=>s.replace(/^[-•*\d.]+\s*/,"").trim()).filter(Boolean);
  },[current]);

  const readTime = useMemo(()=>estimateReadTime((current?.aiSummary||"")+" "+(current?.headlines||[]).map(h=>h.summary).join(" ")),[current]);

  const totalEpisodes = newsletters.length;
  const editionNum = useMemo(()=>{
    if(!current) return 0;
    return totalEpisodes - newsletters.findIndex(n=>n.date===selectedDate);
  },[current,newsletters,selectedDate,totalEpisodes]);

  const handleShare = async () => {
    const url = getShareUrl(selectedDate);
    if(navigator.share){ try{ await navigator.share({title:current?.title||"Sync·MI",url}); return; }catch{} }
    try{ await navigator.clipboard.writeText(url); setShareCopied(true); setTimeout(()=>setShareCopied(false),2500); }catch{}
  };

  if(loading){
    return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:BRAND.mute}}><Spin/></div>;
  }

  return <>
    <Ticker vol="01" episodes={totalEpisodes}/>
    <Nav/>

    <main className="container" style={{padding:"60px 32px 80px"}}>
      {!current ? <div style={{padding:"80px 20px",textAlign:"center",border:`1px dashed ${BRAND.rule}`,borderRadius:4}}>
        <div style={{fontFamily:"'Fraunces',serif",fontSize:"1.6rem",fontStyle:"italic",color:BRAND.mute}}>Nenhuma edição disponível ainda.</div>
        <a href="?view=landing" style={{marginTop:20,display:"inline-block",fontFamily:"'JetBrains Mono',monospace",fontSize:".75rem",textTransform:"uppercase",letterSpacing:".14em",color:BRAND.accent}}>← VOLTAR PARA A LANDING</a>
      </div> :
      <div className="fade">

        {/* HEADER */}
        <div style={{paddingBottom:32, borderBottom:`1px solid ${BRAND.rule}`, marginBottom:48}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(12,1fr)",gap:24,fontFamily:"'JetBrains Mono',monospace",fontSize:".72rem",textTransform:"uppercase",letterSpacing:".14em",color:BRAND.mute,marginBottom:36}}>
            <div style={{gridColumn:"1/4",display:"flex",flexDirection:"column",gap:4}}>
              <span>Edição</span><span style={{color:BRAND.ink,fontWeight:500}}>№ {padNum(editionNum)} · VOL.01</span>
            </div>
            <div style={{gridColumn:"4/7",display:"flex",flexDirection:"column",gap:4}}>
              <span>Publicado</span><span style={{color:BRAND.ink,fontWeight:500}}>{fmtDateMag(current.date)}</span>
            </div>
            <div style={{gridColumn:"7/10",display:"flex",flexDirection:"column",gap:4}}>
              <span>Leitura</span><span style={{color:BRAND.ink,fontWeight:500}}>{readTime} MIN</span>
            </div>
            <div style={{gridColumn:"10/13",display:"flex",flexDirection:"column",gap:4,textAlign:"right"}}>
              <span>Comentários</span><span style={{color:BRAND.ink,fontWeight:500}}>{commentCount}</span>
            </div>
          </div>

          <h1 className="display" style={{fontSize:"clamp(2.5rem, 7vw, 5.5rem)", margin:"0 0 24px", color:BRAND.ink}}>
            {current.title || "Highlights de IA"}
          </h1>
          {current.subtitle && <p style={{fontFamily:"'Fraunces',serif",fontStyle:"italic",fontVariationSettings:"'opsz' 36, 'SOFT' 100",fontSize:"clamp(1.15rem, 2vw, 1.5rem)",lineHeight:1.4,color:BRAND.inkSoft,maxWidth:"58ch",margin:0}}>
            {current.subtitle}
          </p>}

          <div style={{marginTop:32,display:"flex",gap:12,flexWrap:"wrap"}}>
            <button onClick={handleShare} className="btn btn-primary btn-sm">{shareCopied?"✓ LINK COPIADO":"↗ COMPARTILHAR"}</button>
            <button onClick={()=>setCommentsOpen(true)} className="btn btn-ghost btn-sm">💬 COMENTÁRIOS ({commentCount})</button>
            <a href="?view=landing" className="btn btn-ghost btn-sm">← ARQUIVO</a>
          </div>
        </div>

        {/* VIDEO + HIGHLIGHTS — fixed editorial side-by-side */}
        {videoValid && <section style={{marginBottom:64}}>
          <SectionLabel num="01">Episódio em Vídeo</SectionLabel>
          <div style={{display:"grid",gridTemplateColumns:aspectRatio==="9/16"?"380px 1fr":"1fr",gap:48,alignItems:"start"}}>
            <div style={{width:"100%"}}>
              <VideoPlayer url={effectiveVideoUrl} aspectRatio={aspectRatio} maxWidth="100%"/>
            </div>
            {(highlightLines.length>0 || aspectRatio!=="9/16") && <div>
              {highlightLines.length>0 ? <>
                <div className="mono small-caps" style={{color:BRAND.accent,marginBottom:18}}>✨ HIGHLIGHTS DO EPISÓDIO</div>
                <div style={{display:"flex",flexDirection:"column",gap:16}}>
                  {highlightLines.map((h,i)=>(
                    <div key={i} style={{display:"flex",gap:18,alignItems:"flex-start",paddingBottom:14,borderBottom:`1px solid ${BRAND.rule}`}}>
                      <div className="mono" style={{flexShrink:0,fontSize:".88rem",color:BRAND.accent,fontWeight:600,letterSpacing:".05em",paddingTop:2}}>№ {padNum(i+1,2)}</div>
                      <div style={{fontFamily:"'Fraunces',serif",fontSize:"1.1rem",fontWeight:500,lineHeight:1.4,color:BRAND.ink}}>{h}</div>
                    </div>
                  ))}
                </div>
              </> : null}
            </div>}
          </div>
        </section>}

        {current?.podcastUrl && !videoValid && <div className="alert-info" style={{marginBottom:48}}>⏰ O vídeo desta edição expirou.</div>}

        {/* AUDIO PODCAST + SUMMARY — side by side */}
        {current.aiSummary && <section style={{marginBottom:64}}>
          <SectionLabel num="02">Análise da Semana</SectionLabel>
          <div style={{display:"grid",gridTemplateColumns:effectiveAudioUrl?"2fr 1fr":"1fr",gap:32,alignItems:"start"}}>
            <div className="card card-pad" style={{padding:40}}>
              <div style={{fontFamily:"'Fraunces',serif",fontSize:"1.15rem",lineHeight:1.65,color:BRAND.ink,whiteSpace:"pre-wrap"}}>
                {current.aiSummary}
              </div>
            </div>
            {effectiveAudioUrl && <div>
              <div className="mono small-caps" style={{color:BRAND.accent,marginBottom:14}}>🎧 PODCAST DE RESUMO</div>
              <AudioPlayer url={effectiveAudioUrl} title="Podcast de Resumo · Sync·MI"/>

function BreakdownCard({ title, data, keyFmt }){
  const total = data.reduce((s,[,n])=>s+n,0)||1;
  return <div className="card card-pad" style={{padding:18}}>
    <div className="mono small-caps" style={{color:BRAND.mute,marginBottom:12}}>{title}</div>
    {data.length===0 ? <div style={{fontSize:".82rem",color:BRAND.mute,fontStyle:"italic"}}>—</div>
    : <div style={{display:"flex",flexDirection:"column",gap:8}}>
      {data.slice(0,8).map(([k,n])=><div key={k}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:4,fontSize:".82rem"}}>
          <span style={{fontWeight:500}}>{keyFmt?keyFmt(k):k}</span>
          <span className="mono" style={{color:BRAND.mute}}>{n}</span>
        </div>
        <div style={{height:4,background:BRAND.paperDark,borderRadius:2,overflow:"hidden"}}>
          <div style={{width:`${(n/total)*100}%`,height:"100%",background:BRAND.ink}}/>
        </div>
      </div>)}
    </div>}
  </div>;
}

    </div>
  </div>;

  const [nlError,setNlError] = useState("");

  // Briefing tab
  const [briefingCopied,setBriefingCopied] = useState(false);
  const [audioUploadMsg,setAudioUploadMsg] = useState("");

  // Load on mount
  useEffect(()=>{let cancelled=false;(async()=>{
    const settings = await db.get("user:settings_v13");
    if(cancelled) return;
    if(settings){
      if(settings.apiKey) setApiKey(settings.apiKey);
      if(settings.keyValidated) setKeyValidated(true);
    }
    setNewsletters(await db.listNewsletters());
    const seeded = await newsSourcesApi.seedDefaults();
    setNewsSources(seeded);
    setStorageReady(true);
  })();return()=>{cancelled=true}},[]);

  // Save settings
  useEffect(()=>{
    if(!storageReady) return;
    const t = setTimeout(()=>{db.set("user:settings_v13",{apiKey,keyValidated,updatedAt:Date.now()})},600);
    return ()=>clearTimeout(t);
  },[apiKey,keyValidated,storageReady]);

  // Load editor for selected date
  useEffect(()=>{
    if(!storageReady) return;
    (async()=>{
      const ex = await db.get(`newsletter:${editorDate}`);
      if(ex){
        setEditorTitle(ex.title||""); setEditorSubtitle(ex.subtitle||"");
        setEditorHeadlines(ex.headlines||[]); setEditorAiSummary(ex.aiSummary||"");
        setEditorFocusInsights(ex.focusInsights||[]);
        setEditorPodcastUrl(ex.podcastUrl||""); setEditorPodcastBlobRef(ex.podcastBlobRef||"");
        setEditorPodcastTitle(ex.podcastTitle||""); setEditorPodcastDuration(ex.podcastDuration||15);
        setEditorPodcastAspect(ex.podcastAspectRatio||"9/16");
        setEditorPodcastHighlights(ex.podcastHighlights||"");
        setEditorAudioPodcastUrl(ex.audioPodcastUrl||""); setEditorAudioPodcastBlobRef(ex.audioPodcastBlobRef||"");
        setEditorCompanies(ex.companies||[]); setEditorTopics(ex.topics||[]);
        if(ex.podcastExpiresAt){const days=Math.max(1,Math.round((ex.podcastExpiresAt-Date.now())/86400000));setEditorPodcastTtlDays(days);}
      } else {
        setEditorTitle(""); setEditorSubtitle(""); setEditorHeadlines([]);
        setEditorAiSummary(""); setEditorFocusInsights([]);
        setEditorPodcastUrl(""); setEditorPodcastBlobRef("");
        setEditorPodcastTitle(""); setEditorPodcastDuration(15);
        setEditorPodcastAspect("9/16"); setEditorPodcastHighlights("");
        setEditorAudioPodcastUrl(""); setEditorAudioPodcastBlobRef("");
        setEditorCompanies([]); setEditorTopics([]);
      }
    })();
  },[editorDate,storageReady]);

  // Handlers
  const testAnthropic = async () => {
    setTesting(p=>({...p,anthropic:true}));
    const t = apiKey.trim();
    if(!t){setTestResults(p=>({...p,anthropic:{status:"err",msg:"Cole sua chave."}}));setTesting(p=>({...p,anthropic:false}));return;}
    if(apiKey !== t) setApiKey(t);
    if(!t.startsWith("sk-ant-")){setTestResults(p=>({...p,anthropic:{status:"err",msg:"Formato inválido."}}));setTesting(p=>({...p,anthropic:false}));return;}
    try {
      const data = await callAnthropic(t,{model:ANTHROPIC_MODEL,max_tokens:30,messages:[{role:"user",content:"OK"}]});
      setKeyValidated(true);
      setTestResults(p=>({...p,anthropic:{status:"ok",msg:"Conexão OK!"}}));
    } catch(err) {
      let d=err.message;
      if(err.status===401) d="Chave inválida.";
      else if(err.status===429) d="Sem créditos.";
      setTestResults(p=>({...p,anthropic:{status:"err",msg:d}}));
    }
    setTesting(p=>({...p,anthropic:false}));
  };

  const submitPasswordChange = async () => {
    setPwdMsg({type:"",text:""});
    if(!pwdCurrent||!pwdNew){setPwdMsg({type:"err",text:"Preencha todos campos"});return;}
    if(pwdNew !== pwdNewConfirm){setPwdMsg({type:"err",text:"Confirmação não bate"});return;}
    if(pwdNew.length<6){setPwdMsg({type:"err",text:"Mínimo 6 caracteres"});return;}
    try {
      await auth.changePassword(pwdCurrent,pwdNew);
      setPwdCurrent("");setPwdNew("");setPwdNewConfirm("");
      setPwdMsg({type:"ok",text:"✓ Senha alterada"});
    } catch(err){setPwdMsg({type:"err",text:err.message});}
  };

  // News fetching with configured sources
  const fetchNewsForNewsletter = async () => {
    if(!keyValidated){setNlError("Configure a chave Anthropic em Configurações.");return;}
    setIsLoadingNl(true);setNlError("");setNlSuccess("");
    const activeSources = newsSources.filter(s=>s.active);
    const sourcesHint = activeSources.length>0
      ? `\n\nPRIORIZE PESQUISAR NESTAS FONTES:\n${activeSources.map(s=>`- ${s.name} (${s.url})`).join("\n")}\nSempre retorne o link da matéria nessas fontes em "url" e o nome em "source".`
      : "";
    try {
      const t = await callClaude(apiKey,
        `Pesquise as 10 principais notícias de IA, produtividade e desenvolvimento de software desta semana (${fmtDateLong(editorDate)}). Foque em: novos modelos LLM, ferramentas de IA para produtividade, desenvolvimento sistêmico.${sourcesHint}\n\nResponda SOMENTE JSON puro: [{"title":"...","summary":"resumo de 1-2 frases","source":"...","category":"LLM|Produtividade|Sistêmico|IA|Hardware","url":"https://..."}]`,
        true, 3000);
      const m = t.match(/\[[\s\S]*\]/);
      if(m){
        const p = JSON.parse(m[0]).slice(0,10);
        setEditorHeadlines(p);
        setNlSuccess(`${p.length} manchetes${activeSources.length>0?` (${activeSources.length} fontes)`:""}`);
        extractCompaniesAndTopics(p).catch(()=>{});
      } else throw new Error("Sem JSON");
    } catch(err){setNlError("Erro: "+err.message);}
    setIsLoadingNl(false);
  };

  const extractCompaniesAndTopics = async (headlines) => {
    const hl = headlines || editorHeadlines;
    if(!keyValidated || hl.length===0) return;
    setIsExtracting(true);
    try {
      const t = await callClaude(apiKey,
        `Extraia das manchetes as PRINCIPAIS empresas e tópicos.\nResponda SOMENTE JSON: {"companies":["OpenAI","Google",...],"topics":["agentes","RAG",...]}\nMáx 8 de cada, por relevância.\n\nMANCHETES:\n${hl.map(h=>`- ${h.title}: ${h.summary}`).join("\n")}`,
        false, 500);
      const m = t.match(/\{[\s\S]*\}/);
      if(m){const p=JSON.parse(m[0]); setEditorCompanies(p.companies||[]); setEditorTopics(p.topics||[]);}
    } catch(err){console.warn(err.message);}
    setIsExtracting(false);
  };

  const generateTitle = async () => {
    if(!keyValidated){setNlError("Configure a chave.");return;}
    if(editorHeadlines.length===0){setNlError("Adicione manchetes primeiro.");return;}
    setIsGenTitle(true);setNlError("");
    try {
      const t = await callClaude(apiKey,
        `Crie um TÍTULO chamativo (max 7 palavras) para newsletter de IA, baseado em:\n${editorHeadlines.map((h,i)=>`${i+1}. ${h.title}`).join("\n")}\n\nTom: editorial, magnético, instigante. Português. Responda APENAS o título, sem aspas.`,
        false, 200);
      setEditorTitle(t.trim().replace(/^["']|["']$/g,""));
      setNlSuccess("Título gerado!");
    } catch(err){setNlError("Erro: "+err.message);}
    setIsGenTitle(false);
  };
  const generateSubtitle = async () => {
    if(!keyValidated){setNlError("Configure a chave.");return;}
    if(editorHeadlines.length===0){setNlError("Adicione manchetes.");return;}
    setIsGenSubtitle(true);setNlError("");
    try {
      const t = await callClaude(apiKey,
        `FRASE DE IMPACTO (max 25 palavras) para newsletter "${editorTitle||"(sem título)"}". Editorial, sofisticado, ponto de vista.\nManchetes:\n${editorHeadlines.slice(0,6).map(h=>`- ${h.title}: ${h.summary}`).join("\n")}\n\nResponda APENAS a frase.`,
        false, 300);
      setEditorSubtitle(t.trim().replace(/^["']|["']$/g,""));
      setNlSuccess("Frase gerada!");
    } catch(err){setNlError("Erro: "+err.message);}
    setIsGenSubtitle(false);
  };
  const generateAiSummary = async () => {
    if(!keyValidated){setNlError("Configure a chave.");return;}
    if(editorHeadlines.length===0){setNlError("Adicione manchetes.");return;}
    setIsGenSummary(true);setNlError("");
    try {
      const t = await callClaude(apiKey,
        `Resumo executivo (~250 palavras) com PONTO DE VISTA editorial. FOCO: 1) Produtividade 2) Desenvolvimento Sistêmico 3) Modelos LLM/IA.\n\nMANCHETES:\n${editorHeadlines.map((h,i)=>`${i+1}. ${h.title} — ${h.summary}`).join("\n")}\n\nRetorne APENAS o resumo.`,
        false, 1200, "Editor sênior de newsletter de IA.");
      setEditorAiSummary(t.trim());setNlSuccess("Resumo gerado!");
    } catch(err){setNlError("Erro: "+err.message);}
    setIsGenSummary(false);
  };
  const generateFocusInsights = async () => {
    if(!keyValidated){setNlError("Configure a chave.");return;}
    if(editorHeadlines.length===0){setNlError("Adicione manchetes.");return;}
    setIsGenInsights(true);setNlError("");
    try {
      const t = await callClaude(apiKey,
        `Insight curto (50-70 palavras) por área. JSON: {"produtividade":"...","sistemico":"...","llm":"..."}\nMANCHETES:\n${editorHeadlines.map(h=>`- ${h.title}: ${h.summary}`).join("\n")}`,
        false, 1000);
      const m = t.match(/\{[\s\S]*\}/);
      if(m){
        const p=JSON.parse(m[0]);
        setEditorFocusInsights([
          {area:"produtividade",summary:p.produtividade||""},
          {area:"sistemico",summary:p.sistemico||""},
          {area:"llm",summary:p.llm||""},
        ]);
        setNlSuccess("Insights gerados!");
      } else throw new Error("Sem JSON");
    } catch(err){setNlError("Erro: "+err.message);}
    setIsGenInsights(false);
  };
  const generateHighlights = async () => {
    if(!keyValidated){setNlError("Configure a chave.");return;}
    setIsGenHighlights(true);setNlError("");
    const ctx = (editorPodcastTitle||"") + "\n\n" + (editorAiSummary||editorHeadlines.map(h=>`${h.title}: ${h.summary}`).join("\n"));
    try {
      const t = await callClaude(apiKey,
        `Gere 5-8 HIGHLIGHTS curtos do podcast. Cada um: 1 linha, max 12 palavras, começando com verbo de ação. Tom editorial.\nCONTEXTO: ${ctx}\nResponda APENAS uma lista, um highlight por linha, sem numeração nem bullets.`,
        false, 800);
      setEditorPodcastHighlights(t.trim());setNlSuccess("Highlights gerados!");
    } catch(err){setNlError("Erro: "+err.message);}
    setIsGenHighlights(false);
  };

  const saveNewsletter = async () => {
    if(!editorDate){setNlError("Selecione uma data.");return;}
    setNlError("");setNlSuccess("");
    const expiresAt = (editorPodcastUrl||editorPodcastBlobRef)&&editorPodcastTtlDays>0?Date.now()+editorPodcastTtlDays*86400000:null;
    const nl = {
      id:`newsletter:${editorDate}`, date:editorDate,
      title:editorTitle||`Highlights de IA · ${fmtDate(editorDate)}`,
      subtitle:editorSubtitle, headlines:editorHeadlines,
      aiSummary:editorAiSummary, focusInsights:editorFocusInsights,
      podcastUrl:editorPodcastUrl, podcastBlobRef:editorPodcastBlobRef,
      podcastTitle:editorPodcastTitle, podcastDuration:editorPodcastDuration,
      podcastExpiresAt:expiresAt, podcastAspectRatio:editorPodcastAspect,
      podcastHighlights:editorPodcastHighlights,
      audioPodcastUrl:editorAudioPodcastUrl, audioPodcastBlobRef:editorAudioPodcastBlobRef,
      companies:editorCompanies, topics:editorTopics,
      updatedAt:Date.now(),
    };
    const r = await db.set(nl.id,nl);
    if(r.ok){setNlSuccess(`✓ Edição publicada (${fmtDate(editorDate)})`);setNewsletters(await db.listNewsletters());}
    else setNlError(`Falha: ${r.error}`);
  };

  const deleteNewsletter = async (d) => {
    if(!confirm(`Apagar edição de ${fmtDate(d)}?`)) return;
    const ex = await db.get(`newsletter:${d}`);
    if(ex?.podcastBlobRef) await db.delete(ex.podcastBlobRef);
    if(ex?.audioPodcastBlobRef) await db.delete(ex.audioPodcastBlobRef);
    await db.delete(`newsletter:${d}`);
    setNewsletters(await db.listNewsletters());
    setNlSuccess("Apagada");
  };

  const handleVideoUpload = async (e) => {
    const f = e.target.files?.[0]; if(!f) return;
    if(f.size > 30*1024*1024) {setNlError(`Grande (${(f.size/(1024*1024)).toFixed(1)}MB). Prefira URL externa.`); return;}
    setNlSuccess("Convertendo vídeo...");
    try {
      const dataUrl = await fileToDataUrl(f);
      const blobKey = `videoblob:${editorDate}:${Date.now()}`;
      const r = await db.saveBlob(blobKey,dataUrl);
      if(r.ok){setEditorPodcastBlobRef(blobKey);setEditorPodcastUrl("");setNlSuccess(`Vídeo salvo (${(f.size/(1024*1024)).toFixed(1)}MB) ✓`);}
      else setNlError(`Falha: ${r.error}`);
    } catch(err){setNlError("Erro: "+err.message);}
  };

  const handleAudioUpload = async (e) => {
    const f = e.target.files?.[0]; if(!f) return;
    if(f.size > 25*1024*1024) {setAudioUploadMsg(`❌ Grande (${(f.size/(1024*1024)).toFixed(1)}MB). Máx 25MB ou use URL.`); return;}
    setAudioUploadMsg("⏳ Convertendo áudio...");
    try {
      const dataUrl = await fileToDataUrl(f);
      const blobKey = `audioblob:${editorDate}:${Date.now()}`;
      const r = await db.saveBlob(blobKey,dataUrl);
      if(r.ok){
        setEditorAudioPodcastBlobRef(blobKey);
        setEditorAudioPodcastUrl("");
        setAudioUploadMsg(`✓ Áudio carregado (${(f.size/(1024*1024)).toFixed(1)}MB)`);
      } else setAudioUploadMsg(`❌ Falha: ${r.error}`);
    } catch(err){setAudioUploadMsg("❌ Erro: "+err.message);}
  };

  // News sources handlers
  const reloadSources = async () => {setNewsSources(await newsSourcesApi.list());};
  const handleAddSource = async () => {
    setSrcMsg({type:"",text:""});
    if(!srcName.trim()||!srcUrl.trim()){setSrcMsg({type:"err",text:"Preencha nome e URL"});return;}
    if(!srcUrl.startsWith("http")){setSrcMsg({type:"err",text:"URL deve começar com http"});return;}
    await newsSourcesApi.upsert({name:srcName.trim(),url:srcUrl.trim(),category:srcCategory,active:true});
    setSrcName("");setSrcUrl("");setSrcMsg({type:"ok",text:"✓ Fonte adicionada"});
    await reloadSources();
  };

  // Briefing content for NotebookLM
  const briefingText = useMemo(()=>{
    const sources = editorHeadlines.filter(h=>h.url).map(h=>`- ${h.title}\n  ${h.url}\n  Fonte: ${h.source||"N/A"}`).join("\n");
    return `# BRIEFING SYNC·MI · EDIÇÃO ${fmtDateLong(editorDate)}

## CONTEXTO DO PODCAST
Sync·MI é um podcast semanal de IA, com FOCO DIRETO em inovação tecnológica e EXEMPLOS CLAROS. Tom editorial brasileiro, sucinto, sem hype, sem jargão excessivo. Público: profissionais ocupados que precisam acompanhar IA sem ter tempo de ler tudo.

## INSTRUÇÕES PARA O PODCAST
- Idioma: português brasileiro
- Duração: ~5 minutos
- Formato: 2 hosts em diálogo
- FOCO: inovações concretas em IA, com exemplos práticos
- EVITAR: hype, generalizações, futurologia vazia
- INCLUIR: impacto prático, "o que muda na minha semana?"

## TÍTULO DA EDIÇÃO
${editorTitle || "(sem título)"}

## SUBTÍTULO / TESE
${editorSubtitle || "(sem subtítulo)"}

## RESUMO EDITORIAL
${editorAiSummary || "(sem resumo)"}

## EMPRESAS EM DESTAQUE
${editorCompanies.length>0 ? editorCompanies.join(", ") : "(nenhuma destacada)"}

## TÓPICOS-CHAVE
${editorTopics.length>0 ? editorTopics.map(t=>"#"+t).join(", ") : "(nenhum)"}

## FONTES (use estes URLs no NotebookLM)
${sources || "(sem fontes com URL)"}
`;
  },[editorDate,editorTitle,editorSubtitle,editorAiSummary,editorCompanies,editorTopics,editorHeadlines]);

  const copyBriefing = () => {
    navigator.clipboard.writeText(briefingText);
    setBriefingCopied(true);
    setTimeout(()=>setBriefingCopied(false),2500);
  };

  return <>
    <Ticker vol="01" episodes={newsletters.length}/>
    <Nav isAdmin={true} session={session} onLogout={onLogout}/>

    <main className="container" style={{padding:"40px 32px 80px"}}>
      {/* TABS */}
      <div style={{display:"flex",gap:6,marginBottom:32,paddingBottom:14,borderBottom:`1px solid ${BRAND.rule}`,flexWrap:"wrap"}}>
        {ADMIN_TABS.map((t,i)=>(
          <button key={i} onClick={()=>setTab(i)}
            className={tab===i ? "btn btn-primary btn-sm" : "btn btn-ghost btn-sm"}
            style={{border:tab===i?"1px solid var(--ink)":"1px solid transparent"}}>
            <span>{t.icon}</span> {t.label}
          </button>
        ))}
      </div>

      {/* TAB 0: NEWSLETTER EDITOR */}
      {tab===0 && <div className="fade">
        <SectionLabel num="📰">Edição da Newsletter</SectionLabel>

        <div style={{display:"flex",gap:14,alignItems:"end",marginBottom:24,flexWrap:"wrap"}}>
          <Field label="Data da edição" style={{minWidth:200}}>
            <Input type="date" value={editorDate} onChange={e=>setEditorDate(e.target.value)}/>
          </Field>
          <div style={{flex:1,display:"flex",gap:6,flexWrap:"wrap"}}>
            {newsletters.slice(0,5).map(n=>
              <button key={n.date} onClick={()=>setEditorDate(n.date)} className={editorDate===n.date?"btn btn-primary btn-sm":"btn btn-ghost btn-sm"}>{fmtDate(n.date)}</button>
            )}
          </div>
          <Btn onClick={saveNewsletter}>💾 Publicar</Btn>
          <a href={`?view=public&date=${editorDate}`} target="_blank" className="btn btn-ghost btn-sm">👁 Pré-visualizar</a>
          {newsletters.find(n=>n.date===editorDate) && <button onClick={()=>deleteNewsletter(editorDate)} className="btn btn-ghost btn-sm" style={{borderColor:BRAND.accent,color:BRAND.accent}}>🗑 Apagar</button>}
        </div>

        {nlError && <div className="alert-error">⚠ {nlError}</div>}
        {nlSuccess && <div className="alert-ok">{nlSuccess}</div>}

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:24,marginTop:24}}>
          {/* LEFT — content */}
          <div>
            <div className="card card-pad" style={{padding:24,marginBottom:14,background:`linear-gradient(180deg,${BRAND.paperLight} 0%,rgba(212,165,46,.08) 100%)`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <div className="mono small-caps" style={{color:BRAND.accent}}>📰 TÍTULO PRINCIPAL</div>
                <Btn size="sm" onClick={generateTitle} disabled={isGenTitle||!keyValidated||editorHeadlines.length===0}>{isGenTitle?<><Spin/> Gerando</>:"✨ Gerar"}</Btn>
              </div>
              <Input value={editorTitle} onChange={e=>setEditorTitle(e.target.value)} placeholder="Título magnético da edição"
                style={{fontFamily:"'Fraunces',serif",fontSize:"1.5rem",fontWeight:500,letterSpacing:"-.02em",padding:"14px 18px"}}/>
            </div>

            <div className="card card-pad" style={{padding:20,marginBottom:14}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <div className="mono small-caps" style={{color:BRAND.accentDeep}}>💭 SUBTÍTULO / FRASE DE IMPACTO</div>
                <Btn size="sm" onClick={generateSubtitle} disabled={isGenSubtitle||!keyValidated||editorHeadlines.length===0}>{isGenSubtitle?<><Spin/></>:"✨ Gerar"}</Btn>
              </div>
              <TArea value={editorSubtitle} onChange={e=>setEditorSubtitle(e.target.value)} rows={2} placeholder="Frase que captura a tese editorial"
                style={{fontFamily:"'Fraunces',serif",fontStyle:"italic",fontSize:"1.05rem"}}/>
            </div>

            <div className="card card-pad" style={{padding:20,marginBottom:14}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <div className="mono small-caps" style={{color:BRAND.ink}}>📡 MANCHETES ({editorHeadlines.length})</div>
                <Btn size="sm" onClick={fetchNewsForNewsletter} disabled={isLoadingNl||!keyValidated}>{isLoadingNl?<><Spin/> Buscando</>:"🔍 Buscar IA"}</Btn>
              </div>
              {editorHeadlines.length===0 ? <div style={{padding:24,textAlign:"center",color:BRAND.mute,fontStyle:"italic",fontFamily:"'Fraunces',serif"}}>Clique "Buscar IA" para popular automaticamente</div>
              : <div style={{display:"flex",flexDirection:"column",gap:8,maxHeight:300,overflowY:"auto"}}>
                {editorHeadlines.map((h,i)=>
                  <div key={i} style={{padding:10,background:BRAND.paperDark,borderRadius:6,fontSize:".82rem"}}>
                    <div style={{fontWeight:600,marginBottom:3}}>{i+1}. {h.title}</div>
                    <div style={{color:BRAND.mute,fontSize:".75rem"}}>{h.source||"?"} · {h.category||"IA"} {h.url && <a href={h.url} target="_blank" style={{color:BRAND.accent,marginLeft:6}}>↗</a>}</div>
                  </div>
                )}
              </div>}
            </div>

            <div className="card card-pad" style={{padding:20,marginBottom:14}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <div className="mono small-caps" style={{color:BRAND.ink}}>🧠 RESUMO EDITORIAL</div>
                <Btn size="sm" onClick={generateAiSummary} disabled={isGenSummary||!keyValidated||editorHeadlines.length===0}>{isGenSummary?<><Spin/></>:"✨ Gerar"}</Btn>
              </div>
              <TArea value={editorAiSummary} onChange={e=>setEditorAiSummary(e.target.value)} rows={8} placeholder="Resumo de ~250 palavras"/>
            </div>

            <div className="card card-pad" style={{padding:20,marginBottom:14}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <div className="mono small-caps" style={{color:BRAND.accent}}>🏢 EMPRESAS & TÓPICOS</div>
                <Btn size="sm" onClick={()=>extractCompaniesAndTopics()} disabled={isExtracting||!keyValidated||editorHeadlines.length===0}>{isExtracting?<><Spin/></>:"✨ Extrair"}</Btn>
              </div>
              <div style={{marginBottom:10}}>
                <div className="mono small-caps" style={{color:BRAND.mute,marginBottom:6,fontSize:".62rem"}}>EMPRESAS</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                  {editorCompanies.map((c,i)=><span key={i} className="chip solid" style={{cursor:"pointer"}} onClick={()=>setEditorCompanies(editorCompanies.filter((_,j)=>j!==i))}>{c} ×</span>)}
                  {editorCompanies.length===0 && <span style={{fontSize:".8rem",color:BRAND.mute,fontStyle:"italic"}}>—</span>}
                </div>
              </div>
              <div>
                <div className="mono small-caps" style={{color:BRAND.mute,marginBottom:6,fontSize:".62rem"}}>TÓPICOS</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                  {editorTopics.map((t,i)=><span key={i} className="chip acc" style={{cursor:"pointer"}} onClick={()=>setEditorTopics(editorTopics.filter((_,j)=>j!==i))}>#{t} ×</span>)}
                  {editorTopics.length===0 && <span style={{fontSize:".8rem",color:BRAND.mute,fontStyle:"italic"}}>—</span>}
                </div>
              </div>
            </div>

            <div className="card card-pad" style={{padding:20}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <div className="mono small-caps" style={{color:BRAND.signal}}>🎯 INSIGHTS POR ÁREA</div>
                <Btn size="sm" onClick={generateFocusInsights} disabled={isGenInsights||!keyValidated||editorHeadlines.length===0}>{isGenInsights?<><Spin/></>:"✨ Gerar"}</Btn>
              </div>
              {FOCUS_AREAS.map((area,i)=>{
                const cur = editorFocusInsights.find(x=>x.area===area.id);
                return <div key={area.id} style={{marginBottom:10}}>
                  <div className="mono small-caps" style={{color:BRAND.mute,marginBottom:5,fontSize:".62rem"}}>{area.icon} {area.label}</div>
                  <TArea value={cur?.summary||""} onChange={e=>{const v=e.target.value;setEditorFocusInsights(prev=>{const arr=[...prev];const idx=arr.findIndex(x=>x.area===area.id);if(idx>=0)arr[idx]={...arr[idx],summary:v};else arr.push({area:area.id,summary:v});return arr;});}} rows={2}/>
                </div>;
              })}
            </div>
          </div>

          {/* RIGHT — podcast video + highlights */}
          <div>
            <div className="card card-pad" style={{padding:24,marginBottom:14}}>
              <div className="mono small-caps" style={{color:BRAND.accent,marginBottom:14}}>🎬 EPISÓDIO EM VÍDEO</div>
              <Field label="URL do vídeo (HeyGen, YouTube, etc)" style={{marginBottom:10}}>
                <Input value={editorPodcastUrl} onChange={e=>{setEditorPodcastUrl(e.target.value);setEditorPodcastBlobRef("");}} placeholder="https://app.heygen.com/videos/..."/>
              </Field>
              <Field label="Formato do vídeo" style={{marginBottom:10}}>
                <div style={{display:"flex",gap:6}}>
                  {[
                    {v:"9/16",l:"📱 Vertical"},{v:"16/9",l:"💻 Horizontal"},{v:"1/1",l:"⏹ Quadrado"}
                  ].map(o=>
                    <button key={o.v} onClick={()=>setEditorPodcastAspect(o.v)} className={editorPodcastAspect===o.v?"btn btn-primary btn-sm":"btn btn-ghost btn-sm"} style={{flex:1,justifyContent:"center"}}>{o.l}</button>
                  )}
                </div>
              </Field>
              <Field label="Ou faça upload (.mp4 até 30MB)" style={{marginBottom:10}}>
                <input type="file" accept="video/*" onChange={handleVideoUpload} style={{fontSize:".82rem"}}/>
                {editorPodcastBlobRef && <div className="mono" style={{fontSize:".68rem",color:BRAND.signal,marginTop:5,textTransform:"uppercase",letterSpacing:".1em"}}>✓ Vídeo carregado · {editorPodcastBlobRef.slice(-12)}</div>}
              </Field>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <Field label="Duração (min)">
                  <Input type="number" value={editorPodcastDuration} onChange={e=>setEditorPodcastDuration(+e.target.value||0)}/>
                </Field>
                <Field label="Expirar em (dias)">
                  <Input type="number" value={editorPodcastTtlDays} onChange={e=>setEditorPodcastTtlDays(+e.target.value||0)}/>
                </Field>
              </div>
              {(editorPodcastUrl||editorPodcastBlobRef) && <div style={{marginTop:14,padding:10,background:BRAND.paperDark,borderRadius:6}}>
                <div className="mono small-caps" style={{color:BRAND.mute,marginBottom:8,fontSize:".62rem"}}>PREVIEW</div>
                <VideoPlayer url={editorPodcastBlobRef ? null : editorPodcastUrl} aspectRatio={editorPodcastAspect} maxWidth={editorPodcastAspect==="9/16"?"220px":"100%"}/>
                {editorPodcastBlobRef && <div style={{fontSize:".8rem",color:BRAND.mute,textAlign:"center",padding:14}}>(preview de uploads inline disponível só após salvar)</div>}
              </div>}
            </div>

            <div className="card card-pad" style={{padding:20,background:`linear-gradient(135deg,${BRAND.paperLight},rgba(212,165,46,.08))`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <div className="mono small-caps" style={{color:BRAND.accent}}>✨ HIGHLIGHTS DO EPISÓDIO</div>
                <Btn size="sm" onClick={generateHighlights} disabled={isGenHighlights||!keyValidated}>{isGenHighlights?<><Spin/></>:"✨ Gerar"}</Btn>
              </div>
              <TArea value={editorPodcastHighlights} onChange={e=>setEditorPodcastHighlights(e.target.value)} rows={6} placeholder="Um highlight por linha. Aparecem ao lado do vídeo."/>
            </div>
          </div>
        </div>
      </div>}

      {/* TAB 1: BRIEFING IA (NotebookLM) */}
      {tab===1 && <div className="fade">
        <SectionLabel num="🎙️">Briefing para NotebookLM</SectionLabel>
        <p style={{fontFamily:"'Fraunces',serif",fontStyle:"italic",color:BRAND.inkSoft,fontSize:"1.05rem",marginTop:-24,marginBottom:32,maxWidth:"60ch"}}>
          Copie o briefing abaixo, cole no NotebookLM, gere o Audio Overview, baixe o MP3 e faça upload aqui. O áudio aparece automaticamente ao lado do resumo na newsletter pública.
        </p>

        <div style={{display:"grid",gridTemplateColumns:"3fr 2fr",gap:24}}>
          {/* LEFT — Briefing text */}
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <div className="mono small-caps" style={{color:BRAND.accent}}>📋 BRIEFING · EDIÇÃO {fmtDateMag(editorDate)}</div>
              <div style={{display:"flex",gap:6}}>
                <Btn size="sm" onClick={copyBriefing}>{briefingCopied?"✓ COPIADO":"📋 Copiar tudo"}</Btn>
                <a href="https://notebooklm.google.com/" target="_blank" className="btn btn-ghost btn-sm">↗ Abrir NotebookLM</a>
              </div>
            </div>
            <pre className="card" style={{padding:24,whiteSpace:"pre-wrap",fontFamily:"'JetBrains Mono',monospace",fontSize:".82rem",lineHeight:1.55,color:BRAND.ink,maxHeight:600,overflowY:"auto"}}>{briefingText}</pre>
          </div>

          {/* RIGHT — Upload audio */}
          <div>
            <div className="card card-pad" style={{padding:24,marginBottom:14,background:`linear-gradient(135deg,${BRAND.paperLight},rgba(197,57,28,.05))`}}>
              <div className="mono small-caps" style={{color:BRAND.accent,marginBottom:14}}>📥 UPLOAD DO ÁUDIO</div>
              <p style={{fontSize:".88rem",lineHeight:1.5,color:BRAND.inkSoft,marginTop:0,marginBottom:14}}>
                Após gerar no NotebookLM, baixe o MP3 e selecione aqui.
              </p>

              <Field label="Arquivo de áudio (.mp3, máx 25MB)" style={{marginBottom:14}}>
                <input type="file" accept="audio/*" onChange={handleAudioUpload} style={{fontSize:".82rem"}}/>
              </Field>

              <div className="mono small-caps" style={{color:BRAND.mute,marginBottom:8,fontSize:".62rem"}}>— OU —</div>

              <Field label="URL pública do áudio" style={{marginBottom:14}}>
                <Input value={editorAudioPodcastUrl} onChange={e=>{setEditorAudioPodcastUrl(e.target.value);setEditorAudioPodcastBlobRef("");}} placeholder="https://.../podcast.mp3"/>
              </Field>

              {audioUploadMsg && <div className={audioUploadMsg.startsWith("✓")?"alert-ok":audioUploadMsg.startsWith("❌")?"alert-error":"alert-info"}>{audioUploadMsg}</div>}

              {(editorAudioPodcastUrl||editorAudioPodcastBlobRef) && <div style={{marginTop:14}}>
                <div className="mono small-caps" style={{color:BRAND.mute,marginBottom:8,fontSize:".62rem"}}>PREVIEW</div>
                {editorAudioPodcastBlobRef ? <div style={{fontSize:".82rem",color:BRAND.inkSoft,fontStyle:"italic"}}>Áudio salvo localmente. Disponível na newsletter pública.</div>
                : <AudioPlayer url={editorAudioPodcastUrl}/>}
              </div>}
            </div>

            <div className="card card-pad" style={{padding:18}}>
              <div className="mono small-caps" style={{color:BRAND.mute,marginBottom:10}}>📖 INSTRUÇÕES</div>
              <ol style={{margin:0,paddingLeft:20,fontSize:".88rem",lineHeight:1.65,color:BRAND.inkSoft}}>
                <li>Copie o briefing à esquerda</li>
                <li>Abra <a href="https://notebooklm.google.com/" target="_blank" style={{color:BRAND.accent}}>NotebookLM</a> e crie um novo notebook</li>
                <li>Cole o briefing como uma "Text source"</li>
                <li>Adicione também os URLs das fontes (uma por uma)</li>
                <li>Clique em "Audio Overview" → "Generate"</li>
                <li>Aguarde 5-10 min, depois clique em "Download"</li>
                <li>Volte aqui e faça upload do MP3</li>
                <li>Salve a edição em "Edição da Newsletter"</li>
              </ol>
            </div>
          </div>
        </div>
      </div>}

      {/* TAB 2: FONTES */}
      {tab===2 && <div className="fade">
        <SectionLabel num="📡">Fontes de Notícias</SectionLabel>
        <p style={{fontFamily:"'Fraunces',serif",fontStyle:"italic",color:BRAND.inkSoft,fontSize:"1.05rem",marginTop:-24,marginBottom:32}}>
          Fontes que a IA prioriza ao buscar manchetes. As 12 fontes padrão já vêm pré-cadastradas.
        </p>

        <div className="card card-pad" style={{padding:24,marginBottom:24,background:`linear-gradient(135deg,${BRAND.paperLight},rgba(212,165,46,.06))`}}>
          <div className="mono small-caps" style={{color:BRAND.accent,marginBottom:14}}>➕ ADICIONAR NOVA FONTE</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 2fr 130px auto",gap:10,alignItems:"end"}}>
            <Field label="Nome"><Input value={srcName} onChange={e=>setSrcName(e.target.value)} placeholder="TechCrunch"/></Field>
            <Field label="URL"><Input value={srcUrl} onChange={e=>setSrcUrl(e.target.value)} placeholder="https://..."/></Field>
            <Field label="Categoria">
              <select value={srcCategory} onChange={e=>setSrcCategory(e.target.value)} style={{width:"100%"}}>
                {CAT_LABELS.map(c=><option key={c}>{c}</option>)}
              </select>
            </Field>
            <Btn onClick={handleAddSource}>➕ Adicionar</Btn>
          </div>
          {srcMsg.text && <div className={srcMsg.type==="ok"?"alert-ok":"alert-error"}>{srcMsg.text}</div>}
        </div>

        <div className="mono small-caps" style={{color:BRAND.mute,marginBottom:14}}>
          📡 FONTES CADASTRADAS ({newsSources.length} · {newsSources.filter(s=>s.active).length} ATIVAS)
        </div>

        {newsSources.length===0 ? <div style={{padding:60,textAlign:"center",border:`1px dashed ${BRAND.rule}`,borderRadius:4,color:BRAND.mute,fontStyle:"italic",fontFamily:"'Fraunces',serif"}}>Nenhuma fonte ainda. Adicione acima.</div>
        : <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(320px,1fr))",gap:12}}>
          {newsSources.map(s=>
            <div key={s.id} className="card" style={{padding:14,opacity:s.active?1:.55,borderLeft:s.active?`4px solid ${BRAND.signal}`:`4px solid ${BRAND.mute}`}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:8,marginBottom:8}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:600,fontSize:".95rem",fontFamily:"'Fraunces',serif",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.name}</div>
                  <span className="chip" style={{marginTop:4,fontSize:".58rem"}}>{s.category||"IA"}</span>
                </div>
                <span className={s.active?"chip sig":"chip"} style={{fontSize:".58rem"}}>{s.active?"● ATIVA":"○ INATIVA"}</span>
              </div>
              <a href={s.url} target="_blank" className="mono" style={{fontSize:".7rem",color:BRAND.mute,textDecoration:"none",display:"block",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginBottom:10}}>↗ {s.url}</a>
              <div style={{display:"flex",gap:5}}>
                <button onClick={async()=>{await newsSourcesApi.toggleActive(s.id);await reloadSources();}} className="btn btn-ghost btn-sm" style={{flex:1,justifyContent:"center"}}>{s.active?"🚫 Desativar":"✓ Ativar"}</button>
                <button onClick={async()=>{if(confirm("Apagar?")){await newsSourcesApi.remove(s.id);await reloadSources();}}} className="btn btn-ghost btn-sm" style={{borderColor:BRAND.accent,color:BRAND.accent}}>🗑</button>
              </div>
            </div>
          )}
        </div>}
      </div>}

      {/* TAB 3: AUDIÊNCIA */}
      {tab===3 && <AudiencePanel/>}

      {/* TAB 4: CONFIGURAÇÕES */}
      {tab===4 && <div className="fade">
        <SectionLabel num="⚙️">Configurações</SectionLabel>

        {!SB_OK && <div className="alert-error" style={{marginBottom:24}}>
          ⚠ Supabase não configurado. Preencha SUPABASE_URL e SUPABASE_ANON_KEY no topo do <code>index.html</code>. Veja <code>SETUP.md</code>.
        </div>}

        <div className="card card-pad" style={{padding:28,marginBottom:18}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
            <div className="mono small-caps" style={{color:BRAND.accent,flex:1}}>🤖 ANTHROPIC API (Claude)</div>
            <span className={keyValidated?"chip sig":"chip"}>{keyValidated?"✓ VALIDADA":"PENDENTE"}</span>
          </div>
          <p style={{fontSize:".88rem",color:BRAND.inkSoft,lineHeight:1.5,marginTop:0,marginBottom:14}}>
            Sua chave fica salva no Supabase. Pegue em <a href="https://console.anthropic.com/" target="_blank" style={{color:BRAND.accent}}>console.anthropic.com</a>.
          </p>
          <Field label="Chave (sk-ant-...)" style={{marginBottom:10}}>
            <Input type="password" value={apiKey} onChange={e=>setApiKey(e.target.value)} placeholder="sk-ant-..."/>
          </Field>
          <Btn onClick={testAnthropic} disabled={testing.anthropic||!apiKey}>{testing.anthropic?<><Spin/> Testando</>:"▶ Testar conexão"}</Btn>
          {testResults.anthropic && <div className={testResults.anthropic.status==="ok"?"alert-ok":"alert-error"}>{testResults.anthropic.msg}</div>}
        </div>

        <div className="card card-pad" style={{padding:28}}>
          <div className="mono small-caps" style={{color:BRAND.accent,marginBottom:14}}>🔐 TROCAR SENHA</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:12}}>
            <Field label="Senha atual"><Input type="password" value={pwdCurrent} onChange={e=>setPwdCurrent(e.target.value)}/></Field>
            <Field label="Nova senha (min 6)"><Input type="password" value={pwdNew} onChange={e=>setPwdNew(e.target.value)}/></Field>
            <Field label="Confirmar"><Input type="password" value={pwdNewConfirm} onChange={e=>setPwdNewConfirm(e.target.value)}/></Field>
          </div>
          <Btn onClick={submitPasswordChange} disabled={!pwdCurrent||!pwdNew||!pwdNewConfirm}>🔑 Alterar senha</Btn>
          {pwdMsg.text && <div className={pwdMsg.type==="ok"?"alert-ok":"alert-error"}>{pwdMsg.text}</div>}
        </div>
      </div>}

      {/* TAB 5: ARQUIVO */}
      {tab===5 && <div className="fade">
        <SectionLabel num="📚">Arquivo de Edições</SectionLabel>
        {newsletters.length===0 ? <div style={{padding:80,textAlign:"center",border:`1px dashed ${BRAND.rule}`,borderRadius:4,color:BRAND.mute,fontStyle:"italic",fontFamily:"'Fraunces',serif",fontSize:"1.2rem"}}>Nenhuma edição publicada ainda</div>
        : <div style={{borderTop:`1px solid ${BRAND.ink}`}}>
          {newsletters.map((n,i)=>{
            const num = newsletters.length - i;
            return <div key={n.date} style={{display:"grid",gridTemplateColumns:"80px 110px 1fr 110px auto",gap:24,alignItems:"center",padding:"20px 0",borderBottom:`1px solid ${BRAND.rule}`}}>
              <div className="mono" style={{fontSize:".78rem",color:BRAND.mute}}>№ {padNum(num)}</div>
              <div className="mono" style={{fontSize:".82rem",color:BRAND.inkSoft,textTransform:"uppercase",letterSpacing:".08em"}}>{fmtDateMag(n.date)}</div>
              <div style={{fontFamily:"'Fraunces',serif",fontSize:"1.15rem",letterSpacing:"-.01em"}}>{n.title}</div>
              <div className="mono" style={{fontSize:".72rem",color:BRAND.mute,textAlign:"right"}}>{n.podcastDuration||"—"}min</div>
              <div style={{display:"flex",gap:6}}>
                <button onClick={()=>{setEditorDate(n.date);setTab(0);}} className="btn btn-ghost btn-sm">✏️</button>
                <a href={`?view=public&date=${n.date}`} target="_blank" className="btn btn-ghost btn-sm">👁</a>
                <button onClick={()=>deleteNewsletter(n.date)} className="btn btn-ghost btn-sm" style={{borderColor:BRAND.accent,color:BRAND.accent}}>🗑</button>
              </div>
            </div>;
          })}
        </div>}
      </div>}
    </main>
  </>;
}

// ═══════════════════════════════════════════════════════════════════════════
// APP ROUTER
// ═══════════════════════════════════════════════════════════════════════════
function App(){
  const [session,setSession] = useState(null);
  const [checking,setChecking] = useState(true);
  const [view,setView] = useState(() => {
    const params = new URLSearchParams(window.location.search);
    return params.get("view") || "landing";
  });

  useEffect(()=>{(async()=>{
    if(SB_OK){
      const s = await auth.getSession();
      if(s && s.expiresAt > Date.now()) setSession(s);
    }
    setChecking(false);
  })()},[]);

  if(checking){
    return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:BRAND.mute,fontFamily:"'JetBrains Mono',monospace",fontSize:".8rem",letterSpacing:".14em",textTransform:"uppercase"}}>
      <div style={{textAlign:"center"}}><div style={{fontSize:"2rem",marginBottom:12}}>⏳</div>SINCRONIZANDO...</div>
    </div>;
  }

  if(view === "admin"){
    if(!session) return <LoginPage onSuccess={(s)=>{setSession(s);}}/>;
    return <AdminApp session={session} onLogout={async()=>{await auth.logout();setSession(null);window.location.href="?view=landing";}}/>;
  }

  if(view === "public") return <PublicNewsletter/>;

  return <LandingPage/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
