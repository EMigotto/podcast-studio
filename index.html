  // ── ANIMATED INSTAGRAM VIDEO (Canvas 2D + MediaRecorder → WebM) ──
  async function generateInstagramVideo(){
    setBusy(true); setStage("Gerando vídeo animado…"); setErr("");
    try {
      const W = 1080, H = 1080, FPS = 30, DUR = 6; // 6 second loop
      const canvas = document.createElement("canvas");
      canvas.width = W; canvas.height = H;
      const ctx = canvas.getContext("2d");
      const num = String(L.editionNumber || (list.length+1)).padStart(2, "0");
      const title = L.title || L.topic || "Aprofundamento";
      const takeaway = L.takeaway || "";
      const minRead = estimateLearningReadTime(L);

      // easing
      const easeOut = t => 1 - Math.pow(1-t, 3);
      const clamp01 = t => Math.max(0, Math.min(1, t));
      // wrap text helper
      const wrap = (txt, maxW, font) => {
        ctx.font = font;
        const words = String(txt).split(" "); const lines = []; let line = "";
        for(const w of words){
          const test = line ? line+" "+w : w;
          if(ctx.measureText(test).width > maxW && line){ lines.push(line); line = w; }
          else line = test;
        }
        if(line) lines.push(line);
        return lines;
      };

      // Ensure fonts are loaded before drawing
      try { await document.fonts.load("400 120px Fraunces"); await document.fonts.load("400 40px Mulish"); await document.fonts.load("700 24px 'Space Mono'"); await document.fonts.ready; } catch(_){}

      const drawFrame = (p) => { // p = progress 0..1 over whole duration
        ctx.clearRect(0,0,W,H);
        // ---- TOP PANEL (sage gradient, animated light sweep) ----
        const panelH = H*0.52;
        const g = ctx.createLinearGradient(0, 0, W, panelH);
        const shift = Math.sin(p*Math.PI*2)*0.12;
        g.addColorStop(0, `rgba(126,142,106,0.98)`);
        g.addColorStop(clamp01(0.5+shift), `rgba(94,107,77,0.98)`);
        g.addColorStop(1, `rgba(70,82,56,0.99)`);
        ctx.fillStyle = g; ctx.fillRect(0,0,W,panelH);
        // animated vertical "shelf" lines
        ctx.save(); ctx.globalAlpha = 0.10; ctx.strokeStyle = "#fff"; ctx.lineWidth = 2;
        const off = (p*60)%44;
        for(let x=-44+off; x<W; x+=44){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,panelH); ctx.stroke(); }
        ctx.restore();
        // light sweep
        const sweepX = (p*1.4-0.2)*W*1.5;
        const sweep = ctx.createLinearGradient(sweepX-160,0,sweepX+160,panelH);
        sweep.addColorStop(0,"rgba(255,255,255,0)"); sweep.addColorStop(0.5,"rgba(255,255,255,0.10)"); sweep.addColorStop(1,"rgba(255,255,255,0)");
        ctx.fillStyle = sweep; ctx.fillRect(0,0,W,panelH);

        const pad = 72;
        // kicker
        const kAlpha = easeOut(clamp01((p-0.02)/0.12));
        ctx.globalAlpha = kAlpha; ctx.fillStyle = "rgba(244,241,230,0.8)";
        ctx.font = "700 22px 'Space Mono', monospace"; ctx.textBaseline = "alphabetic";
        ctx.fillText("L E A R N I N G   D E   I N O V A Ç Ã O", pad, 110);
        // big number (fade+rise)
        const nP = easeOut(clamp01((p-0.05)/0.2));
        ctx.globalAlpha = nP; ctx.fillStyle = "rgba(244,241,230,0.94)";
        ctx.font = "italic 300 200px Fraunces, serif";
        ctx.fillText(num, pad, 160 + 200 - (1-nP)*30);
        // panel headline (generic)
        const hP = easeOut(clamp01((p-0.12)/0.25));
        ctx.globalAlpha = hP; ctx.fillStyle = "#F4F1E6";
        ctx.font = "400 52px Fraunces, serif";
        wrap("Quando um tema merece mais que cinco minutos.", W-pad*2, "400 52px Fraunces, serif").forEach((ln,i)=>{
          ctx.fillText(ln, pad, 430 + i*60 + (1-hP)*20);
        });

        // ---- BOTTOM CARD (cream, slides up) ----
        const cardP = easeOut(clamp01((p-0.18)/0.25));
        const cardY = panelH + (1-cardP)*40;
        ctx.globalAlpha = 1;
        ctx.fillStyle = "#F6F2E8"; ctx.fillRect(0, cardY, W, H-cardY);
        // badge
        const bP = easeOut(clamp01((p-0.28)/0.18));
        ctx.globalAlpha = bP;
        ctx.strokeStyle = "rgba(27,25,20,0.2)"; ctx.lineWidth = 2;
        ctx.font = "700 22px 'Space Mono', monospace";
        const badgeTxt = `APROFUNDAMENTO Nº ${num} · ${minRead} MIN`;
        const bw = ctx.measureText(badgeTxt).width;
        const by = cardY + 64;
        ctx.beginPath(); ctx.roundRect(pad-4, by-30, bw+36, 46, 23); ctx.stroke();
        ctx.fillStyle = "#4A463B"; ctx.fillText(badgeTxt, pad+14, by);
        // title
        const tP = easeOut(clamp01((p-0.34)/0.25));
        ctx.globalAlpha = tP; ctx.fillStyle = "#1B1914";
        ctx.font = "430 46px Fraunces, serif";
        let ty = by + 80;
        wrap(title, W-pad*2, "430 46px Fraunces, serif").slice(0,3).forEach((ln,i)=>{
          ctx.fillText(ln, pad, ty + i*54 + (1-tP)*16); 
        });
        ty += Math.min(3, wrap(title, W-pad*2, "430 46px Fraunces, serif").length)*54;
        // takeaway (italic, last to appear)
        if(takeaway){
          const kP = easeOut(clamp01((p-0.5)/0.3));
          ctx.globalAlpha = kP; 
          ctx.fillStyle = "#AF452B"; ctx.font = "700 26px Mulish, sans-serif";
          ctx.fillText("Em uma frase:", pad, ty + 60);
          ctx.fillStyle = "#1B1914"; ctx.font = "italic 380 30px Fraunces, serif";
          wrap(takeaway, W-pad*2, "italic 380 30px Fraunces, serif").slice(0,3).forEach((ln,i)=>{
            ctx.fillText(ln, pad, ty + 104 + i*40 + (1-kP)*12);
          });
        }
        // footer brand
        ctx.globalAlpha = easeOut(clamp01((p-0.6)/0.3));
        ctx.fillStyle = "#1B1914"; ctx.font = "400 34px Fraunces, serif";
        ctx.fillText("Sync", pad, H-56);
        const sw = ctx.measureText("Sync").width;
        ctx.fillStyle = "#AF452B"; ctx.fillText("·MI", pad+sw, H-56);
        ctx.fillStyle = "#7A7466"; ctx.font = "700 18px 'Space Mono', monospace"; ctx.textAlign = "right";
        ctx.fillText("SYNCMI.COM", W-pad, H-58); ctx.textAlign = "left";
        ctx.globalAlpha = 1;
      };

      // Record the canvas
      const stream = canvas.captureStream(FPS);
      const mime = MediaRecorder.isTypeSupported("video/webm;codecs=vp9") ? "video/webm;codecs=vp9" : "video/webm";
      const rec = new MediaRecorder(stream, { mimeType: mime, videoBitsPerSecond: 8_000_000 });
      const chunks = [];
      rec.ondataavailable = e => { if(e.data.size) chunks.push(e.data); };
      const done = new Promise(res => rec.onstop = res);
      rec.start();

      const totalFrames = FPS*DUR;
      for(let f=0; f<totalFrames; f++){
        drawFrame(f/totalFrames);
        await new Promise(r => setTimeout(r, 1000/FPS));
      }
      rec.stop();
      await done;

      const blob = new Blob(chunks, { type: "video/webm" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = `learning-instagram-${slugify(L.topic||topic)}.webm`; a.click();
      setTimeout(()=>URL.revokeObjectURL(url), 800);
      setOk("Vídeo gerado! WebM 1080×1080, 6s. Para Instagram, suba direto (Reels/Stories aceitam WebM convertido — use um conversor p/ MP4 se o feed recusar).");
    } catch(e){ setErr("Falha no vídeo: " + (e.message||"")); }
    setBusy(false); setStage("");
  }

  // helpers for editing arrays
  const updateSec = (k,v) => setL(x=>({...x, sections:{...x.sections, [k]:v}}));
  const updateField = (k,v) => setL(x=>({...x, [k]:v}));
  const updateArr = (key, idx, sub, val) => setL(x=>{ const a=[...(x[key]||[])]; a[idx]={...a[idx],[sub]:val}; return {...x, [key]:a}; });
  const addArr = (key, item) => setL(x=>({...x, [key]:[...(x[key]||[]), item]}));
  const removeArr = (key, idx) => setL(x=>({...x, [key]:(x[key]||[]).filter((_,i)=>i!==idx)}));

  const fieldStyle = {width:"100%", padding:"10px 14px", background:BRAND.paperLight, border:`1px solid ${BRAND.rule}`, borderRadius:8, fontFamily:"'Geist',sans-serif", fontSize:".95rem", color:BRAND.ink, outline:"none", resize:"vertical"};

  return <div className="fade">
    <SectionLabel num="🎓">Learning de Inovação · Aprofundamento</SectionLabel>
    <p style={{color:BRAND.inkSoft, marginBottom:24, maxWidth:"66ch"}}>Crie um aprofundamento estruturado a partir de um tema prático. A IA pesquisa em fontes, propõe a estrutura completa (5 seções, KPIs, gráfico, FAQ, fontes) e o conteúdo fica editável. Refine via chat sem refazer tudo. Exporte HTML standalone, gere posts de divulgação e publique na landing.</p>

    {/* RESEARCH BLOCK */}
    <div className="card card-pad" style={{padding:24,marginBottom:24,background:`linear-gradient(180deg,${BRAND.paperLight} 0%, rgba(229,67,27,.04) 100%)`}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"start",marginBottom:14,gap:14,flexWrap:"wrap"}}>
        <div>
          <div className="mono small-caps" style={{color:BRAND.accent,marginBottom:6}}>🔍 Pesquisa Profunda</div>
          <div style={{fontFamily:"'Instrument Serif',serif",fontSize:"1.25rem",fontStyle:"italic"}}>Digite um tema. A IA pesquisa em fontes e estrutura o aprofundamento completo.</div>
        </div>
        {editingId && <button onClick={newLearning} className="btn btn-ghost btn-sm">+ Novo</button>}
      </div>
      <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
        <input value={topic} onChange={e=>setTopic(e.target.value)} placeholder="Ex.: IA Agêntica, Modelos Multimodais, Computação Soberana, RAG em Produção…" style={{...fieldStyle, flex:1, minWidth:280}}/>
        <Btn onClick={doResearch} disabled={busy||!keyValidated||!topic.trim()}>{busy&&stage.startsWith("Pesquis")?<><Spin/> {stage}</>:"🔍 Pesquisar & Gerar"}</Btn>
      </div>
      <div style={{marginTop:12,paddingTop:12,borderTop:`1px dashed ${BRAND.rule}`,display:"flex",alignItems:"center",justifyContent:"space-between",gap:14,flexWrap:"wrap"}}>
        <div style={{fontSize:".82rem",color:BRAND.mute,maxWidth:"54ch",lineHeight:1.5}}>
          <strong style={{color:BRAND.inkSoft}}>OU</strong> · suba um HTML já pronto (gerado externamente ou exportado de outro Sync·MI Learning). O sistema parseia título, sessões, KPIs, FAQs e fontes do template.
        </div>
        <input type="file" accept=".html,.htm,text/html" ref={fileInputRef} style={{display:"none"}} onChange={handleFileUpload}/>
        <Btn onClick={()=>fileInputRef.current?.click()} disabled={busy} style={{background:"transparent",color:BRAND.ink,border:`1px solid ${BRAND.ink}`}}>{busy&&stage.startsWith("Lendo")?<><Spin/> {stage}</>:"📤 Subir HTML pronto"}</Btn>
      </div>
      {!keyValidated && <div style={{marginTop:10,fontSize:".85rem",color:BRAND.mute}}>Configure e valide a API Key na aba Configurações antes de pesquisar.</div>}
    </div>

    {err && <div className="alert-error">⚠ {err}</div>}
    {ok && <div className="alert-ok">✓ {ok}</div>}

    {(L.title || L.sections?.conceito) && <>
      {/* META FIELDS */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:18}}>
        <Field label="Título">
          <textarea value={L.title||""} onChange={e=>updateField("title",e.target.value)} rows={2} style={fieldStyle}/>
        </Field>
        <Field label="Subtítulo">
          <textarea value={L.subtitle||""} onChange={e=>updateField("subtitle",e.target.value)} rows={2} style={fieldStyle}/>
        </Field>
      </div>
      <Field label="Tags (separadas por vírgula)">
        <input value={(L.chips||[]).join(", ")} onChange={e=>updateField("chips", e.target.value.split(",").map(x=>x.trim()).filter(Boolean))} style={fieldStyle}/>
      </Field>

      {/* 5 SECTIONS */}
      {[
        ["conceito","01 · O CONCEITO","Subtítulo da Seção 01"],
        ["porQueImporta","02 · POR QUE IMPORTA","Subtítulo da Seção 02"],
        ["naPratica","03 · NA PRÁTICA","Subtítulo da Seção 03"],
        ["proximasAcoes","04 · MINHAS PRÓXIMAS AÇÕES",null]
      ].map(([k,label,subLabel])=>(
        <div key={k} style={{marginTop:24,paddingTop:20,borderTop:`1px solid ${BRAND.rule}`}}>
          <div className="mono small-caps" style={{color:BRAND.accent,marginBottom:10,fontSize:".62rem"}}>{label}</div>
          {subLabel && <Field label={subLabel}><input value={L.sectionTitles?.[k]||""} onChange={e=>setL(x=>({...x, sectionTitles:{...x.sectionTitles, [k]:e.target.value}}))} style={fieldStyle}/></Field>}
          <textarea value={L.sections?.[k]||""} onChange={e=>updateSec(k,e.target.value)} rows={k==="proximasAcoes"?5:7} style={{...fieldStyle, marginTop:8, fontFamily:"'Geist',sans-serif"}}/>
        </div>
      ))}

      {/* KPIs */}
      <div style={{marginTop:24,paddingTop:20,borderTop:`1px solid ${BRAND.rule}`}}>
        <div className="mono small-caps" style={{color:BRAND.accent,marginBottom:10}}>KPIs</div>
        {(L.kpis||[]).map((k,i)=>(
          <div key={i} style={{display:"grid",gridTemplateColumns:"1fr 100px 2fr 36px",gap:8,marginBottom:8,alignItems:"center"}}>
            <input value={k.label||""} placeholder="Label" onChange={e=>updateArr("kpis",i,"label",e.target.value)} style={fieldStyle}/>
            <input value={k.value||""} placeholder="60%" onChange={e=>updateArr("kpis",i,"value",e.target.value)} style={fieldStyle}/>
            <input value={k.note||""} placeholder="Contexto" onChange={e=>updateArr("kpis",i,"note",e.target.value)} style={fieldStyle}/>
            <button onClick={()=>removeArr("kpis",i)} className="btn btn-ghost btn-sm" style={{padding:"6px 10px"}}>✕</button>
          </div>
        ))}
        <button onClick={()=>addArr("kpis",{label:"",value:"",note:""})} className="btn btn-ghost btn-sm">+ KPI</button>
      </div>

      {/* CHART DATA */}
      <div style={{marginTop:24,paddingTop:20,borderTop:`1px solid ${BRAND.rule}`}}>
        <div className="mono small-caps" style={{color:BRAND.accent,marginBottom:10}}>Gráfico (dados de barra)</div>
        {(L.chartData||[]).map((c,i)=>(
          <div key={i} style={{display:"grid",gridTemplateColumns:"2fr 100px 36px",gap:8,marginBottom:8,alignItems:"center"}}>
            <input value={c.label||""} placeholder="Label do item" onChange={e=>updateArr("chartData",i,"label",e.target.value)} style={fieldStyle}/>
            <input value={c.value||""} type="number" placeholder="Valor" onChange={e=>updateArr("chartData",i,"value",+e.target.value||0)} style={fieldStyle}/>
            <button onClick={()=>removeArr("chartData",i)} className="btn btn-ghost btn-sm" style={{padding:"6px 10px"}}>✕</button>
          </div>
        ))}
        <button onClick={()=>addArr("chartData",{label:"",value:0})} className="btn btn-ghost btn-sm">+ Item</button>
      </div>

      {/* FAQs — 10 geradas, 5 selecionadas para publicação */}
      <div style={{marginTop:24,paddingTop:20,borderTop:`1px solid ${BRAND.rule}`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:10,flexWrap:"wrap",gap:8}}>
          <div className="mono small-caps" style={{color:BRAND.accent}}>05 · FAQ</div>
          <div style={{fontSize:".78rem",color:(L.faqs||[]).filter(f=>f.selected).length===5?BRAND.ink:BRAND.accent,fontWeight:600}}>
            {(L.faqs||[]).filter(f=>f.selected).length} de 5 selecionadas para publicação
          </div>
        </div>
        <div style={{fontSize:".82rem",color:BRAND.mute,marginBottom:14,lineHeight:1.5}}>
          A IA gera 10 perguntas. Marque exatamente 5 para publicar — só as selecionadas aparecem no HTML e no infográfico. As demais ficam de reserva para refinamentos futuros.
        </div>
        {(L.faqs||[]).map((f,i)=>{
          const selectedCount = (L.faqs||[]).filter(x=>x.selected).length;
          const canSelect = f.selected || selectedCount < 5;
          return <div key={i} style={{marginBottom:14,padding:14,background:f.selected?`${BRAND.accent}0F`:BRAND.paperLight,borderRadius:10,border:`2px solid ${f.selected?BRAND.accent:BRAND.rule}`,transition:"all .2s"}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
              <label style={{display:"inline-flex",alignItems:"center",gap:8,cursor:canSelect?"pointer":"not-allowed",opacity:canSelect?1:.4,fontSize:".82rem",fontWeight:600,color:f.selected?BRAND.accent:BRAND.inkSoft}}>
                <input type="checkbox" checked={!!f.selected} disabled={!canSelect} onChange={e=>updateArr("faqs",i,"selected",e.target.checked)} style={{width:18,height:18,accentColor:BRAND.accent,cursor:canSelect?"pointer":"not-allowed"}}/>
                {f.selected?"✓ Publicada":"Marcar para publicar"}
              </label>
              <span className="mono" style={{fontSize:".58rem",letterSpacing:".18em",color:BRAND.mute,marginLeft:"auto"}}>FAQ № {String(i+1).padStart(2,"0")}</span>
            </div>
            <input value={f.q||""} placeholder="Pergunta" onChange={e=>updateArr("faqs",i,"q",e.target.value)} style={{...fieldStyle, marginBottom:6, fontWeight:600}}/>
            <textarea value={f.a||""} placeholder="Resposta" rows={3} onChange={e=>updateArr("faqs",i,"a",e.target.value)} style={fieldStyle}/>
            <button onClick={()=>removeArr("faqs",i)} className="btn btn-ghost btn-sm" style={{marginTop:6,padding:"4px 10px",fontSize:".72rem"}}>Remover</button>
          </div>;
        })}
        <button onClick={()=>addArr("faqs",{q:"",a:"",selected:false})} className="btn btn-ghost btn-sm">+ FAQ</button>
      </div>

      {/* IMAGENS — sugestões da IA + URLs opcionais */}
      <div style={{marginTop:24,paddingTop:20,borderTop:`1px solid ${BRAND.rule}`}}>
        <div className="mono small-caps" style={{color:BRAND.accent,marginBottom:6}}>🖼 Imagens sugeridas</div>
        <div style={{fontSize:".82rem",color:BRAND.mute,marginBottom:14,lineHeight:1.5}}>
          A IA sugere 3-5 imagens (legenda + query de busca + alt text). Cole uma URL real (ex.: Unsplash) pra ela aparecer no HTML final.
        </div>
        {(L.images||[]).map((img,i)=>(
          <div key={i} style={{marginBottom:12,padding:12,background:BRAND.paperLight,borderRadius:8,border:`1px solid ${BRAND.rule}`}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:6}}>
              <input value={img.caption||""} placeholder="Legenda explicativa" onChange={e=>updateArr("images",i,"caption",e.target.value)} style={fieldStyle}/>
              <input value={img.query||""} placeholder="Busca Unsplash (EN)" onChange={e=>updateArr("images",i,"query",e.target.value)} style={fieldStyle}/>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 36px",gap:8}}>
              <input value={img.url||""} placeholder="https://images.unsplash.com/…" onChange={e=>updateArr("images",i,"url",e.target.value)} style={fieldStyle}/>
              <input value={img.alt||""} placeholder="Alt text" onChange={e=>updateArr("images",i,"alt",e.target.value)} style={fieldStyle}/>
              <button onClick={()=>removeArr("images",i)} className="btn btn-ghost btn-sm" style={{padding:"6px 10px"}}>✕</button>
            </div>
            {img.url && <div style={{marginTop:8,padding:8,background:BRAND.paper,borderRadius:6,fontSize:".75rem",color:BRAND.mute}}>Preview: <a href={img.url} target="_blank" rel="noopener" style={{color:BRAND.accent}}>{img.url.slice(0,60)}…</a></div>}
          </div>
        ))}
        <button onClick={()=>addArr("images",{caption:"",query:"",alt:"",url:""})} className="btn btn-ghost btn-sm">+ Imagem</button>
      </div>

      {/* SOURCES */}
      <div style={{marginTop:24,paddingTop:20,borderTop:`1px solid ${BRAND.rule}`}}>
        <div className="mono small-caps" style={{color:BRAND.accent,marginBottom:10}}>📡 Fontes</div>
        {(L.sources||[]).map((s,i)=>(
          <div key={i} style={{display:"grid",gridTemplateColumns:"2fr 3fr 36px",gap:8,marginBottom:8,alignItems:"center"}}>
            <input value={s.title||""} placeholder="Veículo — Título" onChange={e=>updateArr("sources",i,"title",e.target.value)} style={fieldStyle}/>
            <input value={s.url||""} placeholder="https://…" onChange={e=>updateArr("sources",i,"url",e.target.value)} style={fieldStyle}/>
            <button onClick={()=>removeArr("sources",i)} className="btn btn-ghost btn-sm" style={{padding:"6px 10px"}}>✕</button>
          </div>
        ))}
        <button onClick={()=>addArr("sources",{title:"",url:""})} className="btn btn-ghost btn-sm">+ Fonte</button>
      </div>

      {/* TAKEAWAY */}
      <div style={{marginTop:24,paddingTop:20,borderTop:`1px solid ${BRAND.rule}`}}>
        <Field label="✦ Em uma frase (takeaway)">
          <textarea value={L.takeaway||""} onChange={e=>updateField("takeaway",e.target.value)} rows={2} style={fieldStyle}/>
        </Field>
      </div>

      {/* CHAT REFINEMENT */}
      <div style={{marginTop:30,padding:20,border:`1px solid ${BRAND.rule}`,borderRadius:14,background:BRAND.paperLight}}>
        <div className="mono small-caps" style={{color:BRAND.accent,marginBottom:14}}>💬 Refinar via chat (sem refazer tudo)</div>
        {chatMsgs.length>0 && <div style={{marginBottom:12,maxHeight:200,overflowY:"auto",display:"flex",flexDirection:"column",gap:8}}>
          {chatMsgs.map((m,i)=>(
            <div key={i} style={{padding:"8px 12px",borderRadius:8,background:m.role==="user"?BRAND.paperDark:BRAND.paper,fontSize:".88rem",alignSelf:m.role==="user"?"flex-end":"flex-start",maxWidth:"85%"}}>
              <span className="mono" style={{fontSize:".55rem",opacity:.6,marginRight:8}}>{m.role==="user"?"VOCÊ":"IA"}</span>{m.content}
            </div>
          ))}
        </div>}
        <div style={{display:"flex",gap:8}}>
          <input value={chatInput} onChange={e=>setChatInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")chatRefine()}} placeholder='Ex.: "Adicione um KPI sobre adoção em empresas brasileiras" ou "Reduza o tom da seção 02"' style={{...fieldStyle, flex:1}}/>
          <Btn onClick={chatRefine} disabled={busy||!chatInput.trim()}>{busy&&stage==="Refinando…"?<><Spin/> Refinando</>:"Enviar →"}</Btn>
        </div>
      </div>

      {/* TEASERS (Instagram + LinkedIn) — both use unified LearningCard */}
      <div style={{marginTop:24,padding:20,border:`1px solid ${BRAND.rule}`,borderRadius:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:10}}>
          <div className="mono small-caps" style={{color:BRAND.accent}}>📣 Divulgação · cards exportáveis</div>
          <Btn onClick={generateTeaserPost} disabled={busy||!keyValidated}>{busy&&stage.startsWith("Gerando")?<><Spin/> {stage}</>:"🪄 Gerar posts"}</Btn>
        </div>
        <div style={{fontSize:".82rem",color:BRAND.mute,marginBottom:14,lineHeight:1.5}}>
          O mesmo card usado na landing e no carrossel da página /learnings vira a imagem do Instagram (1080×1080) e do LinkedIn (1200×627).
        </div>

        {/* Instagram square preview (1080×1080) */}
        <div style={{marginBottom:24}}>
          <div className="mono" style={{fontSize:".62rem",letterSpacing:".22em",color:BRAND.mute,marginBottom:10}}>📷 Instagram · 1080 × 1080</div>
          <div style={{maxHeight:480,overflow:"hidden",borderRadius:8,border:`1px solid ${BRAND.rule}`,background:BRAND.paperLight,padding:20,display:"flex",justifyContent:"center"}}>
            <div ref={teaserRef} style={{transform:"scale(.42)",transformOrigin:"top center",width:1080,height:1080,flexShrink:0}}>
              <LearningCard L={{...L, editionNumber: L.editionNumber || (list.length+1)}} variant="square"/>
            </div>
          </div>
        </div>

        {/* LinkedIn horizontal preview (1200×627) */}
        <div style={{marginBottom:24}}>
          <div className="mono" style={{fontSize:".62rem",letterSpacing:".22em",color:BRAND.mute,marginBottom:10}}>💼 LinkedIn · 1200 × 627</div>
          <div style={{maxHeight:380,overflow:"hidden",borderRadius:8,border:`1px solid ${BRAND.rule}`,background:BRAND.paperLight,padding:20,display:"flex",justifyContent:"center"}}>
            <div ref={linkedinRef} style={{transform:"scale(.5)",transformOrigin:"top center",width:1200,height:627,flexShrink:0}}>
              <LearningCard L={{...L, editionNumber: L.editionNumber || (list.length+1)}} variant="linkedin"/>
            </div>
          </div>
        </div>

        <div style={{display:"flex",gap:8,marginTop:8,flexWrap:"wrap",alignItems:"center"}}>
          <Btn onClick={previewLearning} style={{background:BRAND.ink,color:BRAND.paper}}>👁 Preview do Aprofundamento (HTML)</Btn>
          <Btn onClick={downloadTeaserImage} disabled={busy}>📷 Baixar Instagram (PNG)</Btn>
          <Btn onClick={generateInstagramVideo} disabled={busy} style={{background:"#AF452B",color:"#F4F1E6"}}>{busy&&stage.startsWith("Gerando vídeo")?<><Spin/> {stage}</>:"🎬 Baixar vídeo animado (WebM)"}</Btn>
          <Btn onClick={downloadLinkedinImage} disabled={busy}>💼 Baixar LinkedIn (PNG)</Btn>
          <Btn onClick={downloadHTML}>📄 Baixar HTML standalone</Btn>
          <Btn onClick={()=>setShowJson(x=>!x)}>{showJson?"Esconder":"Ver"} JSON</Btn>
          {L.rawHtml && <label style={{display:"inline-flex",alignItems:"center",gap:8,padding:"8px 12px",background:L.preserveRaw?`${BRAND.accent}1A`:BRAND.paperLight,border:`1px solid ${L.preserveRaw?BRAND.accent:BRAND.rule}`,borderRadius:8,cursor:"pointer",fontSize:".84rem",fontWeight:600,color:L.preserveRaw?BRAND.accent:BRAND.inkSoft}}>
            <input type="checkbox" checked={!!L.preserveRaw} onChange={e=>updateField("preserveRaw",e.target.checked)} style={{accentColor:BRAND.accent,width:16,height:16}}/>
            🔒 Preservar HTML original (não regenerar)
          </label>}
        </div>
        {L.rawHtml && <div style={{marginTop:8,fontSize:".78rem",color:BRAND.mute,lineHeight:1.5}}>
          {L.preserveRaw
            ? <>✓ HTML original ({Math.round(L.rawHtml.length/1024)} KB) será usado tal qual no Preview, Download e Publicação. Desative o toggle para usar a versão regenerada pelo template Sync·MI.</>
            : <>⚠ HTML original ({Math.round(L.rawHtml.length/1024)} KB) <strong>não</strong> será usado — a versão regenerada via template Sync·MI será publicada. Ative o toggle para preservar o original.</>}
        </div>}
        {L.teaser?.linkedin && <div style={{marginTop:14,padding:14,background:BRAND.paperLight,borderRadius:10,border:`1px solid ${BRAND.rule}`}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><div className="mono small-caps" style={{color:BRAND.inkSoft,fontSize:".58rem"}}>POST · LINKEDIN</div><button onClick={()=>{navigator.clipboard.writeText(L.teaser.linkedin); setOk("LinkedIn copiado")}} className="btn btn-ghost btn-sm" style={{padding:"4px 10px",fontSize:".72rem"}}>📋 Copiar</button></div>
          <div style={{whiteSpace:"pre-wrap",fontSize:".92rem",lineHeight:1.55}}>{L.teaser.linkedin}</div>
        </div>}
        {L.teaser?.instagramCaption && <div style={{marginTop:10,padding:14,background:BRAND.paperLight,borderRadius:10,border:`1px solid ${BRAND.rule}`}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><div className="mono small-caps" style={{color:BRAND.inkSoft,fontSize:".58rem"}}>LEGENDA · INSTAGRAM</div><button onClick={()=>{navigator.clipboard.writeText(L.teaser.instagramCaption); setOk("Legenda IG copiada")}} className="btn btn-ghost btn-sm" style={{padding:"4px 10px",fontSize:".72rem"}}>📋 Copiar</button></div>
          <div style={{whiteSpace:"pre-wrap",fontSize:".92rem",lineHeight:1.55}}>{L.teaser.instagramCaption}</div>
        </div>}
      </div>

      {showJson && <pre style={{marginTop:18,padding:16,background:BRAND.ink,color:BRAND.paper,borderRadius:8,overflow:"auto",maxHeight:300,fontSize:".75rem"}}>{JSON.stringify(L,null,2)}</pre>}

      {/* SAVE */}
      <div style={{display:"flex",gap:10,marginTop:24,paddingTop:20,borderTop:`2px solid ${BRAND.ink}`,flexWrap:"wrap"}}>
        <Btn onClick={save} disabled={busy} style={{background:BRAND.ink,color:BRAND.paper,padding:"12px 28px"}}>{busy?<><Spin/> Salvando</>:editingId?"💾 Atualizar Learning":"💾 Publicar Learning"}</Btn>
        <div style={{flex:1}}/>
        {editingId && <button onClick={()=>removeLearning(editingId)} className="btn btn-ghost btn-sm" style={{borderColor:BRAND.accent,color:BRAND.accent}}>🗑 Apagar</button>}
      </div>
    </>}

    {/* PUBLISHED LIST */}
    {list.length>0 && <div style={{marginTop:48,paddingTop:24,borderTop:`2px solid ${BRAND.ink}`}}>
      <div className="mono small-caps" style={{color:BRAND.accent,marginBottom:14}}>📚 Aprofundamentos Publicados ({list.length})</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))",gap:12}}>
        {list.map(x=>(
          <div key={x.id} style={{padding:16,border:`1px solid ${BRAND.rule}`,borderRadius:10,background:editingId===x.id?BRAND.paperDark:BRAND.paperLight,transition:"all .2s"}}>
            <div className="mono small-caps" style={{color:BRAND.accent,fontSize:".58rem",marginBottom:6}}>№ {String(x.editionNumber).padStart(2,"0")} · {new Date(x.createdAt).toLocaleDateString("pt-BR")}</div>
            <div style={{fontFamily:"'Instrument Serif',serif",fontSize:"1.15rem",lineHeight:1.2,marginBottom:10}}>{x.title||x.topic}</div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              <button onClick={()=>loadFor(x.id)} className="btn btn-ghost btn-sm" style={{padding:"4px 10px",fontSize:".72rem"}}>✏️ Editar</button>
              <button onClick={()=>removeLearning(x.id)} className="btn btn-ghost btn-sm" style={{padding:"4px 10px",fontSize:".72rem",color:BRAND.accent,borderColor:`${BRAND.accent}55`}}>🗑</button>
            </div>
          </div>
        ))}
      </div>
    </div>}
  </div>;
}


function AdminApp({ session, onLogout }){

  const [storageReady,setStorageReady] = useState(false);

  // Anthropic
  const [apiKey,setApiKey] = useState("");
  const [keyValidated,setKeyValidated] = useState(false);
  const [testing,setTesting] = useState({});
  const [testResults,setTestResults] = useState({});

  // Password change
  const [pwdCurrent,setPwdCurrent] = useState("");

MANCHETES${featuredIdx.size>0?" (com destaques marcados *)":""}:

ROTEIRO:
${t.slice(0,3000)}`,
        false, 1500);
      try {

        </div>

        {newsSources.length===0 ? <div style={{padding:60,textAlign:"center",border:`1px dashed ${BRAND.rule}`,borderRadius:4,color:BRAND.mute,fontStyle:"italic",fontFamily:"'Fraunces',serif"}}>Nenhuma fonte ainda. Adicione acima ou clique em "Restaurar fontes padrão".</div>
        : (() => {
            // Group sources by category
            const groups = {};
            newsSources.forEach(s=>{(groups[s.category||"Outros"]=groups[s.category||"Outros"]||[]).push(s);});
            // Custom order: Brasil → IA → LLM → Podcast → Sistêmico → resto
            const order = ["Brasil","IA","LLM","Podcast","Sistêmico","Produtividade","Hardware","Software","Cloud","Startups","Regulação","Outros"];
            const sortedCats = Object.keys(groups).sort((a,b)=>{
              const ia = order.indexOf(a), ib = order.indexOf(b);
              return (ia===-1?99:ia) - (ib===-1?99:ib);
            });
            return sortedCats.map(cat=>(
              <div key={cat} style={{marginBottom:22}}>
                <div className="mono small-caps" style={{color:BRAND.accent,marginBottom:10,paddingBottom:6,borderBottom:`1px solid ${BRAND.rule}`}}>
                  {cat} ({groups[cat].length})
                </div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(320px,1fr))",gap:10}}>
                  {groups[cat].map(s=>
                    <div key={s.id} className="card" style={{padding:14,opacity:s.active?1:.55,borderLeft:s.active?`4px solid ${BRAND.signal}`:`4px solid ${BRAND.mute}`}}>
                      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:8,marginBottom:8}}>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontWeight:600,fontSize:".95rem",fontFamily:"'Fraunces',serif",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.name}</div>
                        </div>
                        <span className={s.active?"chip sig":"chip"} style={{fontSize:".58rem"}}>{s.active?"● ATIVA":"○ INATIVA"}</span>
                      </div>
                      <a href={s.url} target="_blank" rel="noreferrer" className="mono" style={{fontSize:".7rem",color:BRAND.mute,textDecoration:"none",display:"block",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginBottom:10}}>↗ {s.url}</a>
                      <div style={{display:"flex",gap:5}}>
                        <button onClick={async()=>{await newsSourcesApi.toggleActive(s.id);await reloadSources();}} className="btn btn-ghost btn-sm" style={{flex:1,justifyContent:"center"}}>{s.active?"🚫 Desativar":"✓ Ativar"}</button>
                        <button onClick={async()=>{if(confirm("Apagar?")){await newsSourcesApi.remove(s.id);await reloadSources();}}} className="btn btn-ghost btn-sm" style={{borderColor:BRAND.accent,color:BRAND.accent}}>🗑</button>
                      </div>
                    </div>
                  )}
                </div>
              </div>
            ));
          })()}
      </div>}

      {/* TAB 4: AUDIÊNCIA */}
      {tab===5 && <AudiencePanel/>}

      {/* TAB 5: CONFIGURAÇÕES */}
      {tab===6 && <div className="fade">
        <SectionLabel num="⚙️">Configurações</SectionLabel>

        {!SB_OK && <div className="alert-error" style={{marginBottom:24}}>
          ⚠ Supabase não configurado. Defina as env vars <code>SUPABASE_URL</code> e <code>SUPABASE_ANON_KEY</code> no Vercel (ou preencha os fallbacks no topo do <code>index.html</code>). Veja <code>SETUP.md</code>.
        </div>}

        <div className="card card-pad" style={{padding:28,marginBottom:18}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
            <div className="mono small-caps" style={{color:BRAND.accent,flex:1}}>🤖 ANTHROPIC API (Claude)</div>
            <span className={keyValidated?"chip sig":"chip"}>{keyValidated?"✓ VALIDADA":"PENDENTE"}</span>
          </div>
          <p style={{fontSize:".88rem",color:BRAND.inkSoft,lineHeight:1.5,marginTop:0,marginBottom:14}}>
            Sua chave fica salva no Supabase. Pegue em <a href="https://console.anthropic.com/" target="_blank" style={{color:BRAND.accent}}>console.anthropic.com</a>.
          </p>
          <Field label="Chave (sk-ant-...)" style={{marginBottom:10}}>
            <Input type="password" value={apiKey} onChange={e=>setApiKey(e.target.value)} placeholder="sk-ant-..."/>
          </Field>
          <Btn onClick={testAnthropic} disabled={testing.anthropic||!apiKey}>{testing.anthropic?<><Spin/> Testando</>:"▶ Testar conexão"}</Btn>
          {testResults.anthropic && <div className={testResults.anthropic.status==="ok"?"alert-ok":"alert-error"}>{testResults.anthropic.msg}</div>}
        </div>

        <div className="card card-pad" style={{padding:28}}>
          <div className="mono small-caps" style={{color:BRAND.accent,marginBottom:14}}>🔐 TROCAR SENHA</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:12}}>
            <Field label="Senha atual"><Input type="password" value={pwdCurrent} onChange={e=>setPwdCurrent(e.target.value)}/></Field>
            <Field label="Nova senha (min 6)"><Input type="password" value={pwdNew} onChange={e=>setPwdNew(e.target.value)}/></Field>
            <Field label="Confirmar"><Input type="password" value={pwdNewConfirm} onChange={e=>setPwdNewConfirm(e.target.value)}/></Field>
          </div>
          <Btn onClick={submitPasswordChange} disabled={!pwdCurrent||!pwdNew||!pwdNewConfirm}>🔑 Alterar senha</Btn>
          {pwdMsg.text && <div className={pwdMsg.type==="ok"?"alert-ok":"alert-error"}>{pwdMsg.text}</div>}
        </div>
      </div>}

      {/* TAB 6: ARQUIVO */}
      {tab===7 && <div className="fade">
        <SectionLabel num="📚">Arquivo de Edições</SectionLabel>
        {newsletters.length===0 ? <div style={{padding:80,textAlign:"center",border:`1px dashed ${BRAND.rule}`,borderRadius:4,color:BRAND.mute,fontStyle:"italic",fontFamily:"'Fraunces',serif",fontSize:"1.2rem"}}>Nenhuma edição publicada ainda</div>
        : <div style={{borderTop:`1px solid ${BRAND.ink}`}}>
          {newsletters.map((n,i)=>{
            const num = newsletters.length - i;
            return <div key={n.date} style={{display:"grid",gridTemplateColumns:"80px 110px 1fr 110px auto",gap:24,alignItems:"center",padding:"20px 0",borderBottom:`1px solid ${BRAND.rule}`}}>
              <div className="mono" style={{fontSize:".78rem",color:BRAND.mute}}>№ {padNum(num)}</div>
              <div className="mono" style={{fontSize:".82rem",color:BRAND.inkSoft,textTransform:"uppercase",letterSpacing:".08em"}}>{fmtDateMag(n.date)}</div>
              <div style={{fontFamily:"'Fraunces',serif",fontSize:"1.15rem",letterSpacing:"-.01em"}}>{n.title}</div>
              <div className="mono" style={{fontSize:".72rem",color:BRAND.mute,textAlign:"right"}}>{n.podcastDuration||"—"}min</div>
              <div style={{display:"flex",gap:6}}>
                <button onClick={()=>{setEditorDate(n.date);setTab(0);}} className="btn btn-ghost btn-sm">✏️</button>
                <a href={`?view=public&date=${n.date}`} target="_blank" className="btn btn-ghost btn-sm">👁</a>
                <button onClick={()=>deleteNewsletter(n.date)} className="btn btn-ghost btn-sm" style={{borderColor:BRAND.accent,color:BRAND.accent}}>🗑</button>
              </div>
            </div>;
          })}
        </div>}
      </div>}
    </main>
  </>;
}

// APP ROUTER
// ═══════════════════════════════════════════════════════════════════════════
function App(){
  const [session,setSession] = useState(null);
  const [checking,setChecking] = useState(true);
  const [view,setView] = useState(() => {
    const params = new URLSearchParams(window.location.search);
    return params.get("view") || "landing";
  });

  useEffect(()=>{(async()=>{
    if(SB_OK){
      const s = await auth.getSession();
      if(s && s.expiresAt > Date.now()) setSession(s);
    }
    setChecking(false);
  })()},[]);

  if(checking){
    return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:BRAND.mute,fontFamily:"'JetBrains Mono',monospace",fontSize:".8rem",letterSpacing:".14em",textTransform:"uppercase"}}>
      <div style={{textAlign:"center"}}><div style={{fontSize:"2rem",marginBottom:12}}>⏳</div>SINCRONIZANDO...</div>
    </div>;
  }

  if(view === "admin"){
    if(!session) return <LoginPage onSuccess={(s)=>{setSession(s);}}/>;
    return <AdminApp session={session} onLogout={async()=>{await auth.logout();setSession(null);window.location.href="?view=landing";}}/>;
  }

  if(view === "public") return <PublicNewsletter/>;
  if(view === "podcasts") return <PodcastsPage/>;
  if(view === "podcast") return <PodcastDetail/>;
  if(view === "learnings") return <LearningsPage/>;
  if(view === "learning") return <LearningView/>;

  return <LandingPage/>;
}

// ── Bootstrap: carrega config do servidor (/api/config → env vars do Vercel),
// inicializa o Supabase e só então renderiza o app. Fallback gracioso se /api
// não existir (ex: abrir o arquivo local) ou demorar demais.
(async function bootstrap(){
  try {
    const ctrl = new AbortController();
    const t = setTimeout(()=>ctrl.abort(), 4000);
    const r = await fetch("/api/config", { cache:"no-store", signal: ctrl.signal });
    clearTimeout(t);
    if(r.ok){
      const cfg = await r.json();
      if(cfg && cfg.supabaseUrl && cfg.supabaseAnonKey){
        initSupabase(cfg.supabaseUrl, cfg.supabaseAnonKey);
      }
    }
  } catch(e){ /* sem /api (local) ou timeout — usa o fallback hardcoded, se houver */ }
  if(!SB_OK) initSupabase(SUPABASE_URL, SUPABASE_ANON_KEY);
  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

  // ── Smooth scroll (Floema-style momentum) via Lenis ──
  // Disabled on touch devices (mobile/tablet) where native scroll is smoother + avoids jank
  try {
    const isTouch = window.matchMedia("(hover: none), (pointer: coarse)").matches || window.innerWidth < 1024;
    if(window.Lenis && !isTouch && !window.matchMedia("(prefers-reduced-motion: reduce)").matches){
      const lenis = new window.Lenis({
        duration: 1.15,
        easing: (t)=> Math.min(1, 1.001 - Math.pow(2, -10 * t)), // expo-out
        smoothWheel: true,
        wheelMultiplier: 0.9,
        touchMultiplier: 1.5,
      });
      function raf(time){ lenis.raf(time); requestAnimationFrame(raf); }
      requestAnimationFrame(raf);
      // Keep GSAP ScrollTrigger in sync with Lenis
      if(window.ScrollTrigger){
        lenis.on("scroll", window.ScrollTrigger.update);
        window.gsap && window.gsap.ticker && window.gsap.ticker.add((t)=>lenis.raf(t*1000));
        window.gsap && window.gsap.ticker && window.gsap.ticker.lagSmoothing(0);
      }
      // Anchor links scroll smoothly via Lenis
      document.addEventListener("click", (e)=>{
        const a = e.target.closest('a[href^="#"], a[href*="#"]');
        if(!a) return;
        const href = a.getAttribute("href")||"";
        const hash = href.includes("#") ? "#"+href.split("#")[1] : "";
        if(hash && hash.length>1){
          const el = document.querySelector(hash);
          if(el){ e.preventDefault(); lenis.scrollTo(el, { offset: -20 }); }
        }
      });
      window.__lenis = lenis;
    }
  } catch(e){ /* smooth scroll optional — fail silently */ }
})();
</script>
