// Map key prefix → table name (each table: id text PK, data jsonb)
const TABLE_MAP = { "newsletter":"newsletters", "comment":"comments", "view":"views", "episode":"episodes", "videoblob":"videoblobs", "user":"settings" };
const tableForKey = k => TABLE_MAP[k.split(":")[0]] || null;

const db = {
  async get(k){
    if(!SB_OK){const v=localStorage.getItem(k);return v?JSON.parse(v):null}
    const tbl=tableForKey(k); if(!tbl)return null;
    try{const{data,error}=await sb.from(tbl).select("data").eq("id",k).maybeSingle(); if(error||!data)return null; return data.data}catch{return null}
  },
  async set(k,v){
    if(!SB_OK){try{localStorage.setItem(k,JSON.stringify(v));return{ok:true}}catch(e){return{ok:false,error:e.message,size:JSON.stringify(v).length}}}
    const tbl=tableForKey(k); if(!tbl)return{ok:false,error:"Sem mapeamento para "+k};
    try{const{error}=await sb.from(tbl).upsert({id:k,data:v}); if(error)return{ok:false,error:error.message}; return{ok:true}}catch(e){return{ok:false,error:e.message}}
  },
  async delete(k){
    if(!SB_OK){try{localStorage.removeItem(k);return{ok:true}}catch{return{ok:false}}}
    const tbl=tableForKey(k); if(!tbl)return{ok:false};
    try{const{error}=await sb.from(tbl).delete().eq("id",k); return{ok:!error}}catch{return{ok:false}}
  },
  async listByPrefix(p){
    if(!SB_OK){const items=[];for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k?.startsWith(p)){const v=localStorage.getItem(k);if(v)try{items.push(JSON.parse(v))}catch{}}}return items}
    const tbl=tableForKey(p); if(!tbl)return[];
    try{
      let q=sb.from(tbl).select("id,data");
      const segs=p.split(":");
      if(segs.length>1&&segs[1])q=q.like("id",p+"%");
      const{data,error}=await q.limit(1000);
      if(error||!data)return[];
      return data.map(r=>r.data).filter(Boolean);
    }catch{return[]}
  },
  async listEpisodes(){return(await db.listByPrefix("episode:")).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0))},

// ANTHROPIC
async function callAnthropic(apiKey,body){
  const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify(body)});
  const text=await res.text();let data;try{data=JSON.parse(text)}catch{data={raw:text}}
  if(!res.ok){const err=new Error(data?.error?.message||`HTTP ${res.status}`);err.status=res.status;err.data=data;throw err}
  return data;
}
async function callClaude(apiKey,prompt,useSearch=false,maxTokens=1500,sys=null){
  const body={model:ANTHROPIC_MODEL,max_tokens:maxTokens,messages:[{role:"user",content:prompt}]};
  if(sys)body.system=sys;if(useSearch)body.tools=[{type:"web_search_20250305",name:"web_search"}];
  let data=await callAnthropic(apiKey,body);
  let text=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("");
  if(text.trim())return text;
  if(useSearch&&data.stop_reason==="tool_use"){
    const tr=(data.content||[]).filter(b=>b.type==="tool_use").map(b=>({type:"tool_result",tool_use_id:b.id,content:"Search executed."}));
    const body2={model:ANTHROPIC_MODEL,max_tokens:maxTokens,tools:[{type:"web_search_20250305",name:"web_search"}],messages:[{role:"user",content:prompt},{role:"assistant",content:data.content},{role:"user",content:tr}]};
    if(sys)body2.system=sys;
    data=await callAnthropic(apiKey,body2);
    return(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("");
  }
  return text;
}

// VIDEO PLAYER
function getVideoEmbedInfo(url){
  if(!url)return null;
  if(url.includes("app.heygen.com/videos/")||url.includes("share.heygen.com"))return{type:"iframe",src:url};
  const yt=url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]+)/);
  if(yt)return{type:"iframe",src:`https://www.youtube.com/embed/${yt[1]}`};
  const vm=url.match(/vimeo\.com\/(\d+)/);
  if(vm)return{type:"iframe",src:`https://player.vimeo.com/video/${vm[1]}`};
  if(url.startsWith("data:video")||/\.(mp4|webm|ogg|mov|m4v)(\?|$)/i.test(url))return{type:"video",src:url};
  if(url.includes("heygen.ai")&&url.includes(".mp4"))return{type:"video",src:url};
  return{type:"iframe",src:url};
}
const VideoPlayer=memo(function VideoPlayer({url,poster,aspectRatio="16/9",maxWidth}){
  const info=getVideoEmbedInfo(url);if(!info)return null;
  const[w,h]=aspectRatio.split("/").map(Number);
  const pb=`${(h/w)*100}%`;
  const cs={width:"100%",maxWidth:maxWidth||(aspectRatio==="9/16"?340:"100%"),margin:"0 auto"};
  if(info.type==="video"){
    return<div style={cs}><div style={{position:"relative",paddingBottom:pb,height:0,overflow:"hidden",borderRadius:12,background:"#000"}}><video controls poster={poster} style={{position:"absolute",top:0,left:0,width:"100%",height:"100%",objectFit:"contain",borderRadius:12,background:"#000"}}><source src={info.src}/></video></div></div>;
  }
  return<div style={cs}><div style={{position:"relative",paddingBottom:pb,height:0,overflow:"hidden",borderRadius:12,background:"#000"}}><iframe src={info.src} style={{position:"absolute",top:0,left:0,width:"100%",height:"100%",border:0,borderRadius:12}} allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture;fullscreen" allowFullScreen title="Video Player"/></div></div>;
});

// PODCAST PREVIEW (admin) — loads blob async if needed
function PodcastPreview({blobRef,url,aspectRatio="16/9"}){
  const[resolvedUrl,setResolvedUrl]=useState(url);
  useEffect(()=>{if(blobRef)db.getVideoBlob(blobRef).then(d=>setResolvedUrl(d||""));else setResolvedUrl(url)},[blobRef,url]);
  if(!resolvedUrl)return null;
  return<VideoPlayer url={resolvedUrl} aspectRatio={aspectRatio} maxWidth={aspectRatio==="9/16"?220:"100%"}/>;
}

// BREAKDOWN CARD
function BreakdownCard({title,data,keyFmt,T}){
  const total=data.reduce((s,[,n])=>s+n,0)||1;
  return<div style={{background:T.cardBg,border:`1px solid ${T.cardBorder}`,borderRadius:11,padding:14}}>
    <div style={{fontSize:11,color:T.textMuted,fontWeight:700,marginBottom:10,letterSpacing:".05em"}}>{title}</div>
    {data.length===0?<div style={{fontSize:11,color:T.textMuted,padding:"10px 0",fontStyle:"italic"}}>—</div>:
      <div style={{display:"flex",flexDirection:"column",gap:6}}>
        {data.slice(0,8).map(([k,n])=><div key={k}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:3,fontSize:11}}>
            <span style={{color:T.text,fontWeight:500}}>{keyFmt?keyFmt(k):k}</span>
            <span style={{color:T.textMuted,fontFamily:"'JetBrains Mono',monospace"}}>{n}</span>
          </div>
          <div style={{height:5,background:T.cardBorder,borderRadius:3,overflow:"hidden"}}>
            <div style={{width:`${(n/total)*100}%`,height:"100%",background:BRAND.navy,borderRadius:3}}/>
          </div>
        </div>)}
      </div>}
  </div>;
}

      </div>}

      {tab===2&&<AudiencePanel T={T} isDark={isDark}/>}

      {tab===3&&keyValidated&&<div className="fade">
        <div style={{borderBottom:`1px solid ${T.cardBorder}`,paddingBottom:14,marginBottom:14}}>
          <h2 style={{margin:0,fontSize:24,fontWeight:800,fontFamily:"'Fraunces',serif",color:T.text}}>📡 Pauta</h2>
          <p style={{margin:"4px 0 0",fontSize:12,color:T.textMuted,fontStyle:"italic"}}>Para episódios de podcast</p>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:22}}>
          <div>
            <Field label="Podcast" mt={0} dark={isDark}><TextInput dark={isDark} value={podcastName} onChange={e=>setPodcastName(e.target.value)}/></Field>
            <Field label="Episódio" dark={isDark}><TextInput dark={isDark} value={epTitle} onChange={e=>setEpTitle(e.target.value)}/></Field>
            <Field label="Duração" dark={isDark}>
              <div style={{display:"flex",gap:6}}>{[5,8,10,12,15].map(d=><button key={d} onClick={()=>setDuration(d)} style={{flex:1,padding:"8px 0",borderRadius:7,border:"1px solid",borderColor:duration===d?BRAND.navy:T.cardBorder,background:duration===d?`${BRAND.navy}20`:T.cardBg,color:duration===d?(isDark?BRAND.gold:BRAND.navy):T.textMuted,cursor:"pointer",fontWeight:700,fontSize:12}}>{d}m</button>)}</div>
            </Field>
            <Field label="Avatar" dark={isDark}>
              <div onClick={()=>fileRef.current?.click()} style={{border:`2px dashed ${BRAND.navy}40`,borderRadius:10,padding:16,textAlign:"center",cursor:"pointer",background:T.cardBg}}>{avatarPreview?<img src={avatarPreview} alt="" style={{width:60,height:60,borderRadius:"50%",objectFit:"cover"}}/>:<>🤳 Foto</>}<input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={handleUpload}/></div>
            </Field>
          </div>
          <div>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
              <div style={{fontSize:9,fontWeight:700,color:isDark?BRAND.gold:BRAND.muted,letterSpacing:".1em",textTransform:"uppercase"}}>Manchetes</div>
              <div style={{display:"flex",gap:6}}>
                {editorHeadlines.length>0&&<Btn secondary onClick={importHeadlinesFromNewsletter}>📥 Newsletter</Btn>}
                <Btn onClick={fetchNews} disabled={loadingNews}>{loadingNews?<><Spinner/> ...</>:"🔍"}</Btn>
              </div>
            </div>
            <ErrorBox msg={newsError}/>
            <div style={{display:"flex",flexDirection:"column",gap:6,maxHeight:380,overflowY:"auto"}}>
              {headlines.map((h,i)=>{const sel=selHL.find(x=>x.title===h.title);return<div key={i} onClick={()=>toggleHL(h)} style={{background:sel?`${BRAND.navy}15`:T.cardBg,border:`1px solid ${sel?BRAND.navy:T.cardBorder}`,borderRadius:9,padding:"10px 12px",cursor:"pointer"}}>
                <div style={{fontSize:12,fontWeight:600,color:sel?(isDark?BRAND.gold:BRAND.navy):T.text}}>{h.title}</div>
                <div style={{fontSize:10,color:T.textMuted,marginTop:3}}>{h.summary}</div>
              </div>})}
            </div>
            {headlines.length>0&&<Btn onClick={genQuickScript} disabled={isGenQuick} style={{width:"100%",marginTop:8}}>{isGenQuick?<><Spinner/> ...</>:"📖 Roteiro"}</Btn>}
          </div>
        </div>
        {quickScript&&<div style={{marginTop:18,background:`${BRAND.sage}15`,border:`1px solid ${BRAND.sage}40`,borderRadius:11,padding:16}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
            <div style={{fontWeight:700,color:BRAND.sageDark}}>📖 Roteiro</div>
            <Btn onClick={()=>{setRefined(quickScript);markDone(3);setTab(4)}}>✍️ Usar →</Btn>
          </div>
          <div style={{fontSize:12,color:T.text,whiteSpace:"pre-wrap",maxHeight:300,overflowY:"auto"}}>{quickScript}</div>
        </div>}
      </div>}

      {tab===4&&keyValidated&&<div className="fade">
        <div style={{borderBottom:`1px solid ${T.cardBorder}`,paddingBottom:14,marginBottom:14}}><h2 style={{margin:0,fontSize:24,fontWeight:800,fontFamily:"'Fraunces',serif",color:T.text}}>✍️ Roteiro</h2></div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:22}}>
          <div>
            <Field label="Conteúdo" mt={0} dark={isDark}>
              <TextArea dark={isDark} value={rawText} onChange={e=>setRawText(e.target.value)} rows={10}/>
              <Btn onClick={refineScript} disabled={isRefining||!rawText.trim()} style={{marginTop:8}}>{isRefining?<><Spinner/> ...</>:"✨ Refinar"}</Btn>
              <ErrorBox msg={refineError}/>
            </Field>
            <Field label="E-mail" dark={isDark}>
              <TextInput dark={isDark} value={emailSubject} onChange={e=>setEmailSubject(e.target.value)} placeholder="Assunto"/>
              <div style={{marginTop:6}}><TextArea dark={isDark} value={distEmail} onChange={e=>setDistEmail(e.target.value)} rows={4}/></div>
              <Btn onClick={genEmailCopy} disabled={isGenEmail} style={{marginTop:8,width:"100%"}}>{isGenEmail?<><Spinner/> ...</>:"🤖 Gerar"}</Btn>
            </Field>
          </div>
          <div>
            <Field label="Roteiro" mt={0} dark={isDark}>
              {!refinedScript?<div style={{border:`1px dashed ${T.cardBorder}`,borderRadius:9,padding:40,textAlign:"center",color:T.textMuted}}>Refine primeiro</div>:<TextArea dark={isDark} value={refinedScript} onChange={e=>setRefined(e.target.value)} rows={16}/>}
            </Field>
          </div>
        </div>
      </div>}

      {tab===5&&keyValidated&&<div className="fade">
        <div style={{borderBottom:`1px solid ${T.cardBorder}`,paddingBottom:14,marginBottom:14}}><h2 style={{margin:0,fontSize:24,fontWeight:800,fontFamily:"'Fraunces',serif",color:T.text}}>🎬 Render</h2></div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:22}}>
          <div>
            <Field label="Motor" mt={0} dark={isDark}>
              <div style={{display:"flex",gap:10}}>
                <div onClick={()=>setRenderEngine("kling")} style={{flex:1,padding:"11px 14px",borderRadius:9,cursor:"pointer",background:renderEngine==="kling"?`${BRAND.navy}20`:T.cardBg,border:`1px solid ${renderEngine==="kling"?BRAND.navy:T.cardBorder}`,color:T.text}}>⚡ Kling</div>
                <div onClick={()=>setRenderEngine("heygen")} style={{flex:1,padding:"11px 14px",borderRadius:9,cursor:"pointer",background:renderEngine==="heygen"?`${BRAND.navy}20`:T.cardBg,border:`1px solid ${renderEngine==="heygen"?BRAND.navy:T.cardBorder}`,color:T.text}}>🎥 HeyGen</div>
              </div>
            </Field>
            <Btn onClick={startRender} disabled={isRendering||!refinedScript} style={{width:"100%",marginTop:14}}>{isRendering?<><Spinner/> ...</>:"🚀 Iniciar"}</Btn>
            <ErrorBox msg={renderError}/>
          </div>
          <div>
            <Field label="Pipeline" mt={0} dark={isDark}>
              {(isRendering||renderDone)&&<div style={{background:T.cardBg,border:`1px solid ${T.cardBorder}`,borderRadius:10,padding:14,marginBottom:12}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                  <span style={{fontSize:11,color:T.textMuted}}>{renderMsg}</span>
                  <span style={{fontFamily:"monospace",color:renderDone?BRAND.sageDark:BRAND.navy}}>{renderPct}%</span>
                </div>
                <div style={{background:T.cardBorder,borderRadius:99,height:7}}><div style={{width:`${renderPct}%`,height:"100%",borderRadius:99,transition:"width .6s",background:renderDone?BRAND.sage:`linear-gradient(90deg,${BRAND.navy},${BRAND.navyLight})`}}/></div>
              </div>}
              {renderDone&&videoUrl&&<div style={{background:`${BRAND.sage}10`,border:`1px solid ${BRAND.sage}40`,borderRadius:10,padding:14}}>
                <div style={{fontWeight:700,color:BRAND.sageDark,marginBottom:10}}>🎉 Pronto</div>
                <VideoPlayer url={videoUrl} poster={thumbnailUrl} aspectRatio="16/9"/>
                <div style={{display:"flex",gap:8,marginTop:10}}>
                  <Btn success onClick={()=>window.open(videoUrl,"_blank")}>⬇️</Btn>
                  <Btn secondary onClick={()=>copyText(videoUrl)}>{copied?"✓":"📋"}</Btn>
                  <Btn onClick={()=>setTab(6)}>📤 →</Btn>
                </div>
              </div>}
            </Field>
          </div>
        </div>
      </div>}

      {tab===6&&keyValidated&&<div className="fade">
        <div style={{borderBottom:`1px solid ${T.cardBorder}`,paddingBottom:14,marginBottom:14}}><h2 style={{margin:0,fontSize:24,fontWeight:800,fontFamily:"'Fraunces',serif",color:T.text}}>📤 Distribuição</h2></div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:22}}>
          <div>
            <Field label="Para" mt={0} dark={isDark}><TextArea dark={isDark} value={teamEmails} onChange={e=>setTeamEmails(e.target.value)} rows={3}/></Field>
            <Field label="Mensagem" dark={isDark}>
              <TextInput dark={isDark} value={emailSubject} onChange={e=>setEmailSubject(e.target.value)} placeholder="Assunto"/>
              <div style={{marginTop:6}}><TextArea dark={isDark} value={distMsg} onChange={e=>setDistMsg(e.target.value)} rows={6}/></div>
              <Btn onClick={genDistMsg} disabled={isGenMsg} style={{marginTop:8,width:"100%"}}>{isGenMsg?<><Spinner/> ...</>:"🤖"}</Btn>
            </Field>
          </div>
          <div>
            <Field label="Canais" mt={0} dark={isDark}>
              <Btn success onClick={sendByEmail} style={{width:"100%",marginBottom:8}}>📨 E-mail</Btn>
              <Btn onClick={sendToTeams} disabled={!teamsWebhook} style={{width:"100%",marginBottom:8}}>💬 Teams</Btn>
              <Btn secondary onClick={()=>copyText(`${emailSubject}\n\n${distMsg}\n\n${videoUrl}`)} style={{width:"100%"}}>{copied?"✓":"📋"}</Btn>
            </Field>
            <ErrorBox msg={distError}/><InfoBox msg={distSuccess}/>
          </div>
        </div>
      </div>}

      {tab===7&&keyValidated&&<div className="fade">
        <div style={{borderBottom:`1px solid ${T.cardBorder}`,paddingBottom:14,marginBottom:14}}>
          <h2 style={{margin:0,fontSize:24,fontWeight:800,fontFamily:"'Fraunces',serif",color:T.text}}>📚 Histórico</h2>
          <p style={{margin:"4px 0 0",fontSize:12,color:T.textMuted}}>{episodes.length} eps · {newsletters.length} edições</p>
        </div>
        <div style={{marginBottom:24}}>
          <div style={{fontSize:11,color:BRAND.goldDark,fontWeight:700,marginBottom:10}}>📰 Newsletters</div>
          {newsletters.length===0?<div style={{color:T.textMuted}}>Nenhuma</div>:<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:10}}>
            {newsletters.map(n=><div key={n.id} style={{background:`${BRAND.gold}10`,border:`1px solid ${BRAND.gold}30`,borderRadius:10,padding:12}}>
              <div style={{fontSize:11,color:BRAND.goldDark,fontFamily:"monospace",fontWeight:700}}>{fmtDate(n.date)}</div>
              <div style={{fontSize:13,fontWeight:700,color:T.text,margin:"4px 0",fontFamily:"'Fraunces',serif"}}>{n.title}</div>
              <div style={{fontSize:10,color:T.textMuted,marginBottom:8}}>{n.headlines?.length||0} manchetes {(n.podcastUrl||n.podcastBlobRef)&&"· 🎙️"}</div>
              <div style={{display:"flex",gap:5}}>
                <button onClick={()=>{setEditorDate(n.date);setTab(0)}} style={{flex:1,background:`${BRAND.gold}25`,border:`1px solid ${BRAND.gold}50`,color:BRAND.goldDark,borderRadius:5,padding:4,fontSize:10,cursor:"pointer",fontWeight:600}}>📝</button>
                <a href={`?view=public&date=${n.date}`} target="_blank" rel="noreferrer" style={{flex:1,background:`${BRAND.sage}25`,border:`1px solid ${BRAND.sage}50`,color:BRAND.sageDark,borderRadius:5,padding:4,fontSize:10,textAlign:"center",textDecoration:"none",fontWeight:600}}>👁️</a>
                <button onClick={()=>deleteNewsletter(n.date)} style={{background:"rgba(200,69,69,.1)",border:"1px solid rgba(200,69,69,.3)",color:"#c84545",borderRadius:5,padding:"4px 8px",fontSize:10,cursor:"pointer"}}>🗑️</button>
              </div>
            </div>)}
          </div>}
        </div>
        <div>
          <div style={{fontSize:11,color:isDark?"#a8c8e8":BRAND.navy,fontWeight:700,marginBottom:10}}>🎬 Episódios</div>
          {selectedEpisode&&<div style={{background:`${BRAND.navy}10`,border:`1px solid ${BRAND.navy}40`,borderRadius:11,padding:16,marginBottom:14}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
              <div style={{fontWeight:700,color:isDark?BRAND.gold:BRAND.navy,fontFamily:"'Fraunces',serif"}}>{selectedEpisode.title}</div>
              <Btn secondary onClick={()=>setSelectedEpisode(null)}>✕</Btn>
            </div>
            {selectedEpisode.videoUrl&&<VideoPlayer url={selectedEpisode.videoUrl} poster={selectedEpisode.thumbnailUrl} aspectRatio="16/9"/>}
          </div>}
          {episodes.length===0?<div style={{color:T.textMuted}}>Nenhum</div>:<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:10}}>
            {episodes.map(ep=><div key={ep.id} style={{background:T.cardBg,border:`1px solid ${T.cardBorder}`,borderRadius:10,overflow:"hidden"}}>
              {ep.thumbnailUrl?<img src={ep.thumbnailUrl} alt="" style={{width:"100%",height:120,objectFit:"cover"}}/>:<div style={{height:80,background:`linear-gradient(135deg,${BRAND.navy},${BRAND.navyDeep})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:30,color:"#fff"}}>{ep.engine==="kling"?"⚡":"🎥"}</div>}
              <div style={{padding:12}}>
                <div style={{fontWeight:700,color:T.text}}>{ep.title}</div>
                <div style={{fontSize:10,color:T.textMuted,fontFamily:"monospace",marginTop:3}}>{new Date(ep.createdAt).toLocaleDateString("pt-BR")}</div>
                <div style={{display:"flex",gap:5,marginTop:8}}>
                  <button onClick={()=>setSelectedEpisode(ep)} style={{flex:1,background:`${BRAND.navy}20`,border:`1px solid ${BRAND.navy}40`,color:isDark?BRAND.gold:BRAND.navy,borderRadius:5,padding:4,fontSize:10,cursor:"pointer"}}>👁️</button>
                  {ep.videoUrl&&<button onClick={()=>useEpisodeAsPodcast(ep)} style={{background:`${BRAND.sage}25`,border:`1px solid ${BRAND.sage}50`,color:BRAND.sageDark,borderRadius:5,padding:"4px 10px",fontSize:10,cursor:"pointer"}}>📰</button>}
                  <button onClick={()=>{if(confirm("Deletar?"))deleteEpisode(ep.id)}} style={{background:"rgba(200,69,69,.1)",border:"1px solid rgba(200,69,69,.3)",color:"#c84545",borderRadius:5,padding:"4px 8px",fontSize:10,cursor:"pointer"}}>🗑️</button>
                </div>
              </div>
            </div>)}
          </div>}
        </div>
      </div>}

      {tab>2&&!keyValidated&&<div className="fade" style={{textAlign:"center",padding:80}}>
        <div style={{fontSize:48}}>🔒</div>
        <div style={{fontSize:18,fontWeight:700,color:BRAND.goldDark,marginTop:14}}>Bloqueado</div>
        <Btn onClick={()=>setTab(1)} style={{marginTop:14}}>← Diagnóstico</Btn>
      </div>}
    </div>
  </div>;
}

// APP ROUTER WITH AUTH GATE
function App(){
  const[session,setSession]=useState(null);
  const[checking,setChecking]=useState(true);
  const params=new URLSearchParams(window.location.search);
  const view=params.get("view");

  useEffect(()=>{(async()=>{await auth.init();const s=await auth.getSession();setSession(s);setChecking(false)})()},[]);

  if(view==="public")return<PublicNewsletter/>;

  // Default and ?view=admin both go through auth
  if(checking)return<div style={{minHeight:"100vh",background:BRAND.cream,display:"flex",alignItems:"center",justifyContent:"center",color:BRAND.muted}}><div style={{textAlign:"center"}}><div className="float" style={{fontSize:40,marginBottom:10}}>🧠</div><div>Verificando sessão...</div></div></div>;

  // If not requesting admin explicitly and no session, default to public
  if(view!=="admin"&&!session)return<PublicNewsletter/>;

  // Admin path: needs session
  if(!session)return<LoginPage onSuccess={s=>{setSession(s);const u=new URL(window.location.href);u.searchParams.set("view","admin");window.history.replaceState({},"",u.toString())}}/>;

  return<AdminApp session={session} onLogout={async()=>{await auth.logout();setSession(null);window.location.search="?view=public"}}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
