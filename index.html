// ADMIN APP (editorial style)
// ═══════════════════════════════════════════════════════════════════════════
function AdminApp({ session, onLogout }){
  const [tab,setTab] = useState(0);
  const [storageReady,setStorageReady] = useState(false);

  // Anthropic
  const [apiKey,setApiKey] = useState("");
  const [keyValidated,setKeyValidated] = useState(false);
  const [testing,setTesting] = useState({});
  const [testResults,setTestResults] = useState({});

  // Password change
  const [pwdCurrent,setPwdCurrent] = useState("");
  const [pwdNew,setPwdNew] = useState("");
  const [pwdNewConfirm,setPwdNewConfirm] = useState("");
  const [pwdMsg,setPwdMsg] = useState({type:"",text:""});

  // News sources
  const [newsSources,setNewsSources] = useState([]);
  const [srcName,setSrcName] = useState("");
  const [srcUrl,setSrcUrl] = useState("");
  const [srcCategory,setSrcCategory] = useState("IA");
  const [srcMsg,setSrcMsg] = useState({type:"",text:""});

  // Newsletter editor
  const [newsletters,setNewsletters] = useState([]);
  const [editorDate,setEditorDate] = useState(today());
  const [editorTitle,setEditorTitle] = useState("");
  const [editorSubtitle,setEditorSubtitle] = useState("");
  const [editorHeadlines,setEditorHeadlines] = useState([]);
  const [editorAiSummary,setEditorAiSummary] = useState("");
  const [editorFocusInsights,setEditorFocusInsights] = useState([]);
  const [editorPodcastUrl,setEditorPodcastUrl] = useState("");
  const [editorPodcastBlobRef,setEditorPodcastBlobRef] = useState("");
  const [editorPodcastTitle,setEditorPodcastTitle] = useState("");
  const [editorPodcastDuration,setEditorPodcastDuration] = useState(15);
  const [editorPodcastTtlDays,setEditorPodcastTtlDays] = useState(30);
  const [editorPodcastAspect,setEditorPodcastAspect] = useState("9/16");
  const [editorPodcastHighlights,setEditorPodcastHighlights] = useState("");
  const [editorAudioPodcastUrl,setEditorAudioPodcastUrl] = useState("");
  const [editorAudioPodcastBlobRef,setEditorAudioPodcastBlobRef] = useState("");
  const [editorInfographicUrl,setEditorInfographicUrl] = useState("");
  const [editorInfographicCaption,setEditorInfographicCaption] = useState("");
  const [infographicUploadMsg,setInfographicUploadMsg] = useState("");
  const [editorCompanies,setEditorCompanies] = useState([]);
  const [editorTopics,setEditorTopics] = useState([]);
  const [isLoadingNl,setIsLoadingNl] = useState(false);
  const [isGenSummary,setIsGenSummary] = useState(false);
  const [isGenInsights,setIsGenInsights] = useState(false);
  const [isGenTitle,setIsGenTitle] = useState(false);
  const [isGenSubtitle,setIsGenSubtitle] = useState(false);
  const [isGenHighlights,setIsGenHighlights] = useState(false);
  const [isExtracting,setIsExtracting] = useState(false);
  const [nlError,setNlError] = useState("");
  const [nlSuccess,setNlSuccess] = useState("");

  // Briefing tab
  const [briefingCopied,setBriefingCopied] = useState(false);
  const [audioUploadMsg,setAudioUploadMsg] = useState("");

  // Wizard
  const [wizardStep,setWizardStep] = useState(1);
  // Step 1: source candidates (raw fetched news before user selection)
  const [sourceCandidates,setSourceCandidates] = useState([]);
  const [selectedIdx,setSelectedIdx] = useState(new Set());
  const [featuredIdx,setFeaturedIdx] = useState(new Set());
  const [translateMsg,setTranslateMsg] = useState("");
  const [isTranslating,setIsTranslating] = useState(false);

  // AI generation guidance prompts — optional editor input per generation step
  const [aiPrompts,setAiPrompts] = useState({
    search:"", summary:"", insights:"", title:"", subtitle:"", script:""
  });
  const updateAiPrompt = (k) => (e) => setAiPrompts(p=>({...p,[k]:e.target.value}));

  // Podcast Studio
  const [allPodcasts,setAllPodcasts] = useState([]);
  const [podSelectedNls,setPodSelectedNls] = useState(new Set());
  const [podScript,setPodScript] = useState("");
  const [podHighlights,setPodHighlights] = useState("");
  const [podTitle,setPodTitle] = useState("");
  const [podDescription,setPodDescription] = useState("");
  const [podVideoUrl,setPodVideoUrl] = useState("");
  const [podVideoBlobRef,setPodVideoBlobRef] = useState("");
  const [podDuration,setPodDuration] = useState(5);
  const [podAspect,setPodAspect] = useState("16/9");
  const [podThumbnailUrl,setPodThumbnailUrl] = useState("");
  const [podWeek,setPodWeek] = useState(today());
  const [isGenScript,setIsGenScript] = useState(false);
  const [podMsg,setPodMsg] = useState({type:"",text:""});
  const [editingPodId,setEditingPodId] = useState(null);

  // Load on mount
  useEffect(()=>{let cancelled=false;(async()=>{
    const settings = await db.get("user:settings_v13");
    if(cancelled) return;
    if(settings){
      if(settings.apiKey) setApiKey(settings.apiKey);
      if(settings.keyValidated) setKeyValidated(true);
    }
    setNewsletters(await db.listNewsletters());
    const seeded = await newsSourcesApi.seedDefaults();
    setNewsSources(seeded);
    setStorageReady(true);
  })();return()=>{cancelled=true}},[]);

  // Save settings
  useEffect(()=>{
    if(!storageReady) return;
    const t = setTimeout(()=>{db.set("user:settings_v13",{apiKey,keyValidated,updatedAt:Date.now()})},600);
    return ()=>clearTimeout(t);
  },[apiKey,keyValidated,storageReady]);

  // Load editor for selected date
  useEffect(()=>{
    if(!storageReady) return;
    (async()=>{
      const ex = await db.get(`newsletter:${editorDate}`);
      if(ex){
        setEditorTitle(ex.title||""); setEditorSubtitle(ex.subtitle||"");
        setEditorHeadlines(ex.headlines||[]); setEditorAiSummary(ex.aiSummary||"");
        setEditorFocusInsights(ex.focusInsights||[]);
        setEditorPodcastUrl(ex.podcastUrl||""); setEditorPodcastBlobRef(ex.podcastBlobRef||"");
        setEditorPodcastTitle(ex.podcastTitle||""); setEditorPodcastDuration(ex.podcastDuration||15);
        setEditorPodcastAspect(ex.podcastAspectRatio||"9/16");
        setEditorPodcastHighlights(ex.podcastHighlights||"");
        setEditorAudioPodcastUrl(ex.audioPodcastUrl||""); setEditorAudioPodcastBlobRef(ex.audioPodcastBlobRef||"");
        setEditorInfographicUrl(ex.infographicUrl||""); setEditorInfographicCaption(ex.infographicCaption||"");
        setEditorCompanies(ex.companies||[]); setEditorTopics(ex.topics||[]);
        if(ex.podcastExpiresAt){const days=Math.max(1,Math.round((ex.podcastExpiresAt-Date.now())/86400000));setEditorPodcastTtlDays(days);}
      } else {
        setEditorTitle(""); setEditorSubtitle(""); setEditorHeadlines([]);
        setEditorAiSummary(""); setEditorFocusInsights([]);
        setEditorPodcastUrl(""); setEditorPodcastBlobRef("");
        setEditorPodcastTitle(""); setEditorPodcastDuration(15);
        setEditorPodcastAspect("9/16"); setEditorPodcastHighlights("");
        setEditorAudioPodcastUrl(""); setEditorAudioPodcastBlobRef("");
        setEditorInfographicUrl(""); setEditorInfographicCaption("");
        setEditorCompanies([]); setEditorTopics([]);
      }
    })();
  },[editorDate,storageReady]);

  // Handlers
  const testAnthropic = async () => {
    setTesting(p=>({...p,anthropic:true}));
    const t = apiKey.trim();
    if(!t){setTestResults(p=>({...p,anthropic:{status:"err",msg:"Cole sua chave."}}));setTesting(p=>({...p,anthropic:false}));return;}
    if(apiKey !== t) setApiKey(t);
    if(!t.startsWith("sk-ant-")){setTestResults(p=>({...p,anthropic:{status:"err",msg:"Formato inválido."}}));setTesting(p=>({...p,anthropic:false}));return;}
    try {
      const data = await callAnthropic(t,{model:ANTHROPIC_MODEL,max_tokens:30,messages:[{role:"user",content:"OK"}]});
      setKeyValidated(true);
      setTestResults(p=>({...p,anthropic:{status:"ok",msg:"Conexão OK!"}}));
    } catch(err) {
      let d=err.message;
      if(err.status===401) d="Chave inválida.";
      else if(err.status===429) d="Sem créditos.";
      setTestResults(p=>({...p,anthropic:{status:"err",msg:d}}));
    }
    setTesting(p=>({...p,anthropic:false}));
  };

  const submitPasswordChange = async () => {
    setPwdMsg({type:"",text:""});
    if(!pwdCurrent||!pwdNew){setPwdMsg({type:"err",text:"Preencha todos campos"});return;}
    if(pwdNew !== pwdNewConfirm){setPwdMsg({type:"err",text:"Confirmação não bate"});return;}
    if(pwdNew.length<6){setPwdMsg({type:"err",text:"Mínimo 6 caracteres"});return;}
    try {
      await auth.changePassword(pwdCurrent,pwdNew);
      setPwdCurrent("");setPwdNew("");setPwdNewConfirm("");
      setPwdMsg({type:"ok",text:"✓ Senha alterada"});
    } catch(err){setPwdMsg({type:"err",text:err.message});}
  };

  // News fetching with configured sources
  const fetchNewsForNewsletter = async () => {
    if(!keyValidated){setNlError("Configure a chave Anthropic em Configurações.");return;}
    setIsLoadingNl(true);setNlError("");setNlSuccess("");
    const activeSources = newsSources.filter(s=>s.active);
    const sourcesHint = activeSources.length>0
      ? `\n\nPRIORIZE PESQUISAR NESTAS FONTES:\n${activeSources.map(s=>`- ${s.name} (${s.url})`).join("\n")}\nSempre retorne o link da matéria nessas fontes em "url" e o nome em "source".`
      : "";
    try {
      const t = await callClaude(apiKey,
        `Pesquise as 10 principais notícias de IA, produtividade e desenvolvimento de software desta semana (${fmtDateLong(editorDate)}). Foque em: novos modelos LLM, ferramentas de IA para produtividade, desenvolvimento sistêmico.${sourcesHint}\n\nResponda APENAS um array JSON válido. Sem prosa antes ou depois. Sem markdown. Comece com [ e termine com ]:\n[{"title":"...","summary":"resumo de 1-2 frases em PT-BR","source":"...","category":"LLM|Produtividade|Sistêmico|IA|Hardware","url":"https://..."}]`,
        true, 6000);
      const arr = parseJsonResponse(t, "array");
      const p = arr.slice(0,10);
      setEditorHeadlines(p);
      setNlSuccess(`${p.length} manchetes${activeSources.length>0?` (${activeSources.length} fontes)`:""}`);
      extractCompaniesAndTopics(p).catch(()=>{});
    } catch(err){setNlError("Erro: "+err.message);}
    setIsLoadingNl(false);
  };

  const extractCompaniesAndTopics = async (headlines) => {
    const hl = headlines || editorHeadlines;
    if(!keyValidated || hl.length===0) return;
    setIsExtracting(true);
    try {
      const t = await callClaude(apiKey,
        `Extraia das manchetes as PRINCIPAIS empresas e tópicos.\nResponda APENAS JSON válido (comece com { e termine com }). Sem markdown. Sem prosa.\n{"companies":["OpenAI","Google",...],"topics":["agentes","RAG",...]}\nMáx 8 de cada, por relevância.\n\nMANCHETES:\n${hl.map(h=>`- ${h.title}: ${h.summary}`).join("\n")}`,
        false, 800);
      const p = parseJsonResponse(t, "object");
      setEditorCompanies(p.companies||[]);
      setEditorTopics(p.topics||[]);
    } catch(err){console.warn("extractCompaniesAndTopics:", err.message);}
    setIsExtracting(false);
  };

  const generateTitle = async () => {
    if(!keyValidated){setNlError("Configure a chave.");return;}
    if(editorHeadlines.length===0){setNlError("Adicione manchetes primeiro.");return;}
    setIsGenTitle(true);setNlError("");
    const guidance = buildEditorGuidance(aiPrompts.title, "Orientação do editor para o título");
    try {
      const t = await callClaude(apiKey,
        `Crie um TÍTULO chamativo (max 7 palavras) para newsletter de IA, baseado em:\n${editorHeadlines.map((h,i)=>`${i+1}. ${h.title}`).join("\n")}\n\nTom: editorial, magnético, instigante. Português.${guidance}\n\nResponda APENAS o título, sem aspas.`,
        false, 200);
      setEditorTitle(t.trim().replace(/^["']|["']$/g,""));
      setNlSuccess("Título gerado!");
    } catch(err){setNlError("Erro: "+err.message);}
    setIsGenTitle(false);
  };
  const generateSubtitle = async () => {
    if(!keyValidated){setNlError("Configure a chave.");return;}
    if(editorHeadlines.length===0){setNlError("Adicione manchetes.");return;}
    setIsGenSubtitle(true);setNlError("");
    const guidance = buildEditorGuidance(aiPrompts.subtitle, "Orientação do editor para a frase de impacto");
    try {
      const t = await callClaude(apiKey,
        `FRASE DE IMPACTO (max 25 palavras) para newsletter "${editorTitle||"(sem título)"}". Editorial, sofisticado, ponto de vista.\nManchetes:\n${editorHeadlines.slice(0,6).map(h=>`- ${h.title}: ${h.summary}`).join("\n")}${guidance}\n\nResponda APENAS a frase.`,
        false, 300);
      setEditorSubtitle(t.trim().replace(/^["']|["']$/g,""));
      setNlSuccess("Frase gerada!");
    } catch(err){setNlError("Erro: "+err.message);}
    setIsGenSubtitle(false);
  };
  const generateAiSummary = async () => {
    if(!keyValidated){setNlError("Configure a chave.");return;}
    if(editorHeadlines.length===0){setNlError("Adicione manchetes.");return;}
    setIsGenSummary(true);setNlError("");
    try {
      const t = await callClaude(apiKey,

    const MB = 1024*1024;
    const MAX_MB = 250;
    if(f.size > MAX_MB*MB){setPodMsg({type:"err",text:`Arquivo de ${(f.size/MB).toFixed(1)}MB excede o limite de ${MAX_MB}MB. Use uma URL externa do HeyGen ou outro serviço.`});return;}
    if(!storageApi.available()){setPodMsg({type:"err",text:"Supabase Storage não configurado. Use o campo URL externa."});return;}
    const sizeStr = (f.size/MB).toFixed(1) + "MB";
    setPodMsg({type:"info",text:`⏳ Enviando vídeo (${sizeStr})... pode levar alguns minutos dependendo da conexão. Não feche esta aba.`});
    try {
      // Clean up old Storage file if URL pointed to Storage
      if(isStorageUrl(podVideoUrl)) await storageApi.deleteByUrl(podVideoUrl);
      const { url } = await storageApi.upload(f, "video");
      setPodVideoUrl(url);          // ← Storage CDN URL goes into the same URL field
      setPodVideoBlobRef("");        // ← clear legacy blobRef
      setPodMsg({type:"ok",text:`✓ Vídeo enviado (${sizeStr}). Aparece no preview abaixo e na página pública.`});
    } catch(err){setPodMsg({type:"err",text:`Falha no upload: ${err.message}`});}
  };

  const copyScript = () => {
    navigator.clipboard.writeText(podScript);
    setPodMsg({type:"ok",text:"✓ Roteiro copiado pro clipboard"});
    setTimeout(()=>setPodMsg(p=>p.text==="✓ Roteiro copiado pro clipboard"?{type:"",text:""}:p),2500);
  };

  return <>
    <Ticker vol="01" episodes={newsletters.length}/>
    <Nav isAdmin={true} session={session} onLogout={onLogout}/>

    <main className="container" style={{padding:"40px 32px 80px"}}>
      {/* TABS */}
      <div style={{display:"flex",gap:6,marginBottom:32,paddingBottom:14,borderBottom:`1px solid ${BRAND.rule}`,flexWrap:"wrap"}}>
        {ADMIN_TABS.map((t,i)=>(
          <button key={i} onClick={()=>setTab(i)}
            className={tab===i ? "btn btn-primary btn-sm" : "btn btn-ghost btn-sm"}
            style={{border:tab===i?"1px solid var(--ink)":"1px solid transparent"}}>
            <span>{t.icon}</span> {t.label}
          </button>
        ))}
      </div>

      {/* TAB 0: NEWSLETTER WIZARD (6 steps) */}
      {tab===0 && <div className="fade">
        <SectionLabel num="📰">Newsletter · Wizard de Publicação</SectionLabel>

        <div style={{display:"flex",gap:14,alignItems:"end",marginBottom:24,flexWrap:"wrap",paddingBottom:18,borderBottom:`1px solid ${BRAND.rule}`}}>
          <Field label="Data da edição" style={{minWidth:200}}>
            <Input type="date" value={editorDate} onChange={e=>setEditorDate(e.target.value)}/>
          </Field>
          <div style={{flex:1,display:"flex",gap:6,flexWrap:"wrap"}}>
            {newsletters.slice(0,5).map(n=>
              <button key={n.date} onClick={()=>{setEditorDate(n.date);}} className={editorDate===n.date?"btn btn-primary btn-sm":"btn btn-ghost btn-sm"}>{fmtDate(n.date)}</button>
            )}
          </div>
          {newsletters.find(n=>n.date===editorDate) && <button onClick={()=>deleteNewsletter(editorDate)} className="btn btn-ghost btn-sm" style={{borderColor:BRAND.accent,color:BRAND.accent}}>🗑 Apagar</button>}
        </div>

        {/* WIZARD STEP TRACKER */}
        <div style={{display:"flex",gap:0,marginBottom:32,padding:14,background:BRAND.paperDark,borderRadius:4,overflowX:"auto"}}>
          {[
            {n:1,label:"Buscar Notícias",icon:"🔍"},
            {n:2,label:"Curadoria",icon:"✍️"},
            {n:3,label:"Temas em Destaque",icon:"🎯"},
            {n:4,label:"Título & Subtítulo",icon:"📰"},
            {n:5,label:"Briefing IA",icon:"🎙️"},
            {n:6,label:"Rascunho & Publicar",icon:"✓"},
          ].map((s,i,arr)=>(
            <div key={s.n} onClick={()=>setWizardStep(s.n)} style={{flex:1,minWidth:130,padding:"10px 12px",cursor:"pointer",borderRight:i<arr.length-1?`1px solid ${BRAND.rule}`:"none",background:wizardStep===s.n?BRAND.ink:wizardStep>s.n?`${BRAND.signal}25`:"transparent",color:wizardStep===s.n?BRAND.paper:wizardStep>s.n?BRAND.inkSoft:BRAND.mute,transition:"all .2s",position:"relative"}}>
              <div className="mono small-caps" style={{fontSize:".58rem",opacity:.8,marginBottom:4}}>PASSO {s.n}</div>
              <div style={{fontSize:".78rem",fontWeight:600,display:"flex",alignItems:"center",gap:6}}>
                <span>{wizardStep>s.n?"✓":s.icon}</span><span>{s.label}</span>
              </div>
            </div>
          ))}
        </div>

        {nlError && <div className="alert-error">⚠ {nlError}</div>}
        {nlSuccess && <div className="alert-ok">{nlSuccess}</div>}

        {/* ═══ STEP 1: Buscar Notícias ═══ */}
        {wizardStep===1 && <div className="fade">
          <div className="card card-pad" style={{padding:24,marginBottom:18,background:`linear-gradient(180deg,${BRAND.paperLight} 0%,rgba(197,57,28,.04) 100%)`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:10}}>
              <div>
                <div className="mono small-caps" style={{color:BRAND.accent,marginBottom:6}}>PASSO 1 · BUSCAR NOTÍCIAS</div>
                <div style={{fontFamily:"'Fraunces',serif",fontSize:"1.2rem",fontStyle:"italic"}}>Pesquise as principais notícias nas fontes cadastradas. Tradução automática para português.</div>
              </div>
              <Btn onClick={wizardFetchNews} disabled={isLoadingNl||!keyValidated}>{isLoadingNl?<><Spin/> Buscando...</>:"🔍 Buscar Notícias da Semana"}</Btn>
            </div>
            <PromptHelper
              value={aiPrompts.search}
              onChange={updateAiPrompt("search")}
              label="REFINAMENTO DE BUSCA (opcional)"
              placeholder="Ex: foque em regulamentação de IA no Brasil, novidades em agentes autônomos, ou lançamentos da Anthropic e OpenAI esta semana..."/>
            <div className="mono" style={{fontSize:".72rem",color:BRAND.mute}}>
              Fontes ativas: {newsSources.filter(s=>s.active).length} de {newsSources.length}
            </div>
          </div>

          {sourceCandidates.length===0 ? <div style={{padding:60,textAlign:"center",border:`1px dashed ${BRAND.rule}`,borderRadius:4,color:BRAND.mute,fontStyle:"italic",fontFamily:"'Fraunces',serif",fontSize:"1.15rem"}}>Clique em "Buscar Notícias da Semana" para popular</div>
          : <>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:8}}>
              <div className="mono small-caps" style={{color:BRAND.mute}}>
                {selectedIdx.size} de {sourceCandidates.length} selecionadas · {featuredIdx.size} em destaque
              </div>
              <div style={{display:"flex",gap:6}}>
                <button onClick={()=>setSelectedIdx(new Set(sourceCandidates.map((_,i)=>i)))} className="btn btn-ghost btn-sm">✓ Marcar todas</button>
                <button onClick={()=>setSelectedIdx(new Set())} className="btn btn-ghost btn-sm">✗ Desmarcar</button>
              </div>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:24}}>
              {sourceCandidates.map((h,i)=>{
                const sel = selectedIdx.has(i), feat = featuredIdx.has(i);
                return <div key={i} style={{display:"grid",gridTemplateColumns:"auto 1fr auto",gap:14,padding:16,background:sel?BRAND.paperLight:BRAND.paperDark,border:`1px solid ${feat?BRAND.accent:BRAND.rule}`,borderRadius:4,opacity:sel?1:.55,transition:"all .2s",borderLeft:feat?`4px solid ${BRAND.accent}`:sel?`4px solid ${BRAND.signal}`:`4px solid ${BRAND.rule}`}}>
                  <input type="checkbox" checked={sel} onChange={()=>toggleSel(i)} style={{width:20,height:20,marginTop:4,accentColor:BRAND.ink,cursor:"pointer"}}/>
                  <div style={{minWidth:0}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:5}}>
                      <span className="chip acc" style={{fontSize:".58rem"}}>{h.category||"IA"}</span>
                      {h.source && <span className="mono" style={{fontSize:".68rem",color:BRAND.mute,textTransform:"uppercase",letterSpacing:".08em"}}>{h.source}</span>}
                      {h.originalLang==="en" && <span className="chip" style={{fontSize:".58rem",borderColor:BRAND.signal,color:BRAND.signal}}>🇺🇸→🇧🇷 traduzido</span>}
                      {feat && <span className="chip acc" style={{fontSize:".58rem",background:BRAND.accent,color:BRAND.paper}}>⭐ DESTAQUE</span>}
                    </div>
                    <div style={{fontFamily:"'Fraunces',serif",fontSize:"1.05rem",lineHeight:1.25,marginBottom:5,letterSpacing:"-.005em"}}>{h.title}</div>
                    <div style={{fontSize:".88rem",color:BRAND.inkSoft,lineHeight:1.45}}>{h.summary}</div>
                    {h.url && <a href={h.url} target="_blank" rel="noreferrer" className="mono" style={{fontSize:".68rem",color:BRAND.accent,textDecoration:"none",marginTop:6,display:"inline-block",letterSpacing:".08em",textTransform:"uppercase"}}>↗ Ver fonte original</a>}
                  </div>
                  <div style={{display:"flex",flexDirection:"column",gap:6,alignItems:"flex-end"}}>
                    <button onClick={()=>toggleFeatured(i)} className={feat?"btn btn-primary btn-sm":"btn btn-ghost btn-sm"} style={{whiteSpace:"nowrap"}}>{feat?"⭐ Destaque":"☆ Marcar destaque"}</button>
                  </div>
                </div>;
              })}
            </div>
            <div style={{display:"flex",justifyContent:"flex-end",gap:10}}>
              <Btn onClick={wizardConfirmStep1} disabled={selectedIdx.size===0}>Confirmar e Avançar →</Btn>
            </div>
          </>}
        </div>}

        {/* ═══ STEP 2: Curadoria ═══ */}
        {wizardStep===2 && <div className="fade">
          <div className="card card-pad" style={{padding:24,marginBottom:18,background:`linear-gradient(180deg,${BRAND.paperLight} 0%,rgba(197,57,28,.04) 100%)`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:10}}>
              <div>
                <div className="mono small-caps" style={{color:BRAND.accent,marginBottom:6}}>PASSO 2 · CURADORIA</div>
                <div style={{fontFamily:"'Fraunces',serif",fontSize:"1.2rem",fontStyle:"italic"}}>Gere o resumo editorial em tom <em className="acc">direto, simples e entusiasta</em>. Edite à vontade.</div>
              </div>
              <Btn onClick={wizardGenSummary} disabled={isGenSummary||!keyValidated||editorHeadlines.length===0}>{isGenSummary?<><Spin/> Gerando...</>:"✨ Gerar Resumo com IA"}</Btn>
            </div>
            <PromptHelper
              value={aiPrompts.summary}
              onChange={updateAiPrompt("summary")}
              label="ORIENTAÇÃO PARA O RESUMO (opcional)"
              placeholder="Ex: dê mais peso ao impacto para desenvolvedores brasileiros, ou conecte os lançamentos da semana ao tema de agentes autônomos..."/>
            <div className="mono" style={{fontSize:".72rem",color:BRAND.mute}}>
              {editorHeadlines.length} manchetes selecionadas · {editorHeadlines.filter(h=>h.featured).length} em destaque
            </div>
          </div>

          <div className="card card-pad" style={{padding:24,marginBottom:18}}>
            <div className="mono small-caps" style={{color:BRAND.ink,marginBottom:12}}>📝 RESUMO EDITORIAL (EDITÁVEL)</div>
            <TArea value={editorAiSummary} onChange={e=>setEditorAiSummary(e.target.value)} rows={12} placeholder="O resumo aparecerá aqui após clicar em 'Gerar Resumo com IA'..." style={{fontFamily:"'Fraunces',serif",fontSize:"1.05rem",lineHeight:1.6}}/>
          </div>

          <div className="card card-pad" style={{padding:24,marginBottom:24}}>
            <div className="mono small-caps" style={{color:BRAND.accent,marginBottom:12}}>🏢 EMPRESAS & TÓPICOS</div>
            <div style={{marginBottom:14}}>
              <div className="mono small-caps" style={{color:BRAND.mute,marginBottom:6,fontSize:".6rem"}}>EMPRESAS (clique pra remover)</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                {editorCompanies.map((c,i)=><span key={i} className="chip solid" style={{cursor:"pointer"}} onClick={()=>setEditorCompanies(editorCompanies.filter((_,j)=>j!==i))}>{c} ×</span>)}
                {editorCompanies.length===0 && <span style={{fontSize:".85rem",color:BRAND.mute,fontStyle:"italic"}}>— (gere primeiro)</span>}
              </div>
            </div>
            <div>
              <div className="mono small-caps" style={{color:BRAND.mute,marginBottom:6,fontSize:".6rem"}}>TÓPICOS</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                {editorTopics.map((t,i)=><span key={i} className="chip acc" style={{cursor:"pointer"}} onClick={()=>setEditorTopics(editorTopics.filter((_,j)=>j!==i))}>#{t} ×</span>)}
                {editorTopics.length===0 && <span style={{fontSize:".85rem",color:BRAND.mute,fontStyle:"italic"}}>—</span>}
              </div>
            </div>
          </div>

          <div style={{display:"flex",justifyContent:"space-between",gap:10}}>
            <button onClick={()=>setWizardStep(1)} className="btn btn-ghost">← Voltar</button>
            <Btn onClick={()=>setWizardStep(3)} disabled={!editorAiSummary.trim()}>Confirmar e Avançar →</Btn>
          </div>
        </div>}

        {/* ═══ STEP 3: Insights ═══ */}
        {wizardStep===3 && <div className="fade">
          <div className="card card-pad" style={{padding:24,marginBottom:18,background:`linear-gradient(180deg,${BRAND.paperLight} 0%,rgba(212,165,46,.06) 100%)`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:10}}>
              <div>
                <div className="mono small-caps" style={{color:BRAND.accent,marginBottom:6}}>PASSO 3 · TEMAS EM DESTAQUE</div>
                <div style={{fontFamily:"'Fraunces',serif",fontSize:"1.2rem",fontStyle:"italic"}}>Insights por área. Editáveis após geração.</div>
              </div>
              <Btn onClick={generateFocusInsights} disabled={isGenInsights||!keyValidated||editorHeadlines.length===0}>{isGenInsights?<><Spin/> Gerando...</>:"✨ Gerar Insights com IA"}</Btn>
            </div>
            <PromptHelper
              value={aiPrompts.insights}
              onChange={updateAiPrompt("insights")}
              label="ORIENTAÇÃO PARA OS INSIGHTS (opcional)"
              placeholder="Ex: em Produtividade, fale sobre Cursor e Claude Code; em Sistêmico, foque em padrões de RAG; em LLM, compare Claude e GPT na semana..."/>
          </div>

          {FOCUS_AREAS.map((area,i)=>{
            const cur = editorFocusInsights.find(x=>x.area===area.id);
            return <div key={area.id} className="card card-pad" style={{padding:22,marginBottom:14,borderLeft:`4px solid ${i===0?BRAND.accent:i===1?BRAND.signal:BRAND.ink}`}}>
              <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
                <span style={{fontSize:24}}>{area.icon}</span>
                <div className="mono small-caps" style={{color:BRAND.ink,fontSize:".75rem"}}>{area.label}</div>
              </div>
              <TArea value={cur?.summary||""} onChange={e=>{const v=e.target.value;setEditorFocusInsights(prev=>{const arr=[...prev];const idx=arr.findIndex(x=>x.area===area.id);if(idx>=0)arr[idx]={...arr[idx],summary:v};else arr.push({area:area.id,summary:v});return arr;});}} rows={3} placeholder={`Insight sobre ${area.label}...`}/>
            </div>;
          })}

          <div style={{display:"flex",justifyContent:"space-between",gap:10,marginTop:24}}>
            <button onClick={()=>setWizardStep(2)} className="btn btn-ghost">← Voltar</button>
            <Btn onClick={()=>setWizardStep(4)}>Confirmar e Avançar →</Btn>
          </div>
        </div>}

        {/* ═══ STEP 4: Título & Subtítulo ═══ */}
        {wizardStep===4 && <div className="fade">
          <div className="card card-pad" style={{padding:24,marginBottom:18,background:`linear-gradient(180deg,${BRAND.paperLight} 0%,rgba(197,57,28,.04) 100%)`}}>
            <div>
              <div className="mono small-caps" style={{color:BRAND.accent,marginBottom:6}}>PASSO 4 · TÍTULO PRINCIPAL & FRASE DE IMPACTO</div>
              <div style={{fontFamily:"'Fraunces',serif",fontSize:"1.2rem",fontStyle:"italic"}}>A capa da edição. Gere com IA, edite à mão.</div>
            </div>
          </div>

          <div className="card card-pad" style={{padding:24,marginBottom:14}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,flexWrap:"wrap",gap:8}}>
              <div className="mono small-caps" style={{color:BRAND.accent}}>📰 TÍTULO PRINCIPAL</div>
              <Btn size="sm" onClick={generateTitle} disabled={isGenTitle||!keyValidated||editorHeadlines.length===0}>{isGenTitle?<><Spin/></>:"✨ Gerar"}</Btn>
            </div>
            <Input value={editorTitle} onChange={e=>setEditorTitle(e.target.value)} placeholder="Título magnético da edição"
              style={{fontFamily:"'Fraunces',serif",fontSize:"1.5rem",fontWeight:500,letterSpacing:"-.02em",padding:"16px 20px"}}/>
            <PromptHelper
              value={aiPrompts.title}
              onChange={updateAiPrompt("title")}
              label="ORIENTAÇÃO PARA O TÍTULO (opcional)"
              placeholder="Ex: use uma metáfora de corrida, ou destaque o nome OpenAI, ou foque na palavra 'agentes'..."/>
          </div>

          <div className="card card-pad" style={{padding:24,marginBottom:24}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,flexWrap:"wrap",gap:8}}>
              <div className="mono small-caps" style={{color:BRAND.accent}}>💭 SUBTÍTULO / FRASE DE IMPACTO</div>
              <Btn size="sm" onClick={generateSubtitle} disabled={isGenSubtitle||!keyValidated||editorHeadlines.length===0}>{isGenSubtitle?<><Spin/></>:"✨ Gerar"}</Btn>
            </div>
            <TArea value={editorSubtitle} onChange={e=>setEditorSubtitle(e.target.value)} rows={3} placeholder="Tese editorial da semana — frase de impacto"
              style={{fontFamily:"'Fraunces',serif",fontStyle:"italic",fontSize:"1.1rem"}}/>
            <PromptHelper
              value={aiPrompts.subtitle}
              onChange={updateAiPrompt("subtitle")}
              label="ORIENTAÇÃO PARA A FRASE DE IMPACTO (opcional)"
              placeholder="Ex: comece com 'Enquanto', ou conecte os 3 maiores temas em uma única tese, ou faça uma provocação..."/>
          </div>

          <div style={{display:"flex",justifyContent:"space-between",gap:10}}>
            <button onClick={()=>setWizardStep(3)} className="btn btn-ghost">← Voltar</button>
            <Btn onClick={()=>setWizardStep(5)} disabled={!editorTitle.trim()}>Confirmar e Avançar →</Btn>
          </div>
        </div>}

        {/* ═══ STEP 5: Briefing IA (NotebookLM) ═══ */}
        {wizardStep===5 && <div className="fade">
          <div className="card card-pad" style={{padding:24,marginBottom:18,background:`linear-gradient(180deg,${BRAND.paperLight} 0%,rgba(197,57,28,.04) 100%)`}}>
            <div>
              <div className="mono small-caps" style={{color:BRAND.accent,marginBottom:6}}>PASSO 5 · BRIEFING PARA NOTEBOOKLM</div>
              <div style={{fontFamily:"'Fraunces',serif",fontSize:"1.2rem",fontStyle:"italic"}}>Copie, cole no NotebookLM, gere o áudio, suba aqui.</div>
            </div>
          </div>

          <div style={{display:"grid",gridTemplateColumns:"3fr 2fr",gap:20}}>
            <div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                <div className="mono small-caps" style={{color:BRAND.accent}}>📋 BRIEFING · {fmtDateMag(editorDate)}</div>
                <div style={{display:"flex",gap:6}}>
                  <Btn size="sm" onClick={copyBriefing}>{briefingCopied?"✓ COPIADO":"📋 Copiar"}</Btn>
                  <a href="https://notebooklm.google.com/" target="_blank" rel="noreferrer" className="btn btn-ghost btn-sm">↗ NotebookLM</a>
                </div>
              </div>
              <pre className="card" style={{padding:20,whiteSpace:"pre-wrap",fontFamily:"'JetBrains Mono',monospace",fontSize:".78rem",lineHeight:1.55,color:BRAND.ink,maxHeight:500,overflowY:"auto"}}>{briefingText}</pre>
            </div>

            <div>
              <div className="card card-pad" style={{padding:20,marginBottom:14,background:`linear-gradient(135deg,${BRAND.paperLight},rgba(197,57,28,.04))`}}>
                <div className="mono small-caps" style={{color:BRAND.accent,marginBottom:12}}>📥 UPLOAD DO ÁUDIO</div>
                <Field label="Arquivo MP3 (até 50MB) — vai pro Supabase Storage" style={{marginBottom:12}}>
                  <input type="file" accept="audio/*" onChange={handleAudioUpload} style={{fontSize:".82rem"}}/>
                </Field>
                <div className="mono small-caps" style={{color:BRAND.mute,marginBottom:8,fontSize:".6rem",textAlign:"center"}}>— OU —</div>
                <Field label="URL pública do áudio">
                  <Input value={isStorageUrl(editorAudioPodcastUrl)?"":editorAudioPodcastUrl} onChange={e=>{setEditorAudioPodcastUrl(e.target.value);setEditorAudioPodcastBlobRef("");}} placeholder="https://.../podcast.mp3"/>
                </Field>
                {isStorageUrl(editorAudioPodcastUrl) && <div style={{marginTop:8,padding:"6px 10px",background:`rgba(212,165,46,.1)`,borderRadius:4,fontSize:".72rem",color:BRAND.accentDeep,display:"flex",alignItems:"center",gap:8,fontFamily:"'JetBrains Mono',monospace",letterSpacing:".05em"}}>
                  <span>📦</span>
                  <span style={{flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>STORAGE · {(storageUrlToPath(editorAudioPodcastUrl)||"").split("/").pop()}</span>
                  <button onClick={async()=>{if(confirm("Apagar arquivo do Storage e desvincular do podcast?")){await storageApi.deleteByUrl(editorAudioPodcastUrl);setEditorAudioPodcastUrl("");setAudioUploadMsg("Arquivo removido do Storage.");}}} style={{background:"transparent",border:"none",cursor:"pointer",color:BRAND.accent,fontSize:".72rem",fontFamily:"inherit",letterSpacing:"inherit"}}>🗑 REMOVER</button>
                </div>}
                {audioUploadMsg && <div className={audioUploadMsg.startsWith("✓")?"alert-ok":audioUploadMsg.startsWith("❌")?"alert-error":"alert-info"}>{audioUploadMsg}</div>}
                {(editorAudioPodcastUrl||editorAudioPodcastBlobRef) && <div style={{marginTop:14}}>
                  <div className="mono small-caps" style={{color:BRAND.mute,marginBottom:6,fontSize:".58rem"}}>PREVIEW</div>
                  {!editorAudioPodcastBlobRef && <AudioPlayer url={editorAudioPodcastUrl}/>}
                  {editorAudioPodcastBlobRef && <div style={{fontSize:".82rem",color:BRAND.signal,fontStyle:"italic",padding:8,background:BRAND.paperDark,borderRadius:4}}>✓ Áudio legado salvo (preview no rascunho)</div>}
                </div>}
              </div>

              <div className="card card-pad" style={{padding:20,marginBottom:14,background:`linear-gradient(135deg,${BRAND.paperLight},rgba(212,165,46,.07))`}}>
                <div className="mono small-caps" style={{color:BRAND.accent,marginBottom:6}}>📊 INFOGRÁFICO DO EPISÓDIO</div>
                <p style={{fontSize:".8rem",color:BRAND.inkSoft,marginBottom:12,lineHeight:1.5}}>
                  Imagem visual (ex: gerada no NotebookLM) que resume o episódio. Aparece em destaque na página pública e vira o preview do link no LinkedIn.

          Fontes que a IA prioriza ao buscar manchetes no Passo 1 da Newsletter. O catálogo padrão tem <strong>{DEFAULT_SOURCES.length}</strong> fontes (Brasil, internacional, labs de IA, podcasts e dev).
        </p>

        <div className="card card-pad" style={{padding:24,marginBottom:18,background:`linear-gradient(135deg,${BRAND.paperLight},rgba(212,165,46,.06))`}}>
          <div className="mono small-caps" style={{color:BRAND.accent,marginBottom:14}}>➕ ADICIONAR NOVA FONTE</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 2fr 130px auto",gap:10,alignItems:"end"}}>
            <Field label="Nome"><Input value={srcName} onChange={e=>setSrcName(e.target.value)} placeholder="TechCrunch"/></Field>
            <Field label="URL"><Input value={srcUrl} onChange={e=>setSrcUrl(e.target.value)} placeholder="https://..."/></Field>
            <Field label="Categoria">
              <select value={srcCategory} onChange={e=>setSrcCategory(e.target.value)} style={{width:"100%"}}>
                {CAT_LABELS.map(c=><option key={c}>{c}</option>)}
              </select>
            </Field>
            <Btn onClick={handleAddSource}>➕ Adicionar</Btn>
          </div>
          {srcMsg.text && <div className={srcMsg.type==="ok"?"alert-ok":"alert-error"}>{srcMsg.text}</div>}
        </div>

        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:10}}>
          <div className="mono small-caps" style={{color:BRAND.mute}}>
            📡 FONTES CADASTRADAS ({newsSources.length} · {newsSources.filter(s=>s.active).length} ATIVAS)
          </div>
          <Btn size="sm" variant="ghost" onClick={handleRestoreDefaults}>↻ Restaurar fontes padrão</Btn>
        </div>

        {newsSources.length===0 ? <div style={{padding:60,textAlign:"center",border:`1px dashed ${BRAND.rule}`,borderRadius:4,color:BRAND.mute,fontStyle:"italic",fontFamily:"'Fraunces',serif"}}>Nenhuma fonte ainda. Adicione acima ou clique em "Restaurar fontes padrão".</div>
        : (() => {
            // Group sources by category
            const groups = {};
            newsSources.forEach(s=>{(groups[s.category||"Outros"]=groups[s.category||"Outros"]||[]).push(s);});
            // Custom order: Brasil → IA → LLM → Podcast → Sistêmico → resto
            const order = ["Brasil","IA","LLM","Podcast","Sistêmico","Produtividade","Hardware","Software","Cloud","Startups","Regulação","Outros"];
            const sortedCats = Object.keys(groups).sort((a,b)=>{
              const ia = order.indexOf(a), ib = order.indexOf(b);
              return (ia===-1?99:ia) - (ib===-1?99:ib);
            });
            return sortedCats.map(cat=>(
              <div key={cat} style={{marginBottom:22}}>
                <div className="mono small-caps" style={{color:BRAND.accent,marginBottom:10,paddingBottom:6,borderBottom:`1px solid ${BRAND.rule}`}}>
                  {cat} ({groups[cat].length})
                </div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(320px,1fr))",gap:10}}>
                  {groups[cat].map(s=>
                    <div key={s.id} className="card" style={{padding:14,opacity:s.active?1:.55,borderLeft:s.active?`4px solid ${BRAND.signal}`:`4px solid ${BRAND.mute}`}}>
                      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:8,marginBottom:8}}>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontWeight:600,fontSize:".95rem",fontFamily:"'Fraunces',serif",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.name}</div>
                        </div>
                        <span className={s.active?"chip sig":"chip"} style={{fontSize:".58rem"}}>{s.active?"● ATIVA":"○ INATIVA"}</span>
                      </div>
                      <a href={s.url} target="_blank" rel="noreferrer" className="mono" style={{fontSize:".7rem",color:BRAND.mute,textDecoration:"none",display:"block",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginBottom:10}}>↗ {s.url}</a>
                      <div style={{display:"flex",gap:5}}>
                        <button onClick={async()=>{await newsSourcesApi.toggleActive(s.id);await reloadSources();}} className="btn btn-ghost btn-sm" style={{flex:1,justifyContent:"center"}}>{s.active?"🚫 Desativar":"✓ Ativar"}</button>
                        <button onClick={async()=>{if(confirm("Apagar?")){await newsSourcesApi.remove(s.id);await reloadSources();}}} className="btn btn-ghost btn-sm" style={{borderColor:BRAND.accent,color:BRAND.accent}}>🗑</button>
                      </div>
                    </div>
                  )}
                </div>
              </div>
            ));
          })()}
      </div>}

      {/* TAB 4: AUDIÊNCIA */}
      {tab===4 && <AudiencePanel/>}

      {/* TAB 5: CONFIGURAÇÕES */}
      {tab===5 && <div className="fade">
        <SectionLabel num="⚙️">Configurações</SectionLabel>

        {!SB_OK && <div className="alert-error" style={{marginBottom:24}}>
          ⚠ Supabase não configurado. Preencha SUPABASE_URL e SUPABASE_ANON_KEY no topo do <code>index.html</code>. Veja <code>SETUP.md</code>.
        </div>}

        <div className="card card-pad" style={{padding:28,marginBottom:18}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
            <div className="mono small-caps" style={{color:BRAND.accent,flex:1}}>🤖 ANTHROPIC API (Claude)</div>
            <span className={keyValidated?"chip sig":"chip"}>{keyValidated?"✓ VALIDADA":"PENDENTE"}</span>
          </div>
          <p style={{fontSize:".88rem",color:BRAND.inkSoft,lineHeight:1.5,marginTop:0,marginBottom:14}}>
            Sua chave fica salva no Supabase. Pegue em <a href="https://console.anthropic.com/" target="_blank" style={{color:BRAND.accent}}>console.anthropic.com</a>.
          </p>
          <Field label="Chave (sk-ant-...)" style={{marginBottom:10}}>
            <Input type="password" value={apiKey} onChange={e=>setApiKey(e.target.value)} placeholder="sk-ant-..."/>
          </Field>
          <Btn onClick={testAnthropic} disabled={testing.anthropic||!apiKey}>{testing.anthropic?<><Spin/> Testando</>:"▶ Testar conexão"}</Btn>
          {testResults.anthropic && <div className={testResults.anthropic.status==="ok"?"alert-ok":"alert-error"}>{testResults.anthropic.msg}</div>}
        </div>

        <div className="card card-pad" style={{padding:28}}>
          <div className="mono small-caps" style={{color:BRAND.accent,marginBottom:14}}>🔐 TROCAR SENHA</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:12}}>
            <Field label="Senha atual"><Input type="password" value={pwdCurrent} onChange={e=>setPwdCurrent(e.target.value)}/></Field>
            <Field label="Nova senha (min 6)"><Input type="password" value={pwdNew} onChange={e=>setPwdNew(e.target.value)}/></Field>
            <Field label="Confirmar"><Input type="password" value={pwdNewConfirm} onChange={e=>setPwdNewConfirm(e.target.value)}/></Field>
          </div>
          <Btn onClick={submitPasswordChange} disabled={!pwdCurrent||!pwdNew||!pwdNewConfirm}>🔑 Alterar senha</Btn>
          {pwdMsg.text && <div className={pwdMsg.type==="ok"?"alert-ok":"alert-error"}>{pwdMsg.text}</div>}
        </div>
      </div>}

      {/* TAB 6: ARQUIVO */}
      {tab===6 && <div className="fade">
        <SectionLabel num="📚">Arquivo de Edições</SectionLabel>
        {newsletters.length===0 ? <div style={{padding:80,textAlign:"center",border:`1px dashed ${BRAND.rule}`,borderRadius:4,color:BRAND.mute,fontStyle:"italic",fontFamily:"'Fraunces',serif",fontSize:"1.2rem"}}>Nenhuma edição publicada ainda</div>
        : <div style={{borderTop:`1px solid ${BRAND.ink}`}}>
          {newsletters.map((n,i)=>{
            const num = newsletters.length - i;
            return <div key={n.date} style={{display:"grid",gridTemplateColumns:"80px 110px 1fr 110px auto",gap:24,alignItems:"center",padding:"20px 0",borderBottom:`1px solid ${BRAND.rule}`}}>
              <div className="mono" style={{fontSize:".78rem",color:BRAND.mute}}>№ {padNum(num)}</div>
              <div className="mono" style={{fontSize:".82rem",color:BRAND.inkSoft,textTransform:"uppercase",letterSpacing:".08em"}}>{fmtDateMag(n.date)}</div>
              <div style={{fontFamily:"'Fraunces',serif",fontSize:"1.15rem",letterSpacing:"-.01em"}}>{n.title}</div>
              <div className="mono" style={{fontSize:".72rem",color:BRAND.mute,textAlign:"right"}}>{n.podcastDuration||"—"}min</div>
              <div style={{display:"flex",gap:6}}>
                <button onClick={()=>{setEditorDate(n.date);setTab(0);}} className="btn btn-ghost btn-sm">✏️</button>
                <a href={`?view=public&date=${n.date}`} target="_blank" className="btn btn-ghost btn-sm">👁</a>
                <button onClick={()=>deleteNewsletter(n.date)} className="btn btn-ghost btn-sm" style={{borderColor:BRAND.accent,color:BRAND.accent}}>🗑</button>
              </div>
            </div>;
          })}
        </div>}
      </div>}
    </main>
  </>;
}

// ═══════════════════════════════════════════════════════════════════════════
// APP ROUTER
// ═══════════════════════════════════════════════════════════════════════════
function App(){
  const [session,setSession] = useState(null);
  const [checking,setChecking] = useState(true);
  const [view,setView] = useState(() => {
    const params = new URLSearchParams(window.location.search);
    return params.get("view") || "landing";
  });

  useEffect(()=>{(async()=>{
    if(SB_OK){
      const s = await auth.getSession();
      if(s && s.expiresAt > Date.now()) setSession(s);
    }
    setChecking(false);
  })()},[]);

  if(checking){
    return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:BRAND.mute,fontFamily:"'JetBrains Mono',monospace",fontSize:".8rem",letterSpacing:".14em",textTransform:"uppercase"}}>
      <div style={{textAlign:"center"}}><div style={{fontSize:"2rem",marginBottom:12}}>⏳</div>SINCRONIZANDO...</div>
    </div>;
  }

  if(view === "admin"){
    if(!session) return <LoginPage onSuccess={(s)=>{setSession(s);}}/>;
    return <AdminApp session={session} onLogout={async()=>{await auth.logout();setSession(null);window.location.href="?view=landing";}}/>;
  }

  if(view === "public") return <PublicNewsletter/>;
  if(view === "podcasts") return <PodcastsPage/>;
  if(view === "podcast") return <PodcastDetail/>;

  return <LandingPage/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
