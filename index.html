// ─── DB LAYER ────────────────────────────────────────────────────────────────

const hasClaudeStorage = () => typeof window !== "undefined" && window.storage;
const db = {
  async get(key) {
    try {
      if (hasClaudeStorage()) { const r = await window.storage.get(key); return r ? JSON.parse(r.value) : null; }
      const v = localStorage.getItem(key); return v ? JSON.parse(v) : null;
    } catch { return null; }
  },
  async set(key, value) {
    try {
      if (hasClaudeStorage()) await window.storage.set(key, JSON.stringify(value));
      else localStorage.setItem(key, JSON.stringify(value));
      return true;
    } catch { return false; }
  },
  async delete(key) {
    try { if (hasClaudeStorage()) await window.storage.delete(key); else localStorage.removeItem(key); return true; }
    catch { return false; }
  },
  async listByPrefix(prefix) {
    try {
      if (hasClaudeStorage()) {
        const r = await window.storage.list(prefix);
        if (!r?.keys) return [];
        const items = await Promise.all(r.keys.map(k => db.get(k)));
        return items.filter(Boolean);
      }
      const items = [];
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k?.startsWith(prefix)) { const v = localStorage.getItem(k); if (v) items.push(JSON.parse(v)); }
      }
      return items;
    } catch { return []; }
  },
  async listEpisodes() {
    const items = await db.listByPrefix("episode:");
    return items.sort((a, b) => (b.createdAt||0) - (a.createdAt||0));
  },
  async listNewsletters() {
    const items = await db.listByPrefix("newsletter:");
    return items.sort((a, b) => (b.date||"").localeCompare(a.date||""));
  },
};

async function callAnthropic(apiKey, body) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify(body),
  });
  const text = await res.text();
  let data; try { data = JSON.parse(text); } catch { data = { raw: text }; }
  if (!res.ok) {
    const err = new Error(data?.error?.message || `HTTP ${res.status}`);
    err.status = res.status; err.data = data; throw err;
  }
  return data;
}

async function callClaude(apiKey, userPrompt, useSearch = false, maxTokens = 1500, systemPrompt = null) {
  const body = { model: ANTHROPIC_MODEL, max_tokens: maxTokens, messages: [{ role: "user", content: userPrompt }] };
  if (systemPrompt) body.system = systemPrompt;
  if (useSearch) body.tools = [{ type: "web_search_20250305", name: "web_search" }];
  let data = await callAnthropic(apiKey, body);
  let text = (data.content || []).filter(b => b.type === "text").map(b => b.text).join("");
  if (text.trim()) return text;
  if (useSearch && data.stop_reason === "tool_use") {
    const toolResults = (data.content || [])
      .filter(b => b.type === "tool_use")
      .map(b => ({ type: "tool_result", tool_use_id: b.id, content: "Search executed." }));
    const body2 = {
      model: ANTHROPIC_MODEL, max_tokens: maxTokens,
      tools: [{ type: "web_search_20250305", name: "web_search" }],
      messages: [
        { role: "user", content: userPrompt },
        { role: "assistant", content: data.content },
        { role: "user", content: toolResults },
      ],
    };
    if (systemPrompt) body2.system = systemPrompt;
    data = await callAnthropic(apiKey, body2);
    return (data.content || []).filter(b => b.type === "text").map(b => b.text).join("");
  }
  return text;
}

// Detect video URL type and return appropriate embed strategy
function getVideoEmbedInfo(url) {
  if (!url) return null;

  // HeyGen share page (app.heygen.com/videos/...)
  if (url.includes("app.heygen.com/videos/") || url.includes("share.heygen.com")) {
    // HeyGen share pages support iframe embedding
    return { type: "iframe", src: url, original: url };
  }

  // YouTube
  const ytMatch = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]+)/);
  if (ytMatch) {
    return { type: "iframe", src: `https://www.youtube.com/embed/${ytMatch[1]}`, original: url };
  }

  // Vimeo
  const vimeoMatch = url.match(/vimeo\.com\/(\d+)/);
  if (vimeoMatch) {
    return { type: "iframe", src: `https://player.vimeo.com/video/${vimeoMatch[1]}`, original: url };
  }

  // Direct .mp4 / .webm / .ogg or data URLs
  if (url.startsWith("data:video") || /\.(mp4|webm|ogg|mov|m4v)(\?|$)/i.test(url)) {
    return { type: "video", src: url, original: url };
  }

  // HeyGen API resource (resource3.heygen.ai or similar) — direct mp4
  if (url.includes("heygen.ai") && url.includes(".mp4")) {
    return { type: "video", src: url, original: url };
  }

  // Default: try iframe (works for most share pages)
  return { type: "iframe", src: url, original: url, fallback: true };
}

const VideoPlayer = memo(function VideoPlayer({ url, poster, light, maxHeight = 480 }) {
  const info = getVideoEmbedInfo(url);
  if (!info) return null;
  const bgColor = light ? "#000" : "#000";

  if (info.type === "video") {
    return (
      <video controls poster={poster} style={{ width:"100%", borderRadius:12, background:bgColor, maxHeight, display:"block" }}>
        <source src={info.src} />
        Seu navegador não suporta este vídeo.
      </video>
    );
  }
  // iframe (HeyGen, YouTube, Vimeo, share pages)
  return (
    <div style={{ position:"relative", paddingBottom:"56.25%", height:0, overflow:"hidden", borderRadius:12, background:bgColor, maxHeight }}>
      <iframe
        src={info.src}
        style={{ position:"absolute", top:0, left:0, width:"100%", height:"100%", border:0, borderRadius:12 }}
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen"
        allowFullScreen
        title="Video Player"
      />
    </div>
  );
});

function openMailto(toList, subject, body) {
  const recipients = (toList || "").split(/[,;\n]/).map(s => s.trim()).filter(s => s.includes("@")).join(",");
  const url = `mailto:${recipients}?subject=${encodeURIComponent(subject || "")}&body=${encodeURIComponent(body || "")}`;
  window.open(url, "_blank");
}

async function sendTeamsWebhook(webhookUrl, title, body, videoUrl) {
  if (!webhookUrl?.startsWith("https://")) throw new Error("URL Teams inválida");
  const card = {
    "@type": "MessageCard", "@context": "https://schema.org/extensions",
    summary: title, themeColor: "0050ff",
    title: title || "🎙️ Syncronize-MI",
    text: body || "",
    potentialAction: videoUrl ? [{ "@type": "OpenUri", name: "▶️ Assistir", targets: [{ os: "default", uri: videoUrl }] }] : [],
  };
  await fetch(webhookUrl, {
    method: "POST", mode: "no-cors",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(card),
  });
  return { ok: true };
}

  if (!iso) return "";
  const months = ["janeiro", "fevereiro", "março", "abril", "maio", "junho", "julho", "agosto", "setembro", "outubro", "novembro", "dezembro"];

const estimateReadTime = (text) => {
  if (!text) return 0;
  const words = text.split(/\s+/).filter(Boolean).length;

};

    document.body.classList.toggle("light-newsletter", theme === "light");
    return () => document.body.classList.remove("light-newsletter");
  }, [theme]);

  // Load newsletters and pick date from URL or most recent
  useEffect(() => {
    (async () => {
      const items = await db.listNewsletters();
      setNewsletters(items);
      const params = new URLSearchParams(window.location.search);
      const urlDate = params.get("date");
      if (urlDate && items.find(n => n.date === urlDate)) {
        setSelectedDate(urlDate);
      } else if (items.length > 0) {
        setSelectedDate(items[0].date);
      } else {
        setSelectedDate(today());
      }
      setLoading(false);
    })();
  }, []);

  // Update URL when date changes
  useEffect(() => {
    if (!selectedDate || loading) return;
    const url = new URL(window.location.href);
    url.searchParams.set("view", "public");
    url.searchParams.set("date", selectedDate);
    window.history.replaceState({}, "", url.toString());
  }, [selectedDate, loading]);

  const current = newsletters.find(n => n.date === selectedDate);
  const podcastValid = current?.podcastUrl && (!current.podcastExpiresAt || !isExpired(current.podcastExpiresAt));

  const filteredHeadlines = useMemo(() => {
    if (!current?.headlines) return [];
    if (filter === "all") return current.headlines;
    return current.headlines.filter(h => h.category === filter);
  }, [current, filter]);

  const categoriesInUse = useMemo(() => {
    if (!current?.headlines) return [];
    const set = new Set(current.headlines.map(h => h.category).filter(Boolean));
    return Array.from(set);
  }, [current]);

  const readTime = useMemo(() => {
    if (!current) return 0;
    const totalText = (current.aiSummary || "") + " " + (current.headlines || []).map(h => h.summary).join(" ");
    return estimateReadTime(totalText);
  }, [current]);

  // ── Share handler ──
  const handleShare = async () => {
    const url = getShareUrl(selectedDate);
    const title = current?.title || `Syncronize-MI · ${fmtDate(selectedDate)}`;
    const text = current?.subtitle || "Curadoria semanal de IA";

    if (navigator.share) {
      try {
        await navigator.share({ title, text, url });
        return;
      } catch (e) { /* user cancelled */ }
    }
    // Fallback: copy
    try {
      await navigator.clipboard.writeText(url);
      setShareCopied(true);
      setTimeout(() => setShareCopied(false), 2500);
    } catch {
      setShareOpen(true);
    }
  };

  const copyShareUrl = async () => {
    await navigator.clipboard.writeText(getShareUrl(selectedDate));
    setShareCopied(true);
    setTimeout(() => setShareCopied(false), 2500);
  };

  // ── LIGHT THEME (default) ──
  const isLight = theme === "light";
  const styles = isLight ? {
    bg: "#fafbff",
    text: "#1a2540",
    textMuted: "#5a6a85",
    cardBg: "#ffffff",
    cardBorder: "#e0e6f5",
    cardShadow: "0 2px 14px rgba(20,40,90,.04)",
    cardShadowHover: "0 8px 30px rgba(20,40,90,.1)",
    accent1: BRAND.primary,
    accent2: BRAND.secondary,
    accent3: BRAND.accent,
  } : {
    bg: "#070b13",
    text: "#e8eef8",
    textMuted: "#8090a8",
    cardBg: "rgba(255,255,255,.03)",
    cardBorder: "rgba(255,255,255,.08)",
    cardShadow: "none",
    cardShadowHover: "0 8px 30px rgba(0,180,255,.1)",
    accent1: "#00b4ff",
    accent2: "#a78bfa",
    accent3: "#fbbf24",
  };

  if (loading) {
    return (
      <div style={{ background: styles.bg, minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", color: styles.textMuted }}>
        <div style={{ textAlign:"center" }}>
          <div className="float" style={{ fontSize:48, marginBottom:12 }}>🧠</div>
          <div>Carregando edição...</div>
        </div>
      </div>
    );
  }

  return (
    <div style={{ background: styles.bg, minHeight:"100vh", color: styles.text, transition:"all .3s" }}>
      {/* ═══ HERO HEADER ═══ */}
      <div style={{
        background: isLight
          ? `linear-gradient(135deg, ${BRAND.primary}08 0%, ${BRAND.secondary}06 50%, ${BRAND.accent}08 100%)`
          : `linear-gradient(135deg, rgba(0,77,179,.15), rgba(124,58,237,.08))`,
        borderBottom: isLight ? `1px solid ${BRAND.border}` : "1px solid rgba(0,180,255,.15)",
        padding: "30px 24px 24px",
        position: "relative",
        overflow: "hidden",
      }}>
        {/* Decorative blobs */}
        {isLight && (
          <>
            <div style={{ position:"absolute", top:-60, right:-60, width:240, height:240, background:`radial-gradient(circle, ${BRAND.primary}15, transparent 70%)`, borderRadius:"50%", pointerEvents:"none" }} />
            <div style={{ position:"absolute", bottom:-80, left:-40, width:200, height:200, background:`radial-gradient(circle, ${BRAND.secondary}12, transparent 70%)`, borderRadius:"50%", pointerEvents:"none" }} />
          </>
        )}

        <div style={{ maxWidth:1100, margin:"0 auto", position:"relative" }}>
          {/* Logo + brand name */}
          <div style={{ display:"flex", alignItems:"center", gap:14, marginBottom:6, flexWrap:"wrap" }}>
            <div style={{
              width:56, height:56, borderRadius:16,
              background: `linear-gradient(135deg, ${BRAND.primary} 0%, ${BRAND.secondary} 50%, ${BRAND.pink} 100%)`,
              display:"flex", alignItems:"center", justifyContent:"center",
              fontSize:30, color:"#fff",
              boxShadow:`0 8px 24px ${BRAND.primary}40`,
            }}>
              <span style={{ filter:"drop-shadow(0 1px 2px rgba(0,0,0,.2))" }}>🧠</span>
            </div>
            <div style={{ flex:1, minWidth:200 }}>
              <div style={{
                fontFamily:"'Fraunces',serif", fontSize:32, fontWeight:900,
                letterSpacing:"-.035em", lineHeight:1,
                color: styles.text,
                background: isLight ? `linear-gradient(135deg, ${BRAND.primary}, ${BRAND.secondary})` : "none",
                WebkitBackgroundClip: isLight ? "text" : "initial",
                WebkitTextFillColor: isLight ? "transparent" : styles.text,
                backgroundClip: isLight ? "text" : "initial",
              }}>
                Syncronize-MI
              </div>
              <div style={{ fontSize:11, color: styles.textMuted, letterSpacing:".18em", textTransform:"uppercase", marginTop:5, fontWeight:600 }}>
                NewsLetter de IA · {newsletters.length} edição{newsletters.length !== 1 ? "ões" : ""}
              </div>
            </div>

            {/* Top actions */}
            <div style={{ display:"flex", gap:8, alignItems:"center", flexWrap:"wrap" }}>
              <button onClick={() => setTheme(isLight ? "dark" : "light")} style={{
                background: "transparent", border: `1px solid ${isLight ? BRAND.border : "rgba(255,255,255,.1)"}`,
                color: styles.textMuted, padding:"7px 12px", borderRadius:8, fontSize:11, cursor:"pointer",
                display:"flex", alignItems:"center", gap:5, fontFamily:"'Outfit',sans-serif",
              }} title={isLight ? "Modo escuro" : "Modo claro"}>
                {isLight ? "🌙" : "☀️"}
              </button>
              <button onClick={handleShare} style={{
                background: `linear-gradient(135deg, ${BRAND.primary}, ${BRAND.secondary})`,
                border:"none", color:"#fff", padding:"8px 16px", borderRadius:8,
                fontSize:12, fontWeight:600, cursor:"pointer", fontFamily:"'Outfit',sans-serif",
                display:"flex", alignItems:"center", gap:6,
                boxShadow:`0 4px 14px ${BRAND.primary}40`,
              }}>
                {shareCopied ? "✓ Link copiado!" : "🔗 Compartilhar"}
              </button>
              <a href="?view=admin" style={{
                fontSize:10, color: styles.textMuted, textDecoration:"none",
                padding:"7px 12px", borderRadius:8,
                border: `1px solid ${isLight ? BRAND.border : "rgba(255,255,255,.06)"}`,
              }}>Admin →</a>
            </div>
          </div>

          {/* Date selector */}
          {newsletters.length > 0 && (
            <div style={{ display:"flex", alignItems:"center", gap:10, flexWrap:"wrap", marginTop:18, paddingTop:18, borderTop: `1px solid ${isLight ? BRAND.border : "rgba(255,255,255,.06)"}` }}>
              <span style={{ fontSize:10, color: styles.textMuted, fontWeight:700, letterSpacing:".1em", textTransform:"uppercase" }}>📆 Edições</span>
              {newsletters.slice(0, 14).map(n => {
                const sel = selectedDate === n.date;
                return (
                  <button key={n.date} onClick={() => setSelectedDate(n.date)} style={{
                    background: sel ? `linear-gradient(135deg, ${BRAND.primary}, ${BRAND.secondary})` : (isLight ? "#fff" : "rgba(255,255,255,.03)"),
                    border: `1px solid ${sel ? "transparent" : (isLight ? BRAND.border : "rgba(255,255,255,.06)")}`,
                    color: sel ? "#fff" : styles.text,
                    borderRadius:7, padding:"6px 12px", fontSize:11, cursor:"pointer", fontFamily:"'JetBrains Mono',monospace", fontWeight:600,
                    boxShadow: sel ? `0 4px 14px ${BRAND.primary}40` : "none",
                    transition:"all .15s",
                  }}>
                    {fmtDateShort(n.date)}
                    {n.podcastUrl && (!n.podcastExpiresAt || !isExpired(n.podcastExpiresAt)) && <span style={{ marginLeft:5 }}>🎙️</span>}
                  </button>
                );
              })}
            </div>
          )}
        </div>
      </div>

      {/* ═══ MAIN CONTENT ═══ */}
      <div style={{ maxWidth:1100, margin:"0 auto", padding:"32px 24px 60px" }}>
        {!current ? (
          <div style={{
            border: `2px dashed ${isLight ? BRAND.border : "rgba(255,255,255,.07)"}`,
            borderRadius:16, padding:"80px 20px",
            textAlign:"center", color: styles.textMuted,
            background: isLight ? "#fff" : "transparent",
          }}>
            <div className="float" style={{ fontSize:48, marginBottom:14 }}>📭</div>
            <div style={{ fontSize:18, fontWeight:600, color: styles.text, fontFamily:"'Fraunces',serif" }}>Nenhuma edição disponível</div>
            <div style={{ fontSize:12, marginTop:6 }}>Volte em breve para conferir as novidades</div>

          <div className="fade">
            {/* TITLE BLOCK */}
            <div style={{ marginBottom:28 }}>
              <div style={{
                display:"inline-block",
                fontSize:11, fontWeight:700, letterSpacing:".15em", textTransform:"uppercase",
                background: `linear-gradient(135deg, ${BRAND.primary}, ${BRAND.secondary})`,
                WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent", backgroundClip:"text",
                marginBottom:10,
              }}>
                Edição de {fmtDateLong(current.date)}
              </div>
              <h1 style={{
                fontFamily:"'Fraunces',serif", fontSize:"clamp(32px, 5vw, 52px)", fontWeight:800,
                color: styles.text, margin:"4px 0 0",
                letterSpacing:"-.035em", lineHeight:1.05,
              }}>
                {current.title || "Highlights de IA"}
              </h1>
              {current.subtitle && (
                <div style={{
                  fontSize:18, color: styles.textMuted, marginTop:14, lineHeight:1.55, maxWidth:780,
                  fontFamily:"'Fraunces',serif", fontWeight:400, fontStyle:"italic",
                }}>
                  {current.subtitle}
                </div>
              )}
              {/* Meta info */}
              <div style={{ display:"flex", gap:14, marginTop:16, fontSize:11, color: styles.textMuted, flexWrap:"wrap" }}>
                {readTime > 0 && <span>📖 {readTime} min de leitura</span>}
                {current.headlines?.length > 0 && <span>📰 {current.headlines.length} notícia{current.headlines.length !== 1 ? "s" : ""}</span>}
                {podcastValid && <span style={{ color: BRAND.primary, fontWeight:600 }}>🎙️ Podcast disponível</span>}
              </div>
            </div>

            {/* PODCAST PLAYER (FEATURED, FIRST) */}
            {podcastValid && (
              <div style={{
                background: isLight
                  ? `linear-gradient(135deg, #fff 0%, ${BRAND.primary}08 100%)`
                  : "linear-gradient(135deg, rgba(0,80,255,.06), rgba(124,58,237,.04))",
                border: `1px solid ${isLight ? BRAND.border : "rgba(0,180,255,.2)"}`,
                borderRadius:16, padding:24, marginBottom:30,
                boxShadow: isLight ? styles.cardShadow : "none",
              }}>
                <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:14, flexWrap:"wrap", gap:10 }}>
                  <div style={{ display:"flex", alignItems:"center", gap:12 }}>
                    <div style={{
                      width:42, height:42, borderRadius:11,
                      background:`linear-gradient(135deg, ${BRAND.primary}, ${BRAND.secondary})`,
                      display:"flex", alignItems:"center", justifyContent:"center",
                      fontSize:22, color:"#fff",
                      boxShadow:`0 4px 14px ${BRAND.primary}40`,
                    }}>🎙️</div>
                    <div>
                      <div style={{ fontSize:14, fontWeight:700, color: styles.text, fontFamily:"'Fraunces',serif", fontStyle:"italic" }}>
                        {current.podcastTitle || "Podcast da Semana"}
                      </div>
                      <div style={{ fontSize:11, color: styles.textMuted, marginTop:2 }}>
                        Syncronize-MI {current.podcastDuration ? `· ${current.podcastDuration} min` : ""}
                      </div>
                    </div>
                  </div>
                  {current.podcastExpiresAt && (
                    <div style={{
                      fontSize:10, padding:"4px 10px", borderRadius:6,
                      background: isLight ? "#fff8e7" : "rgba(251,191,36,.1)",
                      color: isLight ? "#92400e" : "#fbbf24",
                      fontFamily:"'JetBrains Mono',monospace", fontWeight:600,
                    }}>
                      ⏰ até {new Date(current.podcastExpiresAt).toLocaleDateString("pt-BR")}
                    </div>
                  )}
                </div>
                <VideoPlayer url={current.podcastUrl} poster={current.podcastThumbnail} light={isLight} maxHeight={520} />
              </div>
            )}

            {current?.podcastUrl && !podcastValid && (
              <div style={{
                background: isLight ? "#fff8e7" : "rgba(251,191,36,.06)",
                border: `1px solid ${isLight ? "#fde68a" : "rgba(251,191,36,.25)"}`,
                borderRadius:11, padding:14, marginBottom:24, fontSize:12,
                color: isLight ? "#92400e" : "#fbbf24",
              }}>
                ⏰ O podcast desta edição expirou e não está mais disponível.
              </div>
            )}

            {/* TL;DR / EXECUTIVE SUMMARY */}
            {current.aiSummary && (
              <div style={{
                background: isLight ? "#fff" : "rgba(255,255,255,.02)",
                border: `1px solid ${isLight ? BRAND.border : "rgba(124,58,237,.2)"}`,
                borderRadius:16, padding:28, marginBottom:30,
                boxShadow: styles.cardShadow,
                position:"relative", overflow:"hidden",
              }}>
                <div style={{
                  position:"absolute", top:0, left:0, right:0, height:4,
                  background:`linear-gradient(90deg, ${BRAND.primary}, ${BRAND.secondary}, ${BRAND.pink})`,
                }} />
                <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:14 }}>
                  <span style={{
                    fontSize:11, fontWeight:700, letterSpacing:".15em", textTransform:"uppercase",
                    color: BRAND.secondary,
                  }}>🧠 Análise da Semana</span>
                  <span style={{ fontSize:10, color: styles.textMuted }}>· Editorial IA</span>
                </div>
                <div style={{
                  fontFamily:"'Fraunces',serif", fontSize:18, lineHeight:1.7,
                  color: styles.text, whiteSpace:"pre-wrap",
                  fontWeight:400,
                }}>{current.aiSummary}</div>
              </div>
            )}

            {/* FOCUS AREAS — INSIGHT CARDS */}
            {current.focusInsights && current.focusInsights.length > 0 && (
              <div style={{ marginBottom:30 }}>
                <div style={{
                  fontSize:11, color: styles.textMuted, fontWeight:700,
                  letterSpacing:".15em", textTransform:"uppercase", marginBottom:14,
                  display:"flex", alignItems:"center", gap:8,
                }}>
                  <span style={{ width:24, height:1, background: styles.cardBorder }} />
                  Temas em Destaque
                  <span style={{ flex:1, height:1, background: styles.cardBorder }} />
                </div>
                <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(280px, 1fr))", gap:14 }}>
                  {FOCUS_AREAS.map((area, i) => {
                    const insight = current.focusInsights.find(x => x.area === area.id);
                    if (!insight?.summary) return null;
                    const colors = [BRAND.primary, BRAND.secondary, BRAND.accent];
                    const color = colors[i] || BRAND.primary;
                    return (
                      <div key={area.id} style={{
                        background: isLight ? "#fff" : "rgba(255,255,255,.02)",
                        border: `1px solid ${isLight ? BRAND.border : "rgba(255,255,255,.06)"}`,
                        borderRadius:14, padding:20,
                        boxShadow: styles.cardShadow,
                        position:"relative", overflow:"hidden",
                        transition:"all .25s",
                      }} onMouseEnter={e => e.currentTarget.style.boxShadow = styles.cardShadowHover}
                         onMouseLeave={e => e.currentTarget.style.boxShadow = styles.cardShadow}>
                        <div style={{ position:"absolute", top:0, left:0, bottom:0, width:4, background:color }} />
                        <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:10, paddingLeft:8 }}>
                          <div style={{
                            width:36, height:36, borderRadius:10,
                            background: `${color}15`, color: color,
                            display:"flex", alignItems:"center", justifyContent:"center",
                            fontSize:18,
                          }}>{area.icon}</div>
                          <div style={{ fontSize:11, color: color, fontWeight:700, letterSpacing:".05em", textTransform:"uppercase" }}>
                            {area.label}
                          </div>
                        </div>
                        <div style={{ fontSize:14, color: styles.text, lineHeight:1.6, paddingLeft:8 }}>
                          {insight.summary}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* HEADLINES — FILTER + GRID */}
            {current.headlines && current.headlines.length > 0 && (
              <div>
                <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:16, flexWrap:"wrap", gap:10 }}>
                  <div style={{ fontSize:11, color: styles.textMuted, fontWeight:700, letterSpacing:".15em", textTransform:"uppercase" }}>
                    📰 Notícias da Semana ({filteredHeadlines.length}/{current.headlines.length})
                  </div>
                  {/* Category filter */}
                  {categoriesInUse.length > 1 && (
                    <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                      <button onClick={() => setFilter("all")} style={{
                        padding:"4px 10px", borderRadius:6, fontSize:10, fontWeight:600, cursor:"pointer",
                        background: filter === "all" ? styles.text : "transparent",
                        color: filter === "all" ? styles.bg : styles.textMuted,
                        border: `1px solid ${filter === "all" ? styles.text : (isLight ? BRAND.border : "rgba(255,255,255,.1)")}`,
                        fontFamily:"'Outfit',sans-serif",
                      }}>Todas</button>
                      {categoriesInUse.map(cat => {
                        const sel = filter === cat;
                        const catColor = isLight ? CAT_LIGHT[cat] : null;
                        const darkColor = CAT_DARK[cat] || "#888";
                        return (
                          <button key={cat} onClick={() => setFilter(cat)} style={{
                            padding:"4px 10px", borderRadius:6, fontSize:10, fontWeight:600, cursor:"pointer",
                            background: sel ? (catColor?.bg || `${darkColor}20`) : "transparent",
                            color: sel ? (catColor?.color || darkColor) : styles.textMuted,
                            border: `1px solid ${sel ? (catColor?.color || darkColor) + "40" : (isLight ? BRAND.border : "rgba(255,255,255,.1)")}`,
                            fontFamily:"'Outfit',sans-serif",
                          }}>{cat}</button>
                        );
                      })}
                    </div>
                  )}
                </div>

                <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(330px, 1fr))", gap:16 }}>
                  {filteredHeadlines.map((h, i) => {
                    const catStyle = isLight ? CAT_LIGHT[h.category] : null;
                    const darkColor = CAT_DARK[h.category] || "#888";
                    // First card: featured (full row on small)
                    const featured = i === 0 && filter === "all";
                    return (
                      <div key={i} style={{
                        gridColumn: featured ? "1 / -1" : "auto",
                        background: isLight ? "#fff" : "rgba(255,255,255,.02)",
                        border: `1px solid ${isLight ? BRAND.border : "rgba(255,255,255,.06)"}`,
                        borderRadius:14, padding: featured ? 24 : 18,
                        cursor: h.url ? "pointer" : "default",
                        transition:"all .2s",
                        boxShadow: styles.cardShadow,
                        display:"flex", flexDirection: featured ? "row" : "column", gap:14,
                        flexWrap: "wrap",
                      }}
                      onClick={() => h.url && window.open(h.url, "_blank", "noopener,noreferrer")}
                      onMouseEnter={e => { if (h.url) { e.currentTarget.style.boxShadow = styles.cardShadowHover; e.currentTarget.style.transform = "translateY(-2px)"; } }}
                      onMouseLeave={e => { e.currentTarget.style.boxShadow = styles.cardShadow; e.currentTarget.style.transform = "translateY(0)"; }}>
                        <div style={{ flex:1, minWidth:200 }}>
                          <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:10, flexWrap:"wrap" }}>
                            <span style={{
                              fontSize:9, padding:"3px 9px", borderRadius:5, fontWeight:700, letterSpacing:".04em",
                              background: catStyle?.bg || `${darkColor}20`,
                              color: catStyle?.color || darkColor,
                            }}>{h.category || "IA"}</span>
                            {h.source && <span style={{ fontSize:10, color: styles.textMuted, fontWeight:500 }}>{h.source}</span>}
                            {featured && (
                              <span style={{
                                fontSize:9, padding:"3px 9px", borderRadius:5, fontWeight:700, letterSpacing:".04em",
                                background: `linear-gradient(135deg, ${BRAND.primary}, ${BRAND.secondary})`,
                                color:"#fff",
                              }}>⭐ DESTAQUE</span>
                            )}
                          </div>
                          <div style={{
                            fontFamily:"'Fraunces',serif",
                            fontSize: featured ? 22 : 17, fontWeight: featured ? 700 : 600, lineHeight:1.3,
                            color: styles.text, marginBottom:10,
                          }}>{h.title}</div>
                          <div style={{ fontSize: featured ? 14 : 13, color: styles.textMuted, lineHeight:1.6 }}>
                            {h.summary}
                          </div>
                          {h.url && (
                            <div style={{
                              marginTop:12, fontSize:11, fontWeight:600,
                              color: BRAND.primary,
                              display:"flex", alignItems:"center", gap:5,
                            }}>
                              Ler matéria completa →
                            </div>
                          )}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* FOOTER */}
            <div style={{
              marginTop:60, paddingTop:30,
              borderTop: `1px solid ${isLight ? BRAND.border : "rgba(255,255,255,.05)"}`,
              textAlign:"center", color: styles.textMuted, fontSize:11,
            }}>
              <div style={{ display:"flex", justifyContent:"center", gap:14, marginBottom:14, flexWrap:"wrap" }}>
                <button onClick={handleShare} style={{
                  background: `linear-gradient(135deg, ${BRAND.primary}, ${BRAND.secondary})`,
                  border:"none", color:"#fff", padding:"10px 22px", borderRadius:9,
                  fontSize:13, fontWeight:600, cursor:"pointer", fontFamily:"'Outfit',sans-serif",
                  boxShadow:`0 4px 14px ${BRAND.primary}30`,
                  display:"flex", alignItems:"center", gap:7,
                }}>
                  {shareCopied ? "✓ Link copiado!" : "🔗 Compartilhar Edição"}
                </button>
                <button onClick={copyShareUrl} style={{
                  background: "transparent",
                  border: `1px solid ${isLight ? BRAND.border : "rgba(255,255,255,.1)"}`,
                  color: styles.text, padding:"10px 22px", borderRadius:9,
                  fontSize:13, fontWeight:500, cursor:"pointer", fontFamily:"'Outfit',sans-serif",
                }}>
                  📋 Copiar Link
                </button>
              </div>
              <div style={{ marginTop:14, fontWeight:500 }}>📡 Syncronize-MI · Curadoria semanal de IA</div>

              }}>{shareCopied ? "✓ Copiado" : "📋 Copiar"}</button>
              <button onClick={() => setShareOpen(false)} style={{
                background:"transparent", border: `1px solid ${styles.cardBorder}`, color: styles.text, padding:"10px 16px", borderRadius:7,
                fontSize:12, cursor:"pointer",
              }}>Fechar</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

        false, 2000);

  const genEmailCopy = async () => {
    if (!refinedScript.trim() && !rawText.trim()) { setRefineError("Gere o roteiro."); return; }

    if (!heygenAvatarId.trim()) { setRenderError("Avatar ID?"); return; }

    try {
      setRenderPct(15); setRenderMsg("🔑 Auth...");
      const cleanScript = refinedScript.replace(/\[pausa\]/g, "...").replace(/\[\?\]/g, "?").replace(/\*([^*]+)\*/g, "$1");
      const videoId = await heygenGenerateVideo(heygenApiKey.trim(), {
        avatarId: heygenAvatarId.trim(), voiceId: heygenVoiceId.trim(), scriptText: cleanScript,

      setRenderPct(30); setRenderMsg(`🎬 ${videoId.slice(0,12)}...`);

      while (attempts < 60) {

        if (status?.status === "completed") {
          setRenderPct(100); setRenderMsg("✅");
          setVideoUrl(status.video_url || ""); setThumbnailUrl(status.thumbnail_url || "");
          setRenderDone(true); markDone(4);

        } else if (status?.status === "failed") {

        } else {
          pct = Math.min(95, pct + 3); setRenderPct(pct);
          setRenderMsg(`🎬 ${status?.status}... (${attempts})`);
        }

                  <div style={{ display:"flex", gap:6 }}>
                    {[5,8,10,12,15].map(d => (
                      <button key={d} onClick={() => setDuration(d)} style={{ flex:1, padding:"8px 0", borderRadius:7, border:"1px solid", borderColor: duration===d ? "#00b4ff" : "rgba(255,255,255,.09)", background: duration===d ? "rgba(0,180,255,.1)" : "rgba(255,255,255,.02)", color: duration===d ? "#00b4ff" : "#4a6a80", cursor:"pointer", fontWeight:700, fontSize:12 }}>{d}m</button>
                    ))}
                  </div>
                </Field>
                <Field label="Avatar">
                  <div onClick={() => fileRef.current?.click()} style={{ border:"2px dashed rgba(0,180,255,.22)", borderRadius:10, padding:16, textAlign:"center", cursor:"pointer" }}>
                    {avatarPreview ? <img src={avatarPreview} alt="" style={{ width:60, height:60, borderRadius:"50%", objectFit:"cover" }} /> : <>🤳 Foto</>}
                    <input ref={fileRef} type="file" accept="image/*" style={{ display:"none" }} onChange={handleUpload} />
                  </div>
                  <div style={{ display:"flex", flexWrap:"wrap", gap:5, marginTop:8 }}>
                    {KLING_ROLES.map(r => (<Chip key={r.id} sel={kRole===r.id} onClick={() => setKRole(r.id)}>{r.icon} {r.label}</Chip>))}
                  </div>
                </Field>
              </div>
              <div>
                <div style={{ display:"flex", justifyContent:"space-between", marginBottom:10 }}>
                  <div style={{ fontSize:9, fontWeight:700, color:"#2a5070", letterSpacing:".1em", textTransform:"uppercase" }}>Manchetes</div>
                  <div style={{ display:"flex", gap:6 }}>
                    {editorHeadlines.length > 0 && <Btn secondary onClick={importHeadlinesFromNewsletter}>📥 Newsletter</Btn>}
                    <Btn onClick={fetchNews} disabled={loadingNews}>{loadingNews ? <><Spinner /> ...</> : "🔍"}</Btn>
                  </div>
                </div>
                <ErrorBox msg={newsError} />
                {loadingNews && [...Array(5)].map((_, i) => (<div key={i} className="shim-dark" style={{ height:50, borderRadius:9, marginBottom:6 }} />))}
                <div style={{ display:"flex", flexDirection:"column", gap:6, maxHeight:380, overflowY:"auto" }}>
                  {headlines.map((h, i) => {
                    const sel = selHL.find(x => x.title === h.title);
                    return (
                      <div key={i} onClick={() => toggleHL(h)} style={{ background: sel ? "rgba(0,180,255,.07)" : "rgba(255,255,255,.02)", border: `1px solid ${sel ? "rgba(0,180,255,.35)" : "rgba(255,255,255,.05)"}`, borderRadius:9, padding:"10px 12px", cursor:"pointer" }}>
                        <div style={{ fontSize:12, fontWeight:600, color: sel ? "#00b4ff" : "#a8c8d8" }}>{h.title}</div>
                        <div style={{ fontSize:10, color:"#506070", marginTop:3 }}>{h.summary}</div>
                      </div>
                    );
                  })}
                </div>
                {headlines.length > 0 && (
                  <Btn onClick={genQuickScript} disabled={isGenQuick} style={{ width:"100%", marginTop:8 }}>
                    {isGenQuick ? <><Spinner /> ...</> : `📖 Roteiro`}
                  </Btn>
                )}
              </div>
            </div>
            {quickScript && (
              <div style={{ marginTop:18, background:"rgba(45,138,10,.06)", border:"1px solid rgba(45,138,10,.25)", borderRadius:11, padding:16 }}>
                <div style={{ display:"flex", justifyContent:"space-between", marginBottom:10 }}>
                  <div style={{ fontWeight:700, color:"#6ad446" }}>📖 Roteiro</div>
                  <Btn onClick={() => { setRefined(quickScript); markDone(2); setTab(3); }}>✍️ Usar →</Btn>
                </div>
                <div style={{ fontSize:12, color:"#90c870", whiteSpace:"pre-wrap", maxHeight:300, overflowY:"auto" }}>{quickScript}</div>
              </div>
            )}
          </div>
        )}

        {/* ════ ROTEIRO ══════════════════════════════════════════════════════ */}
        {tab === 3 && keyValidated && (
          <div className="fade">
            <SectionHeader icon="✍️" title="Roteiro" sub="" />
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:22, marginTop:18 }}>
              <div>
                <Field label="Conteúdo" mt={0}>
                  <TextArea value={rawText} onChange={e => setRawText(e.target.value)} rows={10} />
                  <Btn onClick={refineScript} disabled={isRefining || !rawText.trim()} style={{ marginTop:8 }}>
                    {isRefining ? <><Spinner /> ...</> : "✨ Refinar"}
                  </Btn>
                  <ErrorBox msg={refineError} />
                </Field>
                <Field label="E-mail">
                  <TextInput value={emailSubject} onChange={e => setEmailSubject(e.target.value)} placeholder="Assunto" />
                  <div style={{ marginTop:6 }}><TextArea value={distEmail} onChange={e => setDistEmail(e.target.value)} rows={4} /></div>
                  <Btn onClick={genEmailCopy} disabled={isGenEmail} style={{ marginTop:8, width:"100%" }}>
                    {isGenEmail ? <><Spinner /> ...</> : "🤖 Gerar"}
                  </Btn>
                </Field>
              </div>
              <div>
                <Field label="Roteiro" mt={0}>
                  {!refinedScript ? <div style={{ border:"1px dashed rgba(255,255,255,.07)", borderRadius:9, padding:40, textAlign:"center", color:"#506070" }}>Refine primeiro</div> : <TextArea value={refinedScript} onChange={e => setRefined(e.target.value)} rows={16} />}
                </Field>
              </div>
            </div>
          </div>
        )}

        {/* ════ RENDER ═══════════════════════════════════════════════════════ */}
        {tab === 4 && keyValidated && (
          <div className="fade">
            <SectionHeader icon="🎬" title="Render" sub="" />
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:22, marginTop:20 }}>
              <div>
                <Field label="Motor" mt={0}>
                  <div style={{ display:"flex", gap:10 }}>
                    <Card sel={renderEngine==="kling"} onClick={() => setRenderEngine("kling")}><span>⚡ Kling</span></Card>
                    <Card sel={renderEngine==="heygen"} onClick={() => setRenderEngine("heygen")}><span>🎥 HeyGen</span></Card>
                  </div>
                </Field>
                <Btn onClick={startRender} disabled={isRendering || !refinedScript} style={{ width:"100%", marginTop:14 }}>
                  {isRendering ? <><Spinner /> ...</> : "🚀 Iniciar"}
                </Btn>
                <ErrorBox msg={renderError} />
              </div>
              <div>
                <Field label="Pipeline" mt={0}>
                  {(isRendering || renderDone) && (
                    <div style={{ background:"rgba(255,255,255,.02)", borderRadius:10, padding:14, marginBottom:12 }}>
                      <div style={{ display:"flex", justifyContent:"space-between", marginBottom:8 }}>
                        <span style={{ fontSize:11, color:"#90b0c8" }}>{renderMsg}</span>
                        <span style={{ fontFamily:"monospace", color: renderDone ? "#10b981" : "#00b4ff" }}>{renderPct}%</span>
                      </div>
                      <div style={{ background:"rgba(255,255,255,.06)", borderRadius:99, height:7 }}>
                        <div style={{ width:`${renderPct}%`, height:"100%", borderRadius:99, transition:"width .6s", background: renderDone ? "linear-gradient(90deg,#10b981,#34d399)" : "linear-gradient(90deg,#0050ff,#7c3aed)" }} />
                      </div>
                    </div>
                  )}
                  {renderDone && videoUrl && (
                    <div style={{ background:"rgba(16,185,129,.05)", border:"1px solid rgba(16,185,129,.18)", borderRadius:10, padding:14 }}>
                      <div style={{ fontWeight:700, color:"#10b981", marginBottom:10 }}>🎉 Pronto</div>
                      <VideoPlayer url={videoUrl} poster={thumbnailUrl} maxHeight={300} />
                      <div style={{ display:"flex", gap:8, marginTop:10 }}>
                        <Btn success onClick={() => window.open(videoUrl, "_blank")}>⬇️</Btn>
                        <Btn secondary onClick={() => copyText(videoUrl)}>{copied ? "✓" : "📋"}</Btn>
                        <Btn onClick={() => setTab(5)}>📤 →</Btn>
                      </div>
                    </div>
                  )}
                </Field>
              </div>
            </div>
          </div>
        )}

        {/* ════ DISTRIBUIÇÃO ════════════════════════════════════════════════ */}
        {tab === 5 && keyValidated && (
          <div className="fade">
            <SectionHeader icon="📤" title="Distribuição" sub="" />
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:22, marginTop:20 }}>
              <div>
                <Field label="Para" mt={0}><TextArea value={teamEmails} onChange={e => setTeamEmails(e.target.value)} rows={3} /></Field>
                <Field label="Mensagem">
                  <TextInput value={emailSubject} onChange={e => setEmailSubject(e.target.value)} placeholder="Assunto" />
                  <div style={{ marginTop:6 }}><TextArea value={distMsg} onChange={e => setDistMsg(e.target.value)} rows={6} /></div>
                  <Btn onClick={genDistMsg} disabled={isGenMsg} style={{ marginTop:8, width:"100%" }}>{isGenMsg ? <><Spinner /> ...</> : "🤖"}</Btn>
                </Field>
              </div>
              <div>
                <Field label="Canais" mt={0}>
                  <Btn success onClick={sendByEmail} style={{ width:"100%", marginBottom:8 }}>📨 E-mail</Btn>
                  <Btn onClick={sendToTeams} disabled={!teamsWebhook} style={{ width:"100%", marginBottom:8 }}>💬 Teams</Btn>
                  <Btn secondary onClick={() => copyText(`${emailSubject}\n\n${distMsg}\n\n${videoUrl}`)} style={{ width:"100%" }}>{copied ? "✓" : "📋"}</Btn>
                </Field>
                <ErrorBox msg={distError} />
                <InfoBox msg={distSuccess} />
              </div>
            </div>
          </div>
        )}

        {/* ════ HISTÓRICO ════════════════════════════════════════════════════ */}
        {tab === 6 && keyValidated && (
          <div className="fade">
            <SectionHeader icon="📚" title="Histórico" sub={`${episodes.length} eps · ${newsletters.length} edições`} />
            <div style={{ marginTop:18, marginBottom:24 }}>
              <div style={{ fontSize:11, color:"#a78bfa", fontWeight:700, marginBottom:10 }}>📰 Newsletters</div>
              {newsletters.length === 0 ? <div style={{ color:"#506070" }}>Nenhuma</div> :
                <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(280px, 1fr))", gap:10 }}>
                  {newsletters.map(n => (
                    <div key={n.id} style={{ background:"rgba(124,58,237,.04)", border:"1px solid rgba(124,58,237,.2)", borderRadius:10, padding:12 }}>
                      <div style={{ fontSize:11, color:"#a78bfa", fontFamily:"monospace", fontWeight:700 }}>{fmtDate(n.date)}</div>
                      <div style={{ fontSize:12, fontWeight:700, color:"#e0e8f0", margin:"4px 0" }}>{n.title}</div>
                      <div style={{ fontSize:10, color:"#506070", marginBottom:8 }}>{n.headlines?.length || 0} manchetes</div>
                      <div style={{ display:"flex", gap:5 }}>
                        <button onClick={() => { setEditorDate(n.date); setTab(0); }} style={{ flex:1, background:"rgba(124,58,237,.1)", border:"1px solid rgba(124,58,237,.3)", color:"#a78bfa", borderRadius:5, padding:"4px", fontSize:10, cursor:"pointer" }}>📝</button>
                        <a href={`?view=public&date=${n.date}`} target="_blank" rel="noreferrer" style={{ flex:1, background:"rgba(16,185,129,.1)", border:"1px solid rgba(16,185,129,.3)", color:"#10b981", borderRadius:5, padding:"4px", fontSize:10, textAlign:"center", textDecoration:"none" }}>👁️</a>
                        <button onClick={() => deleteNewsletter(n.date)} style={{ background:"rgba(239,68,68,.1)", border:"1px solid rgba(239,68,68,.3)", color:"#ef4444", borderRadius:5, padding:"4px 8px", fontSize:10, cursor:"pointer" }}>🗑️</button>
                      </div>
                    </div>
                  ))}
                </div>
              }
            </div>
            <div>
              <div style={{ fontSize:11, color:"#00b4ff", fontWeight:700, marginBottom:10 }}>🎬 Episódios</div>
              {selectedEpisode && (
                <div style={{ background:"rgba(0,180,255,.04)", border:"1px solid rgba(0,180,255,.2)", borderRadius:11, padding:16, marginBottom:14 }}>
                  <div style={{ display:"flex", justifyContent:"space-between", marginBottom:10 }}>
                    <div style={{ fontWeight:700, color:"#00b4ff" }}>{selectedEpisode.title}</div>
                    <Btn secondary onClick={() => setSelectedEpisode(null)}>✕</Btn>
                  </div>
                  {selectedEpisode.videoUrl && <VideoPlayer url={selectedEpisode.videoUrl} poster={selectedEpisode.thumbnailUrl} maxHeight={400} />}
                </div>
              )}
              {episodes.length === 0 ? <div style={{ color:"#506070" }}>Nenhum</div> :
                <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(280px, 1fr))", gap:10 }}>
                  {episodes.map(ep => (
                    <div key={ep.id} style={{ background:"rgba(255,255,255,.02)", border:"1px solid rgba(255,255,255,.06)", borderRadius:10, overflow:"hidden" }}>
                      {ep.thumbnailUrl ? <img src={ep.thumbnailUrl} alt="" style={{ width:"100%", height:120, objectFit:"cover" }} /> : <div style={{ height:80, background:"linear-gradient(135deg,#0a1628,#0d1a2e)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:30 }}>{ep.engine === "kling" ? "⚡" : "🎥"}</div>}
                      <div style={{ padding:12 }}>
                        <div style={{ fontWeight:700, color:"#c8d8e8" }}>{ep.title}</div>
                        <div style={{ fontSize:10, color:"#506070", fontFamily:"monospace", marginTop:3 }}>{new Date(ep.createdAt).toLocaleDateString("pt-BR")}</div>
                        <div style={{ display:"flex", gap:5, marginTop:8 }}>
                          <button onClick={() => setSelectedEpisode(ep)} style={{ flex:1, background:"rgba(0,180,255,.1)", border:"1px solid rgba(0,180,255,.3)", color:"#00b4ff", borderRadius:5, padding:"4px", fontSize:10, cursor:"pointer" }}>👁️</button>
                          {ep.videoUrl && <button onClick={() => useEpisodeAsPodcast(ep)} style={{ background:"rgba(29,185,84,.1)", border:"1px solid rgba(29,185,84,.3)", color:"#1DB954", borderRadius:5, padding:"4px 10px", fontSize:10, cursor:"pointer" }}>📰</button>}
                          <button onClick={() => { if(confirm("Deletar?")) deleteEpisode(ep.id); }} style={{ background:"rgba(239,68,68,.1)", border:"1px solid rgba(239,68,68,.3)", color:"#ef4444", borderRadius:5, padding:"4px 8px", fontSize:10, cursor:"pointer" }}>🗑️</button>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              }
            </div>
          </div>
        )}

        {tab > 1 && !keyValidated && (
          <div className="fade" style={{ textAlign:"center", padding:80 }}>
            <div style={{ fontSize:48 }}>🔒</div>
            <div style={{ fontSize:18, fontWeight:700, color:"#d97706", marginTop:14 }}>Bloqueado</div>
            <Btn onClick={() => setTab(1)} style={{ marginTop:14 }}>← Diagnóstico</Btn>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── ROUTER ──────────────────────────────────────────────────────────────────

function App() {
  const params = new URLSearchParams(window.location.search);
  const view = params.get("view");
  if (view === "public") return <PublicNewsletter />;
  return <AdminApp />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
